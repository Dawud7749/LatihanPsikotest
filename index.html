encapai tujuan."},{"number":14,"question":"ANTONIM - PRIORITAS (Seri2)","options":{"A":"Hal yang paling utama dan mendesak","B":"Target yang harus dicapai segera","C":"Program unggulan perusahaan","D":"Hal yang dikesampingkan atau tidak diutamakan","E":"Agenda paling penting dalam rapat"},"answer":"D","explanation":"Prioritas berarti hal yang diutamakan atau didahulukan. Antonimnya adalah hal yang dikesampingkan atau diletakkan di urutan bawah."},{"number":15,"question":"ANALOGI - HALTE : SHELTER = DEPO : ...","options":{"A":"Terminal penumpang akhir","B":"Pusat kendali operasional","C":"Workshop perbaikan darurat","D":"Pos keamanan armada","E":"Garasi penyimpanan armada"},"answer":"E","explanation":"Halte disebut juga Shelter (tempat pemberhentian). Depo setara dengan Garasi, yaitu fasilitas tempat armada disimpan dan dirawat."},{"number":16,"question":"ANALOGI - PENGEMUDI : KEMUDI = NAHKODA : ...","options":{"A":"Setir atau kemudi kapal laut","B":"Jangkar kapal laut","C":"Lambung kapal","D":"Peta navigasi pelayaran","E":"Mesin penggerak kapal"},"answer":"A","explanation":"Pengemudi mengendalikan kendaraan melalui Kemudi (setir). Nahkoda mengendalikan kapal laut melalui Kemudi atau Setir kapal."},{"number":17,"question":"ANALOGI - RUTE : PETA = JADWAL : ...","options":{"A":"Aplikasi pemantau bus real-time","B":"Timetable atau papan informasi keberangkatan","C":"Tiket elektronik penumpang","D":"Laporan kinerja bulanan","E":"Sistem GPS kendaraan"},"answer":"B","explanation":"Rute perjalanan dibaca melalui Peta. Jadwal perjalanan dibaca melalui Timetable (papan informasi keberangkatan)."},{"number":18,"question":"ANALOGI - BUS LISTRIK : CHARGING STATION = KENDARAAN BERBAHAN BAKAR : ...","options":{"A":"Bengkel perawatan rutin","B":"Depo penyimpanan armada","C":"SPBU atau stasiun pengisian bahan bakar","D":"Pabrik perakitan kendaraan","E":"Gudang suku cadang kendaraan"},"answer":"C","explanation":"Bus Listrik mengisi energi di Charging Station. Kendaraan berbahan bakar mengisi energi di SPBU."},{"number":19,"question":"ANALOGI - ASURANSI : RISIKO = PEMELIHARAAN PREVENTIF : ...","options":{"A":"Biaya operasional harian","B":"Jadwal servis berkala","C":"Laporan kondisi armada","D":"Kerusakan atau gangguan teknis","E":"Pelatihan teknisi bengkel"},"answer":"D","explanation":"Asuransi memitigasi Risiko. Pemeliharaan Preventif dilakukan untuk mencegah terjadinya Kerusakan atau gangguan teknis."},{"number":20,"question":"ANALOGI - OPERATOR BUS : IZIN TRAYEK = PENGEMUDI : ...","options":{"A":"Seragam dinas resmi","B":"Kontrak kerja dengan perusahaan","C":"Kartu identitas karyawan","D":"Rekam jejak perjalanan digital","E":"Surat Izin Mengemudi (SIM)"},"answer":"E","explanation":"Operator Bus membutuhkan Izin Trayek sebagai legalitas. Pengemudi membutuhkan SIM sebagai legalitas untuk mengoperasikan kendaraan."},{"number":21,"question":"PEMAHAMAN - (Park and Ride) Tujuan utama pengembangan sistem Park and Ride menurut teks adalah...","options":{"A":"Mengurangi dominasi kendaraan pribadi yang masuk ke pusat kota","B":"Menambah kapasitas parkir di seluruh wilayah Jakarta","C":"Memperluas jaringan MRT dan LRT ke pinggiran kota","D":"Meningkatkan pendapatan daerah dari sektor perparkiran","E":"Mempersingkat waktu tempuh dari pinggiran ke pusat kota"},"answer":"A","explanation":"Kalimat pertama teks menyatakan Park and Ride dikembangkan \"untuk mengurangi dominasi kendaraan pribadi di pusat kota\"."},{"number":22,"question":"PEMAHAMAN - (Park and Ride) Manakah syarat agar implementasi Park and Ride berhasil yang PALING LENGKAP sesuai teks?","options":{"A":"Lahan luas, teknologi canggih, dan dukungan pemerintah pusat","B":"Lokasi strategis, tarif parkir terjangkau, dan frekuensi transportasi publik yang tinggi","C":"Keamanan area parkir, kemudahan akses, dan harga tiket murah","D":"Integrasi pembayaran digital, armada memadai, dan sosialisasi warga","E":"Jarak dekat ke pusat kota, parkir gratis, dan jadwal bus yang tepat waktu"},"answer":"B","explanation":"Teks secara tersurat menyebutkan tiga syarat: lokasi strategis, tarif parkir terjangkau, dan frekuensi layanan transportasi publik yang tinggi."},{"number":23,"question":"PEMAHAMAN - (Park and Ride) Kata \"studi kelayakan\" dalam teks memiliki makna yang paling tepat, yaitu...","options":{"A":"Pelatihan teknis bagi petugas lapangan Park and Ride","B":"Survei kepuasan pengguna layanan transportasi","C":"Kajian ilmiah untuk menilai apakah suatu program layak dan dapat berhasil dilaksanakan","D":"Laporan keuangan tahunan program transportasi publik","E":"Peta rencana lokasi pembangunan fasilitas parkir"},"answer":"C","explanation":"Studi kelayakan (feasibility study) adalah kajian mendalam yang dilakukan sebelum suatu program dijalankan untuk menilai apakah program tersebut layak."},{"number":24,"question":"PEMAHAMAN - (Park and Ride) Berdasarkan teks, tantangan terbesar dalam pengembangan Park and Ride saat ini adalah...","options":{"A":"Tingginya biaya pembangunan stasiun MRT baru","B":"Kurangnya minat masyarakat untuk beralih ke transportasi publik","C":"Belum adanya regulasi yang mengatur sistem Park and Ride","D":"Keterbatasan lahan parkir di sekitar titik transit dan belum meratanya layanan feeder","E":"Mahalnya tarif parkir yang membebani pengguna kendaraan pribadi"},"answer":"D","explanation":"Teks secara eksplisit menyebutkan dua tantangan: keterbatasan lahan parkir di sekitar titik transit utama, dan belum meratanya frekuensi layanan feeder."},{"number":25,"question":"PEMAHAMAN - (Park and Ride) Manakah pernyataan yang TIDAK SESUAI atau tidak dapat disimpulkan dari teks Park and Ride?","options":{"A":"Park and Ride merupakan solusi untuk mengurangi kendaraan pribadi di pusat kota","B":"Pengguna Park and Ride memarkirkan kendaraan lalu melanjutkan dengan transportasi publik","C":"Frekuensi feeder yang rendah menjadi salah satu hambatan pengembangan Park and Ride","D":"Tarif parkir yang terjangkau adalah salah satu faktor keberhasilan Park and Ride","E":"Sistem Park and Ride di Jakarta hanya diperuntukkan bagi pengguna MRT dan tidak untuk pengguna Transjakarta"},"answer":"E","explanation":"Teks menyebutkan Park and Ride terintegrasi dengan MRT, LRT, DAN halte Transjakarta, bukan hanya MRT saja."}],"parentId":"verbal","bundleNum":8},"numerik":{"title":"Tes Numerik","order":2,"type":"text","isBundled":true,"bundleIds":["numerik__paket_1","numerik__paket_2","numerik__paket_3","numerik__paket_4","numerik__paket_5","numerik__paket_6","numerik__paket_7","numerik__paket_8","numerik__paket_9","numerik__paket_10"]},"numerik__paket_1":{"title":"Numerik - Paket 1","duration":1800,"questions":[{"number":1,"question":"Kapasitas maksimal satu unit Bus Besar adalah 60 penumpang. Jika dalam satu perjalanan bus tersebut hanya terisi 45 orang, berapa persentase load factor (okupansi) bus tersebut?","options":{"A":"65%","B":"70%","C":"75%","D":"80%","E":"85%"},"answer":"C","explanation":"(45 / 60) x 100% = 3/4 x 100% = 75%."},{"number":2,"question":"Seorang petugas layanan halte mencatat ada 1.200 penumpang di pagi hari. Jika di sore hari jumlahnya meningkat sebesar 25%, berapa total penumpang di sore hari?","options":{"A":"1.400 orang","B":"1.450 orang","C":"1.500 orang","D":"1.550 orang","E":"1.600 orang"},"answer":"C","explanation":"Peningkatan = 25% x 1.200 = 300. Total = 1.200 + 300 = 1.500 orang."},{"number":3,"question":"Harga perolehan satu unit bus listrik adalah Rp5.000.000.000. Jika perusahaan mendapatkan diskon sebesar 5% karena pembelian dalam jumlah besar, berapa harga yang harus dibayar?","options":{"A":"Rp4.500.000.000","B":"Rp4.650.000.000","C":"Rp4.750.000.000","D":"Rp4.850.000.000","E":"Rp4.950.000.000"},"answer":"C","explanation":"Diskon = 5% x 5 Miliar = 250 Juta. Harga bayar = 5.000.000.000 - 250.000.000 = 4.750.000.000."},{"number":4,"question":"Hasil dari 1,25 + 2,50 - (1/2 x 4) adalah...","options":{"A":"1,25","B":"1,50","C":"1,75","D":"2,00","E":"2,25"},"answer":"C","explanation":"1,25 + 2,50 - 2 = 3,75 - 2 = 1,75."},{"number":5,"question":"Sebuah armada bus menempuh jarak 180 km dalam waktu 4 jam termasuk waktu berhenti di halte. Berapa kecepatan rata-rata bus tersebut per jam?","options":{"A":"40 km/jam","B":"45 km/jam","C":"50 km/jam","D":"55 km/jam","E":"60 km/jam"},"answer":"B","explanation":"Kecepatan = Jarak / Waktu = 180 / 4 = 45 km/jam."},{"number":6,"question":"Berapa nilai dari 30% dari 1/5 dari 5.000?","options":{"A":"200","B":"250","C":"300","D":"350","E":"400"},"answer":"C","explanation":"(1/5 x 5.000) = 1.000. Lalu, 30% x 1.000 = 300."},{"number":7,"question":"Total biaya perawatan 5 unit bus dalam sebulan adalah Rp75.000.000. Jika bulan depan perusahaan menambah 3 unit bus lagi, berapa total perkiraan biaya perawatan untuk 8 unit bus?","options":{"A":"Rp105.000.000","B":"Rp110.000.000","C":"Rp120.000.000","D":"Rp125.000.000","E":"Rp130.000.000"},"answer":"C","explanation":"Biaya per bus = 75 Juta / 5 = 15 Juta. Total 8 bus = 8 x 15 Juta = 120 Juta."},{"number":8,"question":"Jika tarif integrasi JakLingko adalah Rp10.000 per 3 jam, berapa biaya yang dikeluarkan seorang penumpang jika ia melakukan perjalanan yang sama setiap hari selama 20 hari kerja (pulang- pergi)?","options":{"A":"Rp200.000","B":"Rp300.000","C":"Rp400.000","D":"Rp500.000","E":"Rp600.000"},"answer":"C","explanation":"Sehari (PP) = 2 x 10.000 = 20.000. Total 20 hari = 20 x 20.000 = 400.000."},{"number":9,"question":"0,75 x 0,2 + 0,15 = ...","options":{"A":"0,25","B":"0,30","C":"0,35","D":"0,40","E":"0,45"},"answer":"B","explanation":"(0,75 x 0,2) = 0,15. Maka 0,15 + 0,15 = 0,30."},{"number":10,"question":"Sebuah bus memiliki tangki BBM berkapasitas 200 liter. Jika jarum indikator menunjukkan sisa 1/4 tangki, berapa liter BBM yang harus diisi agar tangki penuh kembali?","options":{"A":"50 Liter","B":"100 Liter","C":"125 Liter","D":"150 Liter","E":"175 Liter"},"answer":"D","explanation":"Sisa bensin = 1/4 x 200 = 50 Liter. Yang harus diisi = 200 - 50 = 150 Liter. Deret Angka. MT harus memiliki logika yang tajam dalam melihat data yang berurutan. Pola dalam soal-soal ini mencakup penjumlahan, perkalian, hingga pola selang-seling yang sering muncul dalam tes potensi akademik."},{"number":11,"question":"4, 8, 12, 16, 20, ...","options":{"A":"22","B":"24","C":"26","D":"28","E":"30"},"answer":"B","explanation":"Pola penjumlahan tetap (+4). Maka 20 + 4 = 24."},{"number":12,"question":"3, 6, 12, 24, 48, ...","options":{"A":"60","B":"72","C":"84","D":"96","E":"100"},"answer":"D","explanation":"Pola perkalian tetap (x2). Maka 48 x 2 = 96."},{"number":13,"question":"100, 95, 89, 82, 74, ...","options":{"A":"65","B":"66","C":"67","D":"68","E":"69"},"answer":"A","explanation":"Pola pengurangan bertingkat (-5, -6, -7, -8). Maka selanjutnya adalah -9. Jadi, 74 - 9 = 65."},{"number":14,"question":"2, 3, 5, 8, 12, 17, ...","options":{"A":"21","B":"22","C":"23","D":"24","E":"25"},"answer":"C","explanation":"Pola penambahan bertingkat (+1, +2, +3, +4, +5). Maka selanjutnya adalah +6. Jadi, 17 + 6 = 23."},{"number":15,"question":"1, 4, 9, 16, 25, ...","options":{"A":"30","B":"34","C":"36","D":"40","E":"49"},"answer":"C","explanation":"Pola bilangan kuadrat (1^2, 2^2, 3^2, 4^2, 5^2). Maka selanjutnya adalah 6^2 = 36."},{"number":16,"question":"50, 40, 100, 80, 150, 120, ...","options":{"A":"160","B":"170","C":"180","D":"190","E":"200"},"answer":"E","explanation":"Pola selang-seling. Deret pertama: 50, 100, 150 (+50). Deret kedua: 40, 80, 120 (+40). Angka selanjutnya mengikuti deret pertama: 150 + 50 = 200."},{"number":17,"question":"2, 6, 18, 54, ...","options":{"A":"108","B":"144","C":"162","D":"180","E":"210"},"answer":"C","explanation":"Pola perkalian tetap (x3). Maka 54 x 3 = 162."},{"number":18,"question":"80, 10, 70, 15, 60, 20, ...","options":{"A":"25","B":"30","C":"40","D":"50","E":"55"},"answer":"D","explanation":"Pola selang-seling. Deret pertama: 80, 70, 60 (-10). Deret kedua: 10, 15, 20 (+5). Angka selanjutnya mengikuti deret pertama: 60 - 10 = 50."},{"number":19,"question":"1, 3, 4, 7, 11, 18, ...","options":{"A":"25","B":"27","C":"29","D":"31","E":"33"},"answer":"C","explanation":"Deret Fibonacci (angka selanjutnya adalah jumlah dua angka sebelumnya). Maka 11 + 18 = 29."},{"number":20,"question":"12, 14, 18, 26, 42, ...","options":{"A":"58","B":"64","C":"70","D":"74","E":"82"},"answer":"D","explanation":"Pola penambahan dengan kelipatan dua (+2, +4, +8, +16). Maka selanjutnya adalah +32. Jadi, 42 + 32 = 74. Soal Cerita Dasar MT dituntut mampu memecahkan masalah praktis di lapangan dengan cepat dan akurat. Soal-soal ini mencakup logika matematika yang sering ditemui dalam manajemen logistik dan transportasi publik."},{"number":21,"question":"Jarak antara Halte A dan Halte B adalah 15 km. Sebuah bus menempuh jarak tersebut dalam waktu 20 menit. Berapa kecepatan rata-rata bus tersebut?","options":{"A":"40 km/jam","B":"45 km/jam","C":"50 km/jam","D":"55 km/jam","E":"60 km/jam"},"answer":"B","explanation":"Waktu 20 menit = 1/3 jam. Kecepatan = Jarak / Waktu = 15 / (1/3) = 15 x 3 = 45 km/jam."},{"number":22,"question":"Di sebuah depo, terdapat 40 unit bus. Sebanyak 15% dari total bus tersebut sedang dalam masa perawatan rutin (maintenance). Berapa jumlah bus yang siap beroperasi?","options":{"A":"30 unit","B":"32 unit","C":"34 unit","D":"36 unit","E":"38 unit"},"answer":"C","explanation":"Bus maintenance = 15% x 40 = 6 unit. Bus siap operasi = 40 - 6 = 34 unit."},{"number":23,"question":"Bus koridor 1 memiliki waktu tunggu (headway) setiap 5 menit, sedangkan koridor 2 setiap 8 menit. Jika kedua bus baru saja berangkat bersamaan dari halte integrasi, berapa menit lagi kedua bus tersebut akan berangkat bersamaan kembali?","options":{"A":"20 menit","B":"30 menit","C":"40 menit","D":"50 menit","E":"60 menit"},"answer":"C","explanation":"Mencari KPK dari 5 dan 8. Kelipatan 5: 5, 10, 15, 20, 25, 30, 35, 40. Kelipatan 8: 8, 16, 24, 32, 40. KPK = 40 menit."},{"number":24,"question":"Seorang pengemudi bus bekerja selama 8 jam sehari. Dalam satu jam, ia mampu melakukan 2 kali ritase (perjalanan bolak-balik). Jika dalam seminggu ia bekerja selama 5 hari, berapa total ritase yang ia selesaikan?","options":{"A":"60 ritase","B":"70 ritase","C":"80 ritase","D":"90 ritase","E":"100 ritase"},"answer":"C","explanation":"Ritase per hari = 8 jam x 2 = 16 ritase. Total seminggu = 16 x 5 hari = 80 ritase."},{"number":25,"question":"Kapasitas bus listrik adalah 50 penumpang, sedangkan bus gandeng adalah 120 penumpang. Jika perusahaan ingin mengangkut 600 penumpang menggunakan bus listrik saja, berapa selisih jumlah armada yang dibutuhkan jika dibandingkan menggunakan bus gandeng saja?","options":{"A":"5 unit","B":"7 unit","C":"8 unit","D":"10 unit","E":"12 unit"},"answer":"B","explanation":"Armada bus listrik = 600 / 50 = 12 unit. Armada bus gandeng = 600 / 120 = 5 unit. Selisih = 12 - 5 = 7 unit."}],"parentId":"numerik","bundleNum":1},"numerik__paket_2":{"title":"Numerik - Paket 2","duration":1800,"questions":[{"number":1,"question":"Sebuah proyek perbaikan halte dijadwalkan selesai dalam 12 hari oleh 10 pekerja. Jika pimpinan ingin proyek tersebut selesai dalam 8 hari, berapa tambahan pekerja yang dibutuhkan?","options":{"A":"5 orang","B":"10 orang","C":"15 orang","D":"20 orang","E":"25 orang"},"answer":"A","explanation":"Perbandingan berbalik nilai. (12 hari x 10 pekerja) / 8 hari = 15 pekerja. Tambahan pekerja = 15 - 10 = 5 orang."},{"number":2,"question":"Konsumsi daya sebuah bus listrik adalah 1,2 kWh per kilometer. Jika harga listrik adalah Rp1.500 per kWh, berapa biaya energi yang dibutuhkan untuk menempuh jarak 100 km?","options":{"A":"Rp150.000","B":"Rp160.000","C":"Rp170.000","D":"Rp180.000","E":"Rp190.000"},"answer":"D","explanation":"Total kWh = 1,2 x 100 = 120 kWh. Total biaya = 120 x 1.500 = 180.000."},{"number":3,"question":"Dalam sebuah survei kepuasan pelanggan, 3/5 responden menyatakan sangat puas, 1/4 menyatakan cukup puas, dan sisanya menyatakan tidak puas. Berapa persentase responden yang menyatakan tidak puas?","options":{"A":"10%","B":"15%","C":"20%","D":"25%","E":"30%"},"answer":"B","explanation":"Sangat puas = 3/5 = 60%. Cukup puas = 1/4 = 25%. Tidak puas = 100% - (60% + 25%) = 100% - 85% = 15%."},{"number":4,"question":"Stok ban di gudang cukup untuk 20 unit bus selama 30 hari. Jika bus yang harus dilayani bertambah menjadi 25 unit, berapa lama stok ban tersebut akan habis?","options":{"A":"20 hari","B":"22 hari","C":"24 hari","D":"26 hari","E":"28 hari"},"answer":"C","explanation":"Perbandingan berbalik nilai. (20 bus x 30 hari) / 25 bus = 600 / 25 = 24 hari."},{"number":5,"question":"Keuntungan bersih perusahaan pada tahun 2025 adalah Rp500 Miliar. Jika perusahaan menargetkan kenaikan keuntungan sebesar 12% pada tahun 2026, berapa target keuntungan bersih di tahun 2026?","options":{"A":"Rp550 Miliar","B":"Rp560 Miliar","C":"Rp570 Miliar","D":"Rp580 Miliar","E":"Rp590 Miliar"},"answer":"B","explanation":"Kenaikan = 12% x 500 = 60 Miliar. Target 2026 = 500 + 60 = 560 Miliar."},{"number":6,"question":"Koridor A memiliki 20 bus dengan total kapasitas 1.200 penumpang. Koridor B memiliki 15 bus dengan total kapasitas 1.050 penumpang. Manakah koridor yang memiliki rata-rata kapasitas per bus lebih tinggi dan berapa selisihnya?","options":{"A":"Koridor A, selisih 5 penumpang","B":"Koridor B, selisih 10 penumpang","C":"Koridor A, selisih 10 penumpang","D":"Koridor B, selisih 5 penumpang","E":"Keduanya sama"},"answer":"B","explanation":"Rata-rata A = 1.200 / 20 = 60. Rata-rata B = 1.050 / 15 = 70. Koridor B lebih tinggi dengan selisih 70 - 60 = 10 penumpang."},{"number":7,"question":"Anggaran pemeliharaan tahunan sebesar Rp120 Miliar dialokasikan untuk tiga divisi: Bus Besar (50%), Bus Sedang (30%), dan Mikrotrans (20%). Berapa selisih anggaran antara divisi Bus Besar dan Mikrotrans?","options":{"A":"Rp24 Miliar","B":"Rp30 Miliar","C":"Rp36 Miliar","D":"Rp40 Miliar","E":"Rp60 Miliar"},"answer":"C","explanation":"Bus Besar = 50% x 120 = 60 M. Mikrotrans = 20% x 120 = 24 M. Selisih = 60 - 24 = 36 Miliar."},{"number":8,"question":"Sebuah bus listrik dapat menempuh 250 km dengan sekali pengisian daya penuh selama 5 jam. Jika bus harus menempuh total 1.000 km dalam 3 hari, berapa total waktu minimal yang dibutuhkan untuk pengisian daya?","options":{"A":"15 jam","B":"20 jam","C":"25 jam","D":"30 jam","E":"35 jam"},"answer":"B","explanation":"Jumlah pengisian = 1.000 km / 250 km = 4 kali. Total waktu cas = 4 x 5 jam = 20 jam."},{"number":9,"question":"Rasio jumlah petugas keamanan dan petugas layanan halte adalah 2 : 5. Jika total jumlah kedua petugas tersebut di sebuah koridor adalah 140 orang, berapa jumlah petugas layanan halte?","options":{"A":"40 orang","B":"60 orang","C":"80 orang","D":"100 orang","E":"120 orang"},"answer":"D","explanation":"Bagian layanan halte = 5 / (2+5) = 5/7. Jumlah = 5/7 x 140 = 100 orang."},{"number":10,"question":"Dalam 1 jam, sebuah halte melayani 480 penumpang. Jika rata-rata setiap bus yang datang mengangkut 40 penumpang, berapa jumlah bus minimal yang harus berhenti di halte tersebut per jam agar tidak terjadi penumpukan?","options":{"A":"8 bus","B":"10 bus","C":"12 bus","D":"14 bus","E":"16 bus"},"answer":"C","explanation":"480 penumpang / 40 penumpang per bus = 12 bus."},{"number":11,"question":"Sebuah toko memiliki 500 kartu perdana. Hari pertama, terjual 20% dari stok awal. Hari kedua, terjual 25% dari sisa stok hari pertama. Berapa kartu yang masih tersisa?","options":{"A":"250 kartu","B":"275 kartu","C":"300 kartu","D":"325 kartu","E":"350 kartu"},"answer":"C","explanation":"Hari 1 terjual = 20% x 500 = 100 (Sisa 400). Hari 2 terjual = 25% x 400 = 100. Sisa akhir = 400 - 100 = 300 kartu."},{"number":12,"question":"Kecepatan bus di jalur khusus adalah 40 km/jam, sedangkan di jalur umum (campur) turun menjadi 15 km/jam. Jika rute sepanjang 20 km terdiri dari 75% jalur khusus, berapa total waktu tempuh bus tersebut?","options":{"A":"45 menit","B":"50 menit","C":"42.5 menit","D":"60 menit","E":"55.5 menit"},"answer":"C","explanation":"Jalur khusus = 75% x 20 = 15 km. Waktu = 15/40 jam = 22,5 menit. Jalur umum = 5 km. Waktu = 5/15 jam = 1/3 jam = 20 menit.Total waktu = 22.5 +20 = 42.5 menit"},{"number":13,"question":"Rata-rata jumlah penumpang di 4 koridor adalah 5.000 orang/hari. Jika ditambah koridor ke-5, rata-ratanya naik menjadi 5.500 orang/hari. Berapa jumlah penumpang di koridor ke-5?","options":{"A":"6.000 orang","B":"6.500 orang","C":"7.000 orang","D":"7.500 orang","E":"8.000 orang"},"answer":"D","explanation":"Total 4 koridor = 4 x 5.000 = 20.000. Total 5 koridor = 5 x 5.500 = 27.500. Koridor ke-5 = 27.500 - 20.000 = 7.500 orang."},{"number":14,"question":"Perbandingan konsumsi BBM Bus A dan Bus B adalah 3 : 4. Jika Bus A menghabiskan 45 liter untuk jarak tertentu, berapa liter yang dihabiskan Bus B untuk jarak yang sama?","options":{"A":"50 liter","B":"55 liter","C":"60 liter","D":"65 liter","E":"70 liter"},"answer":"C","explanation":"(4/3) x 45 liter = 4 x 15 = 60 liter. Campuran soal (Hitung Cepat & Deret Angka Pada tahap akhir asesmen, tekanan waktu biasanya meningkat. Campuran soal ini dirancang untuk melatih perpindahan fokus otak lo dari operasi hitung aritmatika ke pencarian pola logika angka secara bergantian."},{"number":15,"question":"Hasil dari 2,5 x (4/5) + 150% adalah...","options":{"A":"3,0","B":"3,5","C":"4,0","D":"4,5","E":"5,0"},"answer":"B","explanation":"(2,5 x 0,8) + 1,5 = 2,0 + 1,5 = 3,5."},{"number":16,"question":"Deret Angka: 2, 5, 10, 17, 26, ...","options":{"A":"35","B":"37","C":"39","D":"41","E":"43"},"answer":"B","explanation":"Pola penambahan angka ganjil berurutan (+3, +5, +7, +9). Maka selanjutnya +11. Jadi, 26 + 11 = 37."},{"number":17,"question":"Berapakah nilai dari 12,5% dari 400 dijumlahkan dengan 1/4 dari 200?","options":{"A":"75","B":"100","C":"125","D":"150","E":"175"},"answer":"B","explanation":"(1/8 x 400) + (1/4 x 200) = 50 + 50 = 100."},{"number":18,"question":"Deret Angka: 100, 50, 60, 30, 40, 20, ...","options":{"A":"10","B":"20","C":"30","D":"40","E":"50"},"answer":"C","explanation":"Pola berulang: bagi dua, lalu tambah sepuluh (:2, +10). Maka setelah 20 adalah 20 + 10 = 30."},{"number":19,"question":"Jika x = 0,125 dan y = 1/8, maka hubungan x dan y yang benar adalah...","options":{"A":"x > y","B":"x < y","C":"x = y","D":"x + y = 1","E":"Hubungan tidak dapat ditentukan"},"answer":"C","explanation":"1 dibagi 8 hasilnya adalah tepat 0,125. Jadi x = y."},{"number":20,"question":"Deret Angka: 3, 9, 27, 81, ...","options":{"A":"162","B":"213","C":"243","D":"256","E":"300"},"answer":"C","explanation":"Pola perkalian tetap (x3). Maka 81 x 3 = 243."},{"number":21,"question":"Hasil dari (0,5 x 0,5) + (1,5 : 0,5) adalah...","options":{"A":"2,25","B":"2,75","C":"3,25","D":"3,50","E":"3,75"},"answer":"C","explanation":"(0,25) + (3) = 3,25."},{"number":22,"question":"Deret Angka: 1, 1, 2, 3, 5, 8, 13, ...","options":{"A":"18","B":"20","C":"21","D":"22","E":"24"},"answer":"C","explanation":"Deret Fibonacci (penjumlahan dua angka sebelumnya). Maka 8 + 13 = 21."},{"number":23,"question":"75% dari sebuah angka adalah 60. Berapakah angka tersebut?","options":{"A":"70","B":"75","C":"80","D":"85","E":"90"},"answer":"C","explanation":"3/4 x n = 60 -> n = 60 x 4 / 3 = 80."},{"number":24,"question":"Deret Angka: 7, 10, 15, 22, 31, ...","options":{"A":"40","B":"42","C":"44","D":"46","E":"48"},"answer":"B","explanation":"Pola penambahan bilangan ganjil mulai dari 3 (+3, +5, +7, +9). Maka selanjutnya +11. Jadi, 31 + 11 = 42."},{"number":25,"question":"Berapakah nilai dari 35% dari 2/7 dari 14.000?","options":{"A":"1.000","B":"1.800","C":"1.200","D":"1.400","E":"1.600"},"answer":"D","explanation":"(2/7) x 14.000 = 4.000. Kemudian 35% x 4.000 = (35/100) x 4.000 = 1.400."}],"parentId":"numerik","bundleNum":2},"numerik__paket_3":{"title":"Numerik - Paket 3","duration":1800,"questions":[{"number":1,"question":"Hasil dari (0,75 : 0,15) + (2,5 x 4) adalah...","options":{"A":"10","B":"15","C":"18","D":"12","E":"20"},"answer":"B","explanation":"(0,75 : 0,15) = 5. (2,5 x 4) = 10. Maka 5 + 10 = 15."},{"number":2,"question":"Anggaran awal perawatan depo adalah Rp 40.000.000. Jika terjadi kenaikan harga suku cadang sehingga anggaran harus ditambah 15%, berapa total anggaran yang baru?","options":{"A":"Rp 50.000.000","B":"Rp 44.000.000","C":"Rp 46.000.000","D":"Rp 45.000.000","E":"Rp 48.000.000"},"answer":"C","explanation":"Tambahan = 15% x 40.000.000 = 6.000.000. Total = 40.000.000 + 6.000.000 = Rp 46.000.000."},{"number":3,"question":"Kapasitas bus reguler adalah 60 penumpang. Jika saat ini bus mengangkut 54 penumpang, berapa persentase okupansi bus tersebut?","options":{"A":"88%","B":"85%","C":"90%","D":"92%","E":"95%"},"answer":"C","explanation":"(54 / 60) x 100% = 9/10 x 100% = 90%."},{"number":4,"question":"Penjualan tiket kartu elektronik bulan ini ditargetkan sebanyak 800 keping. Jika sampai pertengahan bulan sudah tercapai 65%, berapa keping tiket lagi yang harus terjual untuk mencapai target?","options":{"A":"300","B":"320","C":"280","D":"240","E":"260"},"answer":"C","explanation":"Kekurangan = 100% - 65% = 35%. 35% x 800 = 280 keping."},{"number":5,"question":"Hasil operasi pecahan: 3/4 + 1/6 - 1/3 adalah...","options":{"A":"2/3","B":"5/12","C":"7/12","D":"3/4","E":"1/2"},"answer":"C","explanation":"Samakan penyebut menjadi 12: 9/12 + 2/12 - 4/12 = 7/12."},{"number":6,"question":"Berapa hasil dari 12,5% x 800 + 0,5 x 100?","options":{"A":"200","B":"175","C":"125","D":"100","E":"150"},"answer":"E","explanation":"12,5% (atau 1/8) x 800 = 100. 0,5 x 100 = 50. Total = 100 + 50 = 150."},{"number":7,"question":"Rasio petugas lapangan pria dan wanita adalah 4 : 3. Jika total petugas adalah 84 orang, berapa selisih jumlah petugas pria dan wanita?","options":{"A":"12","B":"16","C":"18","D":"14","E":"10"},"answer":"A","explanation":"Total perbandingan = 7. Selisih perbandingan = 4 - 3 = 1. Selisih = (1/7) x 84 = 12 orang."},{"number":8,"question":"Sebuah vendor menawarkan harga Rp 25.000.000 untuk pengadaan seragam. Setelah negosiasi, disepakati diskon 8%. Berapa harga akhir yang disetujui?","options":{"A":"Rp 22.000.000","B":"Rp 24.000.000","C":"Rp 23.500.000","D":"Rp 22.500.000","E":"Rp 23.000.000"},"answer":"E","explanation":"Diskon = 8% x 25.000.000 = 2.000.000. Harga akhir = 25.000.000 - 2.000.000 = Rp 23.000.000."},{"number":9,"question":"Nilai dari (2,25 x 4) / 0,5 adalah...","options":{"A":"18","B":"16","C":"14","D":"22","E":"20"},"answer":"A","explanation":"(2,25 x 4) = 9. 9 / 0,5 = 9 x 2 = 18."},{"number":10,"question":"Jika keuntungan bersih bulan ini adalah Rp 1,44 Miliar, dan bulan depan diproyeksikan naik sebesar 25%, berapa proyeksi keuntungan bulan depan?","options":{"A":"Rp 2,00 M","B":"Rp 1,80 M","C":"Rp 1,60 M","D":"Rp 1,75 M","E":"Rp 1,95 M"},"answer":"B","explanation":"Kenaikan = 25% (1/4) x 1,44 M = 0,36 M. Proyeksi = 1,44 + 0,36 = Rp 1,80 M."},{"number":11,"question":"Biaya cuci 5 unit bus adalah Rp 175.000. Berapa biaya untuk mencuci 12 unit bus?","options":{"A":"Rp 400.000","B":"Rp 380.000","C":"Rp 460.000","D":"Rp 420.000","E":"Rp 440.000"},"answer":"D","explanation":"Biaya 1 bus = 175.000 / 5 = 35.000. Biaya 12 bus = 12 x 35.000 = Rp"},{"number":12,"question":"420.000. Sebanyak 5/8 dari total armada di koridor X adalah bus gandeng. Jika jumlah bus gandeng ada 25 unit, berapa total seluruh bus di koridor tersebut?","options":{"A":"40","B":"30","C":"45","D":"35","E":"50"},"answer":"A","explanation":"(5/8) x Total = 25. Maka Total = 25 x (8/5) = 5 x 8 = 40 unit."},{"number":13,"question":"Harga pokok sebuah sparepart adalah Rp 1.500.000. Jika dijual dengan harga Rp 2.100.000, berapa persentase keuntungannya?","options":{"A":"35%","B":"50%","C":"40%","D":"45%","E":"30%"},"answer":"C","explanation":"Keuntungan = 2.100.000 - 1.500.000 = 600.000. Persentase = (600.000 / 1.500.000) x 100% = 40%."},{"number":14,"question":"Berapakah hasil pengurangan 100% - 35,5% - 22,2%?","options":{"A":"43,3%","B":"42,3%","C":"44,3%","D":"40,3%","E":"41,3%"},"answer":"B","explanation":"100 - 35,5 = 64,5. Kemudian 64,5 - 22,2 = 42,3%."},{"number":15,"question":"Deret Angka: 3, 7, 11, 15, 19, ... Angka berikutnya adalah...","options":{"A":"24","B":"23","C":"25","D":"21","E":"22"},"answer":"B","explanation":"Pola penjumlahan konstan (+4). 19 + 4 = 23."},{"number":16,"question":"Deret Angka: 100, 90, 81, 73, ... Angka berikutnya adalah...","options":{"A":"67","B":"66","C":"65","D":"64","E":"68"},"answer":"B","explanation":"Pola pengurangan bertingkat (-10, -9, -8). Selanjutnya dikurangi 7. 73 - 7 ="},{"number":17,"question":"66. Deret Angka: 2, 6, 12, 20, 30, ... Angka berikutnya adalah...","options":{"A":"43","B":"44","C":"42","D":"41","E":"40"},"answer":"C","explanation":"Pola penambahan genap berurutan (+4, +6, +8, +10). Selanjutnya +12. 30 + 12 = 42."},{"number":18,"question":"Deret Angka: 1, 2, 6, 24, 120, ... Angka berikutnya adalah...","options":{"A":"960","B":"360","C":"840","D":"480","E":"720"},"answer":"E","explanation":"Pola faktorial atau perkalian meningkat (x2, x3, x4, x5). Selanjutnya x6. 120 x 6 = 720."},{"number":19,"question":"Deret Angka: 33, 30, 24, 15, ... Angka berikutnya adalah...","options":{"A":"2","B":"5","C":"6","D":"4","E":"3"},"answer":"E","explanation":"Pola pengurangan bertingkat kelipatan tiga (-3, -6, -9). Selanjutnya dikurangi 12. 15 - 12 = 3."},{"number":20,"question":"Deret Angka: 3, 6, 18, 72, ... Angka berikutnya adalah...","options":{"A":"216","B":"360","C":"144","D":"432","E":"288"},"answer":"B","explanation":"Pola perkalian meningkat (x2, x3, x4). Selanjutnya x5. 72 x 5 = 360."},{"number":21,"question":"Deret Angka: 10, 5, 15, 10, 20, 15, ... Angka berikutnya adalah...","options":{"A":"40","B":"30","C":"25","D":"20","E":"35"},"answer":"C","explanation":"Pola selang-seling. Deret ganjil: 10, 15, 20 (+5). Deret genap: 5, 10, 15 (+5). Angka selanjutnya ikut deret ganjil: 20 + 5 = 25."},{"number":22,"question":"Deret Angka: 8, 16, 14, 28, 26, 52, ... Angka berikutnya adalah...","options":{"A":"50","B":"48","C":"54","D":"56","E":"104"},"answer":"A","explanation":"Pola kombinasi berulang: kali dua (x2), lalu kurangi dua (-2). Selanjutnya 52 - 2 = 50."},{"number":23,"question":"Deret Angka: 13, 17, 19, 23, 29, ... Angka berikutnya adalah...","options":{"A":"39","B":"33","C":"37","D":"35","E":"31"},"answer":"E","explanation":"Pola deret bilangan prima berurutan. Setelah 29, bilangan prima selanjutnya adalah 31."},{"number":24,"question":"Deret Angka: 1000, 500, 250, 125, ... Angka berikutnya adalah...","options":{"A":"75","B":"57,5","C":"62,5","D":"50","E":"100"},"answer":"C","explanation":"Pola pembagian konstan (:2). 125 : 2 = 62,5."},{"number":25,"question":"Deret Angka: 4, 9, 19, 39, 79, ... Angka berikutnya adalah...","options":{"A":"149","B":"139","C":"169","D":"159","E":"179"},"answer":"D","explanation":"Pola operasi ganda: kali dua lalu tambah satu (x2 + 1). 79 x 2 = 158 + 1 = 159."}],"parentId":"numerik","bundleNum":3},"numerik__paket_4":{"title":"Numerik - Paket 4","duration":1800,"questions":[{"number":1,"question":"Deret Angka: 1, 8, 9, 64, 25, 216, ... Angka berikutnya adalah...","options":{"A":"125","B":"512","C":"36","D":"49","E":"343"},"answer":"D","explanation":"Pola pangkat selang-seling. Posisi ganjil: 1^2, 3^2, 5^2 (1, 9, 25). Posisi genap: 2^3, 4^3, 6^3 (8, 64, 216). Selanjutnya posisi ganjil 7^2 = 49."},{"number":2,"question":"Deret Angka: 2, 5, 11, 23, 47, ... Angka berikutnya adalah...","options":{"A":"95","B":"91","C":"93","D":"85","E":"97"},"answer":"A","explanation":"Pola operasi ganda: kali dua lalu tambah satu (x2 + 1). 47 x 2 = 94 + 1 = 95."},{"number":3,"question":"Deret Angka: 99, 92, 86, 81, 77, ... Angka berikutnya adalah...","options":{"A":"73","B":"72","C":"71","D":"74","E":"75"},"answer":"D","explanation":"Pola pengurangan bertingkat turun (-7, -6, -5, -4). Selanjutnya dikurangi 3. 77 - 3 = 74."},{"number":4,"question":"Deret Angka: 0, 3, 8, 15, 24, ... Angka berikutnya adalah...","options":{"A":"32","B":"40","C":"30","D":"38","E":"35"},"answer":"E","explanation":"Pola penambahan bilangan ganjil berurutan (+3, +5, +7, +9). Selanjutnya +11. 24 + 11 = 35."},{"number":5,"question":"Sebuah depo memiliki 40 unit bus. Pada pengecekan pagi hari, diketahui 15% bus sedang dalam perbaikan rutin dan 5% mengalami kerusakan mendadak. Berapa unit bus yang siap dioperasikan hari itu?","options":{"A":"36 unit","B":"34 unit","C":"30 unit","D":"32 unit","E":"28 unit"},"answer":"D","explanation":"Total tidak siap = 15% + 5% = 20%. Persentase siap = 100% - 20% = 80%. Bus siap operasi = 80% x 40 = 32 unit."},{"number":6,"question":"Koridor A memiliki headway (waktu tunggu) 10 menit, dan Koridor B memiliki headway 15 menit. Jika keberangkatan pertama kedua koridor bersamaan pada pukul 06:00, pada pukul berapa lagi mereka akan berangkat bersamaan dari halte awal?","options":{"A":"06:45","B":"06:30","C":"07:00","D":"06:40","E":"06:20"},"answer":"B","explanation":"Mencari KPK dari 10 dan 15. KPK-nya adalah 30 menit. Berangkat bersama lagi pukul 06:00 + 30 menit = 06:30."},{"number":7,"question":"Sebuah bus menempuh jarak 75 km dengan kecepatan rata-rata 50 km/jam. Jika bus berangkat pukul 08:15, pukul berapakah bus tersebut tiba di tujuan akhir?","options":{"A":"09:30","B":"10:00","C":"09:40","D":"09:45","E":"09:50"},"answer":"D","explanation":"Waktu tempuh = Jarak / Kecepatan = 75 / 50 = 1,5 jam (1 jam 30 menit). 08:15 + 01:30 = 09:45."},{"number":8,"question":"Rata-rata konsumsi bahan bakar (BBM) bus reguler adalah 1 liter untuk setiap 3 km. Jika bus menempuh rute total sepanjang 120 km dalam sehari, dan harga BBM adalah Rp 10.000 per liter, berapa estimasi biaya BBM per hari untuk bus tersebut?","options":{"A":"Rp 300.000","B":"Rp 400.000","C":"Rp 350.000","D":"Rp 450.000","E":"Rp 500.000"},"answer":"B","explanation":"Kebutuhan BBM = 120 km / 3 km/liter = 40 liter. Biaya BBM = 40 x Rp 10.000 = Rp 400.000."},{"number":9,"question":"Seorang pramudi bekerja selama 8 jam dalam 1 shift. Ia memiliki jatah waktu istirahat (Ishoma) selama 30 menit. Jika satu ritase memakan waktu 90 menit, berapakah ritase penuh maksimal yang dapat ia jalankan?","options":{"A":"6 ritase","B":"7 ritase","C":"3 ritase","D":"5 ritase","E":"4 ritase"},"answer":"D","explanation":"Waktu kerja efektif = 8 jam - 0,5 jam = 7,5 jam = 450 menit. Maksimal ritase = 450 menit / 90 menit = 5 ritase."},{"number":10,"question":"Kapasitas sebuah halte adalah 120 orang. Pada pukul 17:00, halte terisi penuh 120 orang. Pada bus pertama, naik 45 orang. Beberapa menit kemudian datang penumpang baru sebanyak 20 orang. Berapa jumlah orang di halte sekarang sebelum bus kedua datang?","options":{"A":"85 orang","B":"100 orang","C":"105 orang","D":"95 orang","E":"90 orang"},"answer":"D","explanation":"Sisa setelah bus pertama = 120 - 45 = 75 orang. Setelah penumpang baru datang = 75 + 20 = 95 orang."},{"number":11,"question":"Pemerintah memberikan subsidi per kilometer sebesar Rp 5.000. Jika sebuah bus beroperasi melayani 150 km per hari selama 20 hari kerja sebulan, berapa total uang subsidi bulanan untuk bus tersebut?","options":{"A":"Rp 15.000.000","B":"Rp 16.500.000","C":"Rp 12.000.000","D":"Rp 18.000.000","E":"Rp 13.500.000"},"answer":"A","explanation":"Total kilometer sebulan = 150 km/hari x 20 hari = 3.000 km. Subsidi = 3.000 x 5.000 = Rp 15.000.000."},{"number":12,"question":"Sebuah proyek renovasi halte direncanakan selesai dalam 15 hari oleh 10 orang pekerja. Karena cuaca buruk, proyek diminta selesai dalam 10 hari. Berapa total jumlah pekerja yang dibutuhkan (bukan tambahannya)?","options":{"A":"12 orang","B":"15 orang","C":"25 orang","D":"20 orang","E":"18 orang"},"answer":"B","explanation":"Perbandingan berbalik nilai: (15 hari x 10 pekerja) / 10 hari = 150 / 10 = 15 orang."},{"number":13,"question":"Bus listrik memiliki konversi daya di mana 1% sisa baterai setara dengan jarak tempuh 1,5 km. Saat bus keluar depo, baterai berada di 90%. Berdasarkan SOP, bus harus kembali ke depo saat indikator baterai di 15%. Berapa jarak maksimum yang aman ditempuh?","options":{"A":"115 km","B":"105 km","C":"110 km","D":"100 km","E":"112,5 km"},"answer":"E","explanation":"Persentase baterai yang boleh dipakai = 90% - 15% = 75%. Jarak maksimum = 75 x 1,5 km = 112,5 km."},{"number":14,"question":"Tingkat ketepatan waktu (OTP) sebuah rute adalah 95% dari total 200 perjalanan bulan ini. Berapakah jumlah perjalanan yang mengalami keterlambatan?","options":{"A":"8 perjalanan","B":"10 perjalanan","C":"12 perjalanan","D":"5 perjalanan","E":"15 perjalanan"},"answer":"B","explanation":"Persentase keterlambatan = 100% - 95% = 5%. Jumlah terlambat = 5% x 200 = 10 perjalanan."},{"number":15,"question":"Dari hasil survei, 60% penumpang menggunakan kartu uang elektronik dan 40% menggunakan aplikasi dompet digital. Jika pada suatu pagi ada 500 penumpang yang tap in, berapa selisih jumlah pengguna kartu elektronik dan aplikasi dompet digital?","options":{"A":"100 orang","B":"150 orang","C":"120 orang","D":"80 orang","E":"50 orang"},"answer":"A","explanation":"Selisih persentase = 60% - 40% = 20%. Selisih penumpang = 20% x 500 = 100 orang."},{"number":16,"question":"Satu unit bus memiliki 6 buah roda (ban). Jadwal penggantian ban massal dilakukan untuk 15 unit bus sekaligus. Jika harga satu buah ban adalah Rp 2.000.000, berapa total biaya pengadaannya?","options":{"A":"Rp 220.000.000","B":"Rp 150.000.000","C":"Rp 160.000.000","D":"Rp 200.000.000","E":"Rp 180.000.000"},"answer":"E","explanation":"Total ban = 15 bus x 6 ban = 90 ban. Total biaya = 90 x 2.000.000 = Rp 180.000.000."},{"number":17,"question":"Sebuah bus menempuh jalur campuran: 10 km pertama macet dengan kecepatan 20 km/jam, dan 30 km berikutnya lancar di jalur steril dengan kecepatan 60 km/jam. Berapa total waktu tempuh untuk rute 40 km tersebut?","options":{"A":"90 menit","B":"50 menit","C":"45 menit","D":"75 menit","E":"60 menit"},"answer":"E","explanation":"Waktu macet = 10/20 jam = 0,5 jam = 30 menit. Waktu lancar = 30/60 jam = 0,5 jam = 30 menit. Total waktu = 30 + 30 = 60 menit."},{"number":18,"question":"Rata-rata volume penumpang dari Senin hingga Kamis (4 hari) adalah 4.000 orang per hari. Pada hari Jumat, volume melonjak menjadi 6.000 orang. Berapa rata-rata penumpang per hari untuk masa 5 hari tersebut (Senin-Jumat)?","options":{"A":"4.300 orang","B":"4.600 orang","C":"4.400 orang","D":"4.200 orang","E":"4.500 orang"},"answer":"C","explanation":"Total 4 hari = 4 x 4.000 = 16.000. Total 5 hari = 16.000 + 6.000 = 22.000."},{"number":19,"question":"Rata-rata = 22.000 / 5 = 4.400 orang. Upah lembur mekanik di depo ditetapkan 1,5 kali dari upah per jam normal. Jika upah normal adalah Rp 20.000/jam, dan mekanik tersebut melakukan lembur selama 4 jam, berapa total uang lembur yang ia terima?","options":{"A":"Rp 100.000","B":"Rp 120.000","C":"Rp 80.000","D":"Rp 140.000","E":"Rp 160.000"},"answer":"B","explanation":"Tarif lembur = 1,5 x 20.000 = Rp 30.000/jam. Total uang lembur = 4 jam x Rp 30.000 = Rp 120.000."},{"number":20,"question":"Kapasitas maksimal satu unit Bus Gandeng adalah 120 penumpang. Pada jam sibuk, bus tersebut terisi 96 orang. Berapa persentase load factor (okupansi) bus tersebut?","options":{"A":"75%","B":"80%","C":"85%","D":"90%","E":"95%"},"answer":"B","explanation":"Load factor = (96 / 120) x 100% = 4/5 x 100% = 80%."},{"number":21,"question":"Berapa hasil dari operasi hitung berikut: 4,5 + 3,75 - (1,5 x 2)?","options":{"A":"4,25","B":"4,75","C":"5,25","D":"5,75","E":"6,25"},"answer":"C","explanation":"Kerjakan perkalian terlebih dahulu: 1,5 x 2 = 3. Kemudian: 4,5 + 3,75 - 3 = 8,25 - 3 = 5,25."},{"number":22,"question":"Sebuah depo bus membeli suku cadang senilai Rp 15.000.000. Karena membayar tunai, mereka mendapat diskon 12%. Berapa total yang harus dibayar?","options":{"A":"Rp 13.200.000","B":"Rp 13.500.000","C":"Rp 13.800.000","D":"Rp 14.000.000","E":"Rp 14.200.000"},"answer":"A","explanation":"Diskon = 12% x Rp 15.000.000 = Rp 1.800.000. Harga bayar = Rp 15.000.000 - Rp 1.800.000 = Rp 13.200.000."},{"number":23,"question":"Berapa nilai dari 40% dari 3/8 dari 16.000?","options":{"A":"1.800","B":"2.000","C":"2.400","D":"2.800","E":"3.200"},"answer":"C","explanation":"3/8 x 16.000 = 6.000. Kemudian, 40% x 6.000 = 2.400."},{"number":24,"question":"Hasil dari 0,625 : 0,25 + 1,5 adalah...","options":{"A":"2,5","B":"3,0","C":"3,5","D":"4,0","E":"4,5"},"answer":"D","explanation":"0,625 : 0,25 = 2,5. Lalu ditambahkan 1,5 menjadi 2,5 + 1,5 = 4,0."},{"number":25,"question":"Jika jumlah penumpang pada bulan Januari adalah 45.000 orang dan bulan Februari turun 20%, berapa jumlah penumpang di bulan Februari?","options":{"A":"32.000","B":"34.000","C":"35.000","D":"36.000","E":"38.000"},"answer":"D","explanation":"Penurunan = 20% x 45.000 = 9.000. Jumlah penumpang = 45.000 - 9.000 = 36.000."}],"parentId":"numerik","bundleNum":4},"numerik__paket_5":{"title":"Numerik - Paket 5","duration":1800,"questions":[{"number":1,"question":"Biaya cuci harian 1 unit bus adalah Rp 45.000. Jika terdapat 20 bus yang beroperasi penuh selama 30 hari, berapa total anggaran cuci bus dalam sebulan?","options":{"A":"Rp 25.000.000","B":"Rp 26.500.000","C":"Rp 27.000.000","D":"Rp 28.500.000","E":"Rp 30.000.000"},"answer":"C","explanation":"Total biaya = 20 bus x 30 hari x Rp 45.000 = 600 x 45.000 = Rp 27.000.000."},{"number":2,"question":"Hasil dari (2/5 + 1/4) x 200 adalah...","options":{"A":"110","B":"120","C":"130","D":"140","E":"150"},"answer":"C","explanation":"Samakan penyebut: 8/20 + 5/20 = 13/20. Kalikan dengan 200: (13/20) x 200 = 13 x 10 = 130."},{"number":3,"question":"Rasio penumpang pelajar dan pekerja di pagi hari adalah 3 : 5. Jika total penumpang dalam satu bus adalah 64 orang, berapa jumlah penumpang pelajar?","options":{"A":"20","B":"24","C":"28","D":"32","E":"36"},"answer":"B","explanation":"Total rasio = 3 + 5 = 8. Penumpang pelajar = (3/8) x 64 = 3 x 8 = 24 orang."},{"number":4,"question":"Pendapatan tiket halte X rata-rata Rp 5.000.000 per hari. Jika pada akhir pekan pendapatan meningkat 35%, berapa rata-rata pendapatan di akhir pekan?","options":{"A":"Rp 6.250.000","B":"Rp 6.500.000","C":"Rp 6.750.000","D":"Rp 7.000.000","E":"Rp 7.250.000"},"answer":"C","explanation":"Kenaikan = 35% x 5.000.000 = 1.750.000. Total = 5.000.000 + 1.750.000 = Rp 6.750.000."},{"number":5,"question":"Jika x = 12,5% dari 1.600 dan y = 1/4 dari 800, maka hubungan yang tepat adalah...","options":{"A":"x > y","B":"x < y","C":"x = y","D":"x + y = 300","E":"Tidak dapat ditentukan"},"answer":"C","explanation":"x = 12,5% (atau 1/8) x 1.600 = 200. y = 1/4 x 800 = 200. Maka x = y."},{"number":6,"question":"Tangki cadangan BBM berisi 5.000 liter. Jika hari ini terpakai 2.250 liter dan besok dijadwalkan masuk tambahan 1.500 liter, berapa persentase sisa BBM terhadap kapasitas awal tangki setelah tambahan masuk?","options":{"A":"65%","B":"75%","C":"80%","D":"85%","E":"90%"},"answer":"D","explanation":"Sisa hari ini = 5.000 - 2.250 = 2.750. Setelah masuk = 2.750 + 1.500 = 4.250. Persentase = (4.250 / 5.000) x 100% = 85%."},{"number":7,"question":"Berapakah 33,33% dari (6.000 + 3.000)?","options":{"A":"2.000","B":"3.000","C":"4.000","D":"5.000","E":"6.000"},"answer":"B","explanation":"33,33% sama dengan pecahan 1/3. Total = 9.000. Maka 1/3 x 9.000 = 3.000."},{"number":8,"question":"Hasil dari 2,4 x 0,5 + 10,2 adalah...","options":{"A":"11,2","B":"11,4","C":"12,2","D":"12,4","E":"13,2"},"answer":"B","explanation":"2,4 x 0,5 = 1,2. Kemudian 1,2 + 10,2 = 11,4."},{"number":9,"question":"Jumlah bus operasi koridor 1 adalah 40 unit, koridor 2 adalah 35 unit, dan koridor 3 adalah 25 unit. Berapa persentase bus koridor 3 terhadap total bus di ketiga koridor tersebut?","options":{"A":"15%","B":"20%","C":"25%","D":"30%","E":"35%"},"answer":"C","explanation":"Total bus = 40 + 35 + 25 = 100 unit. Persentase koridor 3 = (25 / 100) x 100% = 25%."},{"number":10,"question":"Deret Angka: 5, 10, 15, 20, 25, ... Angka berikutnya adalah...","options":{"A":"28","B":"30","C":"32","D":"35","E":"40"},"answer":"B","explanation":"Pola penjumlahan konstan (+5). 25 + 5 = 30."},{"number":11,"question":"Deret Angka: 2, 4, 8, 16, 32, ... Angka berikutnya adalah...","options":{"A":"48","B":"56","C":"60","D":"64","E":"72"},"answer":"D","explanation":"Pola perkalian konstan (x2). 32 x 2 = 64."},{"number":12,"question":"Deret Angka: 90, 85, 75, 60, 40, ... Angka berikutnya adalah...","options":{"A":"10","B":"15","C":"20","D":"25","E":"30"},"answer":"B","explanation":"Pola pengurangan bertingkat (-5, -10, -15, -20). Selanjutnya dikurangi 25. 40 - 25 = 15."},{"number":13,"question":"Deret Angka: 1, 4, 9, 16, 25, 36, ... Angka berikutnya adalah...","options":{"A":"42","B":"45","C":"47","D":"49","E":"51"},"answer":"D","explanation":"Pola bilangan kuadrat (1^2, 2^2, 3^2, 4^2, 5^2, 6^2). Selanjutnya 7^2 = 49."},{"number":14,"question":"Deret Angka: 3, 5, 8, 13, 21, ... Angka berikutnya adalah...","options":{"A":"30","B":"32","C":"34","D":"36","E":"38"},"answer":"C","explanation":"Deret Fibonacci (angka selanjutnya adalah penjumlahan dua angka sebelumnya). 13 + 21 = 34."},{"number":15,"question":"Deret Angka: 10, 12, 24, 26, 52, 54, ... Angka berikutnya adalah...","options":{"A":"56","B":"84","C":"104","D":"106","E":"108"},"answer":"E","explanation":"Pola kombinasi berulang: tambah 2 (+2), lalu kali dua (x2). 54 x 2 = 108."},{"number":16,"question":"Deret Angka: 100, 20, 90, 30, 80, 40, ... Angka berikutnya adalah...","options":{"A":"50","B":"60","C":"70","D":"80","E":"90"},"answer":"C","explanation":"Pola selang-seling. Deret 1: 100, 90, 80 (-10). Deret 2: 20, 30, 40 (+10). Selanjutnya ikuti deret 1: 80 - 10 = 70."},{"number":17,"question":"Deret Angka: 2, 3, 5, 7, 11, 13, ... Angka berikutnya adalah...","options":{"A":"15","B":"16","C":"17","D":"18","E":"19"},"answer":"C","explanation":"Ini adalah deret bilangan prima murni berurutan. Setelah 13, bilangan prima selanjutnya adalah 17."},{"number":18,"question":"Deret Angka: 3, 9, 27, 81, ... Angka berikutnya adalah...","options":{"A":"162","B":"243","C":"324","D":"405","E":"729"},"answer":"B","explanation":"Pola perkalian konstan (x3). 81 x 3 = 243."},{"number":19,"question":"Deret Angka: 50, 48, 44, 38, 30, ... Angka berikutnya adalah...","options":{"A":"18","B":"20","C":"22","D":"24","E":"26"},"answer":"B","explanation":"Pola pengurangan genap berurutan (-2, -4, -6, -8). Selanjutnya dikurangi 10. 30 - 10 = 20."},{"number":20,"question":"Deret Angka: 1, 8, 27, 64, 125, ... Angka berikutnya adalah...","options":{"A":"186","B":"192","C":"216","D":"225","E":"256"},"answer":"C","explanation":"Pola bilangan pangkat tiga (1^3, 2^3, 3^3, 4^3, 5^3). Selanjutnya 6^3 = 216."},{"number":21,"question":"Deret Angka: 4, 6, 10, 16, 26, ... Angka berikutnya adalah...","options":{"A":"34","B":"36","C":"40","D":"42","E":"44"},"answer":"D","explanation":"Pola mirip Fibonacci: 4+6=10, 6+10=16, 10+16=26. Selanjutnya 16 + 26 = 42."},{"number":22,"question":"Deret Angka: 120, 60, 20, 5, ... Angka berikutnya adalah...","options":{"A":"0,5","B":"1","C":"1,25","D":"1,5","E":"2,5"},"answer":"B","explanation":"Pola pembagian berurutan (:2, :3, :4). Selanjutnya dibagi 5. 5 : 5 = 1."},{"number":23,"question":"Deret Angka: 5, 6, 10, 19, 35, ... Angka berikutnya adalah...","options":{"A":"51","B":"55","C":"60","D":"65","E":"71"},"answer":"C","explanation":"Pola penambahan bilangan kuadrat: +1 (1^2), +4 (2^2), +9 (3^2), +16 (4^2). Selanjutnya +25 (5^2). 35 + 25 = 60."},{"number":24,"question":"Deret Angka: 7, 14, 16, 32, 34, ... Angka berikutnya adalah...","options":{"A":"36","B":"54","C":"64","D":"68","E":"70"},"answer":"D","explanation":"Pola kombinasi: kali dua (x2), lalu tambah dua (+2). 7x2=14, 14+2=16, 16x2=32, 32+2=34. Selanjutnya 34 x 2 = 68."},{"number":25,"question":"Jarak antara Depo A dan Terminal B adalah 45 km. Sebuah bus berangkat dari Depo A pukul 06:00 dengan kecepatan rata-rata 60 km/jam. Pukul berapa bus tersebut tiba di Terminal B?","options":{"A":"06:30","B":"06:40","C":"06:45","D":"06:50","E":"07:00"},"answer":"C","explanation":"Waktu tempuh = Jarak / Kecepatan = 45 / 60 = 0,75 jam atau 45 menit. Bus tiba pukul 06:00 + 45 menit = 06:45."}],"parentId":"numerik","bundleNum":5},"numerik__paket_6":{"title":"Numerik - Paket 6","duration":1800,"questions":[{"number":1,"question":"Dua buah rute, Rute X dan Rute Y, memiliki jadwal keberangkatan dari halte ujung yang sama. Bus Rute X berangkat setiap 12 menit, sedangkan Rute Y setiap 15 menit. Jika pada pukul 08:00 keduanya berangkat bersamaan, pada pukul berapa mereka akan berangkat bersamaan lagi?","options":{"A":"08:45","B":"09:00","C":"09:15","D":"09:30","E":"10:00"},"answer":"B","explanation":"Cari KPK dari 12 dan 15. KPK(12, 15) = 60 menit (1 jam). Mereka berangkat bersama 1 jam kemudian, yaitu pukul 09:00."},{"number":2,"question":"Dalam satu shift kerja (8 jam), seorang pengemudi wajib beristirahat total selama 1 jam. Jika waktu satu ritase (pulang-pergi) memakan waktu 1 jam 10 menit, berapa banyak ritase maksimal yang dapat diselesaikan dalam satu shift?","options":{"A":"4 ritase","B":"5 ritase","C":"6 ritase","D":"7 ritase","E":"8 ritase"},"answer":"C","explanation":"Waktu efektif kerja = 8 jam - 1 jam = 7 jam = 420 menit. Satu ritase = 70 menit. Maksimal ritase = 420 / 70 = 6 ritase."},{"number":3,"question":"Sebuah proyek pembangunan halte BRT dapat diselesaikan oleh 15 pekerja dalam waktu 20 hari. Jika perusahaan ingin mempercepat penyelesaian menjadi 12 hari, berapa tambahan pekerja yang diperlukan?","options":{"A":"8 orang","B":"10 orang","C":"15 orang","D":"20 orang","E":"25 orang"},"answer":"B","explanation":"Perbandingan berbalik nilai. (15 pekerja x 20 hari) = X pekerja x 12 hari. X = 300 / 12 = 25 pekerja. Tambahan pekerja = 25 - 15 = 10 orang."},{"number":4,"question":"Sebuah bus listrik mengonsumsi 1,5 kWh per kilometer. Kapasitas baterai penuh adalah 300 kWh. Jika aturan operasional mengharuskan bus kembali ke depo saat sisa baterai mencapai 20%, berapa jarak maksimal yang bisa ditempuh dalam satu kali operasional?","options":{"A":"140 km","B":"150 km","C":"160 km","D":"180 km","E":"200 km"},"answer":"C","explanation":"Baterai yang boleh digunakan = 100% - 20% = 80%. 80% x 300 kWh = 240 kWh. Jarak maksimal = 240 kWh / 1,5 kWh/km = 160 km."},{"number":5,"question":"Rata-rata penumpang harian di Halte Harmoni selama 4 hari pertama adalah 8.500 orang. Di hari ke-5, terjadi lonjakan sehingga rata-rata 5 hari menjadi 9.000 orang. Berapa jumlah penumpang pada hari ke-5?","options":{"A":"10.000","B":"10.500","C":"11.000","D":"11.500","E":"12.000"},"answer":"C","explanation":"Total 4 hari = 4 x 8.500 = 34.000. Total 5 hari = 5 x 9.000 = 45.000. Penumpang hari ke-5 = 45.000 - 34.000 = 11.000."},{"number":6,"question":"Harga tiket normal adalah Rp 3.500. Pada pukul 05:00 - 07:00 diterapkan tarif khusus Rp 2.000. Jika antara jam tersebut masuk 450 penumpang, dan setelah jam 07:00 masuk 550 penumpang, berapa total pendapatan tiket hari itu?","options":{"A":"Rp 2.625.000","B":"Rp 2.750.000","C":"Rp 2.825.000","D":"Rp 3.000.000","E":"Rp 3.250.000"},"answer":"C","explanation":"Pendapatan promo = 450 x Rp 2.000 = Rp 900.000. Pendapatan normal = 550 x Rp 3.500 = Rp 1.925.000. Total = 900.000 + 1.925.000 = Rp 2.825.000."},{"number":7,"question":"Rasio jumlah bus berbahan bakar CNG dan Bus Listrik di sebuah depo adalah 7 : 3. Jika total bus di depo tersebut adalah 150 unit, berapakah selisih jumlah bus CNG dan Bus Listrik?","options":{"A":"40 unit","B":"50 unit","C":"60 unit","D":"70 unit","E":"80 unit"},"answer":"C","explanation":"Total perbandingan = 7 + 3 = 10. Selisih perbandingan = 7 - 3 = 4. Selisih jumlah = (4 / 10) x 150 = 60 unit."},{"number":8,"question":"Kecepatan rata-rata bus di jalur non-BRT (reguler) adalah 15 km/jam, sedangkan di jalur BRT (steril) adalah 40 km/jam. Sebuah rute memiliki jarak total 25 km, di mana 8 km adalah jalur non-BRT dan sisanya jalur steril. Berapa estimasi total waktu tempuhnya?","options":{"A":"47,5 menit","B":"50,5 menit","C":"55,5 menit","D":"57,5 menit","E":"60,0 menit"},"answer":"D","explanation":"Jalur reguler = 8 km. Waktu = 8/15 jam = 32 menit. Jalur BRT = 25 - 8 = 17 km. Waktu = 17/40 jam = 25,5 menit. Total waktu = 32 + 25,5 = 57,5 menit."},{"number":9,"question":"Sebuah bus Maxi memiliki kapasitas 80 tempat duduk dan ruang berdiri untuk 40 orang. Di halte A naik 50 orang. Di halte B turun 15 orang dan naik 30 orang. Berapa persentase kapasitas total bus yang terisi setelah halte B?","options":{"A":"45,8%","B":"50,2%","C":"54,1%","D":"60,0%","E":"65,5%"},"answer":"C","explanation":"Total kapasitas = 80 + 40 = 120 orang. Penumpang di bus = 50 - 15 + 30 = 65 orang."},{"number":10,"question":"Persentase = (65 / 120) x 100% = 54,16% dibulatkan 54,1%. Anggaran subsidi operasional per kilometer untuk bus ukuran sedang adalah Rp 8.000. Jika sebuah bus sedang beroperasi melayani jarak 120 km per hari selama 25 hari kerja dalam sebulan, berapa total subsidi yang harus dibayarkan untuk 1 unit bus tersebut dalam sebulan?","options":{"A":"Rp 20.000.000","B":"Rp 22.000.000","C":"Rp 24.000.000","D":"Rp 26.000.000","E":"Rp 28.000.000"},"answer":"C","explanation":"Jarak per bulan = 120 km/hari x 25 hari = 3.000 km. Total subsidi = 3.000 km x Rp 8.000 = Rp 24.000.000."},{"number":11,"question":"Dalam evaluasi kinerja bulanan, tingkat ketepatan waktu (OTP) Koridor A adalah 88%, sedangkan Koridor B adalah 92%. Jika total perjalanan Koridor A bulan lalu adalah 1.500 perjalanan dan Koridor B adalah 1.200 perjalanan, berapa total jumlah perjalanan yang TIDAK tepat waktu dari kedua koridor tersebut?","options":{"A":"260 perjalanan","B":"276 perjalanan","C":"282 perjalanan","D":"290 perjalanan","E":"300 perjalanan"},"answer":"B","explanation":"Koridor A tidak tepat = (100% - 88%) x 1.500 = 12% x 1.500 = 180. Koridor B tidak tepat = (100% - 92%) x 1.200 = 8% x 1.200 = 96. Total = 180 + 96 = 276 perjalanan."},{"number":12,"question":"Konsumsi BBM sebuah bus reguler adalah 1 liter untuk setiap 2,5 km. Jika harga BBM adalah Rp 6.800 per liter, berapa biaya BBM yang dihabiskan untuk menempuh rute bolak-balik (pulang-pergi) sepanjang 50 km (satu arah)?","options":{"A":"Rp 136.000","B":"Rp 272.000","C":"Rp 340.000","D":"Rp 408.000","E":"Rp 544.000"},"answer":"B","explanation":"Total jarak pulang-pergi = 50 km x 2 = 100 km. BBM yang dibutuhkan = 100 km / 2,5 km/liter = 40 liter. Biaya = 40 x Rp 6.800 = Rp 272.000."},{"number":13,"question":"Sebuah halte melayani rata-rata kedatangan 1 bus setiap 3 menit. Jika di halte tersebut setiap bus rata-rata menaikkan 15 penumpang, berapa perkiraan jumlah penumpang yang diangkut dari halte tersebut dalam kurun waktu 2,5 jam?","options":{"A":"600 orang","B":"750 orang","C":"800 orang","D":"900 orang","E":"1.050 orang"},"answer":"B","explanation":"Total waktu = 2,5 jam = 150 menit. Jumlah kedatangan bus = 150 / 3 = 50 bus. Penumpang terangkut = 50 bus x 15 orang/bus = 750 orang."},{"number":14,"question":"Sebagai MT, Anda melihat data armada di depo. Ada 120 bus total. 10% sedang perawatan rutin berat, 15% perawatan ringan, dan sisa bus yang siap operasi dialokasikan merata untuk 5 rute. Berapa unit bus yang didapat oleh masing-masing rute?","options":{"A":"15 unit","B":"16 unit","C":"17 unit","D":"18 unit","E":"20 unit"},"answer":"D","explanation":"Total perawatan = 10% + 15% = 25%. Bus beroperasi = 100% - 25% = 75%. Jumlah bus"},{"number":15,"question":"operasi = 75% x 120 = 90 unit. Alokasi per rute = 90 / 5 = 18 unit. TES NUMERIK – 30 BUTIR SOAL Kapasitas maksimal satu unit Bus Sedang adalah 80 penumpang. Jika dalam satu perjalanan bus tersebut hanya terisi 56 orang, berapa persentase load factor (okupansi) bus tersebut?","options":{"A":"70%","B":"65%","C":"60%","D":"75%","E":"80%"},"answer":"A","explanation":"Load factor = (56 / 80) × 100% = 0,70 × 100% = 70%."},{"number":16,"question":"Seorang petugas halte mencatat ada 1.800 penumpang di pagi hari. Jika di sore hari jumlahnya turun sebesar 20%, berapa total penumpang di sore hari?","options":{"A":"1.380 orang","B":"1.440 orang","C":"1.500 orang","D":"1.560 orang","E":"1.620 orang"},"answer":"B","explanation":"Penurunan = 20% × 1.800 = 360. Total sore = 1.800 – 360 = 1.440 orang."},{"number":17,"question":"Harga perolehan satu unit bus listrik adalah Rp3.000.000.000. Jika perusahaan mendapatkan diskon 8% karena pembelian dalam jumlah besar, berapa harga yang harus dibayar?","options":{"A":"Rp2.640.000.000","B":"Rp2.700.000.000","C":"Rp2.760.000.000","D":"Rp2.820.000.000","E":"Rp2.880.000.000"},"answer":"C","explanation":"Diskon = 8% × Rp3.000.000.000 = Rp240.000.000. Harga bayar = Rp3.000.000.000 – Rp240.000.000 = Rp2.760.000.000."},{"number":18,"question":"Hasil dari 2,5 + 3,75 – (2 × 1,5) adalah ...","options":{"A":"2,75","B":"3,00","C":"3,50","D":"3,25","E":"4,00"},"answer":"D","explanation":"2 × 1,5 = 3,00. Lalu 2,5 + 3,75 – 3,00 = 6,25 – 3,00 = 3,25."},{"number":19,"question":"Sebuah armada bus menempuh jarak 240 km dalam waktu 3 jam 12 menit. Berapa kecepatan rata-rata bus tersebut per jam?","options":{"A":"60 km/jam","B":"65 km/jam","C":"70 km/jam","D":"72 km/jam","E":"75 km/jam"},"answer":"E","explanation":"3 jam 12 menit = 3 + 12/60 = 3,2 jam. Kecepatan = 240 / 3,2 = 75 km/jam."},{"number":20,"question":"Berapa nilai dari 40% dari 1/5 dari 6.000?","options":{"A":"420","B":"480","C":"540","D":"600","E":"660"},"answer":"B","explanation":"(1/5 × 6.000) = 1.200. Lalu 40% × 1.200 = 480."},{"number":21,"question":"Total biaya perawatan rutin 6 unit bus dalam sebulan adalah Rp90.000.000. Jika bulan depan perusahaan menambah 4 unit bus lagi, berapa total perkiraan biaya perawatan untuk 10 unit bus?","options":{"A":"Rp150.000.000","B":"Rp160.000.000","C":"Rp170.000.000","D":"Rp180.000.000","E":"Rp190.000.000"},"answer":"A","explanation":"Biaya per bus = Rp90.000.000 / 6 = Rp15.000.000. Total 10 bus = 10 × Rp15.000.000 = Rp150.000.000."},{"number":22,"question":"Jika tarif integrasi JakLingko adalah Rp14.000 per perjalanan, berapa biaya yang dikeluarkan seorang penumpang jika ia melakukan perjalanan yang sama setiap hari selama 22 hari kerja (pulang-pergi)?","options":{"A":"Rp528.000","B":"Rp560.000","C":"Rp594.000","D":"Rp616.000","E":"Rp660.000"},"answer":"D","explanation":"Sehari (PP) = 2 × Rp14.000 = Rp28.000. Total 22 hari = 22 × Rp28.000 = Rp616.000."},{"number":23,"question":"0,6 × 0,5 + 0,4 = ...","options":{"A":"0,50","B":"0,60","C":"0,70","D":"0,80","E":"0,90"},"answer":"C","explanation":"(0,6 × 0,5) = 0,30. Maka 0,30 + 0,40 = 0,70."},{"number":24,"question":"Sebuah bus memiliki tangki BBM berkapasitas 250 liter. Jika jarum indikator menunjukkan sisa 2/5 tangki, berapa liter BBM yang harus diisi agar tangki penuh kembali?","options":{"A":"80 Liter","B":"100 Liter","C":"120 Liter","D":"130 Liter","E":"150 Liter"},"answer":"E","explanation":"Sisa BBM = 2/5 × 250 = 100 Liter. Yang harus diisi = 250 – 100 = 150 Liter."},{"number":25,"question":"5, 10, 15, 20, 25, ...","options":{"A":"28","B":"30","C":"32","D":"35","E":"40"},"answer":"B","explanation":"Pola penjumlahan tetap (+5). Maka 25 + 5 = 30."}],"parentId":"numerik","bundleNum":6},"numerik__paket_7":{"title":"Numerik - Paket 7","duration":1800,"questions":[{"number":1,"question":"2, 4, 8, 16, 32, ...","options":{"A":"48","B":"56","C":"64","D":"72","E":"80"},"answer":"C","explanation":"Pola perkalian tetap (×2). Maka 32 × 2 = 64."},{"number":2,"question":"100, 93, 85, 76, 66, ...","options":{"A":"50","B":"52","C":"54","D":"55","E":"56"},"answer":"D","explanation":"Pola pengurangan bertingkat: –7, –8, –9, –10, –11. Maka selanjutnya 66 – 11 ="},{"number":3,"question":"55. 1, 2, 4, 7, 11, 16, ...","options":{"A":"22","B":"23","C":"24","D":"25","E":"26"},"answer":"A","explanation":"Pola penambahan bertingkat: +1, +2, +3, +4, +5, +6. Maka selanjutnya 16 + 6 ="},{"number":4,"question":"22. 1, 8, 27, 64, 125, ...","options":{"A":"180","B":"196","C":"200","D":"210","E":"216"},"answer":"E","explanation":"Pola bilangan kubik (n³): 1³, 2³, 3³, 4³, 5³. Maka selanjutnya 6³ = 216."},{"number":5,"question":"60, 20, 70, 25, 80, 30, ...","options":{"A":"35","B":"40","C":"90","D":"85","E":"95"},"answer":"C","explanation":"Pola selang-seling. Deret ganjil: 60, 70, 80 (+10). Deret genap: 20, 25, 30 (+5). Angka selanjutnya mengikuti deret ganjil: 80 + 10 = 90."},{"number":6,"question":"3, 5, 9, 17, ...","options":{"A":"30","B":"33","C":"35","D":"36","E":"38"},"answer":"B","explanation":"Pola: setiap suku = (suku sebelumnya × 2) – 1. 5×2–1=9, 9×2–1=17, 17×2– 1=33."},{"number":7,"question":"5, 15, 45, 135, ...","options":{"A":"300","B":"350","C":"375","D":"405","E":"450"},"answer":"D","explanation":"Pola perkalian tetap (×3). Maka 135 × 3 = 405."},{"number":8,"question":"4, 9, 16, 25, 36, ...","options":{"A":"49","B":"50","C":"48","D":"51","E":"52"},"answer":"A","explanation":"Pola bilangan kuadrat: 2², 3², 4², 5², 6². Maka selanjutnya 7² = 49."},{"number":9,"question":"10, 5, 20, 10, 40, 20, 80, 40, ...","options":{"A":"50","B":"80","C":"120","D":"140","E":"160"},"answer":"E","explanation":"Pola selang-seling. Deret ganjil: 10, 20, 40, 80 (×2). Deret genap: 5, 10, 20, 40 (×2). Angka selanjutnya mengikuti deret ganjil: 80 × 2 = 160."},{"number":10,"question":"Jarak Halte A ke Halte B adalah 12 km, dan jarak Halte B ke Halte C adalah 18 km. Sebuah bus berangkat dari Halte A menuju Halte C, kemudian kembali berhenti di Halte B. Berapa total jarak yang telah ditempuh bus tersebut?","options":{"A":"30 km","B":"36 km","C":"42 km","D":"48 km","E":"54 km"},"answer":"D","explanation":"Jarak A ke B ke C = 12 + 18 = 30 km. Kemudian C ke B = 18 km. Total = 30 + 18 = 48 km."},{"number":11,"question":"Di sebuah depo terdapat 50 unit bus. Sebanyak 12% dari total bus tersebut sedang dalam masa perawatan rutin (maintenance). Berapa jumlah bus yang siap beroperasi?","options":{"A":"44 unit","B":"40 unit","C":"42 unit","D":"46 unit","E":"48 unit"},"answer":"A","explanation":"Bus maintenance = 12% × 50 = 6 unit. Bus siap operasi = 50 – 6 = 44 unit."},{"number":12,"question":"Bus koridor 1 memiliki waktu tunggu (headway) setiap 6 menit, sedangkan koridor 2 setiap 9 menit. Jika kedua bus baru saja berangkat bersamaan dari halte integrasi, berapa menit lagi kedua bus tersebut akan berangkat bersamaan kembali?","options":{"A":"9 menit","B":"12 menit","C":"15 menit","D":"16 menit","E":"18 menit"},"answer":"E","explanation":"Mencari KPK dari 6 dan 9. Kelipatan 6: 6, 12, 18. Kelipatan 9: 9, 18. KPK = 18 menit."},{"number":13,"question":"Sebuah proyek perbaikan halte dijadwalkan selesai dalam 20 hari oleh 8 pekerja. Jika pimpinan ingin proyek tersebut selesai dalam 16 hari, berapa jumlah pekerja yang dibutuhkan?","options":{"A":"8 orang","B":"10 orang","C":"12 orang","D":"14 orang","E":"16 orang"},"answer":"B","explanation":"Perbandingan berbalik nilai. Total hari-orang = 8 × 20 = 160. Pekerja baru = 160 / 16 = 10 orang."},{"number":14,"question":"Konsumsi daya sebuah bus listrik adalah 1,5 kWh per kilometer. Jika tarif listrik adalah Rp1.200 per kWh, berapa biaya energi yang dibutuhkan untuk menempuh jarak 80 km?","options":{"A":"Rp120.000","B":"Rp132.000","C":"Rp144.000","D":"Rp156.000","E":"Rp168.000"},"answer":"C","explanation":"Total kWh = 1,5 × 80 = 120 kWh. Total biaya = 120 × Rp1.200 = Rp144.000."},{"number":15,"question":"Dalam survei kepuasan penumpang, 2/5 responden menyatakan sangat puas, 7/20 menyatakan cukup puas, dan sisanya menyatakan tidak puas. Berapa persentase responden yang menyatakan tidak puas?","options":{"A":"10%","B":"15%","C":"20%","D":"22%","E":"25%"},"answer":"E","explanation":"Sangat puas = 2/5 = 8/20. Cukup puas = 7/20. Total puas = 8/20 + 7/20 = 15/20 = 75%. Tidak puas = 100% – 75% = 25%."},{"number":16,"question":"Stok ban di gudang cukup untuk melayani 30 unit bus selama 25 hari. Jika jumlah bus yang harus dilayani bertambah menjadi 50 unit, berapa lama stok ban tersebut akan habis?","options":{"A":"10 hari","B":"12 hari","C":"14 hari","D":"15 hari","E":"18 hari"},"answer":"D","explanation":"Perbandingan berbalik nilai. Total stok = 30 × 25 = 750 unit-hari. Lama habis = 750 / 50 = 15 hari."},{"number":17,"question":"Keuntungan bersih perusahaan pada tahun 2024 adalah Rp400 Miliar. Jika perusahaan menargetkan kenaikan keuntungan sebesar 15% pada tahun 2025, berapa target keuntungan bersih di tahun 2025?","options":{"A":"Rp460 Miliar","B":"Rp450 Miliar","C":"Rp470 Miliar","D":"Rp480 Miliar","E":"Rp490 Miliar"},"answer":"A","explanation":"Kenaikan = 15% × Rp400 Miliar = Rp60 Miliar. Target 2025 = Rp400 + Rp60 = Rp460 Miliar."},{"number":18,"question":"Koridor A memiliki 25 bus dengan total kapasitas 1.750 penumpang. Koridor B memiliki 18 bus dengan total kapasitas 1.440 penumpang. Manakah koridor yang memiliki rata-rata kapasitas per bus lebih tinggi, dan berapa selisihnya?","options":{"A":"Koridor A, selisih 5 penumpang","B":"Koridor B, selisih 10 penumpang","C":"Koridor A, selisih 10 penumpang","D":"Koridor B, selisih 5 penumpang","E":"Keduanya sama"},"answer":"B","explanation":"Rata-rata Koridor A = 1.750 / 25 = 70 penumpang/bus. Rata-rata Koridor B = 1.440 / 18 = 80 penumpang/bus. Koridor B lebih tinggi; selisih = 80 – 70 = 10 penumpang."},{"number":19,"question":"Kecepatan bus di jalur khusus BRT adalah 48 km/jam, sedangkan di jalur umum (campur) adalah 24 km/jam. Sebuah rute sepanjang 24 km terdiri dari 2/3 jalur khusus dan 1/3 jalur umum. Berapa total waktu tempuh bus tersebut?","options":{"A":"30 menit","B":"35 menit","C":"40 menit","D":"45 menit","E":"50 menit"},"answer":"C","explanation":"Jalur khusus = 2/3 × 24 = 16 km. Waktu = 16/48 jam = 1/3 jam = 20 menit. Jalur"},{"number":20,"question":"umum = 1/3 × 24 = 8 km. Waktu = 8/24 jam = 1/3 jam = 20 menit. Total waktu = 20 + 20 = 40 menit. Sebuah feeder bus memiliki 35 unit armada. Pada suatu hari, 40% armada dinyatakan tidak laik jalan karena kerusakan. Berapa unit bus yang masih dapat beroperasi?","options":{"A":"19 unit","B":"21 unit","C":"22 unit","D":"24 unit","E":"25 unit"},"answer":"B","explanation":"Tidak laik jalan = 40% × 35 = 14 unit. Beroperasi = 35 – 14 = 21 unit."},{"number":21,"question":"Harga satu set ban bus adalah Rp4.500.000. Sebuah bus memerlukan 6 set ban. Jika bengkel memberikan diskon khusus 15%, berapa total biaya ban yang harus dibayar?","options":{"A":"Rp21.000.000","B":"Rp21.600.000","C":"Rp22.050.000","D":"Rp22.500.000","E":"Rp22.950.000"},"answer":"E","explanation":"Harga normal = 6 × Rp4.500.000 = Rp27.000.000. Diskon = 15% × Rp27.000.000 = Rp4.050.000. Bayar = Rp27.000.000 – Rp4.050.000 = Rp22.950.000."},{"number":22,"question":"Berapa hasil dari 5/8 × 640 – 45% × 200?","options":{"A":"310","B":"320","C":"330","D":"340","E":"350"},"answer":"A","explanation":"5/8 × 640 = 400. 45% × 200 = 90. Maka 400 – 90 = 310."},{"number":23,"question":"Dari total 3.600 penumpang harian di sebuah stasiun KRL, 45% adalah pekerja kantoran, 30% pelajar, dan sisanya penumpang umum. Berapa jumlah penumpang umum?","options":{"A":"800 orang","B":"850 orang","C":"900 orang","D":"950 orang","E":"1.000 orang"},"answer":"C","explanation":"Pekerja kantoran = 45% × 3.600 = 1.620. Pelajar = 30% × 3.600 = 1.080. Umum = 3.600 – 1.620 – 1.080 = 900 orang."},{"number":24,"question":"Sebuah bus menempuh jarak 168 km. Konsumsi bahan bakarnya 14 km/liter dan harga solar Rp6.500 per liter. Berapa total biaya bahan bakar perjalanan tersebut?","options":{"A":"Rp65.000","B":"Rp70.000","C":"Rp75.000","D":"Rp78.000","E":"Rp80.000"},"answer":"D","explanation":"Kebutuhan solar = 168 / 14 = 12 liter. Biaya = 12 × Rp6.500 = Rp78.000."},{"number":25,"question":"Perusahaan bus menargetkan penurunan angka kecelakaan sebesar 30% dibandingkan tahun lalu. Jika tahun lalu terjadi 140 kecelakaan, berapa target maksimum kecelakaan yang boleh terjadi tahun ini?","options":{"A":"90 kasus","B":"98 kasus","C":"105 kasus","D":"110 kasus","E":"112 kasus"},"answer":"B","explanation":"Penurunan = 30% × 140 = 42. Target = 140 – 42 = 98 kasus."}],"parentId":"numerik","bundleNum":7},"numerik__paket_8":{"title":"Numerik - Paket 8","duration":1800,"questions":[{"number":1,"question":"Berapa nilai dari (2/3 × 750) + (3/4 × 480) – 150?","options":{"A":"670","B":"680","C":"690","D":"700","E":"710"},"answer":"E","explanation":"2/3 × 750 = 500. 3/4 × 480 = 360. Maka 500 + 360 – 150 = 710."},{"number":2,"question":"Sebuah bus bandara menempuh jarak 56 km dalam waktu 48 menit. Berapa kecepatan rata-rata bus tersebut dalam km/jam?","options":{"A":"70 km/jam","B":"72 km/jam","C":"75 km/jam","D":"78 km/jam","E":"80 km/jam"},"answer":"A","explanation":"48 menit = 48/60 = 0,8 jam. Kecepatan = 56 / 0,8 = 70 km/jam."},{"number":3,"question":"Perusahaan transportasi menganggarkan Rp6.000.000.000 untuk pengadaan bus baru seharga Rp1.500.000.000 per unit. Setelah membeli 3 unit, berapa persen anggaran yang sudah terpakai?","options":{"A":"65%","B":"70%","C":"75%","D":"80%","E":"85%"},"answer":"C","explanation":"Terpakai = 3 × Rp1.500.000.000 = Rp4.500.000.000. Persentase = (4.500.000.000 / 6.000.000.000) × 100% = 75%."},{"number":4,"question":"Seorang kondektur bus mencatat 480 penumpang dalam satu shift 8 jam. Jika produktivitas di jam sibuk 40% lebih tinggi dari rata-rata per jam, berapa penumpang yang dilayani per jam pada saat jam sibuk?","options":{"A":"72 penumpang/jam","B":"76 penumpang/jam","C":"80 penumpang/jam","D":"84 penumpang/jam","E":"88 penumpang/jam"},"answer":"D","explanation":"Rata-rata = 480 / 8 = 60 penumpang/jam. Jam sibuk = 60 × 1,4 = 84 penumpang/jam."},{"number":5,"question":"Berapa nilai dari 0,125 × 800 + 0,25 × 360?","options":{"A":"180","B":"190","C":"200","D":"210","E":"220"},"answer":"B","explanation":"0,125 × 800 = 100. 0,25 × 360 = 90. Maka 100 + 90 = 190."},{"number":6,"question":"Sebuah angkutan feeder LRT berkapasitas 20 penumpang beroperasi 50 kali perjalanan dalam sehari dengan rata-rata tingkat keterisian 75%. Berapa total penumpang yang terangkut?","options":{"A":"600 penumpang","B":"650 penumpang","C":"680 penumpang","D":"720 penumpang","E":"750 penumpang"},"answer":"E","explanation":"Penumpang per perjalanan = 75% × 20 = 15. Total = 50 × 15 = 750 penumpang."},{"number":7,"question":"Deret Angka: 4, 7, 12, 19, 28, ...","options":{"A":"39","B":"40","C":"41","D":"42","E":"43"},"answer":"A","explanation":"Selisih antar suku: +3, +5, +7, +9, +11 (bertambah 2 setiap langkah). Maka 28 + 11 = 39."},{"number":8,"question":"Deret Angka: 729, 243, 81, 27, 9, ...","options":{"A":"1","B":"2","C":"3","D":"4","E":"5"},"answer":"C","explanation":"Pola pembagian tetap (÷3). Maka 9 ÷ 3 = 3."},{"number":9,"question":"Deret Angka: 6, 11, 21, 41, 81, ...","options":{"A":"141","B":"151","C":"155","D":"161","E":"163"},"answer":"D","explanation":"Pola: setiap suku = (suku sebelumnya × 2) – 1. 81 × 2 – 1 = 161."},{"number":10,"question":"Deret Angka: 2, 8, 4, 16, 8, 32, 16, ...","options":{"A":"48","B":"64","C":"72","D":"80","E":"96"},"answer":"B","explanation":"Pola selang-seling. Posisi ganjil: 2, 4, 8, 16 (×2). Posisi genap: 8, 16, 32, 64 (×2). Suku berikutnya berada di posisi genap: 32 × 2 = 64."},{"number":11,"question":"Deret Angka: 3, 6, 12, 24, 48, 96, ...","options":{"A":"152","B":"162","C":"172","D":"182","E":"192"},"answer":"E","explanation":"Pola perkalian tetap (×2). Maka 96 × 2 = 192."},{"number":12,"question":"Deret Angka: 45, 38, 32, 27, 23, 20, ...","options":{"A":"18","B":"19","C":"20","D":"21","E":"22"},"answer":"A","explanation":"Selisih antar suku: –7, –6, –5, –4, –3, –2 (berkurang 1 setiap langkah). Maka 20 – 2 = 18."},{"number":13,"question":"Deret Angka: 1, 2, 6, 24, 120, ...","options":{"A":"540","B":"620","C":"720","D":"800","E":"840"},"answer":"C","explanation":"Pola faktorial: 1!, 2!, 3!, 4!, 5!. Suku berikutnya 6! = 6 × 5! = 6 × 120 = 720."},{"number":14,"question":"Deret Angka: 9, 16, 25, 36, 49, 64, ...","options":{"A":"75","B":"77","C":"79","D":"81","E":"83"},"answer":"D","explanation":"Pola bilangan kuadrat mulai dari 3²: 3², 4², 5², 6², 7², 8². Maka berikutnya 9² = 81."},{"number":15,"question":"Deret Angka: 100, 95, 85, 70, 50, ...","options":{"A":"20","B":"25","C":"30","D":"35","E":"40"},"answer":"B","explanation":"Selisih antar suku: –5, –10, –15, –20, –25 (bertambah 5 setiap langkah). Maka 50 – 25 = 25."},{"number":16,"question":"Deret Angka: 1, 3, 9, 27, 81, ...","options":{"A":"183","B":"193","C":"213","D":"233","E":"243"},"answer":"E","explanation":"Pola perkalian tetap (×3). Maka 81 × 3 = 243."},{"number":17,"question":"Deret Angka: 8, 5, 12, 9, 16, 13, 20, ...","options":{"A":"17","B":"18","C":"19","D":"20","E":"21"},"answer":"A","explanation":"Pola selang-seling. Posisi ganjil: 8, 12, 16, 20 (+4). Posisi genap: 5, 9, 13 (+4). Suku"},{"number":18,"question":"berikutnya (posisi genap ke-4): 13 + 4 = 17. Deret Angka: 2, 3, 5, 9, 17, 33, ...","options":{"A":"57","B":"61","C":"65","D":"69","E":"73"},"answer":"C","explanation":"Pola: setiap suku = (suku sebelumnya × 2) – 1. 3=2×2–1; 5=3×2–1; 9=5×2–1; 17=9×2–1; 33=17×2–1. Maka 33 × 2 – 1 = 65."},{"number":19,"question":"Sebuah trem listrik melayani rute melingkar sepanjang 18 km dengan kecepatan rata-rata 36 km/jam. Jika trem beroperasi selama 14 jam sehari, berapa maksimal ronde perjalanan yang dapat diselesaikan?","options":{"A":"22 ronde","B":"24 ronde","C":"26 ronde","D":"28 ronde","E":"30 ronde"},"answer":"D","explanation":"Waktu 1 ronde = 18 / 36 = 0,5 jam = 30 menit. Dalam 14 jam = 840 menit. Ronde = 840 / 30 = 28 ronde."},{"number":20,"question":"Pendapatan perusahaan bus tahun 2023 sebesar Rp850 miliar. Tahun 2024 naik 20%, dan tahun 2025 naik 15% dari pendapatan tahun 2024. Berapa pendapatan perusahaan di tahun 2025?","options":{"A":"Rp1.150 miliar","B":"Rp1.173 miliar","C":"Rp1.200 miliar","D":"Rp1.225 miliar","E":"Rp1.250 miliar"},"answer":"B","explanation":"Pendapatan 2024 = Rp850 M × 1,2 = Rp1.020 M. Pendapatan 2025 = Rp1.020 M × 1,15 = Rp1.173 M."},{"number":21,"question":"Seorang mekanik mampu memeriksa 4 unit bus dalam 6 jam. Jika tersedia 5 mekanik yang bekerja bersamaan, berapa jam yang dibutuhkan untuk memeriksa 30 unit bus?","options":{"A":"5 jam","B":"6 jam","C":"7 jam","D":"8 jam","E":"9 jam"},"answer":"E","explanation":"Kecepatan 1 mekanik = 4/6 unit/jam. Kecepatan 5 mekanik = 5 × 4/6 = 20/6 unit/jam. Waktu = 30 ÷ (20/6) = 30 × 6/20 = 9 jam."},{"number":22,"question":"Sebuah depo memiliki 3 tipe bus: 25 unit Bus A (kapasitas 60), 15 unit Bus B (kapasitas 40), dan 10 unit Bus C (kapasitas 25). Berapa rata-rata kapasitas per bus dari seluruh armada?","options":{"A":"47 penumpang","B":"49 penumpang","C":"51 penumpang","D":"53 penumpang","E":"55 penumpang"},"answer":"A","explanation":"Total kapasitas = (25×60) + (15×40) + (10×25) = 1.500 + 600 + 250 = 2.350. Total unit = 50."},{"number":23,"question":"Rata-rata = 2.350 / 50 = 47 penumpang. Seorang petugas ticketing melayani rata-rata 90 penumpang per jam. Jika shift kerjanya 7 jam dengan satu jam istirahat di tengah, berapa total penumpang yang dilayani dalam satu shift?","options":{"A":"500 penumpang","B":"520 penumpang","C":"540 penumpang","D":"560 penumpang","E":"580 penumpang"},"answer":"C","explanation":"Waktu efektif = 7 – 1 = 6 jam. Total = 6 × 90 = 540 penumpang."},{"number":24,"question":"Bus antarkota berangkat dari Kota A pukul 07.30 dan tiba di Kota B pukul 11.15. Jarak kedua kota 225 km. Berapa kecepatan rata-rata bus tersebut?","options":{"A":"50 km/jam","B":"54 km/jam","C":"57 km/jam","D":"60 km/jam","E":"63 km/jam"},"answer":"D","explanation":"Waktu tempuh = 11.15 – 07.30 = 3 jam 45 menit = 3,75 jam. Kecepatan = 225 / 3,75 = 60 km/jam."},{"number":25,"question":"Dalam lelang pengadaan bus, perusahaan menawarkan harga Rp1.800.000.000 per unit dengan margin keuntungan 25% dari harga pokok. Berapa harga pokok per unit bus tersebut?","options":{"A":"Rp1.350.000.000","B":"Rp1.440.000.000","C":"Rp1.500.000.000","D":"Rp1.560.000.000","E":"Rp1.620.000.000"},"answer":"B","explanation":"Harga jual = Harga pokok × 1,25. Harga pokok = Rp1.800.000.000 / 1,25 = Rp1.440.000.000."}],"parentId":"numerik","bundleNum":8},"numerik__paket_9":{"title":"Numerik - Paket 9","duration":1800,"questions":[{"number":1,"question":"Bus koridor 3 dan koridor 8 berangkat bersamaan dari terminal induk. Koridor 3 headway 15 menit, koridor 8 headway 20 menit. Setelah berapa menit keduanya akan berangkat bersamaan kembali?","options":{"A":"30 menit","B":"35 menit","C":"40 menit","D":"45 menit","E":"60 menit"},"answer":"E","explanation":"KPK(15, 20): 15 = 3×5; 20 = 2²×5. KPK = 2² × 3 × 5 = 60 menit."},{"number":2,"question":"Bus wisata menempuh rute: Terminal -> Objek A (30 km) -> Objek B (45 km) -> Terminal (60 km). Dengan kecepatan rata-rata 60 km/jam, berapa total waktu tempuh?","options":{"A":"2 jam 15 menit","B":"2 jam 20 menit","C":"2 jam 25 menit","D":"2 jam 30 menit","E":"2 jam 35 menit"},"answer":"A","explanation":"Total jarak = 30 + 45 + 60 = 135 km. Waktu = 135 / 60 = 2,25 jam = 2 jam 15 menit."},{"number":3,"question":"Perusahaan memiliki 3 sopir yang masing-masing bekerja 8 jam/hari. Jika perusahaan ingin mengoperasikan 2 bus masing-masing selama 20 jam/hari, berapa sopir tambahan yang dibutuhkan?","options":{"A":"0 sopir","B":"1 sopir","C":"2 sopir","D":"3 sopir","E":"4 sopir"},"answer":"C","explanation":"Total jam dibutuhkan = 2 × 20 = 40 jam. Kapasitas saat ini = 3 × 8 = 24 jam. Kekurangan = 40 – 24 = 16 jam. Sopir tambahan = 16 / 8 = 2 sopir."},{"number":4,"question":"Sebuah shelter bus dalam kondisi kosong. Setiap menit, 30 penumpang tiba dan 20 penumpang naik bus. Jika kapasitas shelter 200 orang, setelah berapa menit shelter akan penuh?","options":{"A":"15 menit","B":"16 menit","C":"18 menit","D":"20 menit","E":"22 menit"},"answer":"D","explanation":"Penambahan bersih = 30 – 20 = 10 penumpang/menit. Waktu penuh = 200 / 10 = 20 menit."},{"number":5,"question":"Perusahaan transportasi membagikan bonus Rp360.000.000 kepada 3 divisi: Operasional (50%), Teknik (30%), dan Administrasi (sisanya). Berapa selisih bonus antara Divisi Operasional dan Divisi Administrasi?","options":{"A":"Rp90.000.000","B":"Rp108.000.000","C":"Rp120.000.000","D":"Rp126.000.000","E":"Rp144.000.000"},"answer":"B","explanation":"Operasional = 50% × Rp360 juta = Rp180 juta. Teknik = 30% × Rp360 juta = Rp108 juta. Administrasi = Rp360 – Rp180 – Rp108 = Rp72 juta. Selisih = Rp180 juta – Rp72 juta = Rp108.000.000."},{"number":6,"question":"Sebuah terminal bus melayani 2.500 penumpang per hari. Pada hari Lebaran, jumlah penumpang meningkat 84%. Berapa jumlah penumpang pada hari Lebaran tersebut?","options":{"A":"4.100 orang","B":"4.300 orang","C":"4.600 orang","D":"4.800 orang","E":"5.000 orang"},"answer":"C","explanation":"Kenaikan = 84% × 2.500 = 2.100. Total = 2.500 + 2.100 = 4.600 orang."},{"number":7,"question":"Tarif bus Transjakarta untuk penumpang umum adalah Rp3.500 per perjalanan. Jika seorang penumpang menggunakan kartu Jakcard dan mendapatkan diskon 50% untuk perjalanan pertamanya, berapa yang harus dibayar?","options":{"A":"Rp1.200","B":"Rp1.500","C":"Rp1.600","D":"Rp1.750","E":"Rp2.000"},"answer":"D","explanation":"Diskon = 50% × Rp3.500 = Rp1.750. Harga bayar = Rp3.500 – Rp1.750 = Rp1.750."},{"number":8,"question":"Sebuah bus memiliki kapasitas 60 penumpang. Dalam satu perjalanan, hanya 45 kursi yang terisi. Berapa persentase kursi yang kosong?","options":{"A":"20%","B":"25%","C":"30%","D":"35%","E":"40%"},"answer":"B","explanation":"Kursi kosong = 60 – 45 = 15. Persentase kosong = (15 / 60) × 100% = 25%."},{"number":9,"question":"Berapa nilai dari 1/4 dari 800 ditambah 30% dari 600?","options":{"A":"340","B":"350","C":"360","D":"370","E":"380"},"answer":"E","explanation":"1/4 × 800 = 200. 30% × 600 = 180. Total = 200 + 180 = 380."},{"number":10,"question":"Kecepatan rata-rata bus TransMakassar pada jalur bebas hambatan adalah 72 km/jam. Jika bus tersebut harus menempuh jarak 54 km, berapa waktu yang dibutuhkan (dalam menit)?
