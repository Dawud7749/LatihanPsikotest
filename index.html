0-25=225, 225x2=450. Jawaban: 450."},{"number":14,"question":"Nomor rute kereta komuter mengikuti pola: K1, K3, K6, K10, K15, ... Kode rute kereta berikutnya adalah...","options":{"A":"K18","B":"K19","C":"K20","D":"K22","E":"K21"},"answer":"E","explanation":"Selisih antar angka di kode: 2, 3, 4, 5, 6 (bertambah 1 setiap langkah). Selisih berikutnya = 6. Maka: 15 + 6 = 21. Kode rute: K21."},{"number":15,"question":"Di dalam terminal bus, Ruang Tunggu berada di sebelah selatan Loket Tiket. Toilet Umum berada di sebelah barat Loket Tiket. Mushola berada di sebelah utara Toilet Umum. Di manakah posisi Mushola relatif terhadap Ruang Tunggu?","options":{"A":"Barat","B":"Barat Laut","C":"Utara","D":"Timur Laut","E":"Barat Daya"},"answer":"B","explanation":"Tetapkan Loket Tiket di (0,0). Ruang Tunggu di selatan = (0,-1). Toilet Umum di barat = (- 1,0). Mushola di utara Toilet = (-1,1). Posisi Mushola (-1,1) relatif terhadap Ruang Tunggu (0,-1): delta x = -1 (barat), delta y = +2 (utara). Arahnya adalah Barat Laut."},{"number":16,"question":"SOPIR : BUS = NAHKODA : ...","options":{"A":"Pelabuhan","B":"Jangkar","C":"Kapal","D":"Awak Kapal","E":"Dermaga"},"answer":"C","explanation":"Sopir adalah orang yang mengemudikan Bus. Nahkoda adalah orang yang mengemudikan Kapal. Hubungan: operator pengendali - moda transportasi yang dikendalikan."},{"number":17,"question":"LANDASAN PACU : PESAWAT = REL : ...","options":{"A":"Stasiun","B":"Masinis","C":"Gerbong","D":"Kereta","E":"Tiket"},"answer":"D","explanation":"Landasan Pacu adalah jalur khusus yang digunakan oleh Pesawat untuk lepas landas dan mendarat. Rel adalah jalur khusus yang digunakan oleh Kereta untuk bergerak. Hubungan: infrastruktur jalur - moda transportasi penggunanya."},{"number":18,"question":"Semua kendaraan listrik tidak menghasilkan emisi gas buang secara langsung. Semua motor listrik adalah kendaraan listrik. Vespa Elettrica adalah motor listrik. Kesimpulan yang PALING TEPAT adalah...","options":{"A":"Vespa Elettrica tidak menghasilkan emisi gas buang secara langsung.","B":"Semua jenis motor menghasilkan emisi gas buang.","C":"Vespa Elettrica adalah satu-satunya motor listrik yang bebas emisi.","D":"Emisi hanya dihasilkan oleh kendaraan berbahan bakar fosil.","E":"Tidak semua kendaraan listrik bebas dari emisi gas buang."},"answer":"A","explanation":"Rantai silogisme: Vespa Elettrica adalah motor listrik → motor listrik adalah kendaraan listrik"},{"number":19,"question":"→ kendaraan listrik tidak menghasilkan emisi langsung. Maka Vespa Elettrica tidak menghasilkan emisi gas buang secara langsung. Diagram Venn menunjukkan tiga kategori kendaraan: Lingkaran P = Kendaraan yang beroperasi di darat. Lingkaran Q = Kendaraan berbahan bakar diesel. Lingkaran R = Kendaraan angkutan barang. Truk kontainer bermesin diesel yang beroperasi di darat untuk mengangkut barang masuk ke dalam kategori...","options":{"A":"Hanya P dan R","B":"Hanya Q dan R","C":"Hanya P dan Q","D":"P, Q, dan R sekaligus","E":"Hanya R"},"answer":"D","explanation":"Truk kontainer beroperasi di darat (P), berbahan bakar diesel (Q), dan digunakan untuk mengangkut barang (R). Maka truk tersebut masuk ke irisan dari ketiga lingkaran sekaligus: P, Q, dan R."},{"number":20,"question":"Diagram X menunjukkan rute bus yang melewati pusat kota. Diagram Y menunjukkan rute bus yang menghindari pusat kota. Rute Koridor 8 selalu masuk dalam Diagram Y dan tidak pernah masuk Diagram X. Kesimpulan yang PALING TEPAT adalah...","options":{"A":"Rute Koridor 8 kadang-kadang melewati pusat kota.","B":"Rute Koridor 8 tidak pernah melewati pusat kota.","C":"Semua rute dalam Diagram Y lebih cepat dari Diagram X.","D":"Rute Koridor 8 lebih ramai dari rute lainnya.","E":"Rute Koridor 8 bisa masuk Diagram X dan Diagram Y secara bersamaan."},"answer":"B","explanation":"Diagram Y = rute yang menghindari pusat kota. Rute Koridor 8 selalu masuk Diagram Y dan tidak pernah masuk Diagram X (rute lewat pusat kota). Maka Rute Koridor 8 tidak pernah melewati pusat kota."},{"number":21,"question":"Premis 1: Semua pengemudi bus kota wajib mengikuti pelatihan keselamatan berkendara. Premis 2: Rudi adalah pengemudi bus kota. Kesimpulan yang paling tepat adalah...","options":{"A":"Rudi wajib mengikuti pelatihan keselamatan berkendara.","B":"Rudi sudah mengikuti pelatihan keselamatan berkendara.","C":"Semua peserta pelatihan adalah pengemudi bus kota.","D":"Rudi adalah pengemudi bus kota yang berpengalaman.","E":"Semua yang ikut pelatihan wajib menjadi pengemudi bus kota."},"answer":"A","explanation":"Silogisme kategorik sederhana (Modus Ponens). Rudi termasuk dalam kelompok pengemudi bus kota, sehingga Rudi otomatis wajib mengikuti pelatihan keselamatan berkendara."},{"number":22,"question":"Premis 1: Semua stasiun MRT memiliki fasilitas lift untuk penyandang disabilitas. Premis 2: Sebagian gedung perkantoran memiliki fasilitas lift untuk penyandang disabilitas. Kesimpulan yang paling tepat adalah...","options":{"A":"Semua gedung perkantoran adalah stasiun MRT.","B":"Sebagian gedung perkantoran bukan stasiun MRT.","C":"Semua stasiun MRT adalah gedung perkantoran.","D":"Tidak ada gedung perkantoran yang memiliki lift.","E":"Hanya stasiun MRT yang memiliki lift untuk penyandang disabilitas."},"answer":"B","explanation":"Karena tidak semua gedung perkantoran disebutkan identik dengan stasiun MRT, dan hanya sebagian gedung perkantoran yang memiliki lift, maka terdapat gedung perkantoran yang bukan stasiun MRT (sebagian gedung perkantoran bukan stasiun MRT)."},{"number":23,"question":"Premis 1: Jika kereta mengalami gangguan sinyal, maka jadwal keberangkatan akan terlambat. Premis 2: Jadwal keberangkatan hari ini tidak terlambat. Kesimpulan yang paling tepat adalah...","options":{"A":"Kereta sedang mengalami gangguan sinyal.","B":"Jadwal keberangkatan selalu tepat waktu.","C":"Kereta tidak mengalami gangguan sinyal.","D":"Penumpang sudah naik kereta tepat waktu.","E":"Sinyal kereta dalam kondisi normal sejak tadi pagi."},"answer":"C","explanation":"Modus Tollens: Jika P maka Q. Ternyata tidak Q (jadwal tidak terlambat), maka kesimpulannya adalah tidak P (kereta tidak mengalami gangguan sinyal)."},{"number":24,"question":"Premis 1: Semua terminal tipe A melayani angkutan antarkota antarprovinsi (AKAP). Premis 2: Terminal Merak tidak melayani angkutan AKAP. Kesimpulan yang paling tepat adalah...","options":{"A":"Terminal Merak adalah terminal tipe A yang sedang direnovasi.","B":"Terminal tipe A tidak hanya melayani angkutan AKAP.","C":"Semua terminal di Indonesia melayani angkutan AKAP.","D":"Terminal Merak bukan terminal tipe A.","E":"Terminal tipe A melayani semua jenis angkutan umum."},"answer":"D","explanation":"Karena semua terminal tipe A melayani AKAP, dan Terminal Merak tidak melayani AKAP, maka secara logis Terminal Merak bukan terminal tipe A (silogisme kategorik negatif)."},{"number":25,"question":"Premis 1: Sebagian armada taksi online telah terintegrasi dengan aplikasi pembayaran digital. Premis 2: Semua armada yang terintegrasi dengan aplikasi pembayaran digital mendukung transaksi tanpa tunai. Kesimpulan yang paling tepat adalah...","options":{"A":"Semua armada taksi online mendukung transaksi tanpa tunai.","B":"Semua transaksi tanpa tunai berasal dari taksi online.","C":"Tidak ada taksi online yang menerima pembayaran tunai.","D":"Semua armada yang mendukung transaksi tanpa tunai adalah taksi online.","E":"Sebagian armada taksi online mendukung transaksi tanpa tunai."},"answer":"E","explanation":"Karena hanya sebagian taksi online yang terintegrasi, dan semua yang terintegrasi mendukung transaksi tanpa tunai, maka hanya sebagian taksi online yang mendukung transaksi tanpa tunai."}],"parentId":"logika","bundleNum":5},"logika__paket_6":{"title":"Logika - Paket 6","duration":1800,"questions":[{"number":1,"question":"Premis 1: Semua penumpang KRL yang membawa sepeda harus menggunakan gerbong khusus sepeda. Premis 2: Andi adalah penumpang KRL yang membawa sepeda. Kesimpulan yang paling tepat adalah...","options":{"A":"Andi harus menggunakan gerbong khusus sepeda.","B":"Andi tidak diperbolehkan naik KRL.","C":"Semua penumpang KRL wajib menggunakan gerbong khusus.","D":"Andi membawa sepeda karena ada gerbong khusus.","E":"Tidak semua penumpang KRL membawa sepeda."},"answer":"A","explanation":"Silogisme kategorik sederhana. Andi termasuk dalam kelompok penumpang KRL yang membawa sepeda, sehingga Andi harus menggunakan gerbong khusus sepeda."},{"number":2,"question":"Premis 1: Sebagian bus rapid transit (BRT) menggunakan bahan bakar hidrogen. Premis 2: Semua kendaraan yang menggunakan bahan bakar hidrogen menghasilkan emisi nol. Kesimpulan yang paling tepat adalah...","options":{"A":"Semua bus BRT menghasilkan emisi nol.","B":"Sebagian bus BRT menghasilkan emisi nol.","C":"Tidak ada bus BRT yang menghasilkan emisi.","D":"Semua kendaraan emisi nol adalah bus BRT.","E":"Bahan bakar hidrogen hanya digunakan oleh bus BRT."},"answer":"B","explanation":"Karena hanya sebagian bus BRT yang menggunakan hidrogen, dan semua yang menggunakan hidrogen menghasilkan emisi nol, maka hanya sebagian bus BRT yang menghasilkan emisi nol."},{"number":3,"question":"Premis 1: Semua pelabuhan internasional memiliki fasilitas bea cukai. Premis 2: Pelabuhan Nusa Indah tidak memiliki fasilitas bea cukai. Kesimpulan yang paling tepat adalah...","options":{"A":"Pelabuhan Nusa Indah adalah pelabuhan internasional yang sedang direnovasi.","B":"Pelabuhan Nusa Indah mungkin termasuk pelabuhan internasional.","C":"Pelabuhan Nusa Indah bukan pelabuhan internasional.","D":"Fasilitas bea cukai hanya ada di pelabuhan internasional.","E":"Pelabuhan internasional hanya ada di kota-kota besar."},"answer":"C","explanation":"Karena semua pelabuhan internasional memiliki fasilitas bea cukai, dan Pelabuhan Nusa Indah tidak memilikinya, maka Pelabuhan Nusa Indah pasti bukan pelabuhan internasional."},{"number":4,"question":"Premis 1: Jika jembatan mengalami kerusakan struktural, maka jembatan tersebut ditutup untuk umum. Premis 2: Jembatan Ciawi tidak ditutup untuk umum. Kesimpulan yang paling tepat adalah...","options":{"A":"Jembatan Ciawi mengalami kerusakan struktural ringan.","B":"Semua jembatan yang tidak ditutup pasti dalam kondisi baik.","C":"Jembatan Ciawi sedang dalam pemantauan rutin.","D":"Jembatan Ciawi tidak mengalami kerusakan struktural.","E":"Penutupan jembatan selalu disebabkan oleh kerusakan struktural."},"answer":"D","explanation":"Modus Tollens: Jika P maka Q. Ternyata tidak Q (jembatan tidak ditutup), maka tidak P (jembatan tidak mengalami kerusakan struktural)."},{"number":5,"question":"Premis 1: Semua pilot maskapai penerbangan nasional wajib memiliki lisensi ATPL. Premis 2: Sebagian instruktur penerbangan adalah pilot maskapai penerbangan nasional. Kesimpulan yang paling tepat adalah...","options":{"A":"Semua instruktur penerbangan wajib memiliki lisensi ATPL.","B":"Tidak ada instruktur penerbangan yang memiliki lisensi ATPL.","C":"Semua pemegang lisensi ATPL adalah instruktur penerbangan.","D":"Hanya pilot maskapai yang boleh memiliki lisensi ATPL.","E":"Sebagian instruktur penerbangan wajib memiliki lisensi ATPL."},"answer":"E","explanation":"Karena hanya sebagian instruktur penerbangan yang merupakan pilot maskapai, dan semua pilot maskapai wajib memiliki ATPL, maka hanya sebagian instruktur penerbangan yang wajib memiliki lisensi ATPL."},{"number":6,"question":"Lima taksi online (A, B, C, D, E) akan menjemput penumpang secara berurutan dari satu titik lokasi. Ketentuannya: Taksi B menjemput tepat setelah Taksi A. Taksi D menjemput sebelum Taksi B. Taksi C tidak boleh menjemput pada urutan pertama atau kelima. Taksi E menjemput pada urutan ketiga. Urutan penjemputan taksi yang benar adalah...","options":{"A":"D, C, E, A, B","B":"C, D, E, A, B","C":"D, E, C, A, B","D":"A, B, D, C, E","E":"C, E, D, A, B"},"answer":"A","explanation":"E di posisi 3 (tetap). AB berpasangan berurutan. D sebelum B. Satu-satunya susunan valid: D(1)-C(2)-E(3)-A(4)-B(5). Karena AB di posisi 4-5, D harus di posisi 1 atau 2, dan C mengisi yang tersisa. (Gunakan data Soal No. 11)"},{"number":7,"question":"Taksi yang menjemput penumpang pada urutan kedua adalah...","options":{"A":"Taksi A","B":"Taksi C","C":"Taksi D","D":"Taksi E","E":"Taksi B"},"answer":"B","explanation":"Berdasarkan urutan valid D-C-E-A-B, taksi yang menjemput di urutan kedua adalah Taksi C. (Gunakan data Soal No. 11)"},{"number":8,"question":"Taksi yang menjemput tepat sebelum Taksi E adalah...","options":{"A":"Taksi A","B":"Taksi B","C":"Taksi C","D":"Taksi D","E":"Tidak dapat ditentukan"},"answer":"C","explanation":"Berdasarkan urutan D-C-E-A-B, Taksi E berada di posisi 3. Posisi 2 (tepat sebelum E) ditempati oleh Taksi C."},{"number":9,"question":"Enam petugas (P, Q, R, S, T, U) akan bertugas di tiga koridor busway: Koridor 1, Koridor 2, dan Koridor 3. Setiap koridor dijaga tepat dua petugas. Ketentuannya: P tidak mau bertugas di Koridor 1. Q dan R harus berada di koridor yang sama. S bertugas di Koridor 3. T tidak mau bertugas di Koridor 2 atau Koridor 3. Di koridor manakah petugas P bertugas?","options":{"A":"Koridor 1","B":"Koridor 2","C":"Bersama petugas T","D":"Koridor 3","E":"Bersama petugas Q"},"answer":"D","explanation":"T tidak mau di Koridor 2 atau 3, maka T di Koridor 1. QR harus bersama, maka QR di Koridor 2. K1: T+U. K3: S+P. Maka P di Koridor 3. (Gunakan data Soal No. 14)"},{"number":10,"question":"Siapakah teman bertugas petugas T?","options":{"A":"Petugas P","B":"Petugas Q","C":"Petugas R","D":"Petugas S","E":"Petugas U"},"answer":"E","explanation":"T di Koridor 1. P tidak mau di K1. QR di K2. S di K3. Satu-satunya yang tersisa untuk menemani T di K1 adalah U. (Gunakan data Soal No. 14)"},{"number":11,"question":"Di koridor manakah petugas U bertugas?","options":{"A":"Koridor 1","B":"Koridor 2","C":"Koridor 3","D":"Koridor 1 atau 2","E":"Tidak dapat ditentukan"},"answer":"A","explanation":"Berdasarkan analisis lengkap: T+U di Koridor 1, Q+R di Koridor 2, S+P di Koridor 3. Petugas U bertugas di Koridor 1."},{"number":12,"question":"Empat stasiun kereta (P, Q, R, S) berada di jalur lurus dari barat ke timur. Stasiun Q berjarak 4 km dari P. Stasiun R berjarak 6 km dari P. Stasiun S berjarak 2 km dari Q. Semua stasiun berada di sebelah timur P. Urutan stasiun dari barat ke timur adalah...","options":{"A":"P - Q - S - R","B":"P - S - Q - R","C":"P - Q - R - S","D":"P - R - Q - S","E":"S - P - Q - R"},"answer":"B","explanation":"P = 0 km (titik acuan). Q = 4 km dari P. R = 6 km dari P. S = 2 km dari Q, bisa di 2 km atau 6 km. Karena 6 km = R, maka S = 2 km. Urutan: P(0)-S(2)-Q(4)-R(6)."},{"number":13,"question":"Empat bus di depo memiliki usia yang berbeda: Bus A lebih baru dari Bus B. Bus C lebih tua dari Bus D. Bus B dan Bus D dibeli pada tahun yang sama. Bus manakah yang paling baru?","options":{"A":"Bus B","B":"Bus D","C":"Bus A","D":"Bus C","E":"Bus B dan Bus D sama-sama paling baru"},"answer":"C","explanation":"A lebih baru dari B. C lebih tua dari D. B dan D usianya sama. Urutan dari tertua ke terbaru: C < D = B < A. Maka Bus A adalah yang paling baru."},{"number":14,"question":"Dalam sebuah garasi operasional, posisi Mobil Operasional berada di antara Mobil Inspeksi dan Mobil Derek. Mobil Tangki berada di sebelah kanan Mobil Derek. Mobil Patroli berada di sebelah kiri Mobil Inspeksi. Kendaraan mana yang berada di posisi paling kiri?","options":{"A":"Mobil Inspeksi","B":"Mobil Operasional","C":"Mobil Derek","D":"Mobil Patroli","E":"Mobil Tangki"},"answer":"D","explanation":"Susunan dari kiri ke kanan: Patroli - Inspeksi - Operasional - Derek - Tangki. Mobil operasional di antara inspeksi dan derek. Mobil tangki di kanan derek. Mobil patroli di kiri inspeksi. Maka posisi paling kiri adalah Mobil Patroli."},{"number":15,"question":"Sebuah bus beroperasi melewati 6 titik secara berurutan: Terminal - Pasar - Sekolah - Kantor Pos - Rumah Sakit - Bandara. Seorang penumpang naik di Pasar dan ingin turun di Rumah Sakit. Berapa titik yang dilewati bus setelah penumpang naik hingga sampai tujuan?","options":{"A":"1 titik","B":"3 titik","C":"4 titik","D":"0 titik","E":"2 titik"},"answer":"E","explanation":"Rute: Terminal-Pasar-Sekolah-Kantor Pos-Rumah Sakit-Bandara. Penumpang naik di Pasar, turun di Rumah Sakit. Bus melewati Sekolah dan Kantor Pos sebelum tiba di tujuan. Total = 2 titik."},{"number":16,"question":"Premis 1: Semua bus listrik tidak mengeluarkan emisi karbon. Premis 2: Semua bus yang beroperasi di rute Zero Emission Zone (ZEZ) adalah bus listrik. Kesimpulan yang paling tepat adalah...","options":{"A":"Semua bus yang beroperasi di rute ZEZ tidak mengeluarkan emisi karbon.","B":"Sebagian bus listrik beroperasi di rute ZEZ.","C":"Semua kendaraan yang tidak mengeluarkan emisi karbon adalah bus listrik.","D":"Bus yang mengeluarkan emisi karbon tidak boleh beroperasi di mana pun.","E":"Semua bus di ZEZ lebih hemat energi dibandingkan bus konvensional."},"answer":"A","explanation":"Silogisme hipotetik: Semua bus ZEZ adalah bus listrik (P2), dan semua bus listrik tidak mengeluarkan emisi karbon (P1). Maka semua bus ZEZ tidak mengeluarkan emisi karbon."},{"number":17,"question":"Dalam diagram Venn: Lingkaran A = kendaraan berbahan bakar bensin. Lingkaran B = kendaraan yang mengeluarkan polusi udara. Lingkaran A sepenuhnya berada di dalam Lingkaran B. Kesimpulan manakah yang TIDAK TEPAT berdasarkan diagram tersebut?","options":{"A":"Semua kendaraan berbahan bakar bensin mengeluarkan polusi udara.","B":"Semua kendaraan yang mengeluarkan polusi udara berbahan bakar bensin.","C":"Sebagian kendaraan yang mengeluarkan polusi udara berbahan bakar bensin.","D":"Tidak ada kendaraan berbahan bakar bensin yang bebas polusi.","E":"Kendaraan bensin merupakan bagian dari kelompok kendaraan pencemar udara."},"answer":"B","explanation":"Jika A sepenuhnya di dalam B, artinya semua A adalah B, tetapi tidak berarti semua B adalah A. Mungkin ada kendaraan lain (bukan bensin) yang juga berpolusi. Pernyataan B adalah kesimpulan yang SALAH."},{"number":18,"question":"BUS : HALTE = KAPAL FERI : ...","options":{"A":"Laut","B":"Nelayan","C":"Dermaga","D":"Pelabuhan Besar","E":"Pelaut"},"answer":"C","explanation":"Bus berhenti di Halte untuk menaikkan/menurunkan penumpang. Analogi serupa: Kapal Feri berhenti di Dermaga untuk menaikkan/menurunkan penumpang."},{"number":19,"question":"Perhatikan pola warna lampu lalu lintas berikut: Merah, Kuning, Hijau, Merah, Kuning, ... Warna berikutnya dalam pola tersebut adalah...","options":{"A":"Merah","B":"Kuning","C":"Biru","D":"Hijau","E":"Oranye"},"answer":"D","explanation":"Pola berulang setiap 3: Merah-Kuning-Hijau-Merah-Kuning-Hijau. Setelah Kuning (urutan ke-5), berikutnya adalah Hijau (urutan ke-6)."},{"number":20,"question":"Premis 1: Semua armada bus yang berusia lebih dari 10 tahun wajib menjalani uji emisi setiap 6 bulan. Premis 2: Sebagian armada di Depo Ciputat berusia lebih dari 10 tahun. Kesimpulan yang paling tepat adalah...","options":{"A":"Semua armada di Depo Ciputat menjalani uji emisi setiap 6 bulan.","B":"Tidak ada armada di Depo Ciputat yang lolos uji emisi.","C":"Armada yang berusia kurang dari 10 tahun tidak perlu uji emisi sama sekali.","D":"Semua yang menjalani uji emisi setiap 6 bulan berasal dari Depo Ciputat.","E":"Sebagian armada di Depo Ciputat wajib menjalani uji emisi setiap 6 bulan."},"answer":"E","explanation":"Karena hanya sebagian armada di Depo Ciputat berusia lebih dari 10 tahun, maka hanya sebagian dari mereka yang wajib menjalani uji emisi setiap 6 bulan."},{"number":21,"question":"Dalam peta terminal: Loket Tiket berada di sebelah utara Ruang Tunggu. Toilet berada di sebelah timur Ruang Tunggu. Mushola berada di sebelah barat Loket Tiket. Di manakah posisi Mushola terhadap Ruang Tunggu?","options":{"A":"Barat Laut","B":"Timur Laut","C":"Barat Daya","D":"Tenggara","E":"Utara"},"answer":"A","explanation":"Loket Tiket berada di Utara Ruang Tunggu. Mushola berada di Barat Loket Tiket. Jika Loket Tiket di Utara, maka sesuatu yang Barat dari Loket Tiket berada di Barat Laut Ruang Tunggu."},{"number":22,"question":"Diagram P = rute bus yang memiliki halte terintegrasi. Diagram Q = rute bus yang melewati kawasan wisata. Rute 7B selalu masuk dalam Diagram P. Kesimpulan yang paling tepat adalah...","options":{"A":"Rute 7B selalu melewati kawasan wisata.","B":"Rute 7B selalu memiliki halte terintegrasi.","C":"Semua rute berhalte terintegrasi melewati kawasan wisata.","D":"Rute 7B tidak pernah melewati kawasan wisata.","E":"Semua rute kawasan wisata memiliki halte terintegrasi."},"answer":"B","explanation":"Karena rute 7B selalu masuk dalam Diagram P (rute berhalte terintegrasi), maka secara logis rute 7B selalu memiliki halte terintegrasi. Tidak ada informasi tentang kawasan wisata."},{"number":23,"question":"Jadwal keberangkatan bus dari terminal adalah: 06.00, 06.20, 06.45, 07.15, 07.50, ... Jadwal keberangkatan bus berikutnya adalah...","options":{"A":"08.20","B":"08.25","C":"08.30","D":"08.35","E":"08.40"},"answer":"C","explanation":"Selisih antar jadwal: 20 menit, 25 menit, 30 menit, 35 menit (bertambah 5 menit setiap kali). Selisih berikutnya = 40 menit. Jadwal berikutnya: 07.50 + 40 menit = 08.30."},{"number":24,"question":"SOPIR : BUS = MASINIS : ...","options":{"A":"Stasiun","B":"Rel","C":"Tiket","D":"Kereta","E":"Peron"},"answer":"D","explanation":"Sopir adalah orang yang mengemudikan Bus. Analogi: Masinis adalah orang yang mengemudikan Kereta."},{"number":25,"question":"Premis 1: Semua bandara internasional memiliki terminal internasional. Premis 2: Semua terminal internasional dilengkapi fasilitas imigrasi dan bea cukai. Premis 3: Bandara Soekarno-Hatta adalah bandara internasional. Kesimpulan yang paling tepat adalah...","options":{"A":"Bandara Soekarno-Hatta tidak memiliki terminal domestik.","B":"Semua bandara di Indonesia memiliki imigrasi dan bea cukai.","C":"Terminal domestik tidak memiliki fasilitas imigrasi.","D":"Fasilitas imigrasi hanya ada di bandara internasional.","E":"Bandara Soekarno-Hatta memiliki fasilitas imigrasi dan bea cukai."},"answer":"E","explanation":"Silogisme hipotetik tiga premis: BSH adalah bandara internasional (P3), memiliki terminal internasional (P1), dilengkapi imigrasi dan bea cukai (P2). Maka BSH memiliki imigrasi dan bea cukai."}],"parentId":"logika","bundleNum":6},"logika__paket_7":{"title":"Logika - Paket 7","duration":1800,"questions":[{"number":1,"question":"Premis 1: Semua pengemudi angkot wajib mematuhi tarif resmi yang ditetapkan pemerintah daerah. Premis 2: Pak Hendra adalah pengemudi angkot di Kota Bandung. Tentukan kesimpulan yang paling tepat.","options":{"A":"Semua pengemudi di Kota Bandung mematuhi tarif resmi.","B":"Pak Hendra wajib mematuhi tarif resmi yang ditetapkan pemerintah daerah.","C":"Pak Hendra mungkin tidak mematuhi tarif resmi.","D":"Tarif resmi hanya berlaku untuk pengemudi tertentu.","E":"Pak Hendra adalah satu-satunya pengemudi angkot di Bandung."},"answer":"B","explanation":"Silogisme kategorik standar. Pak Hendra adalah pengemudi angkot, dan semua pengemudi angkot wajib mematuhi tarif resmi. Maka Pak Hendra wajib mematuhi tarif resmi pemerintah daerah."},{"number":2,"question":"Premis 1: Jika radar cuaca mendeteksi badai, maka semua penerbangan ditunda keberangkatannya. Premis 2: Tidak semua penerbangan ditunda keberangkatannya. Tentukan kesimpulan yang paling tepat.","options":{"A":"Radar cuaca mengalami kerusakan.","B":"Badai sedang terjadi di beberapa wilayah.","C":"Radar cuaca tidak mendeteksi badai.","D":"Penerbangan internasional tidak terkena penundaan.","E":"Badai terjadi namun tidak berbahaya."},"answer":"C","explanation":"Modus Tollens: Jika P maka Q. Tidak Q (penerbangan tidak ditunda). Maka Tidak P: radar cuaca tidak mendeteksi badai."},{"number":3,"question":"Premis 1: Semua maskapai penerbangan nasional wajib terdaftar di Direktorat Jenderal Perhubungan Udara (DJPU). Premis 2: Maskapai Nusantara Air adalah maskapai penerbangan nasional. Tentukan kesimpulan yang paling tepat.","options":{"A":"Maskapai Nusantara Air wajib terdaftar di DJPU.","B":"Maskapai Nusantara Air mungkin terdaftar di DJPU.","C":"DJPU hanya mendaftarkan maskapai tertentu.","D":"Semua maskapai yang terdaftar di DJPU adalah maskapai nasional.","E":"Maskapai Nusantara Air adalah satu-satunya yang terdaftar."},"answer":"A","explanation":"Silogisme kategorik standar. Nusantara Air adalah maskapai nasional, dan semua maskapai nasional wajib terdaftar di DJPU. Maka Nusantara Air wajib terdaftar di DJPU."},{"number":4,"question":"Premis 1: Tidak ada kendaraan dengan STNK mati yang boleh beroperasi di jalan raya. Premis 2: Kendaraan plat DK 4567 AB memiliki STNK yang sudah mati. Tentukan kesimpulan yang paling tepat.","options":{"A":"Kendaraan DK 4567 AB boleh beroperasi dengan pengawasan petugas.","B":"STNK mati tidak selalu berarti melanggar aturan.","C":"Semua kendaraan di jalan raya memiliki STNK aktif.","D":"Kendaraan DK 4567 AB tidak boleh beroperasi di jalan raya.","E":"Kendaraan DK 4567 AB harus membayar denda terlebih dahulu."},"answer":"D","explanation":"Tidak ada kendaraan ber-STNK mati yang boleh beroperasi. Kendaraan DK 4567 AB ber-STNK mati, sehingga mutlak kendaraan tersebut tidak boleh beroperasi di jalan raya."},{"number":5,"question":"Premis 1: Semua bus pariwisata wajib dilengkapi sabuk pengaman di setiap kursi penumpang. Premis 2: Bus PO Tirta Jaya adalah bus pariwisata. Tentukan kesimpulan yang paling tepat.","options":{"A":"Hanya Bus PO Tirta Jaya yang wajib punya sabuk pengaman.","B":"Bus PO Tirta Jaya mungkin dilengkapi sabuk pengaman.","C":"Semua jenis bus wajib dilengkapi sabuk pengaman.","D":"Sabuk pengaman bukan kewajiban bagi bus pariwisata.","E":"Bus PO Tirta Jaya wajib dilengkapi sabuk pengaman di setiap kursi penumpang."},"answer":"E","explanation":"Silogisme kategorik standar. Bus PO Tirta Jaya adalah bus pariwisata, dan semua bus pariwisata wajib dilengkapi sabuk pengaman di setiap kursi. Maka Bus PO Tirta Jaya wajib dilengkapi sabuk pengaman."},{"number":6,"question":"Premis 1: Sebagian sopir truk kontainer memiliki sertifikat kendaraan berat (SIM B2). Premis 2: Semua pemegang SIM B2 mendapatkan tunjangan khusus dari perusahaan. Tentukan kesimpulan yang paling tepat.","options":{"A":"Semua sopir truk kontainer mendapat tunjangan khusus.","B":"Sebagian sopir truk kontainer mendapat tunjangan khusus.","C":"Tunjangan khusus hanya diberikan kepada sopir truk kontainer.","D":"Sopir yang tidak punya SIM B2 tidak bekerja di perusahaan.","E":"Tidak ada sopir truk kontainer yang mendapat tunjangan."},"answer":"B","explanation":"Hanya sebagian sopir truk kontainer yang bersertifikat SIM B2, dan semua pemegang SIM B2 mendapat tunjangan. Maka hanya sebagian sopir truk kontainer yang mendapat tunjangan khusus."},{"number":7,"question":"Premis 1: Jika lampu sinyal lalu lintas di Persimpangan Sudirman padam, maka petugas Dishub diturunkan untuk mengatur lalu lintas. Premis 2: Petugas Dishub tidak diturunkan di Persimpangan Sudirman. Tentukan kesimpulan yang paling tepat.","options":{"A":"Lampu sinyal di Persimpangan Sudirman sudah padam.","B":"Petugas Dishub sedang bertugas di lokasi lain.","C":"Lampu sinyal lalu lintas di Persimpangan Sudirman tidak padam.","D":"Pengemudi mengabaikan rambu-rambu lalu lintas.","E":"Persimpangan Sudirman sedang sepi dari kendaraan."},"answer":"C","explanation":"Modus Tollens: Jika P maka Q. Tidak Q (petugas tidak diturunkan). Maka Tidak P: lampu sinyal tidak padam."},{"number":8,"question":"Premis 1: Semua stasiun MRT Jakarta memiliki lift untuk pengguna difabel. Premis 2: Stasiun Bundaran HI adalah stasiun MRT Jakarta. Tentukan kesimpulan yang paling tepat.","options":{"A":"Stasiun Bundaran HI memiliki lift untuk pengguna difabel.","B":"Stasiun Bundaran HI mungkin memiliki lift.","C":"Hanya Stasiun Bundaran HI yang memiliki lift di MRT Jakarta.","D":"Semua stasiun transportasi di Jakarta memiliki lift.","E":"Pengguna difabel hanya dapat menggunakan Stasiun Bundaran HI."},"answer":"A","explanation":"Silogisme kategorik sederhana. Stasiun Bundaran HI adalah bagian dari MRT Jakarta, dan semua stasiun MRT Jakarta memiliki lift untuk difabel. Maka Stasiun Bundaran HI pasti memiliki lift untuk difabel."},{"number":9,"question":"Premis 1: Semua penumpang pesawat rute internasional wajib memiliki paspor yang masih berlaku. Premis 2: Sebagian wisatawan asing yang tiba di Bali adalah penumpang pesawat rute internasional. Tentukan kesimpulan yang paling tepat.","options":{"A":"Semua wisatawan asing di Bali wajib memiliki paspor yang berlaku.","B":"Sebagian wisatawan asing di Bali tidak memiliki paspor.","C":"Paspor tidak wajib untuk penumpang penerbangan domestik.","D":"Sebagian wisatawan asing yang tiba di Bali wajib memiliki paspor yang masih berlaku.","E":"Penumpang pesawat domestik juga wajib memiliki paspor."},"answer":"D","explanation":"Hanya sebagian wisatawan asing di Bali yang merupakan penumpang pesawat internasional. Semua penumpang internasional wajib berpaspor. Maka hanya sebagian wisatawan asing tersebut yang dapat dipastikan wajib memiliki paspor berlaku."},{"number":10,"question":"Premis 1: Jika volume kendaraan melebihi kapasitas jalan, maka terjadi kemacetan. Premis 2: Saat ini terjadi kemacetan di Jalan Gatot Subroto. Tentukan kesimpulan yang paling tepat.","options":{"A":"Volume kendaraan pasti melebihi kapasitas jalan.","B":"Jalan Gatot Subroto sedang dalam perbaikan.","C":"Belum tentu volume kendaraan melebihi kapasitas jalan.","D":"Semua pengemudi mengabaikan rambu lalu lintas.","E":"Polisi lalu lintas tidak bertugas hari ini."},"answer":"C","explanation":"Ini adalah jebakan affirming the consequent. Jika P maka Q. Q terjadi (ada kemacetan). Tidak bisa disimpulkan P pasti terjadi, karena kemacetan bisa disebabkan faktor lain seperti kecelakaan atau perbaikan jalan. Maka: belum tentu volume kendaraan melebihi kapasitas."},{"number":11,"question":"Lima armada bus (Bus 1, Bus 2, Bus 3, Bus 4, Bus 5) akan diberangkatkan dari Terminal Pulo Gebang secara berurutan. Ketentuannya: Bus 1 berangkat tepat sebelum Bus 3 (berurutan langsung). Bus 5 berangkat tepat sebelum Bus 2 (berurutan langsung). Bus 4 berangkat pada urutan kelima (terakhir). Bus 3 berangkat sebelum Bus 5. Urutan keberangkatan bus yang BENAR adalah...","options":{"A":"Bus 5, Bus 2, Bus 1, Bus 3, Bus 4","B":"Bus 1, Bus 3, Bus 2, Bus 5, Bus 4","C":"Bus 3, Bus 1, Bus 5, Bus 2, Bus 4","D":"Bus 5, Bus 1, Bus 3, Bus 2, Bus 4","E":"Bus 1, Bus 3, Bus 5, Bus 2, Bus 4"},"answer":"E","explanation":"Bus 4 di posisi 5. Paket Bus 1-Bus 3 berurutan, paket Bus 5-Bus 2 berurutan. Bus 3 sebelum Bus 5. Jika posisi paket (1,3) adalah (1,2) dan paket (5,2) adalah (3,4): urutan Bus 1, Bus 3, Bus 5, Bus 2, Bus 4. Ini memenuhi semua syarat. (Gunakan data Soal No. 11)"},{"number":12,"question":"Bus yang berangkat pada urutan ketiga adalah...","options":{"A":"Bus 1","B":"Bus 5","C":"Bus 2","D":"Bus 3","E":"Bus 4"},"answer":"B","explanation":"Berdasarkan urutan yang valid: Bus 1 (1), Bus 3 (2), Bus 5 (3), Bus 2 (4), Bus 4 (5). Bus yang berada di posisi ketiga adalah Bus 5. (Gunakan data Soal No. 11)"},{"number":13,"question":"Bus manakah yang berangkat tepat sebelum Bus 4?","options":{"A":"Bus 1","B":"Bus 3","C":"Bus 5","D":"Bus 2","E":"Tidak bisa ditentukan"},"answer":"D","explanation":"Urutan valid: Bus 1, Bus 3, Bus 5, Bus 2, Bus 4. Bus yang berada tepat di posisi ke-4 (sebelum Bus 4 di posisi 5) adalah Bus 2."},{"number":14,"question":"Enam petugas (P, Q, R, S, T, U) ditempatkan di tiga pos penjagaan: Pos Terminal, Pos Halte, dan Pos Jembatan. Setiap pos dijaga oleh tepat dua petugas. Ketentuannya: P tidak mau bertugas di Pos Terminal. Q dan R harus berada di pos yang sama. S bertugas di Pos Jembatan. T tidak mau bertugas di Pos Jembatan atau Pos Halte. Di pos manakah petugas U bertugas?","options":{"A":"Pos Terminal","B":"Pos Halte","C":"Pos Jembatan","D":"Bersama petugas Q","E":"Bersama petugas S"},"answer":"A","explanation":"T hanya bisa di Pos Terminal (tidak mau di Jembatan/Halte). Q dan R tidak bisa di Terminal (karena hanya 2 slot, T sudah satu). Q dan R tidak bisa di Jembatan (S sudah di sana, jadi full). Maka Q dan R di Pos Halte. Sisa P dan U untuk Pos Terminal dan Pos Jembatan. P tidak mau di Terminal, jadi P di Jembatan bersama S. Maka U di Pos Terminal bersama T. (Gunakan data Soal No. 14)"},{"number":15,"question":"Siapakah teman jaga petugas S di Pos Jembatan?","options":{"A":"Q","B":"T","C":"P","D":"R","E":"U"},"answer":"C","explanation":"Berdasarkan analisis Soal 14: Pos Jembatan diisi S dan P. Maka teman jaga S adalah P."},{"number":16,"question":"Lima moda transportasi diurutkan berdasarkan kecepatan rata-rata: Pesawat lebih cepat dari Kereta Cepat. Kapal Feri lebih lambat dari Bus Ekspres. Kereta Cepat lebih cepat dari Bus Ekspres. Kapal Feri lebih cepat dari Sepeda Motor. Moda transportasi dengan kecepatan PALING LAMBAT adalah...","options":{"A":"Kapal Feri","B":"Sepeda Motor","C":"Bus Ekspres","D":"Kereta Cepat","E":"Pesawat"},"answer":"B","explanation":"Susun urutan dari cepat ke lambat: Pesawat > Kereta Cepat > Bus Ekspres > Kapal Feri > Sepeda Motor. Moda paling lambat adalah Sepeda Motor."},{"number":17,"question":"Jumlah penumpang bus di suatu halte tercatat setiap jam (dalam orang): 45, 50, 60, 75, 95, ... Jumlah penumpang pada jam berikutnya adalah...","options":{"A":"115","B":"110","C":"125","D":"120","E":"130"},"answer":"D","explanation":"Selisih antar suku: 5, 10, 15, 20, 25 (bertambah 5 setiap langkah). Selisih berikutnya = 25. Maka: 95 + 25 = 120."},{"number":18,"question":"Kode registrasi armada bus mengikuti pola berikut: TJ-001-A, TJ-002-B, TJ-003-C, TJ-004-D, ... Kode registrasi bus ke-5 adalah...","options":{"A":"TJ-005-E","B":"TJ-005-F","C":"TJ-006-E","D":"TJ-004-E","E":"TJ-005-D"},"answer":"A","explanation":"Pola: nomor urut bertambah 1, huruf mengikuti urutan alfabet (A, B, C, D, E). Bus ke-5 memiliki kode TJ-005-E."},{"number":19,"question":"Deret nomor rute bus berikut mengikuti suatu pola: 6, 12, 10, 20, 18, 36, 34, ... Angka berikutnya dalam deret ini adalah...","options":{"A":"66","B":"70","C":"64","D":"72","E":"68"},"answer":"E","explanation":"Pola bergantian: x2 lalu -2. Maka: 6x2=12, 12-2=10, 10x2=20, 20-2=18, 18x2=36, 36-2=34, 34x2=68. Jawaban: 68."},{"number":20,"question":"Dalam denah bandara, Terminal 1 berada di sebelah barat Terminal 2. Terminal 3 berada di sebelah utara Terminal 2. Area Kargo berada di sebelah timur Terminal 3. Di manakah posisi Area Kargo relatif terhadap Terminal 1?","options":{"A":"Timur","B":"Utara","C":"Timur Laut","D":"Tenggara","E":"Barat Laut"},"answer":"C","explanation":"Tetapkan Terminal 2 di koordinat (0,0). Terminal 1 di (-1,0). Terminal 3 di (0,1). Area Kargo di timur Terminal 3 = (1,1). Posisi (1,1) relatif terhadap (-1,0): arah ke kanan (timur) dan ke atas (utara), sehingga arahnya adalah Timur Laut."},{"number":21,"question":"STASIUN : KERETA = PELABUHAN : ...","options":{"A":"Laut","B":"Jangkar","C":"Awak Kapal","D":"Kapal","E":"Dermaga"},"answer":"D","explanation":"Stasiun adalah tempat pemberhentian dan keberangkatan Kereta. Pelabuhan adalah tempat pemberhentian dan keberangkatan Kapal. Hubungan: fasilitas infrastruktur - moda transportasi yang menggunakannya."},{"number":22,"question":"Semua bus rapid transit (BRT) memiliki jalur khusus (busway). Tidak semua kendaraan bermotor memiliki jalur khusus. Kesimpulan yang PALING TEPAT adalah...","options":{"A":"Semua kendaraan bermotor adalah BRT.","B":"Sebagian kendaraan bermotor bukan BRT.","C":"Semua jalur khusus hanya digunakan oleh BRT.","D":"BRT dan kendaraan bermotor tidak berhubungan.","E":"Semua BRT termasuk kategori kendaraan bermotor."},"answer":"B","explanation":"Semua BRT punya jalur khusus, tapi tidak semua kendaraan bermotor punya. Artinya ada kendaraan bermotor yang tidak punya jalur khusus, yang berarti kendaraan tersebut bukan BRT. Maka sebagian kendaraan bermotor bukan BRT."},{"number":23,"question":"PILOT : KOKPIT = MASINIS : ...","options":{"A":"Kabin Masinis","B":"Gerbong Penumpang","C":"Rel Kereta","D":"Stasiun Kereta","E":"Loket Tiket"},"answer":"A","explanation":"Pilot mengemudikan pesawat dari Kokpit (ruang kemudi pesawat). Masinis mengemudikan kereta dari Kabin Masinis (ruang kemudi kereta). Hubungan: operator - ruang pengendali moda transportasinya."},{"number":24,"question":"Diagram Venn menunjukkan tiga kategori kendaraan: Lingkaran A: Kendaraan bermesin. Lingkaran B: Kendaraan berbahan bakar bensin. Lingkaran C: Kendaraan roda dua. Sepeda motor konvensional masuk dalam kategori...","options":{"A":"Hanya A","B":"Hanya B dan C","C":"Hanya A dan C","D":"Hanya A dan B","E":"A, B, dan C sekaligus"},"answer":"E","explanation":"Sepeda motor konvensional memiliki mesin (A), menggunakan bahan bakar bensin (B), dan memiliki dua roda (C). Maka sepeda motor konvensional masuk irisan dari ketiga lingkaran sekaligus: A, B, dan C."},{"number":25,"question":"Semua pengemudi ojek online wajib memiliki SIM C. Semua pengemudi ojek online dengan rating di atas 4.8 mendapatkan bonus bulanan. Andi adalah pengemudi ojek online dengan rating 4.9. Kesimpulan yang PALING TEPAT adalah...","options":{"A":"Andi tidak wajib memiliki SIM C karena sudah punya rating tinggi.","B":"Semua pengemudi ojek online mendapatkan bonus bulanan.","C":"Andi wajib memiliki SIM C dan mendapatkan bonus bulanan.","D":"Rating 4.9 tidak menjamin bonus bulanan bagi Andi.","E":"Hanya Andi yang mendapatkan bonus bulanan."},"answer":"C","explanation":"Rantai silogisme: Andi adalah pengemudi ojek online, maka wajib memiliki SIM C (Premis 1). Rating Andi 4.9 > 4.8, maka Andi mendapatkan bonus bulanan (Premis 2). Kedua kesimpulan berlaku sekaligus untuk Andi."}],"parentId":"logika","bundleNum":7},"spasial": {"title": "Tes Spasial", "duration": 900, "order": 4, "type": "visual", "questions": [{"number": 2, "image_b64": "/9j/4AAQSkZJRgABAQAAAQABAAD/2w
