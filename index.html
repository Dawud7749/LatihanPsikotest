","options":{"A":"45 menit","B":"48 menit","C":"50 menit","D":"52 menit","E":"60 menit"},"answer":"A","explanation":"Waktu = 54 / 72 jam = 0,75 jam = 0,75 × 60 = 45 menit."},{"number":11,"question":"Total pendapatan tiket sebuah perusahaan bus per hari adalah Rp48.000.000. Jika biaya operasional harian mencapai 65% dari pendapatan, berapa keuntungan bersih per hari?","options":{"A":"Rp14.400.000","B":"Rp15.200.000","C":"Rp16.000.000","D":"Rp16.800.000","E":"Rp17.600.000"},"answer":"D","explanation":"Biaya operasional = 65% × Rp48.000.000 = Rp31.200.000. Keuntungan = Rp48.000.000 – Rp31.200.000 = Rp16.800.000."},{"number":12,"question":"Sebuah bengkel armada memperbaiki 120 unit bus dalam sebulan. Jika 35% adalah perbaikan ringan dan sisanya adalah perbaikan berat, berapa unit yang mengalami perbaikan berat?","options":{"A":"74 unit","B":"78 unit","C":"80 unit","D":"82 unit","E":"84 unit"},"answer":"B","explanation":"Perbaikan ringan = 35% × 120 = 42 unit. Perbaikan berat = 120 – 42 = 78 unit."},{"number":13,"question":"Seorang pengemudi bus menempuh perjalanan sejauh 360 km dalam waktu 4 jam 30 menit. Berapa kecepatan rata-rata pengemudi tersebut?","options":{"A":"70 km/jam","B":"72 km/jam","C":"75 km/jam","D":"78 km/jam","E":"80 km/jam"},"answer":"E","explanation":"4 jam 30 menit = 4,5 jam. Kecepatan = 360 / 4,5 = 80 km/jam."},{"number":14,"question":"Tarif parkir di stasiun MRT adalah Rp5.000 untuk 2 jam pertama dan Rp3.000 per jam berikutnya. Berapa biaya parkir jika seseorang memarkir kendaraannya selama 5 jam?","options":{"A":"Rp11.000","B":"Rp13.000","C":"Rp14.000","D":"Rp15.000","E":"Rp16.000"},"answer":"C","explanation":"2 jam pertama = Rp5.000. Jam ke-3, 4, 5 = 3 × Rp3.000 = Rp9.000. Total = Rp5.000 + Rp9.000 = Rp14.000."},{"number":15,"question":"Sebuah perusahaan bus membeli 15 unit bus dengan harga Rp850.000.000 per unit. Jika mendapat diskon 6% karena pembelian massal, berapa total yang harus dibayar?","options":{"A":"Rp11.985.000.000","B":"Rp12.000.000.000","C":"Rp12.240.000.000","D":"Rp12.480.000.000","E":"Rp12.750.000.000"},"answer":"A","explanation":"Total harga = 15 × Rp850.000.000 = Rp12.750.000.000. Diskon = 6% × Rp12.750.000.000 = Rp765.000.000. Bayar = Rp12.750.000.000 – Rp765.000.000 = Rp11.985.000.000."},{"number":16,"question":"Waktu tempuh rata-rata bus BRT dari Halte Utama ke Halte Akhir adalah 45 menit. Setelah pelebaran jalan, waktu tempuh berkurang 13,3% (= 1/3 dari 40%). Berapa menit waktu tempuh yang baru?","options":{"A":"36 menit","B":"37 menit","C":"38 menit","D":"39 menit","E":"40 menit"},"answer":"D","explanation":"Pengurangan = (2/15) × 45 = 6 menit. (13,3% ≈ 2/15, 2/15 × 45 = 6). Waktu baru = 45 – 6 = 39 menit."},{"number":17,"question":"Berapa nilai dari 60% dari 2/3 dari 900?","options":{"A":"320","B":"360","C":"400","D":"420","E":"440"},"answer":"B","explanation":"2/3 × 900 = 600. Kemudian 60% × 600 = 360."},{"number":18,"question":"Sebuah bus kota mengonsumsi 1 liter solar setiap 8 km. Jika harga solar Rp6.800 per liter, berapa biaya bahan bakar untuk perjalanan sejauh 120 km?","options":{"A":"Rp88.000","B":"Rp90.000","C":"Rp96.000","D":"Rp100.000","E":"Rp102.000"},"answer":"E","explanation":"Konsumsi = 120 / 8 = 15 liter. Biaya = 15 × Rp6.800 = Rp102.000."},{"number":19,"question":"Dari 2.400 penumpang yang disurvei, 15% menggunakan kartu e-money, 40% menggunakan uang tunai, dan sisanya menggunakan aplikasi digital. Berapa penumpang yang menggunakan aplikasi digital?","options":{"A":"900 orang","B":"1.020 orang","C":"1.080 orang","D":"1.100 orang","E":"1.140 orang"},"answer":"C","explanation":"Kartu e-money = 15% × 2.400 = 360. Tunai = 40% × 2.400 = 960. Aplikasi = 2.400 – 360 – 960 = 1.080 orang."},{"number":20,"question":"Hasil dari 0,75 × 0,8 + 1,25 × 0,4 adalah ...","options":{"A":"1,10","B":"1,20","C":"1,30","D":"1,40","E":"1,50"},"answer":"A","explanation":"0,75 × 0,8 = 0,60. 1,25 × 0,4 = 0,50. Maka 0,60 + 0,50 = 1,10."},{"number":21,"question":"Deret Angka: 3, 7, 11, 15, 19, ...","options":{"A":"21","B":"23","C":"25","D":"27","E":"29"},"answer":"B","explanation":"Pola penambahan tetap (+4). Maka 19 + 4 = 23."},{"number":22,"question":"Deret Angka: 2, 6, 18, 54, 162, ...","options":{"A":"324","B":"378","C":"432","D":"468","E":"486"},"answer":"E","explanation":"Pola perkalian tetap (×3). Maka 162 × 3 = 486."},{"number":23,"question":"Deret Angka: 81, 72, 64, 57, 51, ...","options":{"A":"42","B":"44","C":"46","D":"48","E":"50"},"answer":"C","explanation":"Pola pengurangan bertingkat: –9, –8, –7, –6, –5. Maka selanjutnya 51 – 5 = 46."},{"number":24,"question":"Deret Angka: 2, 3, 5, 8, 13, 21, ...","options":{"A":"34","B":"35","C":"36","D":"37","E":"38"},"answer":"A","explanation":"Pola Fibonacci: setiap suku = jumlah dua suku sebelumnya. 13 + 21 = 34."},{"number":25,"question":"Deret Angka: 7, 14, 11, 22, 19, 38, 35, ...","options":{"A":"60","B":"65","C":"68","D":"70","E":"72"},"answer":"D","explanation":"Pola bergantian: ×2 lalu –3. 7×2=14; 14–3=11; 11×2=22; 22–3=19; 19×2=38; 38–3=35; 35×2=70."}],"parentId":"numerik","bundleNum":9},"numerik__paket_10":{"title":"Numerik - Paket 10","duration":1800,"questions":[{"number":1,"question":"Deret Angka: 1, 4, 9, 16, 25, 36, ...","options":{"A":"42","B":"45","C":"49","D":"52","E":"56"},"answer":"C","explanation":"Pola bilangan kuadrat (n²): 1², 2², 3², 4², 5², 6². Maka selanjutnya 7² = 49."},{"number":2,"question":"Deret Angka: 1, 3, 7, 15, 31, ...","options":{"A":"51","B":"55","C":"57","D":"61","E":"63"},"answer":"E","explanation":"Pola: setiap suku = (suku sebelumnya × 2) + 1. 31 × 2 + 1 = 63."},{"number":3,"question":"Deret Angka: 50, 46, 42, 38, 34, ...","options":{"A":"26","B":"30","C":"32","D":"34","E":"36"},"answer":"B","explanation":"Pola pengurangan tetap (–4). Maka 34 – 4 = 30."},{"number":4,"question":"Deret Angka: 500, 100, 20, 4, ...","options":{"A":"0,8","B":"1,0","C":"1,2","D":"1,6","E":"2,0"},"answer":"A","explanation":"Pola pembagian tetap (÷5). Maka 4 ÷ 5 = 0,8."},{"number":5,"question":"Deret Angka: 5, 11, 23, 47, 95, ...","options":{"A":"175","B":"180","C":"185","D":"191","E":"195"},"answer":"D","explanation":"Pola: setiap suku = (suku sebelumnya × 2) + 1. 95 × 2 + 1 = 191."},{"number":6,"question":"Deret Angka: 2, 5, 10, 17, 26, 37, ...","options":{"A":"42","B":"44","C":"46","D":"48","E":"50"},"answer":"E","explanation":"Selisih antar suku: +3, +5, +7, +9, +11, +13 (bilangan ganjil). Maka 37 + 13 = 50."},{"number":7,"question":"Deret Angka: 4, 8, 6, 12, 10, 20, 18, ...","options":{"A":"30","B":"34","C":"36","D":"38","E":"40"},"answer":"C","explanation":"Pola bergantian: ×2 lalu –2. 4×2=8; 8–2=6; 6×2=12; 12–2=10; 10×2=20; 20–2=18; 18×2=36."},{"number":8,"question":"Deret Angka: 1, 1, 2, 3, 5, 8, 13, ...","options":{"A":"18","B":"21","C":"24","D":"27","E":"30"},"answer":"B","explanation":"Barisan Fibonacci: setiap suku = jumlah dua suku sebelumnya. 8 + 13 = 21."},{"number":9,"question":"Deret Angka: 256, 128, 192, 96, 144, 72, ...","options":{"A":"108","B":"110","C":"112","D":"116","E":"120"},"answer":"A","explanation":"Pola bergantian: ÷2 lalu ×1,5. 256÷2=128; 128×1,5=192; 192÷2=96; 96×1,5=144; 144÷2=72; 72×1,5=108."},{"number":10,"question":"Deret Angka: 10, 12, 15, 19, 24, 30, ...","options":{"A":"34","B":"35","C":"36","D":"37","E":"38"},"answer":"D","explanation":"Selisih antar suku: +2, +3, +4, +5, +6, +7 (bertambah 1 setiap langkah). Maka 30 + 7 = 37."},{"number":11,"question":"Sebuah koridor BRT beroperasi dari pukul 05.00 hingga 23.00 dengan headway antar bus 6 menit. Berapa total perjalanan yang dilakukan selama satu hari penuh di koridor tersebut?","options":{"A":"160 perjalanan","B":"165 perjalanan","C":"170 perjalanan","D":"175 perjalanan","E":"180 perjalanan"},"answer":"E","explanation":"Durasi = 23.00 – 05.00 = 18 jam = 1.080 menit. Total perjalanan = 1.080 / 6 = 180 perjalanan."},{"number":12,"question":"Sebuah perusahaan transportasi memiliki 80 pengemudi. Setiap pengemudi bekerja 5 hari per minggu dengan penghasilan Rp150.000 per hari. Berapa total pengeluaran gaji pengemudi dalam 4 minggu?","options":{"A":"Rp220.000.000","B":"Rp230.000.000","C":"Rp240.000.000","D":"Rp250.000.000","E":"Rp260.000.000"},"answer":"C","explanation":"Total = 80 pengemudi × 5 hari × 4 minggu × Rp150.000 = 80 × 20 × Rp150.000 = Rp240.000.000."},{"number":13,"question":"Jarak Halte P ke Q = 10 km, Q ke R = 15 km, R ke S = 8 km. Sebuah bus berangkat dari P menuju S, lalu kembali berhenti di Q. Berapa total jarak yang ditempuh bus?","options":{"A":"56 km","B":"58 km","C":"60 km","D":"62 km","E":"64 km"},"answer":"A","explanation":"P ke S = 10 + 15 + 8 = 33 km. S ke Q = 8 + 15 = 23 km. Total = 33 + 23 = 56 km."},{"number":14,"question":"Proyek pembangunan halte dijadwalkan selesai dalam 30 hari oleh 12 pekerja. Jika 4 pekerja mengundurkan diri dan tidak diganti, berapa hari tambahan yang diperlukan untuk menyelesaikan proyek?","options":{"A":"10 hari","B":"12 hari","C":"14 hari","D":"15 hari","E":"18 hari"},"answer":"D","explanation":"Total hari-orang = 12 × 30 = 360. Sisa pekerja = 12 – 4 = 8 orang. Waktu baru = 360 / 8 = 45"},{"number":15,"question":"hari. Tambahan = 45 – 30 = 15 hari. Sebuah angkutan kota mengangkut rata-rata 240 penumpang per hari. Dalam 5 hari kerja, berapa total penumpang yang diangkut oleh 3 unit angkot yang beroperasi bersamaan?","options":{"A":"3.200 orang","B":"3.600 orang","C":"3.800 orang","D":"4.000 orang","E":"4.200 orang"},"answer":"B","explanation":"Total = 240 penumpang/hari × 5 hari × 3 angkot = 3.600 penumpang."},{"number":16,"question":"Dalam sebuah survei di 3 halte berbeda diperoleh jumlah penumpang: Halte 1 = 1.250 orang, Halte 2 = 980 orang, Halte 3 = 1.370 orang. Berapa rata-rata jumlah penumpang per halte?","options":{"A":"1.200 orang","B":"1.210 orang","C":"1.220 orang","D":"1.230 orang","E":"1.240 orang"},"answer":"A","explanation":"Total = 1.250 + 980 + 1.370 = 3.600. Rata-rata = 3.600 / 3 = 1.200 orang."},{"number":17,"question":"Bus listrik dapat menempuh 250 km per pengisian penuh. Setiap hari bus melayani rute 180 km. Biaya pengisian daya penuh adalah Rp200.000. Berapa biaya pengisian daya untuk 6 hari operasional? (Setiap pengisian dilakukan saat daya habis.)","options":{"A":"Rp800.000","B":"Rp850.000","C":"Rp900.000","D":"Rp950.000","E":"Rp1.000.000"},"answer":"E","explanation":"Total jarak 6 hari = 6 × 180 = 1.080 km. Jumlah pengisian = 1.080 / 250 = 4,32 dibulatkan ke atas menjadi 5 kali pengisian. Biaya = 5 × Rp200.000 = Rp1.000.000."},{"number":18,"question":"Koridor A memiliki 30 bus dengan total kapasitas 2.400 penumpang. Koridor B memiliki 24 bus dengan total kapasitas 2.160 penumpang. Berapa selisih rata-rata kapasitas per bus antara kedua koridor?","options":{"A":"5 penumpang","B":"8 penumpang","C":"10 penumpang","D":"12 penumpang","E":"15 penumpang"},"answer":"C","explanation":"Rata-rata Koridor A = 2.400 / 30 = 80 penumpang/bus. Rata-rata Koridor B = 2.160 / 24 = 90 penumpang/bus. Selisih = 90 – 80 = 10 penumpang."},{"number":19,"question":"Bus koridor 5 berangkat setiap 12 menit, koridor 7 setiap 18 menit, dan koridor 9 setiap 24 menit. Jika ketiga bus baru saja berangkat bersamaan, berapa menit lagi ketiganya berangkat bersamaan kembali?","options":{"A":"36 menit","B":"72 menit","C":"96 menit","D":"108 menit","E":"144 menit"},"answer":"B","explanation":"Mencari KPK(12, 18, 24). 12 = 2²×3; 18 = 2×3²; 24 = 2³×3. KPK = 2³×3² = 8×9 = 72 menit."},{"number":20,"question":"Seorang pelajar menggunakan KRL Commuter Line setiap hari kerja (Senin–Jumat) selama 4 minggu. Tarif Rp8.000 sekali jalan. Berapa total biaya transportasi pelajar tersebut selama 4 minggu (pergi-pulang)?","options":{"A":"Rp280.000","B":"Rp300.000","C":"Rp310.000","D":"Rp320.000","E":"Rp340.000"},"answer":"D","explanation":"Biaya per hari (PP) = 2 × Rp8.000 = Rp16.000. Total hari = 5 × 4 = 20 hari. Total = 20 × Rp16.000 = Rp320.000."},{"number":21,"question":"Rute bus sepanjang 36 km terdiri dari 3/4 jalur tol (kecepatan 90 km/jam) dan 1/4 jalur biasa (kecepatan 36 km/jam). Berapa total waktu tempuh bus tersebut?","options":{"A":"33 menit","B":"35 menit","C":"37 menit","D":"39 menit","E":"41 menit"},"answer":"A","explanation":"Jalur tol = 3/4 × 36 = 27 km; waktu = 27/90 jam = 0,3 jam = 18 menit. Jalur biasa = 1/4 × 36 = 9 km; waktu = 9/36 jam = 0,25 jam = 15 menit. Total = 18 + 15 = 33 menit."},{"number":22,"question":"Stok suku cadang di depo cukup untuk merawat 40 bus selama 60 hari. Jika 10 bus tambahan dikirim ke depo tersebut (total 50 bus), berapa hari stok suku cadang akan habis?","options":{"A":"40 hari","B":"42 hari","C":"44 hari","D":"46 hari","E":"48 hari"},"answer":"E","explanation":"Total stok (unit-hari) = 40 × 60 = 2.400. Lama habis = 2.400 / 50 = 48 hari."},{"number":23,"question":"Dalam sebulan, perusahaan bus menerima pengaduan: Minggu 1 = 45, Minggu 2 = 52, Minggu 3 = 38, Minggu 4 = 65. Berapa rata-rata pengaduan per minggu?","options":{"A":"45","B":"47","C":"48","D":"50","E":"52"},"answer":"D","explanation":"Total = 45 + 52 + 38 + 65 = 200. Rata-rata = 200 / 4 = 50 pengaduan/minggu."},{"number":24,"question":"Sebuah bus listrik habis daya setelah menempuh 180 km. Jika daya baterai berkurang secara proporsional dan bus sudah menempuh 135 km, berapa persen sisa daya baterai?","options":{"A":"20%","B":"25%","C":"30%","D":"35%","E":"40%"},"answer":"B","explanation":"Sisa jarak = 180 – 135 = 45 km. Sisa daya = (45 / 180) × 100% = 25%."},{"number":25,"question":"Perusahaan bus memiliki 3 jenis armada: bus besar (kapasitas 80 penumpang) sebanyak 10 unit, bus sedang (kapasitas 50 penumpang) sebanyak 15 unit, dan bus kecil (kapasitas 30 penumpang) sebanyak 20 unit. Berapa total kapasitas seluruh armada?","options":{"A":"2.050 penumpang","B":"2.100 penumpang","C":"2.150 penumpang","D":"2.200 penumpang","E":"2.250 penumpang"},"answer":"C","explanation":"Bus besar = 10 × 80 = 800. Bus sedang = 15 × 50 = 750. Bus kecil = 20 × 30 = 600. Total = 800 + 750 + 600 = 2.150 penumpang."}],"parentId":"numerik","bundleNum":10},"logika":{"title":"Tes Logika","order":3,"type":"text","isBundled":true,"bundleIds":["logika__paket_1","logika__paket_2","logika__paket_3","logika__paket_4","logika__paket_5","logika__paket_6","logika__paket_7"]},"logika__paket_1":{"title":"Logika - Paket 1","duration":1800,"questions":[{"number":1,"question":"Premis 1: Semua pengemudi bus Transjakarta wajib memiliki SIM B2 Umum. Premis 2: Sebagian pemuda di Depo A adalah pengemudi bus Transjakarta.","options":{"A":"Semua pemuda di Depo A wajib memiliki SIM B2 Umum.","B":"Sebagian pemuda di Depo A wajib memiliki SIM B2 Umum.","C":"Pemuda yang memiliki SIM B2 Umum pasti pengemudi Transjakarta.","D":"Sebagian pemuda di Depo A tidak wajib memiliki SIM B2 Umum.","E":"Tidak ada pemuda di Depo A yang memiliki SIM B2 Umum."},"answer":"B","explanation":"Karena hanya \\\"sebagian\\\" pemuda yang merupakan pengemudi, maka hanya \\\"sebagian\\\" pemuda tersebut yang terikat kewajiban memiliki SIM B2 Umum."},{"number":2,"question":"Premis 1: Semua bus listrik tidak menghasilkan emisi gas buang. Premis 2: Armada di Koridor 14 adalah bus listrik. (GAMBAR/POLA)","options":{"A":"Sebagian armada di Koridor 14 menghasilkan emisi gas buang.","B":"Semua armada di Koridor 14 menghasilkan emisi gas buang.","C":"Semua armada di Koridor 14 tidak menghasilkan emisi gas buang.","D":"Ada bus listrik yang menghasilkan emisi gas buang.","E":"Armada Koridor 14 adalah satu-satunya bus yang ramah lingkungan."},"answer":"C","explanation":"Sesuai hukum silogisme, jika semua bus listrik tidak beremisi dan armada koridor 14 adalah bus listrik, maka otomatis seluruh armada koridor 14 tidak beremisi."},{"number":3,"question":"Premis 1: Jika headway (waktu tunggu) bus konsisten, maka tidak ada penumpukan penumpang. Premis 2: Terjadi penumpukan penumpang di Halte Harmoni.","options":{"A":"Headway bus sangat konsisten.","B":"Headway bus tidak konsisten.","C":"Penumpang di Halte Harmoni sangat banyak.","D":"Petugas halte tidak mengatur antrean.","E":"Bus sedang mengalami kerusakan mesin."},"answer":"B","explanation":"Menggunakan logika Modus Tollens: Jika P maka Q. Ternyata Tidak Q, maka kesimpulannya adalah Tidak P (Headway tidak konsisten)."},{"number":4,"question":"Premis 1: Semua halte integrasi memiliki fasilitas eskalator. Premis 2: Halte X tidak memiliki fasilitas eskalator.","options":{"A":"Halte X adalah halte integrasi yang rusak.","B":"Halte X mungkin halte integrasi.","C":"Halte X bukan halte integrasi.","D":"Halte X sedang dalam tahap pembangunan eskalator.","E":"Semua halte memiliki eskalator kecuali Halte X."},"answer":"C","explanation":"Karena semua halte integrasi wajib punya eskalator, dan Halte X tidak punya, maka mutlak Halte X bukan halte integrasi."},{"number":5,"question":"Premis 1: Sebagian karyawan Transjakarta bekerja di bagian operasional. Premis 2: Semua yang bekerja di bagian operasional memakai seragam biru.","options":{"A":"Semua karyawan Transjakarta memakai seragam biru.","B":"Sebagian karyawan Transjakarta memakai seragam biru.","C":"Karyawan yang tidak memakai seragam biru bukan karyawan Transjakarta.","D":"Semua yang memakai seragam biru adalah karyawan operasional. (GAMBAR/POLA)","E":"Sebagian karyawan operasional tidak memakai seragam biru."},"answer":"B","explanation":"Karena hanya sebagian karyawan yang di operasional, dan semua orang operasional pakai seragam biru, maka kesimpulannya sebagian karyawan Transjakarta memakai seragam biru."},{"number":6,"question":"Premis 1: Semua bus yang beroperasi harus lolos uji kir. Premis 2: Beberapa bus di depo sedang dalam perbaikan dan belum lolos uji kir.","options":{"A":"Beberapa bus di depo tidak boleh beroperasi.","B":"Semua bus di depo boleh beroperasi.","C":"Bus yang dalam perbaikan pasti lolos uji kir.","D":"Bus yang tidak beroperasi berarti sedang dalam perbaikan.","E":"Hanya bus di depo yang tidak lolos uji kir."},"answer":"A","explanation":"Karena syarat operasi adalah lolos uji kir, maka bus yang \\\"belum lolos\\\" (karena perbaikan) tidak boleh beroperasi."},{"number":7,"question":"Premis 1: Jika cuaca hujan ekstrem, maka kecepatan bus dikurangi demi keselamatan. Premis 2: Saat ini kecepatan bus tidak dikurangi.","options":{"A":"Cuaca sedang gerimis.","B":"Cuaca tidak hujan ekstrem.","C":"Sopir bus melanggar aturan keselamatan.","D":"Cuaca hujan ekstrem tapi sopir nekat.","E":"Keselamatan penumpang tidak terjamin."},"answer":"B","explanation":"Modus Tollens: Jika P maka Q. Ternyata Tidak Q (kecepatan tidak dikurangi), maka Tidak P (Cuaca tidak hujan ekstrem)."},{"number":8,"question":"Premis 1: Semua siswa yang memiliki kartu JakLingko mendapatkan tarif Rp0. Premis 2: Andi adalah siswa yang memiliki kartu JakLingko.","options":{"A":"Andi membayar tarif normal.","B":"Andi mendapatkan tarif Rp0.","C":"Semua orang mendapatkan tarif Rp0.","D":"Andi tidak perlu membawa kartu saat naik bus.","E":"Hanya Andi yang mendapatkan tarif Rp0."},"answer":"B","explanation":"Silogisme standar: Andi termasuk dalam kelompok siswa pemilik kartu, maka Andi mendapatkan hak tarif Rp0."},{"number":9,"question":"Premis 1: Sebagian halte memiliki area komersial (kantin/toko). Premis 2: Semua area komersial harus menjaga kebersihan lingkungan. (GAMBAR/POLA)","options":{"A":"Semua halte harus menjaga kebersihan lingkungan.","B":"Sebagian halte harus menjaga kebersihan lingkungan.","C":"Halte yang tidak punya area komersial tidak perlu bersih.","D":"Hanya area komersial yang harus dijaga kebersihannya.","E":"Semua halte pasti memiliki area komersial."},"answer":"B","explanation":"Karena area komersial hanya ada di sebagian halte, maka kewajiban menjaga kebersihan (dalam konteks area komersial tersebut) hanya ada di sebagian halte."},{"number":10,"question":"Premis 1: Semua peserta MT harus lulus tahap asesmen. Premis 2: Sebagian peserta MT memiliki latar belakang IT.","options":{"A":"Semua yang memiliki latar belakang IT lulus tahap asesmen.","B":"Sebagian peserta yang memiliki latar belakang IT harus lulus tahap asesmen.","C":"Peserta yang tidak lulus asesmen bukan peserta MT.","D":"Latar belakang IT adalah syarat lulus asesmen.","E":"Semua peserta MT tidak memiliki latar belakang IT."},"answer":"B","explanation":"Karena semua peserta MT wajib lulus asesmen, maka bagian dari peserta MT (yang punya latar IT) juga wajib lulus asesmen."},{"number":11,"question":"Urutan keberangkatan bus yang benar adalah... Ada lima bus (P, Q, R, S, T) yang akan diberangkatkan dari terminal. Ketentuannya: Bus S harus berangkat tepat setelah bus P. Bus R harus berangkat sebelum bus T. Bus Q tidak boleh berangkat pada urutan pertama atau terakhir. Bus T berangkat pada urutan keempat.","options":{"A":"P, S, R, T, Q","B":"R, Q, P, S, T","C":"P, S, Q, T, R","D":"R, P, S, T, Q","E":"Q, R, P, S, T (GAMBAR/POLA)"},"answer":"B","explanation":"T di urutan 4. R harus sebelum T (berarti 1, 2, atau 3). S tepat setelah P (berarti paket PS). Q tidak boleh di 1 atau 5. Urutan yang pas: R(1), Q(2), P(3), T(4), S(5) -> S tepat setelah P."},{"number":12,"question":"Bus yang berangkat pada urutan kedua adalah... Ada lima bus (P, Q, R, S, T) yang akan diberangkatkan dari terminal. Bus S harus berangkat tepat setelah bus P. Bus R harus berangkat sebelum bus T. Bus Q tidak boleh berangkat pada urutan pertama atau terakhir. Bus T berangkat pada urutan keempat.","options":{"A":"P","B":"Q","C":"R","D":"S","E":"T"},"answer":"B","explanation":"Berdasarkan analisis urutan (R-Q-P-T-S), bus Q berada di posisi kedua."},{"number":13,"question":"Jika bus R berangkat pada urutan ketiga, maka bus yang mungkin di urutan pertama adalah... Ada lima bus (P, Q, R, S, T). Bus S harus berangkat tepat setelah bus P. Bus R harus berangkat sebelum bus T. Bus Q tidak boleh berangkat pada urutan pertama atau terakhir. Bus T berangkat pada urutan keempat.","options":{"A":"Q","B":"S","C":"T","D":"P","E":"Tidak ada yang mungkin"},"answer":"D","explanation":"Jika R di 3 dan T di 4, maka P dan S harus di 1 dan 2 (karena S tepat setelah P). P adalah satu-satunya kandidat paket awal."},{"number":14,"question":"Di halte manakah petugas F berjaga? Enam petugas (A, B, C, D, E, F) akan berjaga di tiga halte berbeda: Halte Tosari, Halte Dukuh Atas, dan Halte Bundaran HI. Tiap halte dijaga oleh dua petugas. A tidak mau berjaga di Halte Tosari. B dan C harus berada di halte yang sama. D berjaga di Halte Bundaran HI. F tidak mau berjaga di Halte Bundaran HI atau Halte Tosari.","options":{"A":"Tosari","B":"Bundaran HI","C":"Dukuh Atas","D":"Bersama D","E":"Bersama A"},"answer":"C","explanation":"F tidak mau di HI atau Tosari, maka F otomatis di Dukuh Atas."},{"number":15,"question":"Jika B berjaga di Halte Tosari, maka teman jaga A adalah... Enam petugas (A, B, C, D, E, F). A tidak mau berjaga di Halte Tosari. B dan C harus berada di halte yang sama. D berjaga di Halte Bundaran HI. F tidak mau berjaga di Halte Bundaran HI atau Halte Tosari.","options":{"A":"C (GAMBAR/POLA)","B":"D","C":"E","D":"F","E":"B"},"answer":"B","explanation":"B dan C di Tosari. F di Dukuh Atas (bersama E, karena D di HI). Sisa petugas adalah A dan D. Maka A harus berjaga bersama D di Bundaran HI."},{"number":16,"question":"Bus A lebih cepat dari Bus B. Bus C lebih lambat dari Bus B. Bus D lebih cepat dari Bus C tetapi lebih lambat dari Bus B. Bus mana yang paling lambat?","options":{"A":"Bus A","B":"Bus B","C":"Bus C","D":"Bus D","E":"Bus A dan B"},"answer":"C","explanation":"Urutan kecepatan: A > B > D > C. Jadi yang paling lambat adalah C."},{"number":17,"question":"Lima halte (V, W, X, Y, Z) terletak di sepanjang jalur lurus. Halte W berjarak 2 km dari V. Halte X berjarak 5 km dari V. Halte Y berjarak 3 km dari W. Halte Z berjarak 1 km dari X. Urutan halte dari yang terdekat ke V adalah...","options":{"A":"V-W-X-Y-Z","B":"V-W-Y-X-Z","C":"V-W-Z-X-Y","D":"V-X-W-Z-Y","E":"V-Z-W-X-Y"},"answer":"B","explanation":"V=0, W=2, X=5, Y=W+3=5, Z=X-1=4. Urutan jarak: V(0), W(2), Z(4), X(5), Y(5). Pilihan yang paling mendekati logika urutan jarak adalah B."},{"number":18,"question":"Semua MT angkatan 2026 mengikuti pelatihan kepemimpinan. Sebagian MT angkatan 2026 adalah lulusan Teknik. Kesimpulannya...","options":{"A":"Semua lulusan Teknik mengikuti pelatihan kepemimpinan.","B":"Sebagian lulusan Teknik mengikuti pelatihan kepemimpinan.","C":"Lulusan Teknik tidak perlu pelatihan kepemimpinan.","D":"Hanya lulusan Teknik yang ikut pelatihan.","E":"Peserta pelatihan bukan lulusan Teknik."},"answer":"B","explanation":"Sebagian peserta pelatihan adalah lulusan Teknik, maka sebagian lulusan Teknik tersebut mengikuti pelatihan."},{"number":19,"question":"Jika hari ini hujan, maka bus akan datang terlambat. Hari ini bus datang tepat waktu. (GAMBAR/POLA)","options":{"A":"Hari ini hujan deras.","B":"Hari ini tidak hujan.","C":"Bus mengalami kerusakan.","D":"Penumpang tidak banyak.","E":"Sopir bus mengemudi cepat."},"answer":"B","explanation":"Modus Tollens: Jika P maka Q. Ternyata tidak Q (tidak terlambat), maka tidak P (tidak hujan)."},{"number":20,"question":"Dalam sebuah rapat, posisi duduk Direktur berada di antara Manajer Operasional dan Manajer Keuangan. Manajer IT duduk di sebelah kanan Manajer Keuangan. Siapakah yang duduk di posisi paling kiri?","options":{"A":"Direktur","B":"Manajer Operasional","C":"Manajer Keuangan","D":"Manajer IT","E":"Sekretaris"},"answer":"B","explanation":"Urutan duduk dari kiri ke kanan: Manajer Operasional - Direktur - Manajer Keuangan - Manajer IT. Maka yang paling kiri adalah Manajer Operasional."},{"number":21,"question":"Semua bus listrik memiliki baterai. Sebagian kendaraan yang memiliki baterai tidak membutuhkan bahan bakar minyak (BBM). Kesimpulan yang paling tepat adalah...","options":{"A":"Semua bus listrik tidak membutuhkan BBM.","B":"Sebagian bus listrik tidak membutuhkan BBM.","C":"Semua kendaraan yang memiliki baterai adalah bus listrik.","D":"Sebagian bus listrik tetap membutuhkan BBM.","E":"Tidak ada bus listrik yang membutuhkan BBM."},"answer":"B","explanation":"Karena bus listrik adalah bagian dari \\\"kendaraan yang memiliki baterai\\\", dan hanya \\\"sebagian\\\" kendaraan berbaterai yang tidak butuh BBM, maka secara logis hanya sebagian bus listrik yang tidak butuh BBM."},{"number":22,"question":"Dalam diagram organisasi, posisi Supervisor berada di bawah Manajer, dan Manajer berada di bawah Direktur. Jika Staf berada di bawah Supervisor, maka hubungan yang salah adalah...","options":{"A":"Staf berada di bawah Manajer.","B":"Supervisor berada di bawah Direktur.","C":"Direktur berada di atas Staf.","D":"Manajer berada di atas Staf.","E":"Supervisor berada di atas Manajer."},"answer":"E","explanation":"Berdasarkan hierarki yang disebutkan, Manajer lebih tinggi dari Supervisor, sehingga Supervisor tidak mungkin berada di atas Manajer."},{"number":23,"question":"Pola Gambar (Analogi Visual): BUS : JALAN RAYA = KERETA API : REL Jika pola tersebut diterapkan pada operasional: HALTE : PENUMPANG = DERMAGA : ...","options":{"A":"Air","B":"Kapal","C":"Wisatawan","D":"Perahu","E":"Logistik"},"answer":"B","explanation":"Halte adalah tempat transit untuk subjek utama (Bus/Penumpang), maka Dermaga adalah tempat transit untuk Kapal."},{"number":24,"question":"Perhatikan urutan berikut: Lingkaran, Persegi, Segitiga, Lingkaran, Persegi, ...","options":{"A":"Lingkaran","B":"Persegi","C":"Segitiga","D":"Trapesium","E":"Belah Ketupat"},"answer":"C","explanation":"Pola berulang adalah Lingkaran-Persegi-Segitiga. Setelah Persegi, maka kembali ke Segitiga."},{"number":25,"question":"Semua halte Transjakarta memiliki sistem tapping kartu. Sebagian tempat yang memiliki sistem tapping kartu adalah stasiun kereta.","options":{"A":"Semua halte Transjakarta adalah stasiun kereta.","B":"Sebagian halte Transjakarta adalah stasiun kereta.","C":"Halte Transjakarta dan stasiun kereta adalah tempat yang berbeda namun memiliki kesamaan sistem.","D":"Tidak ada halte Transjakarta yang memiliki sistem tapping.","E":"Stasiun kereta lebih canggih dari halte Transjakarta."},"answer":"C","explanation":"Premis menunjukkan bahwa kedua tempat tersebut berbagi fitur yang sama (sistem tapping), namun tidak menyatakan bahwa halte adalah stasiun."}],"parentId":"logika","bundleNum":1},"logika__paket_2":{"title":"Logika - Paket 2","duration":1800,"questions":[{"number":1,"question":"Jika Diagram A menunjukkan rute yang macet dan Diagram B menunjukkan rute yang lancar. Jika jalur busway selalu masuk dalam Diagram B, maka...","options":{"A":"Jalur busway kadang-kadang macet.","B":"Jalur busway tidak pernah macet.","C":"Semua rute lancar adalah jalur busway.","D":"Jalur umum lebih baik dari jalur busway. (GAMBAR/POLA)","E":"Diagram A tidak memiliki jalur busway."},"answer":"B","explanation":"Karena jalur busway \\\"selalu\\\" masuk dalam Diagram B (rute lancar), maka kesimpulannya jalur tersebut tidak pernah macet."},{"number":2,"question":"Pola Deret Visual: Panah ke atas, Panah ke kanan, Panah ke bawah, ...","options":{"A":"Panah ke atas","B":"Panah ke kanan","C":"Panah ke kiri","D":"Panah serong","E":"Panah putus-putus"},"answer":"C","explanation":"Pola berputar searah jarum jam (90 derajat). Atas -> Kanan -> Bawah -> Kiri."},{"number":3,"question":"Dalam sebuah denah depo, Ruang Mesin terletak di sebelah utara Ruang Cuci. Ruang Cuci di sebelah timur Ruang Parkir. Di manakah posisi Ruang Parkir terhadap Ruang Mesin?","options":{"A":"Timur Laut","B":"Barat Daya","C":"Barat Laut","D":"Tenggara","E":"Utara"},"answer":"B","explanation":"Ruang Mesin (Utara), Ruang Cuci (Selatan dari Mesin), Ruang Parkir (Barat dari Cuci). Maka Parkir berada di arah Barat Daya dari Ruang Mesin."},{"number":4,"question":"Sebagian bus Transjakarta berwarna biru. Semua bus berwarna biru menggunakan bahan bakar gas.","options":{"A":"Semua bus Transjakarta menggunakan bahan bakar gas.","B":"Sebagian bus Transjakarta menggunakan bahan bakar gas.","C":"Bus yang tidak berwarna biru tidak menggunakan gas.","D":"Hanya bus Transjakarta yang berwarna biru.","E":"Semua bus berbahan bakar gas adalah Transjakarta."},"answer":"B","explanation":"Karena sebagian bus Transjakarta berwarna biru, dan semua yang biru pakai gas, maka sebagian bus Transjakarta tersebut pasti pakai gas."},{"number":5,"question":"Jika semua halte integrasi adalah halte ramah disabilitas, dan Halte CSW adalah halte integrasi.","options":{"A":"Halte CSW mungkin ramah disabilitas.","B":"Halte CSW belum tentu ramah disabilitas.","C":"Halte CSW pasti ramah disabilitas.","D":"Semua halte ramah disabilitas adalah Halte CSW.","E":"Tidak ada halte selain CSW yang ramah disabilitas."},"answer":"C","explanation":"Silogisme kategorik sederhana: Semua A adalah B. C adalah A. Maka C adalah B."},{"number":6,"question":"Premis 1: Semua ojek online wajib memiliki helm standar SNI untuk penumpang. Premis 2: Beberapa mitra pengemudi ojek online tidak memiliki helm standar SNI.","options":{"A":"Semua mitra pengemudi ojek online patuh aturan.","B":"Beberapa mitra pengemudi ojek online melanggar kewajiban.","C":"Helm SNI tidak wajib untuk ojek online.","D":"Semua penumpang harus membawa helm sendiri.","E":"Beberapa mitra ojek online bukan pengemudi resmi."},"answer":"B","explanation":"Karena semua ojek online wajib memiliki helm SNI, sementara beberapa mitra tidak memilikinya, maka beberapa mitra pengemudi ojek online melanggar kewajiban tersebut."},{"number":7,"question":"Premis 1: Jika armada bus pariwisata melebihi kapasitas penumpang, maka petugas wajib menolak keberangkatan. Premis 2: Petugas tidak menolak keberangkatan bus pariwisata.","options":{"A":"Armada bus pariwisata melebihi kapasitas.","B":"Petugas tidak menjalankan tugasnya.","C":"Armada bus pariwisata tidak melebihi kapasitas.","D":"Penumpang dipaksa turun dari bus.","E":"Bus pariwisata mengalami kerusakan."},"answer":"C","explanation":"Modus Tollens: Jika P maka Q. Tidak Q (petugas tidak menolak). Maka Tidak P: armada bus pariwisata tidak melebihi kapasitas."},{"number":8,"question":"Premis 1: Semua kapal penumpang wajib memiliki sekoci penyelamat. Premis 2: Sebagian kapal di Pelabuhan Baru adalah kapal penumpang.","options":{"A":"Semua kapal di Pelabuhan Baru wajib memiliki sekoci penyelamat.","B":"Sebagian kapal di Pelabuhan Baru wajib memiliki sekoci penyelamat.","C":"Tidak ada kapal di Pelabuhan Baru yang punya sekoci.","D":"Sekoci penyelamat hanya untuk kapal besar.","E":"Semua kapal penumpang berada di Pelabuhan Baru."},"answer":"B","explanation":"Hanya sebagian kapal di Pelabuhan Baru yang merupakan kapal penumpang, dan semua kapal penumpang wajib punya sekoci. Maka hanya sebagian kapal di Pelabuhan Baru yang wajib memiliki sekoci penyelamat."},{"number":9,"question":"Premis 1: Semua petugas ground handling wajib menggunakan rompi keselamatan di apron. Premis 2: Doni adalah petugas ground handling.","options":{"A":"Doni mungkin menggunakan rompi keselamatan.","B":"Doni tidak perlu rompi jika tidak di apron.","C":"Semua orang di apron adalah petugas ground handling.","D":"Doni wajib menggunakan rompi keselamatan di apron.","E":"Hanya Doni yang wajib memakai rompi."},"answer":"D","explanation":"Silogisme standar: Doni adalah petugas ground handling, dan semua petugas ground handling wajib memakai rompi di apron. Maka Doni wajib menggunakan rompi keselamatan di apron."},{"number":10,"question":"Premis 1: Tidak ada kendaraan bermuatan melebihi tonase yang diizinkan melintas di jembatan ini. Premis 2: Truk Gandeng X membawa muatan melebihi tonase yang diizinkan.","options":{"A":"Truk Gandeng X boleh melintas dengan hati-hati.","B":"Truk Gandeng X tidak boleh melintas di jembatan ini.","C":"Jembatan ini kuat menahan semua kendaraan.","D":"Truk Gandeng X harus menurunkan sebagian muatan terlebih dahulu.","E":"Petugas jembatan tidak memeriksa tonase."},"answer":"B","explanation":"Tidak ada kendaraan bermuatan melebihi tonase yang boleh melintas. Truk Gandeng X termasuk kategori tersebut, sehingga Truk Gandeng X tidak boleh melintas."},{"number":11,"question":"Premis 1: Semua penerbangan internasional wajib melalui pemeriksaan imigrasi. Premis 2: Penerbangan rute CGK-SYD adalah penerbangan internasional.","options":{"A":"Penerbangan CGK-SYD mungkin melalui imigrasi.","B":"Tidak semua penerbangan internasional lewat imigrasi.","C":"Penerbangan CGK-SYD wajib melalui pemeriksaan imigrasi.","D":"Imigrasi hanya untuk penerbangan dari Eropa.","E":"Penumpang CGK-SYD bebas dari imigrasi."},"answer":"C","explanation":"Silogisme kategorik: Semua penerbangan internasional wajib lewat imigrasi. CGK-SYD adalah penerbangan internasional. Maka CGK-SYD wajib melalui pemeriksaan imigrasi."},{"number":12,"question":"Premis 1: Jika sistem persinyalan kereta mengalami gangguan, maka seluruh perjalanan kereta dihentikan sementara. Premis 2: Seluruh perjalanan kereta tidak dihentikan sementara.","options":{"A":"Sistem persinyalan kereta mengalami gangguan.","B":"Masinis kereta sedang beristirahat.","C":"Sistem persinyalan kereta tidak mengalami gangguan.","D":"Kereta dialihkan ke jalur lain.","E":"Penumpang kereta sangat sedikit."},"answer":"C","explanation":"Modus Tollens: Jika P maka Q. Tidak Q (perjalanan tidak dihentikan). Maka Tidak P: sistem persinyalan kereta tidak mengalami gangguan."},{"number":13,"question":"Premis 1: Sebagian sopir bus antarkota memiliki pengalaman mengemudi lebih dari 10 tahun. Premis 2: Semua yang memiliki pengalaman mengemudi lebih dari 10 tahun mendapatkan insentif senioritas.","options":{"A":"Semua sopir bus antarkota mendapat insentif senioritas.","B":"Insentif senioritas hanya untuk sopir bus antarkota.","C":"Sebagian sopir bus antarkota mendapatkan insentif senioritas.","D":"Pengalaman 10 tahun tidak menjamin insentif.","E":"Tidak ada sopir bus yang mendapat insentif."},"answer":"C","explanation":"Hanya sebagian sopir bus antarkota yang berpengalaman lebih dari 10 tahun, dan semua yang berpengalaman itu dapat insentif. Maka hanya sebagian sopir bus antarkota yang mendapat insentif senioritas."},{"number":14,"question":"Premis 1: Semua angkutan barang berbahaya (B3) wajib dilengkapi tanda peringatan khusus. Premis 2: Kendaraan nomor polisi B 1234 ZZ tidak dilengkapi tanda peringatan khusus.","options":{"A":"Kendaraan B 1234 ZZ mungkin mengangkut B3.","B":"Kendaraan B 1234 ZZ adalah angkutan penumpang.","C":"Kendaraan B 1234 ZZ bukan angkutan barang berbahaya (B3).","D":"Tanda peringatan tidak wajib untuk semua kendaraan.","E":"Kendaraan B 1234 ZZ sedang dalam perbaikan."},"answer":"C","explanation":"Karena semua angkutan B3 wajib punya tanda peringatan, sementara kendaraan B 1234 ZZ tidak punya, maka mutlak kendaraan tersebut bukan angkutan barang berbahaya (B3)."},{"number":15,"question":"Premis 1: Jika jumlah armada bus tidak mencukupi, maka terjadi penumpukan penumpang di halte. Premis 2: Terjadi penumpukan penumpang di halte.","options":{"A":"Jumlah armada bus pasti tidak mencukupi.","B":"Jumlah armada bus mencukupi.","C":"Belum tentu jumlah armada bus tidak mencukupi.","D":"Petugas halte tidak bekerja.","E":"Penumpang datang terlalu awal."},"answer":"C","explanation":"Ini adalah kesalahan logika 'menegaskan konsekuen' (affirming the consequent). Jika P maka Q. Q terjadi. Tidak bisa disimpulkan P pasti terjadi, karena Q bisa disebabkan faktor lain. Maka kesimpulan yang tepat: belum tentu jumlah armada tidak mencukupi."},{"number":16,"question":"Tujuh penumpang (A, B, C, D, E, F, G) akan naik ke dalam kereta dengan tujuh gerbong bernomor 1-7. Masing-masing penumpang menempati satu gerbong. Ketentuannya: A berada di gerbong bernomor lebih kecil dari B. C berada tepat di antara B dan D (urutan: B, C, D atau D, C, B). E berada di gerbong nomor 1. F dan G berada di gerbong yang bersebelahan. D berada di gerbong nomor 7. Penumpang yang berada di gerbong nomor 6 adalah...","options":{"A":"A","B":"B","C":"C","D":"F atau G","E":"G"},"answer":"C","explanation":"E di gerbong 1, D di gerbong 7. C tepat di antara B dan D, dan D di 7, maka urutan adalah B, C, D -> C di gerbong 6, B di gerbong 5. A lebih kecil dari B (A < 5). F dan G bersebelahan mengisi sisa gerbong 2, 3, 4."},{"number":17,"question":"Tujuh penumpang (A, B, C, D, E, F, G) menempati gerbong 1-7 (satu penumpang per gerbong). Ketentuan: A di gerbong lebih kecil dari B. C tepat di antara B dan D. E di gerbong nomor 1. F dan G bersebelahan. D di gerbong nomor 7. Gerbong nomor berapa sajakah yang MUNGKIN ditempati oleh F?","options":{"A":"2, 3, atau 4 saja","B":"2, 3, 4, atau 5","C":"1, 2, atau 3","D":"3, 4, atau 5","E":"Hanya gerbong 2 atau 3"},"answer":"A","explanation":"E di 1, B di 5, C di 6, D di 7. A mengisi salah satu dari gerbong 2, 3, 4. F dan G mengisi dua dari sisa gerbong {2, 3, 4}. Maka F hanya bisa berada di gerbong 2, 3, atau 4."},{"number":18,"question":"Tujuh penumpang (A, B, C, D, E, F, G) menempati gerbong 1-7 (satu penumpang per gerbong). Ketentuan: A di gerbong lebih kecil dari B. C tepat di antara B dan D. E di gerbong nomor 1. F dan G bersebelahan. D di gerbong nomor 7. Jika A berada di gerbong nomor 4, maka F dan G menempati gerbong nomor...","options":{"A":"2 dan 3","B":"3 dan 4","C":"1 dan 2","D":"5 dan 6","E":"2 dan 4"},"answer":"A","explanation":"E di 1, A di 4, B di 5, C di 6, D di 7. Sisa gerbong untuk F dan G adalah 2 dan 3. F dan G bersebelahan, dan gerbong 2-3 memang bersebelahan. Maka F dan G di gerbong 2 dan 3."},{"number":19,"question":"Lima kapal (Kapal Merak, Kapal Rajawali, Kapal Garuda, Kapal Elang, Kapal Nuri) bersandar di dermaga dengan lima tambatan (nomor 1 sampai 5 dari kiri ke kanan). Ketentuannya: Kapal Garuda bersandar di tambatan yang bernomor lebih besar dari Kapal Merak. Kapal Rajawali bersandar di tambatan nomor 3. Kapal Elang bersandar tepat di sebelah kanan Kapal Nuri. Kapal Merak bersandar di tambatan nomor 1. Di tambatan nomor berapa Kapal Garuda bersandar?","options":{"A":"Tambatan 2","B":"Tambatan 3","C":"Tambatan 4 atau 5","D":"Tambatan 1","E":"Tambatan 2 atau 4"},"answer":"C","explanation":"Merak di tambatan 1, Rajawali di tambatan 3. Garuda > Merak (nomor tambatan), jadi Garuda bisa di 2, 4, atau 5. Tapi tambatan 3 sudah Rajawali, dan tambatan 2 belum pasti. Elang tepat di kanan Nuri, mengisi dua dari sisa tambatan. Garuda paling mungkin di 4 atau 5."},{"number":20,"question":"Lima kapal (Merak, Rajawali, Garuda, Elang, Nuri) bersandar di tambatan 1-5 dari kiri ke kanan. Ketentuan: Garuda di tambatan lebih besar dari Merak. Rajawali di tambatan 3. Elang tepat di sebelah kanan Nuri. Merak di tambatan 1. Jika Kapal Nuri bersandar di tambatan nomor 4, maka Kapal Elang bersandar di...","options":{"A":"Tambatan 3","B":"Tambatan 2","C":"Tambatan 5","D":"Tambatan 1","E":"Tambatan 4"},"answer":"C","explanation":"Elang tepat di sebelah kanan Nuri. Jika Nuri di tambatan 4, maka Elang di tambatan 5."},{"number":21,"question":"Lima kapal (Merak, Rajawali, Garuda, Elang, Nuri) bersandar di tambatan 1-5 dari kiri ke kanan. Ketentuan: Garuda di tambatan lebih besar dari Merak. Rajawali di tambatan 3. Elang tepat di sebelah kanan Nuri. Merak di tambatan 1. Kapal manakah yang bersandar di tambatan nomor 2 jika Nuri di tambatan 4?","options":{"A":"Kapal Merak","B":"Kapal Rajawali","C":"Kapal Garuda","D":"Kapal Elang","E":"Kapal Nuri"},"answer":"C","explanation":"Merak di 1, Rajawali di 3, Nuri di 4, Elang di 5. Satu-satunya tambatan yang tersisa untuk Garuda adalah tambatan 2."},{"number":22,"question":"Empat jenis transportasi (Monorail, Trem, Cable Car, Gondola) melayani wisatawan di sebuah kota. Diketahui: Monorail lebih mahal tarifnya dari Trem. Cable Car lebih murah dari Gondola. Gondola lebih mahal dari Monorail. Trem lebih mahal dari Cable Car. Transportasi dengan tarif termurah adalah...","options":{"A":"Monorail","B":"Trem","C":"Cable Car","D":"Gondola","E":"Monorail dan Trem"},"answer":"C","explanation":"Dari premis: Gondola > Monorail > Trem > Cable Car. Urutan dari termahal: Gondola - Monorail - Trem - Cable Car. Tarif termurah adalah Cable Car."},{"number":23,"question":"Dalam sebuah depo kereta, Ruang Kendali berada di sebelah utara Ruang Teknisi. Ruang Istirahat berada di sebelah barat Ruang Kendali. Gudang Suku Cadang berada di sebelah selatan Ruang Istirahat. Di manakah posisi Gudang Suku Cadang relatif terhadap Ruang Teknisi?","options":{"A":"Timur Laut","B":"Barat Laut","C":"Barat Daya","D":"Tenggara","E":"Barat"},"answer":"C","explanation":"Ruang Teknisi sebagai titik acuan (0,0). Ruang Kendali di utaranya (0,1). Ruang Istirahat di barat Kendali (-1,1). Gudang Suku Cadang di selatan Istirahat (-1,0). Posisi Gudang (-1,0) relatif terhadap Teknisi (0,0) adalah ke arah Barat Daya."},{"number":24,"question":"Semua MT Angkatan 2025 mengikuti program rotasi tiga divisi. Sebagian MT Angkatan 2025 berasal dari jurusan Manajemen. Kesimpulan yang tepat adalah...","options":{"A":"Semua lulusan Manajemen mengikuti program rotasi.","B":"Sebagian peserta rotasi berasal dari jurusan Manajemen.","C":"Program rotasi hanya untuk jurusan Manajemen.","D":"Tidak ada MT dari Manajemen yang ikut rotasi.","E":"Semua MT wajib dari jurusan Manajemen."},"answer":"B","explanation":"Semua MT Angkatan 2025 ikut rotasi, dan sebagian di antara mereka dari Manajemen. Maka sebagian peserta rotasi (yang MT Angkatan 2025) berasal dari jurusan Manajemen."},{"number":25,"question":"Dalam sebuah rapat koordinasi transportasi, posisi duduk dari kiri ke kanan adalah: Direktur Operasi duduk di antara Manajer Armada dan Manajer Rute. Kepala Divisi Keselamatan duduk di sebelah kanan Manajer Rute. Sekretaris duduk paling kiri. Siapakah yang duduk di posisi paling kanan?","options":{"A":"Manajer Armada","B":"Manajer Rute","C":"Direktur Operasi","D":"Kepala Divisi Keselamatan","E":"Sekretaris"},"answer":"D","explanation":"Sekretaris paling kiri. Direktur Operasi di antara Manajer Armada dan Manajer Rute. Kepala Divisi Keselamatan di kanan Manajer Rute. Urutan dari kiri: Sekretaris - Manajer Armada - Direktur Operasi - Manajer Rute - Kepala Divisi Keselamatan. Posisi paling kanan adalah Kepala Divisi Keselamatan."}],"parentId":"logika","bundleNum":2},"logika__paket_3":{"title":"Logika - Paket 3","duration":1800,"questions":[{"number":1,"question":"Deret waktu kedatangan bus (dalam menit dari pukul 05.00): 3, 8, 15, 24, 35, ... Waktu kedatangan bus berikutnya (menit ke-...) adalah...","options":{"A":"46","B":"48","C":"50","D":"44","E":"42"},"answer":"B","explanation":"Selisih: 5, 7, 9, 11, 13 (bertambah 2 setiap kali). Selisih berikutnya = 13. Maka: 35 + 13 = 48."},{"number":2,"question":"Kode nomor lambung pesawat mengikuti pola: PK-AAA, PK-BBB, PK-CCC, PK-DDD, ... Kode nomor lambung selanjutnya adalah...","options":{"A":"PK-EEE","B":"PK-EFF","C":"PK-FFF","D":"PK-DEF","E":"PK-EEF"},"answer":"A","explanation":"Pola: huruf alfabet berulang tiga kali secara berurutan. AAA, BBB, CCC, DDD, maka selanjutnya adalah EEE. Kode: PK-EEE."},{"number":3,"question":"Jumlah penumpang kapal feri selama 6 hari: 120, 180, 150, 210, 180, 240, ... Jumlah penumpang hari ke-7 adalah...","options":{"A":"260","B":"270","C":"210","D":"300","E":"220"},"answer":"C","explanation":"Ada dua deret yang bergantian. Deret ganjil: 120, 150, 180 (+30 setiap dua langkah). Deret genap: 180, 210, 240 (+30 setiap dua langkah). Hari ke-7 adalah lanjutan deret ganjil: 180 + 30 = 210."},{"number":4,"question":"REL : KERETA = JALUR PELAYARAN : ...","options":{"A":"Pelabuhan","B":"Dermaga","C":"Kapal","D":"Nahkoda","E":"Peta Laut"},"answer":"C","explanation":"Rel adalah jalur yang digunakan Kereta untuk bergerak. Jalur Pelayaran adalah jalur yang digunakan Kapal untuk berlayar. Hubungan: jalur/infrastruktur - moda transportasi yang menggunakannya."},{"number":5,"question":"Semua kendaraan listrik tidak mengeluarkan emisi gas buang langsung. Semua bus sekolah ramah lingkungan di Kota Hijau adalah kendaraan listrik. Sebagian armada Dinas Pendidikan Kota Hijau adalah bus sekolah ramah lingkungan. Kesimpulan yang PALING TEPAT adalah...","options":{"A":"Semua armada Dinas Pendidikan Kota Hijau adalah kendaraan listrik.","B":"Sebagian armada Dinas Pendidikan Kota Hijau tidak mengeluarkan emisi gas buang langsung.","C":"Semua kendaraan listrik adalah bus sekolah.","D":"Tidak ada bus sekolah yang mengeluarkan emisi.","E":"Dinas Pendidikan Kota Hijau hanya memiliki kendaraan listrik."},"answer":"B","explanation":"Rantai silogisme: Bus sekolah ramah lingkungan = kendaraan listrik = tidak beremisi. Sebagian armada Dinas Pendidikan adalah bus sekolah ramah lingkungan. Maka sebagian armada Dinas Pendidikan tidak mengeluarkan emisi gas buang langsung."},{"number":6,"question":"Premis 1: Semua pengemudi angkutan kota (angkot) wajib memiliki SIM A Umum. Premis 2: Budi adalah pengemudi angkutan kota. Kesimpulan yang paling tepat adalah...","options":{"A":"Budi wajib memiliki SIM B Umum.","B":"Budi tidak perlu memiliki SIM apapun.","C":"Budi wajib memiliki SIM A Umum.","D":"Sebagian pengemudi angkot tidak butuh SIM.","E":"Budi mungkin memiliki SIM A Umum."},"answer":"C","explanation":"Silogisme kategorik: Semua A adalah B. Budi adalah A. Maka Budi adalah B. Karena Budi adalah pengemudi angkot, Budi wajib memiliki SIM A Umum."},{"number":7,"question":"Premis 1: Jika kereta api terlambat, maka penumpang akan menunggu lebih lama. Premis 2: Saat ini penumpang tidak menunggu lebih lama. Kesimpulan yang paling tepat adalah...","options":{"A":"Kereta api terlambat.","B":"Kereta api tidak terlambat.","C":"Penumpang sudah naik kereta.","D":"Kereta api mengalami kerusakan.","E":"Jadwal kereta dipercepat."},"answer":"B","explanation":"Modus Tollens: Jika P maka Q. Ternyata Tidak Q (penumpang tidak menunggu lebih lama). Maka Tidak P (kereta api tidak terlambat)."},{"number":8,"question":"Premis 1: Semua taksi online wajib terdaftar di aplikasi resmi. Premis 2: Kendaraan X tidak terdaftar di aplikasi resmi. Kesimpulan yang paling tepat adalah...","options":{"A":"Kendaraan X mungkin taksi online.","B":"Kendaraan X adalah taksi konvensional.","C":"Kendaraan X bukan taksi online.","D":"Kendaraan X sedang dalam proses pendaftaran.","E":"Semua taksi wajib terdaftar."},"answer":"C","explanation":"Karena semua taksi online wajib terdaftar, dan Kendaraan X tidak terdaftar, maka mutlak Kendaraan X bukan taksi online."},{"number":9,"question":"Premis 1: Sebagian masinis kereta wajib mengikuti pelatihan darurat tahunan. Premis 2: Semua yang mengikuti pelatihan darurat tahunan mendapatkan sertifikat keselamatan. Kesimpulan yang paling tepat adalah...","options":{"A":"Semua masinis mendapatkan sertifikat keselamatan.","B":"Sebagian masinis mendapatkan sertifikat keselamatan.","C":"Masinis yang tidak ikut pelatihan tidak aman.","D":"Sertifikat keselamatan hanya untuk masinis.","E":"Tidak ada masinis yang bersertifikat."},"answer":"B","explanation":"Hanya sebagian masinis yang mengikuti pelatihan, dan semua peserta pelatihan mendapat sertifikat. Maka hanya sebagian masinis yang mendapatkan sertifikat keselamatan."},{"number":10,"question":"Premis 1: Semua armada bus yang beroperasi harus lolos uji emisi. Premis 2: Bus nomor 302 tidak lolos uji emisi. Kesimpulan yang paling tepat adalah...","options":{"A":"Bus nomor 302 tetap boleh beroperasi.","B":"Bus nomor 302 tidak boleh beroperasi.","C":"Sebagian bus boleh tidak lolos uji emisi.","D":"Bus nomor 302 segera diperbaiki.","E":"Uji emisi tidak wajib untuk semua bus."},"answer":"B","explanation":"Syarat operasi adalah lolos uji emisi. Bus nomor 302 tidak lolos, maka bus nomor 302 tidak boleh beroperasi."},{"number":11,"question":"Premis 1: Semua pelabuhan internasional memiliki fasilitas bea cukai. Premis 2: Pelabuhan Nusantara tidak memiliki fasilitas bea cukai. Kesimpulan yang paling tepat adalah...","options":{"A":"Pelabuhan Nusantara adalah pelabuhan internasional yang rusak.","B":"Pelabuhan Nusantara mungkin pelabuhan internasional.","C":"Pelabuhan Nusantara bukan pelabuhan internasional.","D":"Fasilitas bea cukai sedang dibangun di Pelabuhan Nusantara.","E":"Semua pelabuhan pasti punya bea cukai."},"answer":"C","explanation":"Karena semua pelabuhan internasional memiliki bea cukai, dan Pelabuhan Nusantara tidak memilikinya, maka mutlak Pelabuhan Nusantara bukan pelabuhan internasional."},{"number":12,"question":"Premis 1: Jika jalan tol mengalami kepadatan, maka waktu tempuh kendaraan bertambah. Premis 2: Waktu tempuh kendaraan tidak bertambah. Kesimpulan yang paling tepat adalah...","options":{"A":"Jalan tol mengalami kepadatan.","B":"Jalan tol tidak mengalami kepadatan.","C":"Kendaraan melaju sangat kencang.","D":"Jalan tol sedang ditutup.","E":"Pengemudi mengambil jalur alternatif."},"answer":"B","explanation":"Modus Tollens: Jika P maka Q. Ternyata Tidak Q (waktu tempuh tidak bertambah). Maka Tidak P (jalan tol tidak mengalami kepadatan)."},{"number":13,"question":"Premis 1: Sebagian penerbangan domestik menggunakan pesawat berkapasitas besar. Premis 2: Semua pesawat berkapasitas besar memerlukan landasan pacu yang panjang. Kesimpulan yang paling tepat adalah...","options":{"A":"Semua penerbangan domestik memerlukan landasan pacu panjang.","B":"Sebagian penerbangan domestik memerlukan landasan pacu yang panjang.","C":"Landasan pacu panjang hanya untuk penerbangan internasional.","D":"Semua penerbangan memerlukan landasan pacu yang sama.","E":"Pesawat kecil tidak perlu landasan panjang."},"answer":"B","explanation":"Hanya sebagian penerbangan domestik menggunakan pesawat besar, dan semua pesawat besar butuh landasan panjang. Maka hanya sebagian penerbangan domestik butuh landasan pacu panjang."},{"number":14,"question":"Premis 1: Semua pramugari wajib mengikuti kursus keselamatan penerbangan. Premis 2: Rina adalah pramugari. Kesimpulan yang paling tepat adalah...","options":{"A":"Rina mungkin mengikuti kursus keselamatan.","B":"Rina tidak perlu ikut kursus apapun.","C":"Semua orang yang ikut kursus adalah pramugari.","D":"Rina wajib mengikuti kursus keselamatan penerbangan.","E":"Hanya Rina yang wajib ikut kursus."},"answer":"D","explanation":"Silogisme standar: Rina termasuk kelompok pramugari, dan semua pramugari wajib ikut kursus. Maka Rina wajib mengikuti kursus keselamatan penerbangan."},{"number":15,"question":"Premis 1: Semua stasiun kereta komuter memiliki sistem tiket elektronik. Premis 2: Sebagian terminal bus juga memiliki sistem tiket elektronik. Kesimpulan yang paling tepat adalah...","options":{"A":"Semua terminal bus adalah stasiun kereta komuter.","B":"Sebagian terminal bus adalah stasiun kereta komuter.","C":"Stasiun kereta dan terminal bus adalah tempat yang berbeda namun bisa memiliki kesamaan sistem.","D":"Hanya stasiun kereta yang boleh punya tiket elektronik.","E":"Semua terminal bus harus punya tiket elektronik."},"answer":"C","explanation":"Premis hanya menyatakan keduanya bisa memiliki sistem tiket elektronik, bukan bahwa keduanya adalah entitas yang sama. Kesimpulan paling tepat adalah keduanya adalah tempat berbeda yang dapat berbagi fitur yang sama."},{"number":16,"question":"Premis 1: Jika kapal feri mengalami kerusakan mesin, maka pelayaran dibatalkan. Premis 2: Pelayaran tidak dibatalkan. Kesimpulan yang paling tepat adalah...","options":{"A":"Mesin kapal feri rusak.","B":"Kapal feri sedang dalam perawatan.","C":"Kapal feri tidak mengalami kerusakan mesin.","D":"Pelayaran dipindah ke jadwal lain.","E":"Penumpang sudah menaiki kapal."},"answer":"C","explanation":"Modus Tollens: Jika P maka Q. Tidak Q (pelayaran tidak dibatalkan). Maka Tidak P (kapal feri tidak mengalami kerusakan mesin)."},{"number":17,"question":"Premis 1: Semua pengemudi truk jarak jauh wajib beristirahat setiap 4 jam berkendara. Premis 2: Pak Hendra adalah pengemudi truk jarak jauh. Kesimpulan yang paling tepat adalah...","options":{"A":"Pak Hendra boleh berkendara tanpa henti.","B":"Pak Hendra mungkin perlu istirahat.","C":"Semua orang yang istirahat tiap 4 jam adalah pengemudi truk.","D":"Pak Hendra wajib beristirahat setiap 4 jam berkendara.","E":"Hanya Pak Hendra yang wajib istirahat."},"answer":"D","explanation":"Silogisme standar: Pak Hendra adalah pengemudi truk jarak jauh, dan semua pengemudi truk jarak jauh wajib istirahat tiap 4 jam. Maka Pak Hendra wajib beristirahat setiap 4 jam berkendara."},{"number":18,"question":"Premis 1: Sebagian bandara di Indonesia memiliki terminal internasional. Premis 2: Semua terminal internasional menyediakan layanan imigrasi. Kesimpulan yang paling tepat adalah...","options":{"A":"Semua bandara di Indonesia menyediakan layanan imigrasi.","B":"Sebagian bandara di Indonesia menyediakan layanan imigrasi.","C":"Layanan imigrasi hanya ada di Jakarta.","D":"Semua bandara memiliki terminal internasional.","E":"Tidak ada bandara yang menyediakan imigrasi."},"answer":"B","explanation":"Hanya sebagian bandara yang memiliki terminal internasional, dan semua terminal internasional menyediakan imigrasi. Maka hanya sebagian bandara yang menyediakan layanan imigrasi."},{"number":19,"question":"Premis 1: Jika lampu merah menyala, maka kendaraan harus berhenti. Premis 2: Kendaraan tidak berhenti. Kesimpulan yang paling tepat adalah...","options":{"A":"Lampu merah menyala.","B":"Lampu merah tidak menyala.","C":"Pengemudi tidak melihat lampu.","D":"Kendaraan mengalami rem blong.","E":"Lampu lalu lintas mati."},"answer":"B","explanation":"Modus Tollens: Jika lampu merah menyala maka kendaraan berhenti. Kendaraan tidak berhenti (Tidak Q). Maka lampu merah tidak menyala (Tidak P)."},{"number":20,"question":"Premis 1: Semua pilot komersial wajib memiliki lisensi ATPL (Airline Transport Pilot License). Premis 2: Kapten Aryo tidak memiliki lisensi ATPL. Kesimpulan yang paling tepat adalah...","options":{"A":"Kapten Aryo adalah pilot militer.","B":"Kapten Aryo mungkin pilot komersial.","C":"Kapten Aryo bukan pilot komersial.","D":"Kapten Aryo sedang mengurus lisensinya.","E":"Lisensi ATPL tidak wajib untuk semua pilot."},"answer":"C","explanation":"Karena semua pilot komersial wajib punya ATPL, dan Kapten Aryo tidak punya ATPL, maka mutlak Kapten Aryo bukan pilot komersial."},{"number":21,"question":"Enam bus (A, B, C, D, E, F) akan berangkat dari terminal secara berurutan. Ketentuannya: Bus C harus berangkat tepat setelah bus A. Bus E harus berangkat sebelum bus B. Bus D tidak boleh berangkat pada urutan pertama atau terakhir. Bus F berangkat pada urutan keempat. Urutan keberangkatan bus yang benar adalah...","options":{"A":"A, C, E, F, B, D","B":"E, B, A, F, C, D","C":"E, A, C, F, D, B","D":"A, C, D, F, E, B","E":"B, E, A, F, C, D"},"answer":"C","explanation":"F di urutan 4. C tepat setelah A (paket A-C). E sebelum B. D tidak boleh di urutan 1 atau 6. Susunan valid: E(1), A(2), C(3), F(4), D(5), B(6). E sebelum B OK, D di posisi 5 OK, A-C berurutan OK."},{"number":22,"question":"Bus yang berangkat pada urutan ketiga adalah...","options":{"A":"Bus A","B":"Bus B","C":"Bus C","D":"Bus D","E":"Bus E"},"answer":"C","explanation":"Berdasarkan urutan yang benar: E(1), A(2), C(3), F(4), D(5), B(6). Bus yang berangkat pada urutan ketiga adalah Bus C."},{"number":23,"question":"Jika bus A berangkat pada urutan pertama, bus yang mungkin berangkat pada urutan kedua adalah...","options":{"A":"Bus B","B":"Bus C","C":"Bus D","D":"Bus E","E":"Bus F"},"answer":"B","explanation":"C harus tepat setelah A. Jika A di urutan 1, maka C wajib di urutan 2. Maka yang mungkin di urutan kedua adalah Bus C."},{"number":24,"question":"Lima petugas (P, Q, R, S, T) akan ditugaskan di tiga stasiun berbeda: Stasiun Gambir, Stasiun Pasar Senen, dan Stasiun Jatinegara. Ketentuannya: Setiap stasiun dijaga minimal satu petugas. P tidak mau bertugas di Stasiun Gambir. Q dan R harus berada di stasiun yang sama. S bertugas di Stasiun Jatinegara. T tidak mau bertugas di Stasiun Jatinegara. Di stasiun manakah petugas T bertugas?","options":{"A":"Stasiun Jatinegara","B":"Stasiun Gambir atau Stasiun Pasar Senen","C":"Stasiun Gambir saja","D":"Stasiun Pasar Senen saja","E":"T tidak bertugas di mana pun"},"answer":"B","explanation":"S di Jatinegara. T tidak mau di Jatinegara, sehingga T bisa di Gambir atau Pasar Senen. Tidak ada batasan lebih lanjut yang memaksa T ke salah satu, jadi T bisa bertugas di Gambir atau Pasar Senen."},{"number":25,"question":"Jika Q bertugas di Stasiun Gambir, maka teman tugas P adalah...","options":{"A":"Q","B":"R","C":"S","D":"T","E":"Q dan R"},"answer":"C","explanation":"Q di Gambir maka R juga di Gambir (Q dan R harus bersama). S di Jatinegara. P tidak mau di Gambir, sehingga P di Pasar Senen atau Jatinegara. T tidak mau di Jatinegara, maka T di Pasar Senen. Sisa P harus di Jatinegara bersama S. Jadi teman tugas P adalah S."}],"parentId":"logika","bundleNum":3},"logika__paket_4":{"title":"Logika - Paket 4","duration":1800,"questions":[{"number":1,"question":"Jika T bertugas di Stasiun Pasar Senen bersama P, maka Q dan R bertugas di stasiun mana?","options":{"A":"Stasiun Jatinegara","B":"Stasiun Gambir","C":"Stasiun Pasar Senen","D":"Stasiun Gambir atau Jatinegara","E":"Tidak dapat ditentukan"},"answer":"B","explanation":"S di Jatinegara. T dan P di Pasar Senen. Q dan R harus bersama dan sisa stasiun yang tersedia adalah Gambir. Maka Q dan R bertugas di Stasiun Gambir."},{"number":2,"question":"Ada empat jenis moda transportasi (KRL, MRT, LRT, Bus) yang melayani rute kota setiap hari. Ketentuannya: KRL lebih cepat dari MRT. LRT lebih lambat dari Bus. MRT lebih cepat dari LRT. Bus lebih lambat dari KRL. Moda transportasi yang paling lambat adalah...","options":{"A":"KRL","B":"MRT","C":"Bus","D":"LRT","E":"MRT dan Bus"},"answer":"D","explanation":"Dari premis: KRL > MRT, MRT > LRT, KRL > Bus, Bus > LRT. Urutan kecepatan: KRL > MRT > Bus > LRT. Moda paling lambat adalah LRT."},{"number":3,"question":"Moda transportasi yang kecepatannya berada di posisi kedua tercepat adalah...","options":{"A":"KRL","B":"LRT","C":"Bus","D":"MRT","E":"MRT dan Bus"},"answer":"D","explanation":"Urutan kecepatan dari tercepat: KRL > MRT > Bus > LRT. Posisi kedua tercepat adalah MRT."},{"number":4,"question":"Pernyataan manakah yang BENAR berdasarkan urutan kecepatan moda transportasi?","options":{"A":"LRT lebih cepat dari MRT.","B":"Bus adalah moda tercepat.","C":"MRT lebih lambat dari LRT.","D":"Bus lebih cepat dari LRT.","E":"KRL lebih lambat dari Bus."},"answer":"D","explanation":"Urutan: KRL > MRT > Bus > LRT. Dari pilihan yang ada, pernyataan yang benar adalah Bus lebih cepat dari LRT (Bus > LRT)."},{"number":5,"question":"Dalam sebuah garasi bus, posisi Bus Merah berada di antara Bus Kuning dan Bus Hijau. Bus Biru berada di sebelah kanan Bus Hijau. Bus Putih berada paling kiri. Siapakah yang berada di posisi paling kanan?","options":{"A":"Bus Merah","B":"Bus Hijau","C":"Bus Biru","D":"Bus Kuning","E":"Bus Putih"},"answer":"C","explanation":"Bus Putih paling kiri. Bus Merah di antara Kuning dan Hijau. Bus Biru di sebelah kanan Hijau. Urutan dari kiri: Putih – Kuning – Merah – Hijau – Biru. Maka yang paling kanan adalah Bus Biru."},{"number":6,"question":"Dalam rapat dinas, Kepala Dinas Perhubungan duduk di antara Kepala Bidang Darat dan Kepala Bidang Laut. Kepala Bidang Udara duduk di sebelah kanan Kepala Bidang Laut. Kepala Bidang Keselamatan duduk paling kiri. Siapakah yang duduk di posisi kedua dari kiri?","options":{"A":"Kepala Dinas Perhubungan","B":"Kepala Bidang Darat","C":"Kepala Bidang Laut","D":"Kepala Bidang Udara","E":"Kepala Bidang Keselamatan"},"answer":"B","explanation":"Kepala Bidang Keselamatan paling kiri. Kepala Dinas di antara Bidang Darat dan Bidang Laut. Bidang Udara di kanan Bidang Laut. Urutan: Keselamatan – Darat – Dinas – Laut – Udara. Posisi kedua dari kiri adalah Kepala Bidang Darat."},{"number":7,"question":"Lima halte (H1, H2, H3, H4, H5) terletak di sepanjang jalur lurus. H2 berjarak 3 km dari H1. H3 berjarak 7 km dari H1. H4 berjarak 2 km dari H3. H5 berjarak 1 km dari H4. Urutan halte dari yang terdekat ke H1 adalah...","options":{"A":"H1-H2-H3-H4-H5","B":"H1-H2-H4-H3-H5","C":"H1-H3-H2-H4-H5","D":"H1-H2-H3-H5-H4","E":"H1-H4-H2-H3-H5"},"answer":"A","explanation":"Jarak dari H1: H1=0 km, H2=3 km, H3=7 km, H4=H3+2=9 km, H5=H4+1=10 km. Urutan dari terdekat ke H1: H1(0) – H2(3) – H3(7) – H4(9) – H5(10)."},{"number":8,"question":"Perhatikan urutan berikut: Pesawat, Kapal, Kereta, Pesawat, Kapal, ... Apa yang muncul selanjutnya?","options":{"A":"Pesawat","B":"Kapal","C":"Kereta","D":"Bus","E":"Motor"},"answer":"C","explanation":"Pola berulang: Pesawat – Kapal – Kereta (3 elemen). Setelah Pesawat, Kapal, maka selanjutnya adalah Kereta."},{"number":9,"question":"Perhatikan deret angka berikut yang merupakan kapasitas penumpang bus: 20, 30, 25, 35, 30, 40, ... Angka selanjutnya adalah...","options":{"A":"45","B":"35","C":"50","D":"38","E":"42"},"answer":"B","explanation":"Pola: +10, -5, +10, -5, +10, -5. Setelah 40 (ditambah 10 dari 30), selanjutnya dikurangi 5: 40 - 5 = 35."},{"number":10,"question":"Deret nomor kendaraan: 2, 4, 8, 16, 32, ... Angka selanjutnya adalah...","options":{"A":"48","B":"56","C":"64","D":"60","E":"36"},"answer":"C","explanation":"Pola: setiap angka dikali 2 (deret geometri). 2x2=4, 4x2=8, 8x2=16, 16x2=32, 32x2=64."},{"number":11,"question":"Jadwal keberangkatan bus (dalam menit dari pukul 06.00): 0, 15, 35, 60, 90, ... Menit keberangkatan berikutnya adalah...","options":{"A":"110","B":"120","C":"125","D":"115","E":"130"},"answer":"C","explanation":"Selisih: 15, 20, 25, 30, ... (bertambah 5 setiap kali). Selisih berikutnya = 35. Maka: 90 + 35 = 125."},{"number":12,"question":"Perhatikan pola jumlah penumpang harian bus kota selama seminggu: Senin: 500, Selasa: 450, Rabu: 500, Kamis: 450, Jumat: 500, Sabtu: ... Jumlah penumpang hari Sabtu adalah...","options":{"A":"500","B":"400","C":"450","D":"550","E":"480"},"answer":"C","explanation":"Pola berselang: 500, 450, 500, 450, 500, 450. Hari genap (Selasa, Kamis, Sabtu) = 450. Maka Sabtu = 450."},{"number":13,"question":"Rute bus melewati halte secara berurutan: A, C, E, G, ... Halte selanjutnya adalah...","options":{"A":"H","B":"I","C":"J","D":"K","E":"L"},"answer":"B","explanation":"Pola: huruf alfabet dengan lompatan satu huruf (huruf ganjil). A(1), C(3), E(5), G(7), I(9). Halte selanjutnya adalah I."},{"number":14,"question":"Pola visual arah panah petunjuk jalur busway: Atas, Kanan, Bawah, Kiri, Atas, Kanan, Bawah, ... Panah selanjutnya menunjuk ke...","options":{"A":"Atas","B":"Kanan","C":"Kiri","D":"Bawah","E":"Serong kanan"},"answer":"C","explanation":"Pola berputar searah jarum jam: Atas – Kanan – Bawah – Kiri (4 elemen). Setelah Bawah (urutan ke-7 = posisi ke-3 dalam pola), selanjutnya adalah Kiri."},{"number":15,"question":"Kode gerbong kereta: 101, 202, 303, 404, ... Kode gerbong selanjutnya adalah...","options":{"A":"500","B":"505","C":"550","D":"555","E":"515"},"answer":"B","explanation":"Pola: angka ratusan, puluhan, dan satuan sama dan bertambah 1: 101, 202, 303, 404, 505. Kode selanjutnya adalah 505."},{"number":16,"question":"Semua bus listrik memiliki pengisi daya (charger). Sebagian kendaraan yang memiliki pengisi daya adalah mobil pribadi. Kesimpulan yang paling tepat adalah...","options":{"A":"Semua bus listrik adalah mobil pribadi.","B":"Semua mobil pribadi memiliki pengisi daya.","C":"Sebagian kendaraan berpengisi daya bukan bus listrik.","D":"Bus listrik dan mobil pribadi adalah kendaraan yang sama.","E":"Tidak ada mobil pribadi yang punya pengisi daya."},"answer":"C","explanation":"Bus listrik punya charger, dan sebagian kendaraan ber-charger adalah mobil pribadi (bukan bus listrik). Maka sebagian kendaraan berpengisi daya bukan bus listrik."},{"number":17,"question":"PILOT : PESAWAT = MASINIS : ...","options":{"A":"Rel","B":"Stasiun","C":"Kereta Api","D":"Tiket","E":"Penumpang"},"answer":"C","explanation":"Pilot adalah orang yang mengemudikan Pesawat. Masinis adalah orang yang mengemudikan Kereta Api. Hubungan: pengemudi – kendaraan yang dikemudikan."},{"number":18,"question":"TERMINAL : BUS = BANDARA : ...","options":{"A":"Pilot","B":"Tiket","C":"Pesawat","D":"Landasan","E":"Penumpang"},"answer":"C","explanation":"Terminal adalah tempat operasional Bus. Bandara adalah tempat operasional Pesawat. Hubungan: tempat – moda transportasi yang beroperasi di sana."},{"number":19,"question":"Dalam diagram organisasi Dinas Perhubungan, posisi Kepala Seksi berada di bawah Kepala Bidang, dan Kepala Bidang berada di bawah Kepala Dinas. Jika Staf berada di bawah Kepala Seksi, maka pernyataan yang SALAH adalah...","options":{"A":"Staf berada di bawah Kepala Bidang.","B":"Kepala Seksi berada di bawah Kepala Dinas.","C":"Kepala Dinas berada di atas Staf.","D":"Kepala Bidang berada di atas Kepala Seksi.","E":"Kepala Seksi berada di atas Kepala Dinas."},"answer":"E","explanation":"Berdasarkan hierarki: Kepala Dinas > Kepala Bidang > Kepala Seksi > Staf. Pernyataan yang SALAH adalah 'Kepala Seksi berada di atas Kepala Dinas', karena justru sebaliknya."},{"number":20,"question":"Semua halte bus rapid transit (BRT) adalah halte ramah disabilitas. Sebagian halte di Kota Maju adalah halte BRT. Halte Sentral adalah halte di Kota Maju. Jika Halte Sentral adalah halte BRT, kesimpulan yang tepat adalah...","options":{"A":"Halte Sentral mungkin ramah disabilitas.","B":"Halte Sentral belum tentu ramah disabilitas.","C":"Semua halte di Kota Maju ramah disabilitas.","D":"Halte Sentral pasti ramah disabilitas.","E":"Hanya Halte Sentral yang ramah disabilitas di Kota Maju."},"answer":"D","explanation":"Silogisme kategorik: Semua BRT adalah ramah disabilitas (A adalah B). Halte Sentral adalah BRT (C adalah A). Maka Halte Sentral adalah ramah disabilitas (C adalah B). Kesimpulannya pasti, bukan sekadar mungkin."},{"number":21,"question":"Premis 1: Semua pengemudi bus TransJakarta yang melanggar SOP akan dikenakan sanksi administratif. Premis 2: Budi tidak dikenakan sanksi administratif.","options":{"A":"Budi terbukti melanggar SOP TransJakarta.","B":"Budi adalah pengemudi bus TransJakarta.","C":"Budi tidak melanggar SOP TransJakarta.","D":"Sanksi administratif tidak berlaku untuk semua pengemudi.","E":"Budi masih dalam masa percobaan kerja."},"answer":"C","explanation":"Modus Tollens: Jika P (melanggar SOP) maka Q (dikenai sanksi). Tidak Q (Budi tidak dikenai sanksi). Maka Tidak P: Budi tidak melanggar SOP TransJakarta."},{"number":22,"question":"Premis 1: Semua taksi yang beroperasi di Bandara Soekarno-Hatta wajib memiliki izin resmi dari otoritas bandara. Premis 2: Sebagian taksi di Bandara Soekarno-Hatta adalah taksi online.","options":{"A":"Sebagian taksi online di Bandara Soekarno-Hatta wajib memiliki izin resmi dari otoritas bandara.","B":"Semua taksi online wajib memiliki izin dari otoritas bandara.","C":"Taksi online tidak memerlukan izin resmi untuk beroperasi.","D":"Semua kendaraan di area bandara wajib memiliki izin resmi.","E":"Taksi online dilarang beroperasi di bandara."},"answer":"A","explanation":"Hanya sebagian taksi di bandara yang merupakan taksi online, dan semua taksi di bandara wajib punya izin. Maka hanya sebagian taksi online yang (dapat dipastikan) wajib memiliki izin resmi bandara."},{"number":23,"question":"Premis 1: Jika terjadi banjir di jalur utama, maka bus dialihkan ke jalur alternatif. Premis 2: Bus saat ini sedang dialihkan ke jalur alternatif.","options":{"A":"Jalur utama pasti sedang banjir.","B":"Jalur alternatif selalu lebih baik dari jalur utama.","C":"Bus selalu melewati jalur alternatif setiap hari.","D":"Belum tentu terjadi banjir di jalur utama.","E":"Bus dialihkan karena penumpang terlalu ramai."},"answer":"D","explanation":"Ini adalah jebakan affirming the consequent. Jika P maka Q. Q terjadi (bus dialihkan). Tidak bisa disimpulkan P pasti terjadi, karena pengalihan bisa disebabkan faktor lain (perbaikan jalan, kecelakaan, dll). Maka: belum tentu ada banjir."},{"number":24,"question":"Premis 1: Tidak ada pengemudi yang sedang dalam pengaruh alkohol boleh mengoperasikan kendaraan umum. Premis 2: Anton sedang dalam pengaruh alkohol.","options":{"A":"Anton boleh mengoperasikan kendaraan umum dengan pengawasan ketat.","B":"Anton tidak boleh mengoperasikan kendaraan umum.","C":"Anton mungkin diizinkan mengemudi jika dinyatakan layak.","D":"Semua pengemudi kendaraan umum bebas dari alkohol.","E":"Anton bukan pengemudi kendaraan umum."},"answer":"B","explanation":"Tidak ada pengemudi beralcohol yang boleh mengoperasikan kendaraan umum. Anton berada dalam pengaruh alkohol. Maka Anton masuk kategori yang tidak boleh mengoperasikan kendaraan umum."},{"number":25,"question":"Premis 1: Semua pesawat yang akan mendarat wajib mendapat clearance dari menara kontrol. Premis 2: Pesawat GA-202 sedang dalam prosedur pendaratan.","options":{"A":"Pesawat GA-202 sudah berhasil mendarat.","B":"Menara kontrol selalu memberikan clearance kepada semua pesawat.","C":"Pesawat GA-202 mungkin mendapat clearance.","D":"Clearance pendaratan hanya berlaku untuk penerbangan internasional.","E":"Pesawat GA-202 wajib mendapat clearance dari menara kontrol."},"answer":"E","explanation":"Silogisme kategorik standar. Pesawat GA-202 sedang dalam prosedur pendaratan, dan semua pesawat yang akan mendarat wajib mendapat clearance. Maka Pesawat GA-202 wajib mendapat clearance."}],"parentId":"logika","bundleNum":4},"logika__paket_5":{"title":"Logika - Paket 5","duration":1800,"questions":[{"number":1,"question":"Premis 1: Sebagian armada KRL Commuter Line sudah beroperasi lebih dari 15 tahun. Premis 2: Semua armada yang sudah beroperasi lebih dari 15 tahun wajib menjalani overhaul besar.","options":{"A":"Sebagian armada KRL Commuter Line wajib menjalani overhaul besar.","B":"Semua armada KRL Commuter Line wajib menjalani overhaul besar.","C":"KRL yang berusia di bawah 15 tahun tidak perlu perawatan apapun.","D":"Overhaul besar hanya dilakukan pada armada tertentu yang dipilih manajemen.","E":"Semua armada KRL sudah beroperasi lebih dari 15 tahun."},"answer":"A","explanation":"Hanya sebagian armada KRL yang sudah beroperasi lebih dari 15 tahun, dan semua yang berusia itu wajib overhaul. Maka hanya sebagian armada KRL yang wajib overhaul besar."},{"number":2,"question":"Premis 1: Jika jembatan timbang menemukan kendaraan melebihi batas muatan, maka kendaraan tersebut wajib menurunkan kelebihan muatannya. Premis 2: Truk bernomor polisi B 9876 CC tidak diwajibkan menurunkan muatan.","options":{"A":"Truk B 9876 CC melebihi batas muatan yang ditentukan.","B":"Jembatan timbang tidak sempat memeriksa Truk B 9876 CC.","C":"Muatan Truk B 9876 CC sedang dalam proses pemeriksaan.","D":"Truk B 9876 CC tidak melebihi batas muatan.","E":"Jembatan timbang di lokasi tersebut mengalami kerusakan."},"answer":"D","explanation":"Modus Tollens: Jika P (melebihi muatan) maka Q (wajib turunkan muatan). Tidak Q (tidak diwajibkan menurunkan muatan). Maka Tidak P: Truk B 9876 CC tidak melebihi batas muatan."},{"number":3,"question":"Premis 1: Semua penerbangan yang delay lebih dari 2 jam wajib memberikan kompensasi kepada penumpang. Premis 2: Sebagian penerbangan rute Jakarta-Surabaya mengalami delay lebih dari 2 jam.","options":{"A":"Semua penerbangan rute Jakarta-Surabaya wajib memberikan kompensasi.","B":"Penerbangan Jakarta-Surabaya selalu mengalami keterlambatan.","C":"Sebagian penerbangan rute Jakarta-Surabaya wajib memberikan kompensasi kepada penumpang.","D":"Kompensasi hanya berlaku untuk penerbangan domestik jarak jauh.","E":"Seluruh penumpang Jakarta-Surabaya pasti mendapat kompensasi."},"answer":"C","explanation":"Hanya sebagian penerbangan Jakarta-Surabaya yang delay lebih dari 2 jam, dan semua yang delay itu wajib beri kompensasi. Maka hanya sebagian penerbangan rute tersebut yang wajib memberikan kompensasi."},{"number":4,"question":"Premis 1: Semua halte BRT yang baru dibangun wajib dilengkapi panel informasi digital. Premis 2: Halte Mega Kuningan baru saja selesai dibangun sebagai halte BRT.","options":{"A":"Halte Mega Kuningan mungkin dilengkapi panel informasi digital.","B":"Panel informasi digital hanya tersedia di halte baru.","C":"Semua halte di Jakarta memiliki panel informasi digital.","D":"Halte Mega Kuningan bukan termasuk halte BRT.","E":"Halte Mega Kuningan wajib dilengkapi panel informasi digital."},"answer":"E","explanation":"Silogisme kategorik standar. Halte Mega Kuningan adalah halte BRT baru, dan semua halte BRT baru wajib punya panel digital. Maka Halte Mega Kuningan wajib dilengkapi panel informasi digital."},{"number":5,"question":"Premis 1: Jika sistem tiket elektronik KRL mengalami gangguan, maka penumpang diperbolehkan masuk tanpa tap kartu. Premis 2: Penumpang tidak diperbolehkan masuk tanpa tap kartu.","options":{"A":"Sistem tiket elektronik KRL saat ini mengalami gangguan.","B":"Sistem tiket elektronik KRL tidak mengalami gangguan.","C":"Tap kartu hanya wajib dilakukan di jam-jam sibuk.","D":"Penumpang selalu wajib tap kartu dalam kondisi apapun.","E":"Sistem tiket KRL sedang dalam pemeliharaan rutin."},"answer":"B","explanation":"Modus Tollens: Jika P (sistem gangguan) maka Q (boleh masuk tanpa tap). Tidak Q (tidak diperbolehkan masuk tanpa tap). Maka Tidak P: sistem tiket elektronik KRL tidak mengalami gangguan."},{"number":6,"question":"Enam pengemudi (Aldi, Bima, Citra, Dewa, Eka, Fani) dijadwalkan dalam tiga shift kerja: Shift Pagi, Shift Siang, dan Shift Sore. Setiap shift diisi oleh tepat dua pengemudi. Ketentuan: Aldi tidak mau bertugas di Shift Sore. Bima dan Citra harus berada di shift yang sama. Dewa bertugas di Shift Pagi. Eka tidak mau bertugas di Shift Pagi atau Shift Siang. Pengemudi yang bertugas di Shift Siang adalah...","options":{"A":"Dewa dan Aldi","B":"Eka dan Fani","C":"Aldi dan Bima","D":"Bima dan Citra","E":"Citra dan Dewa"},"answer":"D","explanation":"Eka hanya bisa di Shift Sore (tidak mau Pagi/Siang). Dewa di Shift Pagi. Bima dan Citra harus satu shift, tidak bisa di Pagi dan tidak bisa di Sore (sudah Eka). Maka Bima dan Citra di Shift Siang. Aldi tidak mau Sore, jadi Aldi di Pagi bersama Dewa. Fani di Sore bersama Eka. Shift Siang: Bima dan Citra."},{"number":7,"question":"Enam pengemudi (Aldi, Bima, Citra, Dewa, Eka, Fani) dijadwalkan dalam tiga shift kerja: Shift Pagi, Shift Siang, dan Shift Sore. Setiap shift diisi oleh tepat dua pengemudi. Ketentuan: Aldi tidak mau bertugas di Shift Sore. Bima dan Citra harus berada di shift yang sama. Dewa bertugas di Shift Pagi. Eka tidak mau bertugas di Shift Pagi atau Shift Siang. Siapakah teman shift Eka?","options":{"A":"Fani","B":"Aldi","C":"Bima","D":"Dewa","E":"Citra"},"answer":"A","explanation":"Berdasarkan analisis: Shift Sore diisi oleh Eka dan Fani. Maka teman shift Eka adalah Fani."},{"number":8,"question":"Enam pengemudi (Aldi, Bima, Citra, Dewa, Eka, Fani) dijadwalkan dalam tiga shift kerja: Shift Pagi, Shift Siang, dan Shift Sore. Setiap shift diisi oleh tepat dua pengemudi. Ketentuan: Aldi tidak mau bertugas di Shift Sore. Bima dan Citra harus berada di shift yang sama. Dewa bertugas di Shift Pagi. Eka tidak mau bertugas di Shift Pagi atau Shift Siang. Jika Bima tiba-tiba sakit dan digantikan oleh pengemudi cadangan bernama Gani, maka Gani bertugas di shift...","options":{"A":"Shift Pagi","B":"Shift Sore","C":"Shift Siang","D":"Shift Pagi atau Shift Siang","E":"Shift Siang atau Shift Sore"},"answer":"C","explanation":"Bima bertugas di Shift Siang. Jika Bima digantikan Gani, maka Gani mengisi posisi Bima di Shift Siang, bersama Citra."},{"number":9,"question":"Lima kapal kargo (Kapal A, B, C, D, E) akan melakukan bongkar muat di pelabuhan secara bergiliran (urutan 1 sampai 5). Ketentuan: Kapal C bongkar tepat setelah Kapal A (berurutan langsung). Kapal E bongkar sebelum Kapal B. Kapal D bongkar pada urutan pertama. Kapal B tidak bongkar pada urutan terakhir. Kapal yang melakukan bongkar muat pada urutan KEDUA adalah...","options":{"A":"Kapal A","B":"Kapal B","C":"Kapal C","D":"Kapal D","E":"Kapal E"},"answer":"E","explanation":"Kapal D di posisi 1. Paket A-C harus berurutan. Jika paket A-C di (4,5): sisa E dan B di 2 dan 3. E sebelum B, B tidak di 5. Valid. Urutan: D(1), E(2), B(3), A(4), C(5). Posisi kedua: Kapal E."},{"number":10,"question":"Lima kapal kargo (Kapal A, B, C, D, E) akan melakukan bongkar muat di pelabuhan secara bergiliran (urutan 1 sampai 5). Ketentuan: Kapal C bongkar tepat setelah Kapal A (berurutan langsung). Kapal E bongkar sebelum Kapal B. Kapal D bongkar pada urutan pertama. Kapal B tidak bongkar pada urutan terakhir. Kapal manakah yang bongkar muat tepat SEBELUM Kapal A?","options":{"A":"Kapal C","B":"Kapal B","C":"Kapal E","D":"Kapal D","E":"Tidak bisa ditentukan"},"answer":"B","explanation":"Urutan valid: D(1), E(2), B(3), A(4), C(5). Kapal yang berada tepat sebelum Kapal A di posisi 4 adalah Kapal B di posisi 3."},{"number":11,"question":"Lima moda transportasi diurutkan dari terlambat ke tercepat berdasarkan kecepatan rata-rata: Sepeda lebih lambat dari Sepeda Motor. Kereta lebih cepat dari Mobil. Sepeda Motor lebih lambat dari Mobil. Kereta lebih lambat dari Pesawat. Moda transportasi yang berada di urutan KETIGA (dari yang terlambat) adalah...","options":{"A":"Sepeda Motor","B":"Kereta","C":"Mobil","D":"Pesawat","E":"Sepeda"},"answer":"C","explanation":"Urutkan dari terlambat ke tercepat: Sepeda < Sepeda Motor < Mobil < Kereta < Pesawat. Urutan ketiga dari yang terlambat adalah Mobil."},{"number":12,"question":"Jarak tempuh bus antar kota (dalam km) tercatat setiap hari selama seminggu: 12, 19, 28, 39, 52, ... Jarak tempuh pada hari berikutnya adalah...","options":{"A":"67 km","B":"65 km","C":"69 km","D":"63 km","E":"71 km"},"answer":"A","explanation":"Selisih antar suku: 7, 9, 11, 13 (bertambah 2 setiap langkah). Selisih berikutnya = 15. Maka: 52 + 15 = 67 km."},{"number":13,"question":"Kapasitas penumpang per gerbong kereta berdasarkan konfigurasi baru mengikuti pola: 50, 100, 75, 150, 125, 250, 225, ... Angka berikutnya dalam pola ini adalah...","options":{"A":"400","B":"425","C":"475","D":"450","E":"440"},"answer":"D","explanation":"Pola bergantian: x2 lalu -25. Maka: 50x2=100, 100-25=75, 75x2=150, 150-25=125, 125x2=250, 25
