<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Latihan Psikotes MT Transjakarta</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  :root {
    --primary: #003F87;
    --primary-dark: #002D61;
    --primary-medium: #0066CC;
    --primary-light: #EBF4FB;
    --accent: #00AEEF;
    --bg: #F2F6FA;
    --surface: #FFFFFF;
    --text: #0D1F3C;
    --text-muted: #5B7A9D;
    --border: #D0E4F5;
    --success: #1A8F5A;
    --success-light: #E6F9F0;
    --danger: #EF4444;
    --danger-light: #FEE2E2;
    --warning: #D97706;
    --warning-light: #FFF8E6;
    --info: #0066CC;
    --info-light: #EBF4FB;
    --gold: #FFD700;
    --silver: #9CA3AF;
    --bronze: #CD7F32;
  }
  
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
    font-size: 14px;
  }
  
  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 24px;
  }
  
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    height: 56px;
    display: flex;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  
  header .container {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    gap: 12px;
    width: 100%;
  }
  
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    text-decoration: none;
  }
  .logo-icon {
    width: 34px;
    height: 34px;
    background: var(--primary);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .logo-icon svg { display: block; }
  .logo-text {
    display: flex;
    flex-direction: column;
    line-height: 1.2;
  }
  .logo-text-top {
    font-size: 15px;
    font-weight: 700;
    color: var(--primary);
    letter-spacing: -0.01em;
  }
  .logo-text-sub {
    font-size: 11px;
    font-weight: 500;
    color: var(--primary-medium);
    letter-spacing: 0.02em;
  }
  
  .header-right {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  
  .user-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    background: var(--primary);
    color: white;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
  }
  
  .card {
    background: var(--surface);
    border-radius: 10px;
    padding: 16px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    border: 1px solid var(--border);
  }
  
  .card + .card { margin-top: 12px; }
  
  /* Status Bar */
  .status-bar {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-medium) 100%);
    border-radius: 12px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    color: white;
    margin-bottom: 20px;
    min-height: 72px;
  }
  .status-bar-left {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }
  .status-bar-left h2 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.01em;
    line-height: 1.2;
    white-space: nowrap;
  }
  .status-bar-center {
    display: flex;
    align-items: center;
    gap: 12px;
    flex: 1;
    justify-content: center;
  }
  .progress-pill {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 6px 14px 6px 16px;
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
  }
  .mini-progress {
    width: 60px;
    height: 6px;
    background: rgba(255,255,255,0.25);
    border-radius: 3px;
    overflow: hidden;
  }
  .mini-progress-fill {
    height: 100%;
    background: white;
    border-radius: 3px;
    transition: width 0.3s;
  }
  .status-bar-right {
    display: flex;
    align-items: center;
    gap: 20px;
    flex-shrink: 0;
  }
  .status-stat {
    text-align: center;
  }
  .status-stat-num {
    font-size: 18px;
    font-weight: 700;
    line-height: 1.1;
  }
  .status-stat-label {
    font-size: 11px;
    opacity: 0.75;
    font-weight: 500;
  }
  
  .section-grid-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .section-grid-header h3 {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .section-grid-header .hint {
    font-size: 12px;
    color: var(--text-muted);
    opacity: 0.7;
  }
  
  .section-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    align-items: stretch;
  }

  /* Override global .card + .card margin — grid gap sudah handle spacing */
  .section-grid > .card + .card { margin-top: 0; }

  .section-card {
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-height: 130px;
  }
  
  .section-card:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(0,63,135,0.08);
  }
  
  .section-card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }
  
  .section-card h3 {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.3;
    color: var(--text);
  }
  
  .section-meta {
    display: flex;
    gap: 12px;
    color: var(--text-muted);
    font-size: 12px;
    flex-wrap: wrap;
  }
  
  .section-meta span {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  
  .section-card .btn {
    margin-top: auto;
    width: 100%;
  }
  
  .hist-pill {
    display: inline-flex;
    align-items: center;
    padding: 1px 7px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    line-height: 1.6;
  }
  .hist-green { background: var(--success-light); color: var(--success); }
  .hist-amber { background: var(--warning-light); color: var(--warning); }
  .hist-red { background: var(--danger-light); color: var(--danger); }
  
  .badge {
    display: inline-flex;
    align-items: center;
    padding: 3px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    flex-shrink: 0;
    line-height: 1.4;
  }
  
  .badge-pending { background: var(--info-light); color: var(--primary-medium); }
  .badge-progress { background: var(--warning-light); color: var(--warning); }
  .badge-done { background: var(--success-light); color: var(--success); }
  .badge-paused { background: #EDE9FE; color: #6D28D9; }
  
  .progress-bar {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  
  .progress-fill {
    height: 100%;
    background: var(--primary);
    transition: width 0.3s;
  }
  
  .btn {
    background: var(--primary);
    color: white;
    border: none;
    padding: 9px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease-out;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    text-decoration: none;
    font-family: inherit;
    line-height: 1.4;
  }
  
  .btn:hover { background: var(--primary-dark); }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  
  .btn-secondary {
    background: var(--surface);
    color: var(--text);
    border: 1.5px solid var(--border);
  }
  
  .btn-secondary:hover { background: var(--primary-light); border-color: var(--primary-medium); color: var(--primary-medium); }
  
  .btn-outline-blue {
    background: transparent;
    color: var(--primary-medium);
    border: 1.5px solid var(--primary-medium);
  }
  .btn-outline-blue:hover { background: var(--primary-light); }
  
  .btn-ghost {
    background: transparent;
    color: var(--text-muted);
    border: none;
  }
  .btn-ghost:hover { color: var(--text); background: #F3F5F8; }
  
  .btn-danger {
    background: var(--danger);
    color: white;
  }
  
  .btn-danger:hover { background: #DC2626; }
  
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .btn-lg { padding: 12px 20px; font-size: 15px; }
  .btn-block { width: 100%; }
  
  /* Form */
  .form-group {
    margin-bottom: 16px;
  }
  
  .form-group label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 6px;
    color: var(--text);
  }
  
  .form-input {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 15px;
    font-family: inherit;
    transition: border 0.15s;
    background: var(--surface);
    color: var(--text);
  }
  
  .form-input:focus {
    outline: none;
    border-color: var(--primary);
  }
  
  .form-error {
    background: var(--danger-light);
    color: var(--danger);
    padding: 10px 12px;
    border-radius: 6px;
    font-size: 13px;
    margin-bottom: 12px;
  }
  
  .form-help {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
  }
  
  .auth-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  
  .auth-tab {
    padding: 10px 16px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    color: var(--text-muted);
    font-family: inherit;
    margin-bottom: -1px;
  }
  
  .auth-tab.active {
    color: var(--primary);
    border-bottom-color: var(--primary);
  }
  
  /* Quiz UI */
  .quiz-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  
  .quiz-title {
    font-size: 20px;
    font-weight: 600;
  }
  
  .timer {
    font-family: 'Menlo', 'Monaco', monospace;
    font-size: 18px;
    font-weight: 700;
    background: var(--primary-light);
    color: var(--primary);
    padding: 8px 14px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  
  .timer.warning { background: #FEF3C7; color: #92400E; }
  .timer.danger {
    background: var(--danger-light);
    color: var(--danger);
    animation: pulse 1s infinite;
  }
  
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }
  
  .quiz-progress {
    margin-bottom: 16px;
    color: var(--text-muted);
    font-size: 14px;
  }
  
  .question-text {
    font-size: 16px;
    line-height: 1.6;
    margin-bottom: 20px;
    white-space: pre-wrap;
  }
  
  .question-image {
    max-width: 100%;
    height: auto;
    display: block;
    margin: 0 auto 20px;
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  
  .option {
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    background: var(--surface);
  }
  
  .option:hover {
    border-color: var(--primary);
    background: #FFFAF7;
  }
  
  .option.selected {
    border-color: var(--primary);
    background: var(--primary-light);
  }
  
  .option-letter {
    flex-shrink: 0;
    width: 28px;
    height: 28px;
    border-radius: 6px;
    background: var(--border);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 13px;
  }
  
  .option.selected .option-letter {
    background: var(--primary);
    color: white;
  }
  
  .option-text {
    flex: 1;
    line-height: 1.5;
    padding-top: 3px;
  }
  
  .nav-buttons {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }
  
  .question-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(40px, 1fr));
    gap: 8px;
    margin-top: 16px;
  }
  
  .q-num {
    aspect-ratio: 1;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  
  .q-num:hover { border-color: var(--primary); }
  .q-num.answered { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }
  .q-num.current { background: var(--primary); color: white; border-color: var(--primary); }
  .q-num.correct { background: var(--success-light); border-color: var(--success); color: var(--success); }
  .q-num.wrong { background: var(--danger-light); border-color: var(--danger); color: var(--danger); }
  .q-num.skipped { background: #F3F4F6; border-color: #D1D5DB; color: #9CA3AF; cursor: default; }
  .q-num.selected { box-shadow: 0 0 0 3px rgba(99,102,241,0.35); border-color: var(--primary) !important; }
  
  /* Result UI */
  .result-summary {
    text-align: center;
    padding: 28px 20px;
  }
  
  .score-circle {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    margin: 0 auto 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--primary-light);
    color: var(--primary);
  }
  
  .score-num {
    font-size: 36px;
    font-weight: 700;
    line-height: 1;
  }
  
  .score-label {
    font-size: 12px;
    margin-top: 4px;
    opacity: 0.8;
  }
  
  .result-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-top: 20px;
  }
  
  .stat {
    text-align: center;
    padding: 12px;
    border-radius: 8px;
    background: #F9FAFB;
  }
  
  .stat-num {
    font-size: 22px;
    font-weight: 700;
  }
  
  .stat-label {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
  }
  
  .review-item {
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 18px;
    margin-bottom: 14px;
  }
  
  .review-item.correct { border-color: var(--success); background: #F0FDF4; }
  .review-item.wrong { border-color: var(--danger); background: #FEF2F2; }
  .review-item.skipped { border-color: var(--warning); background: #FFFBEB; }
  
  .review-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    gap: 10px;
  }
  
  .review-num {
    font-weight: 700;
    font-size: 15px;
  }
  
  .review-status {
    font-size: 12px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 999px;
  }
  
  .review-status.correct { background: var(--success-light); color: var(--success); }
  .review-status.wrong { background: var(--danger-light); color: var(--danger); }
  .review-status.skipped { background: #FEF3C7; color: #92400E; }
  
  .review-question {
    margin: 10px 0;
    line-height: 1.5;
  }
  
  .review-options {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin: 10px 0;
  }
  
  .review-option {
    padding: 10px 12px;
    border-radius: 6px;
    background: white;
    border: 1px solid var(--border);
    font-size: 14px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  
  .review-option .option-letter {
    width: 22px;
    height: 22px;
    font-size: 11px;
  }
  
  .review-option.user-correct { border-color: var(--success); background: #ECFDF5; }
  .review-option.user-wrong { border-color: var(--danger); background: #FEF2F2; }
  .review-option.is-correct { border-color: var(--success); }
  .review-option.is-correct .option-letter { background: var(--success); color: white; }
  .review-option.user-wrong .option-letter { background: var(--danger); color: white; }
  
  .explanation {
    background: var(--info-light);
    border-left: 4px solid var(--info);
    padding: 12px 14px;
    margin-top: 12px;
    border-radius: 6px;
    font-size: 14px;
    line-height: 1.6;
  }
  
  .explanation strong { color: var(--info); }
  
  /* Leaderboard */
  .lb-tabs {
    display: flex;
    gap: 4px;
    overflow-x: auto;
    padding-bottom: 4px;
    margin-bottom: 16px;
    -webkit-overflow-scrolling: touch;
  }
  
  .lb-tab {
    padding: 8px 16px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    color: var(--text-muted);
    font-family: inherit;
    white-space: nowrap;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  
  .lb-tab.active {
    background: var(--primary);
    border-color: var(--primary);
    color: white;
  }
  
  .lb-table {
    width: 100%;
    border-collapse: collapse;
  }
  
  .lb-table th, .lb-table td {
    padding: 12px 14px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  
  .lb-table th {
    color: var(--text-muted);
    font-weight: 600;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    background: #F9FAFB;
  }
  
  .lb-table tr:last-child td { border-bottom: none; }
  
  .lb-table tr.current-user {
    background: var(--primary-light);
  }
  
  .lb-table tr.current-user td { font-weight: 600; }
  
  .lb-rank {
    width: 50px;
    font-weight: 700;
    font-size: 16px;
  }
  
  .lb-rank-1 { color: var(--gold); }
  .lb-rank-2 { color: #9CA3AF; }
  .lb-rank-3 { color: var(--bronze); }
  
  .lb-score {
    text-align: right;
    font-weight: 700;
    color: var(--primary);
  }
  
  .lb-empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
  }
  
  .lb-loading {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
  }
  
  /* Home layout 70/30 */
  .home-layout {
    display: grid;
    grid-template-columns: 7fr 3fr;
    gap: 20px;
    align-items: start;
  }
  .home-layout-main { min-width: 0; }
  .home-top-sticky {
    position: sticky;
    top: 56px;
    z-index: 50;
    background: var(--bg);
    padding-bottom: 4px;
  }
  .home-layout-side {
    min-width: 0;
    position: sticky;
    top: 68px;
    max-height: calc(100vh - 80px);
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  
  /* Leaderboard widget — flush sidebar panel */
  .lb-widget {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    position: sticky;
    top: 76px;
    overflow: hidden;
  }
  .lb-widget-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 14px 16px 10px;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
  }
  .lb-widget-header span { font-size: 16px; }
  .lb-widget .lb-tabs {
    display: flex;
    gap: 4px;
    padding: 0 16px 10px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .lb-widget .lb-tab {
    padding: 4px 10px;
    font-size: 11px;
    font-weight: 600;

  const QUIZ_DATA = {"verbal":{"title":"Tes Verbal","order":1,"type":"text","isBundled":true,"bundleIds":["verbal__paket_1","verbal__paket_2","verbal__paket_3","verbal__paket_4","verbal__paket_5","verbal__paket_6","verbal__paket_7","verbal__paket_8"]},"verbal__paket_1":{"title":"Verbal - Paket 1","duration":1800,"questions":[{"number": 1, "question": "SINONIM - ARMADA", "options": {"A": "Pasukan", "B": "Sekumpulan kendaraan", "C": "Jalur perjalanan", "D": "Kelengkapan mesin", "E": "Gudang pusat"}, "answer": "B", "explanation": "Dalam konteks Transjakarta, \"Armada\" merujuk pada seluruh unit bus yang dimiliki atau dioperasikan untuk melayani penumpang."},{"number": 2, "question": "SINONIM - INTEGRASI", "options": {"A": "Pemisahan", "B": "Penyatuan", "C": "Pengawasan", "D": "Pemeliharaan", "E": "Perluasan"}, "answer": "B", "explanation": "Transjakarta fokus pada \"Integrasi\" antarmoda (MRT, LRT, KRL), yang berarti penyatuan atau pembauran berbagai moda transportasi menjadi satu kesatuan sistem."},{"number": 3, "question": "SINONIM - MOBILITAS", "options": {"A": "Kelesuan", "B": "Kecepatan", "C": "Pergerakan", "D": "Kepadatan", "E": "Ketetapan"}, "answer": "C", "explanation": "Mobilitas adalah kemampuan atau kemudahan untuk bergerak/pindah dari satu tempat ke tempat lain, yang merupakan inti dari jasa transportasi publik."},{"number": 4, "question": "SINONIM - REVITALISASI", "options": {"A": "Pembangunan baru", "B": "Penghancuran total", "C": "Pemfungsian kembali", "D": "Penambahan biaya", "E": "Pengalihan rute"}, "answer": "C", "explanation": "Revitalisasi sering digunakan saat Transjakarta memperbaiki halte-halte lama agar kembali berfungsi maksimal dengan fasilitas lebih baik."},{"number": 5, "question": "SINONIM - EFISIENSI", "options": {"A": "Kehematan", "B": "Kekuatan", "C": "Ketepatan", "D": "Keberhasilan", "E": "Kecepatan"}, "answer": "A", "explanation": "Efisiensi dalam operasional bus artinya melakukan tugas dengan cara terbaik, tepat, dan hemat biaya/waktu tanpa membuang sumber daya."},{"number": 6, "question": "ANTONIM - STAGNASI", "options": {"A": "Hambatan", "B": "Kemacetan", "C": "Perkembangan", "D": "Kemunduran", "E": "Keseimbangan"}, "answer": "C", "explanation": "Stagnasi berarti keadaan berhenti atau tidak maju. Lawan kata yang paling tepat adalah Perkembangan atau kemajuan."},{"number": 7, "question": "ANTONIM - KONTINUITAS", "options": {"A": "Berkelanjutan", "B": "Terputus-putus", "C": "Berhubungan", "D": "Konsistensi", "E": "Berurutan"}, "answer": "B", "explanation": "Kontinuitas artinya kesinambungan atau kelangsungan. Lawan katanya adalah sesuatu yang terhenti atau terputus-putus."},{"number": 8, "question": "ANTONIM - KRUSIAL", "options": {"A": "Penting", "B": "Utama", "C": "Gawat", "D": "Sepele", "E": "Mendesak"}, "answer": "D", "explanation": "Krusial berarti sangat penting atau menentukan. Lawan katanya adalah sepele atau tidak penting."},{"number": 9, "question": "ANTONIM - AKOMODATIF", "options": {"A": "Membantu", "B": "Terbuka", "C": "Menutup diri", "D": "Responsif", "E": "Kooperatif"}, "answer": "C", "explanation": "Akomodatif artinya bersifat dapat menyesuaikan diri atau terbuka terhadap keinginan pihak lain. Lawan katanya adalah menutup diri atau kaku."},{"number": 10, "question": "ANTONIM - AKSESIBILITAS", "options": {"A": "Keterjangkauan", "B": "Kemudahan", "C": "Keterbatasan", "D": "Kedekatan", "E": "Kelancaran"}, "answer": "C", "explanation": "Aksesibilitas adalah kemudahan untuk dijangkau (misal: halte yang ramah disabilitas). Lawan katanya adalah keterbatasan atau hambatan untuk menjangkau. Sinonim – antonim (Kosakata Manajemen Strategis & Kebijakan Publik) Untuk soal 11-20, kosakata bakal lebih menjurus ke arah Manajemen Strategis dan Kebijakan Publik. Sebagai calon MT di Transjakarta, lo bakal sering ketemu istilah ini di rapat koordinasi atau dokumen perencanaan jangka panjang perusahaan."},{"number": 11, "question": "SINONIM - AKSELERASI", "options": {"A": "Perbaikan", "B": "Percepatan", "C": "Penghentian", "D": "Pemerataan", "E": "Pengalihan"}, "answer": "B", "explanation": "Transjakarta sering melakukan akselerasi program, misalnya percepatan pengadaan bus listrik untuk mencapai target emisi nol."},{"number": 12, "question": "SINONIM - FLUKTUASI", "options": {"A": "Gejala", "B": "Ketetapan", "C": "Gejolak", "D": "Penurunan", "E": "Perubahan"}, "answer": "C", "explanation": "Fluktuasi sering digunakan untuk menggambarkan jumlah penumpang yang naik-turun (tidak tetap) pada jam-jam tertentu."},{"number": 13, "question": "SINONIM - KOMPENSASI", "options": {"A": "Hadiah", "B": "Penggantian", "C": "Pinjaman", "D": "Keuntungan", "E": "Pajak"}, "answer": "B", "explanation": "Dalam operasional, kompensasi bisa merujuk pada ganti rugi kepada pihak ketiga atau tunjangan tambahan bagi karyawan atas kinerja tertentu."},{"number": 14, "question": "SINONIM - DISPARITAS", "options": {"A": "Persamaan", "B": "Perbedaan", "C": "Perpaduan", "D": "Kesepakatan", "E": "Keseimbangan"}, "answer": "B", "explanation": "Disparitas sering dibahas dalam konteks perbedaan layanan atau fasilitas antara satu koridor dengan koridor lainnya yang perlu disetarakan."},{"number": 15, "question": "SINONIM - IMPLEMENTASI", "options": {"A": "Perencanaan", "B": "Pengawasan", "C": "Pelaksanaan", "D": "Penilaian", "E": "Pengadaan"}, "answer": "C", "explanation": "Setelah strategi dibuat, langkah selanjutnya adalah implementasi atau mempraktekkan rencana tersebut di lapangan."},{"number": 16, "question": "ANTONIM - PROGRESIF", "options": {"A": "Maju", "B": "Aktif", "C": "Statis", "D": "Modern", "E": "Cepat"}, "answer": "C", "explanation": "Progresif artinya bersifat maju atau meningkat. Lawan katanya adalah statis (tetap/diam) atau regresif (mundur)."},{"number": 17, "question": "ANTONIM - INDEPENDEN", "options": {"A": "Mandiri", "B": "Bebas", "C": "Netral", "D": "Terikat", "E": "Otonom"}, "answer": "D", "explanation": "Sebagai BUMD, Transjakarta dituntut mandiri secara bisnis, namun secara regulasi tetap terikat pada kebijakan Pemerintah Provinsi DKI Jakarta."},{"number": 18, "question": "ANTONIM - PARSIAL", "options": {"A": "Sebagian", "B": "Menyeluruh", "C": "Terpisah", "D": "Terbatas", "E": "Tertentu"}, "answer": "B", "explanation": "Parsial artinya hanya sebagian atau tidak lengkap. Lawan katanya adalah komprehensif atau menyeluruh (integral)."},{"number": 19, "question": "ANTONIM - KOLEKTIF", "options": {"A": "Bersama", "B": "Kelompok", "C": "Gabungan", "D": "Individual", "E": "Serentak"}, "answer": "D", "explanation": "Kolektif berarti secara bersama-sama. Lawan katanya adalah individual atau perorangan."},{"number": 20, "question": "ANTONIM - PREVENTIF", "options": {"A": "Pencegahan", "B": "Penjagaan", "C": "Kuratif", "D": "Protektif", "E": "Antisipatif"}, "answer": "C", "explanation": "Preventif adalah tindakan pencegahan sebelum masalah terjadi (misal: perawatan bus rutin). Lawan katanya adalah kuratif atau tindakan pengobatan/perbaikan setelah masalah terjadi. Analogi Kata (Hubungan Makna) Di bagian ini, kita masuk ke Analogi Kata. Jenis soal ini tujuannya untuk mengukur kemampuan logika dan penalaran lo dalam melihat hubungan antara dua hal. Di Transjakarta, kemampuan ini penting banget buat memetakan masalah operasional, misal: hubungan antara kepadatan penumpang dengan ketersediaan bus."},{"number": 21, "question": "BUS : HALTE = KERETA : ...", "options": {"A": "Rel", "B": "Lokomotif", "C": "Stasiun", "D": "Masinis", "E": "Gerbong"}, "answer": "C", "explanation": "Bus berhenti untuk menaikkan/menurunkan penumpang di Halte, sebagaimana Kereta berhenti di Stasiun."},{"number": 22, "question": "SUPIR : SIM = PENUMPANG : ...", "options": {"A": "Bus", "B": "Kursi", "C": "Antrean", "D": "Tiket", "E": "Tujuan"}, "answer": "D", "explanation": "Syarat legal bagi Supir untuk membawa kendaraan adalah memiliki SIM, sedangkan syarat bagi Penumpang untuk menggunakan layanan adalah memiliki Tiket (atau kartu uang elektronik)."},{"number": 23, "question": "KEMACETAN : TRANSJAKARTA = WABAH : ...", "options": {"A": "Rumah Sakit", "B": "Dokter", "C": "Vaksin", "D": "Penyakit", "E": "Pasien"}, "answer": "C", "explanation": "Transjakarta adalah salah satu solusi/alat untuk mengurai kemacetan, sebagaimana Vaksin adalah alat untuk mengatasi atau mencegah wabah."},{"number": 24, "question": "KORIDOR : JALUR = RUTE : ...", "options": {"A": "Peta", "B": "Jarak", "C": "Arah", "D": "Tujuan", "E": "Lintasan"}, "answer": "E", "explanation": "Koridor identik dengan Jalur (area khusus), sedangkan Rute identik dengan Lintasan yang dilalui oleh bus."},{"number": 25, "question": "JPO (Jembatan Penyeberangan Orang) : PEJALAN KAKI = DERMAGA : ...", "options": {"A": "Kapal", "B": "Laut", "C": "Nelayan", "D": "Penumpang Kapal", "E": "Ikan"}, "answer": "D", "explanation": "JPO disediakan khusus untuk mobilitas Pejalan Kaki, sedangkan Dermaga disediakan untuk mobilitas Penumpang Kapal (atau subjek yang menyeberang lewat air)."}],"parentId":"verbal","bundleNum":1},"verbal__paket_2":{"title":"Verbal - Paket 2","duration":1800,"questions":[{"number": 26, "question": "MAINTENANCE : KERUSAKAN = PREVENTIF : ...", "options": {"A": "Perbaikan", "B": "Kecelakaan", "C": "Antisipasi", "D": "Perawatan", "E": "Keamanan"}, "answer": "B", "explanation": "Maintenance dilakukan untuk menangani kerusakan, sedangkan tindakan Preventif (pencegahan) dilakukan untuk menangani/menghindari Kecelakaan atau potensi bahaya."},{"number": 27, "question": "ELEKTRONIK : E-TICKETING = KONVENSIONAL : ...", "options": {"A": "Kertas", "B": "Tunai", "C": "Manual", "D": "Antre", "E": "Karcis"}, "answer": "E", "explanation": "E-ticketing adalah bentuk modern/elektronik dari tiket, sedangkan Karcis adalah bentuk tiket yang bersifat konvensional/fisik lama."},{"number": 28, "question": "JAKLINGKO : INTEGRASI = MRT : ...", "options": {"A": "Cepat", "B": "Bawah Tanah", "C": "Transportasi Publik", "D": "Rel", "E": "Modern"}, "answer": "C", "explanation": "JakLingko adalah sistem yang menjalankan fungsi Integrasi, sedangkan MRT adalah salah satu penyedia moda Transportasi Publik dalam ekosistem tersebut."},{"number": 29, "question": "HEADWAY : WAKTU TUNGGU = KAPASITAS : ...", "options": {"A": "Jumlah Kursi", "B": "Daya Tampung", "C": "Ukuran Bus", "D": "Berat Beban", "E": "Panjang Kendaraan"}, "answer": "B", "explanation": "Headway adalah istilah teknis untuk selisih Waktu Tunggu antar armada, sedangkan Kapasitas adalah istilah teknis untuk Daya Tampung muatan/penumpang."},{"number": 30, "question": "OPERATOR : BUS = MASINIS : ...", "options": {"A": "Rel", "B": "Listrik", "C": "Gerbong", "D": "Kereta Api", "E": "Penumpang"}, "answer": "D", "explanation": "Operator (dalam konteks Transjakarta) adalah pihak yang menjalankan/mengelola Bus, sedangkan Masinis adalah orang yang menjalankan Kereta Api. Pemahaman Wacana. Di tes MT Transjakarta, lo bakal disuguhin teks panjang soal rencana strategis, kebijakan integrasi, atau laporan operasional. Kemampuan lo buat nangkep Ide Pokok, Simpulan, dan Detail Tersirat diuji banget di sini. Teks untuk Soal Nomor 31 - 35 PT Transportasi Jakarta terus mengakselerasi transformasi armada menuju kendaraan ramah lingkungan dengan menargetkan transisi bus listrik secara penuh pada tahun 2030. Langkah ini selaras dengan kebijakan Pemerintah Provinsi DKI Jakarta untuk menekan emisi karbon dan polusi udara. Selain pengadaan unit baru, tantangan utama yang dihadapi adalah pembangunan infrastruktur pengisian daya (charging station) yang harus tersebar merata di berbagai depo. Integrasi sistem pembayaran dan kemudahan aksesibilitas antar-koridor tetap menjadi prioritas utama guna memastikan bahwa perpindahan teknologi ini tidak mengurangi kenyamanan layanan bagi pengguna setia JakLingko."},{"number": 31, "question": "Ide pokok dari wacana di atas adalah...", "options": {"A": "Pembangunan infrastruktur charging station di seluruh depo Jakarta.", "B": "Target penggunaan bus listrik Transjakarta secara menyeluruh di tahun 2030.", "C": "Kerja sama antara Pemprov DKI dan Transjakarta soal polusi.", "D": "Keunggulan sistem pembayaran JakLingko di era bus listrik.", "E": "Penekanan emisi karbon melalui pengurangan armada bus lama."}, "answer": "B", "explanation": "Kalimat pertama menjelaskan fokus utama teks, yaitu target transisi bus listrik penuh pada tahun 2030."},{"number": 32, "question": "Berdasarkan teks, apa tantangan terbesar dalam transisi ke bus listrik?", "options": {"A": "Harga unit bus listrik yang terlalu mahal.", "B": "Menurunnya jumlah pengguna setia JakLingko.", "C": "Pemerataan pembangunan infrastruktur pengisian daya.", "D": "Kurangnya dukungan dari Pemerintah Provinsi DKI Jakarta.", "E": "Proses integrasi antar-koridor yang rumit."}, "answer": "C", "explanation": "Teks menyebutkan secara eksplisit: \"tantangan utama yang dihadapi adalah pembangunan infrastruktur pengisian daya (charging station) yang harus tersebar merata\"."},{"number": 33, "question": "Kata \"Akselerasi\" dalam teks tersebut memiliki makna yang paling dekat dengan...", "options": {"A": "Perencanaan", "B": "Pengawasan", "C": "Percepatan", "D": "Perubahan", "E": "Peningkatan"}, "answer": "C", "explanation": "Akselerasi berarti proses mempercepat atau percepatan suatu kegiatan/program."},{"number": 34, "question": "Apa tujuan utama dari kebijakan transisi bus listrik menurut teks tersebut?", "options": {"A": "Meningkatkan laba perusahaan di tahun 2030.", "B": "Memperluas jangkauan rute hingga ke luar Jakarta.", "C": "Mengurangi emisi karbon dan polusi udara di Jakarta.", "D": "Mempermudah sistem integrasi pembayaran digital.", "E": "Mengganti seluruh supir bus dengan sistem otomatis."}, "answer": "C", "explanation": "Disebutkan bahwa langkah tersebut selaras dengan kebijakan untuk menekan emisi karbon dan polusi udara."},{"number": 35, "question": "Manakah pernyataan yang TIDAK sesuai dengan isi teks di atas?", "options": {"A": "Transjakarta tetap mengutamakan kenyamanan layanan selama masa transisi.", "B": "Bus listrik ditargetkan beroperasi penuh dalam kurang dari sepuluh tahun dari sekarang (2026 ke 2030).", "C": "Charging station hanya akan dibangun di depo-depo tertentu saja.", "D": "Integrasi sistem pembayaran termasuk dalam prioritas perusahaan.", "E": "Kebijakan ini didukung oleh Pemerintah Provinsi DKI Jakarta."}, "answer": "C", "explanation": "Teks menyatakan charging station \"harus tersebar merata\", bukan hanya di depo tertentu. Teks untuk Soal Nomor 36 - 40 Strategi integrasi antarmoda melalui sistem JakLingko telah berhasil meningkatkan efisiensi waktu tempuh penumpang hingga 15%. Keberhasilan ini didorong oleh sinkronisasi jadwal antara bus Transjakarta dengan moda transportasi berbasis rel seperti MRT dan LRT. Namun, evaluasi terbaru menunjukkan adanya bottleneck atau penumpukan penumpang pada beberapa titik halte transit utama pada jam sibuk. Hal ini disebabkan oleh selisih waktu kedatangan bus (headway) yang belum konsisten. Manajemen berencana menerapkan sistem pemantauan berbasis AI untuk mengatur distribusi armada secara real-time."},{"number": 36, "question": "Apa dampak positif dari sistem JakLingko menurut teks?", "options": {"A": "Penurunan harga tiket hingga 15%.", "B": "Peningkatan jumlah armada bus secara signifikan.", "C": "Efisiensi waktu tempuh perjalanan bagi penumpang.", "D": "Penghapusan seluruh titik kemacetan di Jakarta.", "E": "Penggunaan AI di seluruh halte transit."}, "answer": "C", "explanation": "Paragraf pertama menyebutkan keberhasilan meningkatkan efisiensi waktu tempuh hingga 15%."},{"number": 37, "question": "Masalah utama yang masih ditemukan di lapangan berdasarkan evaluasi adalah...", "options": {"A": "Kurangnya minat masyarakat menggunakan MRT dan LRT.", "B": "Penumpukan penumpang di halte transit utama saat jam sibuk.", "C": "Kegagalan sistem pembayaran JakLingko di halte utama.", "D": "Ketidakmampuan AI dalam memantau jadwal bus.", "E": "Jarak halte yang terlalu jauh bagi pejalan kaki."}, "answer": "B", "explanation": "Teks menyebutkan munculnya bottleneck atau penumpukan penumpang di titik halte transit utama."},{"number": 38, "question": "Apa penyebab terjadinya penumpukan penumpang di halte?", "options": {"A": "Kerusakan mesin pada bus-bus lama.", "B": "Kurangnya petugas keamanan di halte transit.", "C": "Jadwal kedatangan bus (headway) yang belum konsisten.", "D": "Terlalu banyaknya orang yang berpindah ke moda rel.", "E": "Sistem pembayaran yang masih manual."}, "answer": "C", "explanation": "Teks menyatakan: \"Hal ini disebabkan oleh selisih waktu kedatangan bus (headway) yang belum konsisten.\""},{"number": 39, "question": "Solusi yang direncanakan manajemen untuk mengatasi masalah tersebut adalah...", "options": {"A": "Menambah jumlah halte di area pemukiman.", "B": "Menghapus rute-rute yang sepi penumpang.", "C": "Menerapkan sistem pemantauan berbasis AI untuk distribusi armada.", "D": "Menaikkan tarif tiket pada jam-jam sibuk.", "E": "Mengganti seluruh direksi manajemen operasional."}, "answer": "C", "explanation": "Kalimat terakhir menyebutkan rencana penerapan sistem pemantauan berbasis AI secara real-time."},{"number": 40, "question": "Makna istilah \"Bottleneck\" dalam konteks teks tersebut adalah...", "options": {"A": "Kelancaran lalu lintas bus.", "B": "Jalur khusus yang menyempit.", "C": "Titik kemacetan atau penyumbatan aliran.", "D": "Wadah penampungan air di halte.", "E": "Penurunan jumlah pengguna layanan."}, "answer": "C", "explanation": "Dalam operasional, bottleneck merujuk pada titik di mana proses terhambat sehingga terjadi penumpukan atau penyumbatan. Campuran semua subtest"},{"number": 41, "question": "SINONIM - VITAL", "options": {"A": "Tambahan", "B": "Darurat", "C": "Sangat Penting", "D": "Pendukung", "E": "Berkala"}, "answer": "C", "explanation": "Aspek keselamatan adalah hal yang \"Vital\" dalam operasional transportasi publik, artinya sangat penting atau mendasar bagi kelangsungan layanan."},{"number": 42, "question": "ANTONIM - PARADOKS", "options": {"A": "Keanehan", "B": "Kesesuaian", "C": "Pertentangan", "D": "Perbedaan", "E": "Kesalahan"}, "answer": "B", "explanation": "Paradoks adalah situasi yang seolah-olah bertentangan dengan pendapat umum atau kebenaran. Lawan katanya adalah kesesuaian atau harmoni."},{"number": 43, "question": "ANALOGI - JADWAL : KETERLAMBATAN = REGULASI : ...", "options": {"A": "Aturan", "B": "Pelanggaran", "C": "Hukum", "D": "Sanksi", "E": "Kepatuhan"}, "answer": "B", "explanation": "Jika Jadwal tidak dipatuhi maka terjadi Keterlambatan, jika Regulasi tidak dipatuhi maka terjadi Pelanggaran."},{"number": 44, "question": "ANALOGI - STASIUN : HUB = HALTE : ...", "options": {"A": "Terminal", "B": "Koridor", "C": "Shelter", "D": "Bus", "E": "Antrean"}, "answer": "C", "explanation": "Dalam istilah teknis transportasi, Stasiun bertindak sebagai Hub (pusat koneksi), sedangkan Halte sering disebut juga sebagai Shelter (tempat berteduh/pemberhentian)."},{"number": 45, "question": "SINONIM - KOMPREHENSIF", "options": {"A": "Singkat", "B": "Menyeluruh", "C": "Rumit", "D": "Terbatas", "E": "Terpadu"}, "answer": "B", "explanation": "Perencanaan MT Transjakarta harus bersifat komprehensif, mencakup seluruh aspek dari operasional hingga finansial. Teks untuk Soal Nomor 46 - 50 Dalam upaya meningkatkan standar layanan, PT Transportasi Jakarta memberlakukan sistem Key Performance Indicator (KPI) yang ketat bagi seluruh mitra operator bus. KPI ini mencakup tingkat kebersihan armada, keramahan petugas, hingga ketepatan waktu kedatangan di halte. Mitra yang gagal memenuhi standar minimum secara berturut-turut akan dikenakan sanksi berupa pemotongan biaya layanan atau bahkan pemutusan kontrak kerja sama. Langkah preventif ini diambil untuk menjamin hak penumpang dalam mendapatkan transportasi yang aman dan layak di seluruh koridor JakLingko."},{"number": 46, "question": "Apa tujuan utama dari pemberlakuan KPI menurut teks tersebut?", "options": {"A": "Mengurangi jumlah mitra operator bus agi operator.", "D": "Penggunaan AI untuk memantau pergerakan bus.", "E": "Sosialisasi penggunaan kartu JakLingko kepada warga."}, "answer": "C", "explanation": "Langkah preventif (pencegahan penurunan kualitas) yang dibahas dalam teks adalah penerapan KPI dan konsekuensinya."}],"parentId":"verbal","bundleNum":2},"verbal__paket_3":{"title":"Verbal - Paket 3","duration":1800,"questions":[{"number":1,"question":"SINONIM - TRAYEK","options":{"A":"Rute","B":"Armada","C":"Jadwal","D":"Bagasi","E":"Terminal"},"answer":"A","explanation":"Trayek adalah garis perjalanan atau rute yang dilalui oleh kendaraan angkutan umum secara tetap."},{"number":2,"question":"SINONIM - BIAYA","options":{"A":"Kerugian","B":"Ongkos","C":"Hutang","D":"Laba","E":"Pajak"},"answer":"B","explanation":"Biaya (cost) sangat bersinonim dengan ongkos yang harus dikeluarkan untuk menjalankan layanan."},{"number":3,"question":"SINONIM - DEPO","options":{"A":"Stasiun","B":"Pabrik","C":"Garasi","D":"Jalur","E":"Halte"},"answer":"C","explanation":"Depo adalah tempat penyimpanan, perawatan, atau perbaikan armada. Sinonim terdekatnya adalah garasi."},{"number":4,"question":"SINONIM - SUBSIDI","options":{"A":"Pendapatan","B":"Potongan","C":"Tagihan","D":"Bantuan","E":"Tarif"},"answer":"D","explanation":"Subsidi adalah bantuan uang dari pemerintah untuk meringankan beban masyarakat."},{"number":5,"question":"SINONIM - EMISI","options":{"A":"Polusi","B":"Asap","C":"Limbah","D":"Cairan","E":"Gas Buang"},"answer":"E","explanation":"Dalam konteks kendaraan bermotor, emisi merujuk pada gas buang yang dihasilkan dari proses pembakaran mesin."},{"number":6,"question":"SINONIM - OPTIMAL","options":{"A":"Terbaik","B":"Banyak","C":"Cukup","D":"Sedang","E":"Terbatas"},"answer":"A","explanation":"Optimal berarti terbaik, tertinggi, atau paling menguntungkan."},{"number":7,"question":"SINONIM - REGULASI","options":{"A":"Kesepakatan","B":"Peraturan","C":"Kebijakan","D":"Tuntutan","E":"Undangan"},"answer":"B","explanation":"Regulasi adalah aturan atau peraturan yang dibuat oleh pihak berwenang."},{"number":8,"question":"SINONIM - INFRASTRUKTUR","options":{"A":"Kendaraan","B":"Fasilitas","C":"Prasarana","D":"Struktur","E":"Jaringan"},"answer":"C","explanation":"Infrastruktur berarti prasarana, yaitu segala sesuatu yang merupakan penunjang utama terselenggaranya suatu proses."},{"number":9,"question":"SINONIM - EVALUASI","options":{"A":"Pengawasan","B":"Penindakan","C":"Perencanaan","D":"Penilaian","E":"Pengujian"},"answer":"D","explanation":"Evaluasi berarti penilaian terhadap kinerja atau proses yang telah berjalan."},{"number":10,"question":"SINONIM - KOMUTER","options":{"A":"Penduduk","B":"Pendatang","C":"Wisatawan","D":"Pejalan Kaki","E":"Penglaju"},"answer":"E","explanation":"Komuter adalah orang yang bepergian ke suatu kota untuk bekerja setiap hari. Padanan kata Indonesianya adalah Penglaju."},{"number":11,"question":"ANTONIM - DINAMIS","options":{"A":"Statis","B":"Cepat","C":"Agresif","D":"Labil","E":"Aktif"},"answer":"A","explanation":"Dinamis artinya penuh semangat dan cepat bergerak. Lawan katanya adalah statis (diam, tidak berubah)."},{"number":12,"question":"ANTONIM - EKSPANSI","options":{"A":"Perluasan","B":"Penyusutan","C":"Penambahan","D":"Penggabungan","E":"Pembelian"},"answer":"B","explanation":"Ekspansi berarti perluasan. Lawan kata yang paling tepat adalah penyusutan atau pengecilan."},{"number":13,"question":"ANTONIM - SIGNIFIKAN","options":{"A":"Nyata","B":"Besar","C":"Sepele","D":"Penting","E":"Menyeluruh"},"answer":"C","explanation":"Signifikan artinya penting atau berarti. Lawan katanya adalah sepele (tidak penting)."},{"number":14,"question":"ANTONIM - MAYORITAS","options":{"A":"Keseluruhan","B":"Sebagian","C":"Umum","D":"Minoritas","E":"Khusus"},"answer":"D","explanation":"Mayoritas adalah jumlah terbanyak. Lawan katanya adalah minoritas."},{"number":15,"question":"ANTONIM - KEDATANGAN","options":{"A":"Perjalanan","B":"Perhentian","C":"Kunjungan","D":"Ketibaan","E":"Keberangkatan"},"answer":"E","explanation":"Dalam sistem operasional halte/stasiun, kedatangan (arrival) selalu dilawankan dengan keberangkatan (departure)."},{"number":16,"question":"ANTONIM - MIKRO","options":{"A":"Makro","B":"Besar","C":"Luas","D":"Panjang","E":"Mayor"},"answer":"A","explanation":"Mikro artinya kecil atau dalam skala sempit. Lawan katanya adalah Makro (skala besar)."},{"number":17,"question":"ANTONIM - DOMESTIK","options":{"A":"Lokal","B":"Internasional","C":"Nasional","D":"Regional","E":"Provinsi"},"answer":"B","explanation":"Domestik berhubungan dengan masalah dalam negeri. Lawan katanya adalah internasional (luar negeri)."},{"number":18,"question":"ANTONIM - FLUKTUATIF","options":{"A":"Labil","B":"Berubah-ubah","C":"Stabil","D":"Konsisten","E":"Menurun"},"answer":"C","explanation":"Fluktuatif adalah kondisi yang naik-turun. Lawan katanya adalah stabil (tetap/tidak goyah)."},{"number":19,"question":"ANTONIM - EKSKLUSIF","options":{"A":"Mewah","B":"Khusus","C":"Tertutup","D":"Umum","E":"Pribadi"},"answer":"D","explanation":"Eksklusif berarti terpisah atau khusus. Lawan katanya adalah umum (terbuka untuk semua)."},{"number":20,"question":"ANTONIM - KONVENSIONAL","options":{"A":"Tradisional","B":"Biasa","C":"Manual","D":"Kuno","E":"Modern"},"answer":"E","explanation":"Konvensional berarti sesuai kebiasaan lama. Lawan katanya adalah modern (mutakhir/baru)."},{"number":21,"question":"ANALOGI - TIKET : PENUMPANG = SIM : ...","options":{"A":"Pengemudi","B":"Kendaraan","C":"Polisi","D":"Jalan Raya","E":"Tilang"},"answer":"A","explanation":"Dokumen wajib bagi PENUMPANG adalah TIKET. Dokumen wajib bagi PENGEMUDI adalah SIM."},{"number":22,"question":"ANALOGI - KERETA : MASINIS = KAPAL : ...","options":{"A":"Pilot","B":"Nahkoda","C":"Kondektur","D":"Supir","E":"Pramugari"},"answer":"B","explanation":"Orang yang mengendalikan KERETA adalah MASINIS. Orang yang mengendalikan KAPAL adalah NAHKODA."},{"number":23,"question":"ANALOGI - JALAN RAYA : ASPAL HAN : ...","options":{"A":"Sungai","B":"Udara","C":"Gunung","D":"Rel","E":"Laut"},"answer":"E","explanation":"TERMINAL adalah simpul transportasi untuk jalur DARAT. PELABUHAN adalah simpul transportasi untuk jalur LAUT."},{"number":6,"question":"PEMAHAMAN - (Bacaan ITS) Ide pokok dari paragraf pertama wacana ITS adalah...","options":{"A":"Penerapan ITS untuk meningkatkan efisiensi lalu lintas","B":"Cara kerja lampu lalu lintas statis di persimpangan","C":"Anggaran Dinas Perhubungan untuk teknologi kamera","D":"Kemacetan lalu lintas yang semakin parah di ibu kota","E":"Pentingnya timer waktu baku pada lampu lalu lintas"},"answer":"A","explanation":"Paragraf pertama berfokus pada rencana perluasan Sistem Transportasi Cerdas (ITS) yang memanfaatkan teknologi untuk kelancaran lalu lintas."},{"number":7,"question":"PEMAHAMAN - (Bacaan ITS) Berdasarkan teks, apa tujuan utama dari implementasi ITS?","options":{"A":"Memasang sensor kamera di seluruh persimpangan ibu kota","B":"Mengurangi durasi keterlambatan dan antrean kendaraan","C":"Menggantikan tugas polisi lalu lintas di persimpangan","D":"Mendenda pengemudi yang melanggar lampu merah","E":"Membatasi jumlah kendaraan pribadi yang masuk ke kota"},"answer":"B","explanation":"Teks secara eksplisit menyebutkan tujuan utama ITS adalah mengurangi durasi keterlambatan kendaraan dan mengurai antrean panjang."},{"number":8,"question":"PEMAHAMAN - (Bacaan ITS) Kata \"Prioritas\" pada kalimat terakhir memiliki makna yang paling dekat dengan...","options":{"A":"Kewajiban","B":"Kelancaran","C":"Keutamaan","D":"Kecepatan","E":"Keteraturan"},"answer":"C","explanation":"Prioritas berarti keadaan yang didahulukan atau diutamakan dari yang lain. Sinonim terdekatnya adalah keutamaan."},{"number":9,"question":"PEMAHAMAN - (Bacaan ITS) Apa yang memicu sistem ITS memberikan durasi lampu hijau yang lebih lama?","options":{"A":"Adanya jadwal rutin dari Dinas Perhubungan setiap pagi","B":"Tingginya angka kecelakaan di persimpangan tersebut","C":"Instruksi manual dari operator di pusat kendali lalu lintas","D":"Deteksi antrean kendaraan yang panjang oleh sensor kamera","E":"Kerusakan pada timer lampu lalu lintas konvensional"},"answer":"D","explanation":"Disebutkan dalam teks: \"Apabila sensor mendeteksi antrean panjang di satu sisi persimpangan, sistem akan secara otomatis memberikan durasi lampu hijau yang lebih panjang\"."},{"number":10,"question":"PEMAHAMAN - (Bacaan ITS) Manakah pernyataan yang TIDAK SESUAI dengan isi wacana ITS?","options":{"A":"Sistem ITS menyesuaikan lampu lalu lintas berdasarkan kepadatan","B":"Bus BRT mendapatkan kemudahan berupa lampu hijau saat di persimpangan","C":"ITS menggunakan kecerdasan buatan dan kamera sensor","D":"Lampu lalu lintas statis bekerja berdasarkan timer waktu yang baku","E":"ITS dapat menambah volume kendaraan yang masuk ke area persimpangan"},"answer":"E","explanation":"Teks tidak menyatakan bahwa ITS menambah volume kendaraan. ITS berfungsi untuk mendeteksi volume dan mengurai antrean."},{"number":11,"question":"PEMAHAMAN - (Bacaan Face Recognition) Ide pokok paragraf pertama wacana Face Recognition adalah...","options":{"A":"Inovasi sistem pembayaran transportasi menggunakan Face Recognition dan QR","B":"Cara menggunakan aplikasi resmi transportasi publik","C":"Bahaya kebocoran pendapatan bagi operator transportasi","D":"Pentingnya menjaga higienitas selama menggunakan transportasi","E":"Penggunaan dompet digital yang semakin meluas di masyarakat"},"answer":"A","explanation":"Paragraf pertama menceritakan gagasan utama tentang transisi menuju sistem pembayaran cardless (pindai wajah dan kode QR) di transportasi publik."},{"number":12,"question":"PEMAHAMAN - (Bacaan Face Recognition) Berdasarkan wacana, apa manfaat paling nyata dari teknologi pindai wajah di halte?","options":{"A":"Menurunkan harga tiket secara signifikan bagi pengguna baru","B":"Mempercepat proses masuk (gate in) hingga kurang dari 1 detik","C":"Mengubah seluruh halte bawah tanah menjadi lebih modern","D":"Memaksa pengguna untuk selalu membawa ponsel pintar","E":"Menghilangkan kebutuhan akan petugas keamanan di halte"},"answer":"B","explanation":"Disebutkan di paragraf kedua: teknologi pindai wajah dapat memverifikasi identitas dalam hitungan kurang dari 1 detik."},{"number":13,"question":"PEMAHAMAN - (Bacaan Face Recognition) Apa tantangan utama yang masih dihadapi dalam penerapan teknologi ini?","options":{"A":"Penolakan dari penumpang yang sudah terbiasa memakai kartu","B":"Harga mesin pindai wajah yang dinilai terlalu mahal","C":"Kendala sinyal atau infrastruktur internet di halte bawah tanah","D":"Sistem dompet digital yang sering mengalami peretasan","E":"Kewajiban penumpang untuk mendaftar akun baru berulang kali"},"answer":"C","explanation":"Kalimat terakhir paragraf kedua menyebutkan kendala infrastruktur jaringan internet di beberapa titik halte bawah tanah."},{"number":14,"question":"PEMAHAMAN - (Bacaan Face Recognition) Kata \"Transisi\" dalam teks tersebut bersinonim dengan...","options":{"A":"Penghentian","B":"Percepatan","C":"Pengurangan","D":"Peralihan","E":"Pembatalan"},"answer":"D","explanation":"Transisi berarti peralihan dari suatu keadaan ke keadaan lainnya."},{"number":15,"question":"PEMAHAMAN - (Bacaan Face Recognition) Kesimpulan yang paling tepat dari keseluruhan wacana Face Recognition adalah...","options":{"A":"Pembayaran kartu fisik akan segera dilarang sepenuhnya oleh pemerintah tahun depan","B":"Face Recognition hanya cocok diterapkan di halte yang memiliki koneksi internet bawah tanah","C":"Inovasi Face Recognition mempercepat layanan, namun masih memerlukan perbaikan infrastruktur jaringan","D":"Kebocoran pendapatan perusahaan telah berhasil dihentikan 100% berkat sistem baru ini","E":"Teknologi baru mempercepat dan memudahkan layanan, namun implementasinya masih membutuhkan perbaikan infrastruktur jaringan"},"answer":"E","explanation":"Teks menyimpulkan teknologi baru memudahkan dan mempercepat, namun masih ada kendala internet yang perlu diatasi."},{"number":16,"question":"SINONIM - TARIF","options":{"A":"Harga atau biaya layanan","B":"Jadwal keberangkatan","C":"Rute perjalanan","D":"Kapasitas kendaraan","E":"Izin operasional"},"answer":"A","explanation":"Tarif adalah harga atau biaya yang dikenakan kepada pengguna layanan transportasi sebagai imbalan atas jasa yang diterima."},{"number":17,"question":"SINONIM - KORIDOR","options":{"A":"Terminal bus","B":"Jalur atau lintasan khusus angkutan umum","C":"Halte pemberhentian","D":"Depo penyimpanan","E":"Garasi kendaraan"},"answer":"B","explanation":"Koridor dalam konteks transportasi publik merujuk pada jalur atau lintasan khusus yang dilewati armada bus."},{"number":18,"question":"SINONIM - DEPO (Set2)","options":{"A":"Halte transit penumpang","B":"Kantor pusat operasional","C":"Fasilitas penyimpanan dan perawatan armada","D":"Terminal utama penumpang","E":"Pos keamanan lapangan"},"answer":"C","explanation":"Depo adalah fasilitas tempat armada kendaraan disimpan, dirawat, dan disiapkan sebelum beroperasi."},{"number":19,"question":"SINONIM - FREKUENSI (LAYANAN)","options":{"A":"Kecepatan laju kendaraan","B":"Jarak tempuh per trip","C":"Biaya operasional harian","D":"Intensitas atau kepadatan jadwal layanan","E":"Jumlah total armada"},"answer":"D","explanation":"Frekuensi layanan mengacu pada seberapa sering kendaraan beroperasi dalam satu satuan waktu."},{"number":20,"question":"SINONIM - TRANSIT","options":{"A":"Keberangkatan awal","B":"Kedatangan akhir","C":"Pembayaran tiket","D":"Rute utama langsung","E":"Perpindahan atau singgah sementara"},"answer":"E","explanation":"Transit berarti perpindahan atau singgah sementara di suatu titik sebelum melanjutkan perjalanan."},{"number":21,"question":"SINONIM - KAPASITAS","options":{"A":"Kecepatan maksimum armada","B":"Daya tampung muatan atau penumpang","C":"Panjang rute yang dilayani","D":"Biaya pengadaan kendaraan","E":"Efisiensi konsumsi bahan bakar"},"answer":"B","explanation":"Ka ental","D":"Rutin","E":"Berulang"},"answer":"C","explanation":"Reguler berarti teratur dan terjadwal. Lawan katanya adalah sesuatu yang tidak teratur atau bersifat insidental."},{"number":2,"question":"ANTONIM - OPTIMAL (Set2)","options":{"A":"Kurang maksimal atau tidak efisien","B":"Efisien","C":"Terbaik","D":"Sempurna","E":"Terpadu"},"answer":"A","explanation":"Optimal berarti kondisi terbaik atau paling efisien. Lawan katanya adalah kondisi yang kurang maksimal atau tidak efisien."},{"number":3,"question":"ANTONIM - TERPUSAT","options":{"A":"Nasional","B":"Terdesentralisasi atau tersebar ke banyak titik","C":"Terpadu","D":"Terhubung","E":"Terintegrasi"},"answer":"B","explanation":"Terpusat berarti dikelola pada satu pusat. Lawan katanya adalah terdesentralisasi atau tersebar ke beberapa titik."},{"number":4,"question":"ANTONIM - PRIORITAS (Set2)","options":{"A":"Kebijakan umum","B":"Program rutin","C":"Rencana jangka panjang","D":"Strategi operasional","E":"Hal yang tidak diutamakan atau dikesampingkan"},"answer":"E","explanation":"Prioritas berarti sesuatu yang diutamakan. Lawan katanya adalah sesuatu yang dikesampingkan atau tidak diutamakan."},{"number":5,"question":"ANTONIM - EKSPANSI (Set2)","options":{"A":"Pertumbuhan jaringan","B":"Pengembangan koridor","C":"Perluasan rute","D":"Pengurangan atau penyusutan layanan","E":"Pembangunan infrastruktur"},"answer":"D","explanation":"Ekspansi berarti perluasan atau pengembangan. Lawan katanya adalah pengurangan atau penyusutan."},{"number":6,"question":"ANTONIM - SINKRON","options":{"A":"Terpadu","B":"Tidak selaras atau tidak serempak","C":"Bersamaan","D":"Sejajar","E":"Terhubung"},"answer":"B","explanation":"Sinkron berarti selaras dan serempak. Lawan katanya adalah tidak selaras atau tidak serempak."},{"number":7,"question":"ANTONIM - EFEKTIF","options":{"A":"Berhasil","B":"Produktif","C":"Tidak mencapai hasil atau tidak berdampak","D":"Bermanfaat","E":"Tepat sasaran"},"answer":"C","explanation":"Efektif berarti n standar","B":"Perekrutan karyawan","C":"Pelatihan pengemudi","D":"Penghargaan prestasi","E":"Pemeriksaan secara teliti"},"answer":"E","explanation":"Inspeksi adalah pemeriksaan secara saksama untuk memastikan segala sesuatu sesuai standar keamanan."}],"parentId":"verbal","bundleNum":5},"verbal__paket_6":{"title":"Verbal - Paket 6","duration":1800,"questions":[{"number":1,"question":"SINONIM - AKSELERASI","options":{"A":"Percepatan atau peningkatan laju","B":"Pengereman mendadak","C":"Pengalihan rute jalan","D":"Batas maksimal muatan","E":"Mundurnya jadwal keberangkatan"},"answer":"A","explanation":"Akselerasi berarti proses mempercepat atau percepatan, baik dalam konteks kecepatan kendaraan maupun percepatan program transportasi."},{"number":2,"question":"SINONIM - VANDALISME","options":{"A":"Pelayanan prima kepada pelanggan","B":"Pemeliharaan fasilitas publik","C":"Kepatuhan terhadap rambu-rambu","D":"Perusakan fasilitas umum","E":"Penertiban lalu lintas"},"answer":"D","explanation":"Vandalisme adalah perbuatan merusak atau menghancurkan fasilitas umum, seperti mencoret-coret halte bus."},{"number":3,"question":"SINONIM - REHABILITASI","options":{"A":"Penghancuran bangunan","B":"Perbaikan atau pemulihan keadaan semula","C":"Penambahan armada baru","D":"Penjualan aset perusahaan","E":"Perluasan wilayah operasi"},"answer":"B","explanation":"Rehabilitasi adalah pemulihan kepada keadaan semula, atau perbaikan fasilitas yang rusak agar bisa digunakan lagi."},{"number":4,"question":"SINONIM - FLUKTUASI","options":{"A":"Pemerataan layanan","B":"Kelancaran arus mudik","C":"Ketidakstabilan atau naik-turun","D":"Penurunan yang konstan","E":"Pergerakan yang lurus"},"answer":"C","explanation":"Fluktuasi adalah keadaan yang tidak tetap atau berubah-ubah (naik-turun), sering menggambarkan jumlah penumpang atau harga tiket."},{"number":5,"question":"SINONIM - MANDAT","options":{"A":"Laporan pertanggungjawaban","B":"Hak milik perusahaan","C":"Kritik dan saran penumpang","D":"Jadwal operasional","E":"Perintah atau tugas yang diberikan"},"answer":"E","explanation":"Mandat adalah instruksi, wewenang, atau perintah yang diberikan oleh seseorang atau organisasi kepada pihak lain."},{"number":6,"question":"ANTONIM - DINAMIS (Set3)","options":{"A":"Bergerak","B":"Statis atau diam","C":"Progresif","D":"Cepat","E":"Berubah"},"answer":"B","explanation":"Dinamis berarti penuh semangat dan mudah bergerak. Lawan katanya adalah Statis yang berarti diam, tidak bergerak, atau tidak berubah."},{"number":7,"question":"ANTONIM - KONVENSIONAL (Set3)","options":{"A":"Tradisional","B":"Kuno","C":"Biasa","D":"Umum","E":"Modern atau mutakhir"},"answer":"E","explanation":"Konvensional berarti mengikuti tradisi atau cara lama. Lawan kata yang paling tepat adalah Modern atau mutakhir."},{"number":8,"question":"ANTONIM - EKSKLUSIF (Set3)","options":{"A":"Terbatas","B":"Khusus","C":"Inklusif atau terbuka untuk umum","D":"Pribadi","E":"Mewah"},"answer":"C","explanation":"Eksklusif berarti terpisah atau khusus. Lawan katanya adalah Inklusif yang merangkum semuanya dan terbuka untuk publik."},{"number":9,"question":"ANTONIM - RESTRIKSI","options":{"A":"Kebebasan atau kelonggaran","B":"Pembatasan jalur","C":"Larangan masuk","D":"Pengaturan ketat","E":"Persyaratan dokumen"},"answer":"A","explanation":"Restriksi berarti pembatasan. Lawan kata dari pembatasan adalah kebebasan atau kelonggaran."},{"number":10,"question":"ANTONIM - KONTINU","options":{"A":"Terus-menerus","B":"Berkesinambungan","C":"Abadi","D":"Terputus atau insidental","E":"Mengalir"},"answer":"D","explanation":"Kontinu berarti terus-menerus tanpa henti. Lawan katanya adalah terputus-putus, tidak berkelanjutan, atau insidental."},{"number":11,"question":"ANTONIM - MAKRO","options":{"A":"Besar","B":"Mikro atau berskala kecil","C":"Luas","D":"Menyeluruh","E":"Global"},"answer":"B","explanation":"Makro berarti besar atau dalam skala luas. Lawan katanya adalah Mikro, yang berarti kecil atau detail sempit."},{"number":12,"question":"ANTONIM - DEPENDEN","options":{"A":"Mandiri atau independen","B":"Bergantung","C":"Membutuhkan","D":"Terikat","E":"Bersandar"},"answer":"A","explanation":"Dependen artinya bergantung pada orang atau hal lain. Lawan katanya adalah mandiri (Independen)."},{"number":13,"question":"ANTONIM - HETEROGEN","options":{"A":"Beragam","B":"Majemuk","C":"Homogen atau sejenis","D":"Bervariasi","E":"Campuran"},"answer":"C","explanation":"Heterogen berarti terdiri atas berbagai unsur yang berbeda. Lawan katanya adalah Homogen yang berarti sejenis atau seragam."},{"number":14,"question":"ANTONIM - FLUKTUATIF (Set3)","options":{"A":"Berubah-ubah","B":"Labil","C":"Dinamis","D":"Stabil atau tetap","E":"Melonjak"},"answer":"D","explanation":"Fluktuatif bersifat naik-turun atau tidak tetap. Lawan katanya adalah stabil, tetap, atau konstan."},{"number":15,"question":"ANTONIM - RELEVAN","options":{"A":"Berkaitan","B":"Cocok","C":"Sesuai","D":"Berhubungan","E":"Menyimpang atau tidak berhubungan"},"answer":"E","explanation":"Relevan berarti ada hubungannya atau bersangkut paut. Lawan katanya adalah tidak relevan atau menyimpang."},{"number":16,"question":"ANALOGI - KERETA : REL = MOBIL : ...","options":{"A":"Jalan raya","B":"Bensin","C":"Roda","D":"Garasi","E":"Sopir"},"answer":"A","explanation":"Kereta bergerak di atas Rel. Mobil melintas di atas Jalan Raya. (Hubungan: Kendaraan dan medium lintasannya)."},{"number":17,"question":"ANALOGI - BENSIN : MOTOR = AVTUR : ...","options":{"A":"Kereta uap","B":"Sepeda","C":"Pesawat terbang","D":"Bus listrik","E":"Kapal feri"},"answer":"C","explanation":"Bensin adalah bahan bakar untuk Motor. Avtur adalah bahan bakar untuk Pesawat terbang."},{"number":18,"question":"ANALOGI - MASINIS : KERETA API = NAHKODA : ...","options":{"A":"Delman","B":"Kapal laut","C":"Pesawat terbang","D":"Bus antarkota","E":"Helikopter"},"answer":"B","explanation":"Masinis mengemudikan Kereta api. Nahkoda mengemudikan Kapal laut."},{"number":19,"question":"ANALOGI - PELABUHAN : KAPAL = STASIUN : ...","options":{"A":"Penumpang","B":"Tiket","C":"Bus","D":"Pesawat","E":"Kereta api"},"answer":"E","explanation":"Pelabuhan adalah tempat berhentinya Kapal. Stasiun adalah tempat berhentinya Kereta api."},{"number":20,"question":"ANALOGI - KEMACETAN : JALAN RAYA = ANTREAN : ...","options":{"A":"Kursi tunggu","B":"Penumpang","C":"Rambu lalu lintas","D":"Loket tiket","E":"Jembatan penyeberangan"},"answer":"D","explanation":"Kemacetan terjadi akibat penumpukan kendaraan di Jalan raya. Antrean terjadi akibat penumpukan orang di Loket tiket."},{"number":21,"question":"ANALOGI - PENUMPANG : TARIF = BARANG : ...","options":{"A":"Berat","B":"Bagasi","C":"Ongkos kirim / Kargo","D":"Kardus","E":"Gudang"},"answer":"C","explanation":"Untuk mengangkut Penumpang dikenakan Tarif. Untuk mengangkut Barang dikenakan Ongkos kirim atau biaya kargo."},{"number":22,"question":"ANALOGI - RAMBU LALU LINTAS : JALAN RAYA = MERCUSUAR : ...","options":{"A":"Perairan atau Laut","B":"Pelabuhan udara","C":"Stasiun","D":"Hutan","E":"Terminal"},"answer":"A","explanation":"Rambu lalu lintas memberikan petunjuk di Jalan raya. Mercusuar memberikan panduan navigasi di Perairan/Laut."},{"number":23,"question":"ANALOGI - REM : BERHENTI = GAS : ...","options":{"A":"Mundur","B":"Melaju atau Bergerak","C":"Mogok","D":"Berbelok","E":"Parkir"},"answer":"B","explanation":"Menginjak Rem membuat kendaraan Berhenti. Menginjak Gas membuat kendaraan Melaju."},{"number":24,"question":"ANALOGI - PENGENDARA : SIM = WARGA NEGARA : ...","options":{"A":"Paspor","B":"Akta kelahiran","C":"NPWP","D":"Kartu keluarga","E":"KTP"},"answer":"E","explanation":"Identitas wajib bagi Pengendara adalah SIM. Identitas wajib bagi Warga negara adalah KTP."},{"number":25,"question":"ANALOGI - BAGASI : BARANG = KABIN : ...","options":{"A":"Mesin","B":"Bahan bakar","C":"Pengemudi","D":"Penumpang","E":"Roda"},"answer":"D","explanation":"Ruang untuk meletakkan Barang disebut Bagasi. Ruang untuk duduknya orang disebut Kabin Penumpang."}],"parentId":"verbal","bundleNum":6},"verbal__paket_7":{"title":"Verbal - Paket 7","duration":1800,"questions":[{"number":1,"question":"SINONIM - TRAYEK (Set4)","options":{"A":"Jadwal keberangkatan","B":"Jalur atau rute perjalanan","C":"Terminal pemberhentian","D":"Tarif penumpang","E":"Jumlah armada"},"answer":"B","explanation":"Trayek adalah jalur atau rute tetap yang dilalui kendaraan umum dalam melayani penumpang."},{"number":2,"question":"SINONIM - DEPO (Set4)","options":{"A":"Stasiun utama","B":"Terminal penumpang","C":"Pos keamanan","D":"Tempat penyimpanan dan perawatan kendaraan","E":"Kantor pusat perusahaan"},"answer":"D","explanation":"Depo dalam konteks transportasi adalah fasilitas untuk menyimpan, merawat, dan mempersiapkan armada sebelum beroperasi."},{"number":3,"question":"SINONIM - HEADWAY","options":{"A":"Kecepatan rata-rata bus","B":"Jarak antar halte","C":"Interval waktu keberangkatan antar armada","D":"Kapasitas penumpang maksimum","E":"Biaya operasional harian"},"answer":"C","explanation":"Headway adalah selisih atau interval waktu antara keberangkatan satu armada dengan armada berikutnya pada rute yang sama."},{"number":4,"question":"SINONIM - EMISI (Set4)","options":{"A":"Bahan bakar kendaraan bermotor","B":"Polusi suara dari mesin bus","C":"Limbah cair dari garasi kendaraan","D":"Asap pabrik di sekitar terminal","E":"Gas buang yang dihasilkan kendaraan bermotor"},"answer":"E","explanation":"Emisi adalah gas atau zat yang dikeluarkan kendaraan bermotor sebagai hasil pembakaran bahan bakar."},{"number":5,"question":"SINONIM - KORIDOR (Set4)","options":{"A":"Jalur khusus yang dilalui bus tertentu","B":"Jalan tol berbayar","C":"Trotoar pejalan kaki","D":"Persimpangan lalu lintas","E":"Terminal pemberhentian akhir"},"answer":"A","explanation":"Koridor adalah jalur atau rute khusus yang ditetapkan untuk dilalui bus tertentu dan biasanya dilengkapi jalur busway tersendiri."},{"number":6,"question":"SINONIM - TARIF (Set4)","options":{"A":"Pajak kendaraan tahunan","B":"Biaya yang dikenakan atas suatu layanan","C":"Subsidi dari pemerintah","D":"Denda keterlambatan","E":"Gaji pengemudi"},"answer":"B","explanation":"Tarif adalah harga atau biaya resmi yang ditetapkan dan dikenakan kepada pengguna atas penggunaan suatu layanan transportasi."},{"number":7,"question":"SINONIM - KAPASITAS (Set4)","options":{"A":"Ukuran fisik kendaraan","B":"Kecepatan maksimum kendaraan","C":"Berat kendaraan kosong","D":"Jumlah kursi yang tidak terisi","E":"Daya tampung maksimum penumpang atau muatan"},"answer":"E","explanation":"Kapasitas adalah kemampuan maksimum suatu kendaraan dalam menampung penumpang atau muatan."},{"number":8,"question":"ANTONIM - SUBSIDI (Set4)","options":{"A":"Bantuan keuangan","B":"Tunjangan operasional","C":"Pembebanan penuh biaya kepada pengguna","D":"Anggaran pemerintah","E":"Dana hibah"},"answer":"C","explanation":"Subsidi berarti bantuan keuangan untuk meringankan biaya layanan. Lawan katanya adalah kondisi di mana seluruh biaya ditanggung pengguna sendiri."},{"number":9,"question":"ANTONIM - EKSPRES","options":{"A":"Cepat dan langsung","B":"Nonstop tanpa pemberhentian","C":"Layanan premium","D":"Lambat dengan banyak pemberhentian","E":"Jarak jauh"},"answer":"D","explanation":"Ekspres berarti layanan yang cepat dan langsung. Antonimnya adalah layanan lambat yang berhenti di setiap halte."},{"number":10,"question":"ANTONIM - KONVENSIONAL (Set4)","options":{"A":"Modern dan berbasis teknologi digital","B":"Tradisional dan lawas","C":"Lama dan ketinggalan zaman","D":"Fisik dan berwujud","E":"Manual dan tidak otomatis"},"answer":"A","explanation":"Konvensional merujuk pada cara atau sistem lama. Lawan katanya adalah modern atau digital."},{"number":11,"question":"ANTONIM - REGULER (Set4)","options":{"A":"Biasa dan standar","B":"Rutin dan terjadwal","C":"Umum dan merata","D":"Khusus dan tidak biasa","E":"Tetap dan konsisten"},"answer":"D","explanation":"Reguler berarti sesuatu yang bersifat biasa, standar, atau rutin. Lawan katanya adalah khusus atau non-reguler."},{"number":12,"question":"ANTONIM - FEEDER","options":{"A":"Rute pengumpan","B":"Layanan cabang","C":"Layanan utama atau trunk line","D":"Rute pendukung","E":"Jalur kecil"},"answer":"C","explanation":"Feeder (pengumpan) adalah rute pendukung yang mengalirkan penumpang ke rute utama. Antonimnya adalah trunk line atau layanan utama."},{"number":13,"question":"ANTONIM - PUNCAK (jam sibuk)","options":{"A":"Macet total","B":"Sangat ramai penumpang","C":"Padat merayap","D":"Waktu utama operasional","E":"Sepi atau waktu non-sibuk"},"answer":"E","explanation":"Jam puncak (peak hour) adalah waktu dengan tingkat keramaian tertinggi. Antonimnya adalah jam sepi atau off-peak."},{"number":14,"question":"ANTONIM - PARSIAL","options":{"A":"Sebagian kecil","B":"Terbagi-bagi","C":"Terpisah antarbagian","D":"Terbatas hanya di satu sisi","E":"Menyeluruh dan lengkap"},"answer":"E","explanation":"Parsial berarti hanya sebagian atau tidak lengkap. Antonimnya adalah menyeluruh, komprehensif, atau integral."},{"number":15,"question":"ANALOGI - PILOT : PESAWAT = MASINIS : ...","options":{"A":"Rel kereta","B":"Stasiun keberangkatan","C":"Kereta Api","D":"Tiket penumpang","E":"Lokomotif saja"},"answer":"C","explanation":"Pilot mengemudikan Pesawat. Masinis mengemudikan Kereta Api."},{"number":16,"question":"ANALOGI - BENSIN : MOTOR = LISTRIK : ...","options":{"A":"Rel kereta api","B":"Bus Listrik (Electric Bus)","C":"Kabel transmisi","D":"Generator pembangkit","E":"Panel surya"},"answer":"B","explanation":"Bensin adalah bahan bakar yang menggerakkan Motor. Listrik adalah energi yang menggerakkan Bus Listrik."},{"number":17,"question":"ANALOGI - TIKET : PENUMPANG = SIM : ...","options":{"A":"Polisi lalu lintas","B":"Kendaraan bermotor","C":"Jalan raya","D":"Pengemudi kendaraan","E":"Mesin kendaraan"},"answer":"D","explanation":"Tiket adalah syarat legal bagi Penumpang. SIM adalah syarat legal bagi Pengemudi."},{"number":18,"question":"ANALOGI - DEPO : BUS = HANGGAR : ...","options":{"A":"Kapal laut","B":"Pesawat terbang","C":"Kereta api","D":"Sepeda motor","E":"Truk kontainer"},"answer":"B","explanation":"Depo adalah fasilitas tempat Bus disimpan dan dirawat. Hanggar adalah fasilitas tempat Pesawat Terbang disimpan dan dirawat."},{"number":19,"question":"ANALOGI - JADWAL : KETERLAMBATAN = REGULASI : ...","options":{"A":"Aturan hukum","B":"Kepatuhan pengguna","C":"Hukum nasional","D":"Sanksi administratif","E":"Pelanggaran"},"answer":"E","explanation":"Jika Jadwal tidak dipatuhi, terjadi Keterlambatan. Jika Regulasi tidak dipatuhi, terjadi Pelanggaran."},{"number":20,"question":"PEMAHAMAN - (Bacaan BRT Gen 2) Ide pokok dari wacana BRT generasi kedua adalah...","options":{"A":"Masalah antrean panjang di halte-halte utama Jakarta","B":"Keterbatasan jaringan internet di koridor pinggiran kota","C":"Pengembangan BRT generasi kedua berbasis kecerdasan buatan","D":"Penerapan sistem tiket nirsentuh QR code di Transjakarta","E":"Program pelatihan intensif bagi pengemudi bus"},"answer":"C","explanation":"Kalimat pertama teks secara eksplisit menyatakan fokus utama, yaitu pengembangan BRT generasi kedua yang mengintegrasikan teknologi kecerdasan buatan."},{"number":21,"question":"PEMAHAMAN - (Bacaan BRT Gen 2) Kata \"proyeksikan\" dalam teks memiliki makna yang paling dekat dengan...","options":{"A":"Memperkirakan atau memprediksi berdasarkan data","B":"Menampilkan secara visual di layar","C":"Menghitung secara manual satu per satu","D":"Menyebarluaskan informasi kepada publik","E":"Menyederhanakan data yang kompleks"},"answer":"A","explanation":"Dalam konteks teks, \"memproyeksikan kepadatan penumpang\" berarti memprediksi atau memperkirakan jumlah penumpang berdasarkan data historis."},{"number":22,"question":"PEMAHAMAN - (Bacaan BRT Gen 2) Hambatan utama dalam implementasi sistem BRT generasi kedua menurut teks adalah...","options":{"A":"Biaya pengadaan bus listrik yang sangat tinggi","B":"Kurangnya minat penumpang menggunakan layanan baru","C":"Sistem kecerdasan buatan yang belum teruji secara nyata","D":"Penolakan dari pengemudi bus terhadap teknologi baru","E":"Keterbatasan jaringan internet di koridor pinggiran dan kebutuhan pelatihan SDM"},"answer":"E","explanation":"Teks menyebutkan dua hambatan: keterbatasan jaringan internet di beberapa titik koridor pinggiran, dan perlunya pelatihan intensif."},{"number":23,"question":"PEMAHAMAN - (Bacaan BRT Gen 2) Manakah pernyataan yang TIDAK sesuai dengan isi teks BRT generasi kedua?","options":{"A":"Distribusi bus dapat disesuaikan secara dinamis menggunakan AI","B":"Seluruh halte lama di Jakarta akan dihapus dan diganti halte digital","C":"Sistem tiket nirsentuh QR code diterapkan untuk mengurangi antrean","D":"Sistem BRT baru mampu membaca data kondisi lalu lintas terkini","E":"Pelatihan intensif dibutuhkan bagi pengemudi dan petugas lapangan"},"answer":"B","explanation":"Teks sama sekali tidak menyebutkan rencana penghapusan halte lama atau penggantinya dengan halte digital."},{"number":24,"question":"PEMAHAMAN - (Bacaan BRT Gen 2) Makna kata \"nirsentuh\" dalam konteks teks tersebut adalah...","options":{"A":"Sistem yang tidak memerlukan tiket fisik apapun","B":"Teknologi berbasis kartu magnetik gesek","C":"Layanan yang tidak membutuhkan petugas di halte","D":"Sistem yang dioperasikan tanpa perlu menyentuh alat pembaca secara langsung","E":"Metode pembayaran tunai tanpa mesin kasir"},"answer":"D","explanation":"Nirsentuh (contactless) berarti tidak memerlukan kontak fisik langsung antara tiket/kartu dengan alat pembaca."},{"number":25,"question":"PEMAHAMAN - (Bacaan BRT Gen 2) Berdasarkan teks, tujuan penerapan sistem tiket berbasis QR code adalah...","options":{"A":"Mengurangi antrean panjang dan mempercepat proses boarding penumpang","B":"Mengganti seluruh petugas halte dengan mesin otomatis","C":"Meningkatkan pendapatan perusahaan dari penjualan tiket digital","D":"Memperluas jangkauan koridor baru ke wilayah pinggiran kota","E":"Mempercepat kecepatan laju bus di jalur busway"},"answer":"A","explanation":"Teks secara eksplisit menyatakan penerapan tiket nirsentuh QR code diharapkan mampu mengurangi antrean panjang dan mempercepat proses boarding penumpang."}],"parentId":"verbal","bundleNum":7},"verbal__paket_8":{"title":"Verbal - Paket 8","duration":1800,"questions":[{"number":1,"question":"SINONIM - KONEKTIVITAS (Seri2)","options":{"A":"Keterhubungan antar moda atau antar wilayah dalam satu sistem","B":"Kecepatan perpindahan penumpang antar halte","C":"Jumlah rute yang tersedia di satu koridor","D":"Kepadatan penumpang di jam sibuk","E":"Luas jangkauan wilayah operasional bus"},"answer":"A","explanation":"Konektivitas merujuk pada keterhubungan antarmoda (bus-MRT-LRT) atau antar wilayah dalam satu ekosistem transportasi terpadu."},{"number":2,"question":"SINONIM - HALTE","options":{"A":"Kantor administrasi koridor bus","B":"Tempat pemberhentian sementara untuk menaikkan dan menurunkan penumpang","C":"Pos penjagaan keamanan di jalur busway","D":"Titik pergantian pengemudi bus","E":"Pusat informasi layanan transportasi publik"},"answer":"B","explanation":"Halte adalah fasilitas publik berupa tempat berhenti sementara yang disediakan bagi penumpang untuk menunggu, naik, dan turun dari kendaraan umum."},{"number":3,"question":"SINONIM - NAVIGASI","options":{"A":"Pencatatan jumlah penumpang harian","B":"Pemantauan keamanan di dalam armada","C":"Penentuan arah dan perencanaan rute perjalanan","D":"Pengaturan kecepatan kendaraan di jalan","E":"Pelaporan keterlambatan kepada pusat kendali"},"answer":"C","explanation":"Navigasi adalah proses menentukan posisi, arah, dan rute yang ditempuh untuk mencapai tujuan."},{"number":4,"question":"SINONIM - REKAYASA LALU LINTAS","options":{"A":"Pembangunan jalan baru di kawasan padat","B":"Penambahan jumlah armada bus di jam sibuk","C":"Penegakan hukum terhadap pelanggaran lalu lintas","D":"Pengaturan dan penataan arus kendaraan agar lebih efisien","E":"Pemasangan kamera CCTV di persimpangan"},"answer":"D","explanation":"Rekayasa lalu lintas adalah upaya teknis untuk mengatur, menata, dan mengoptimalkan arus kendaraan di jalan raya."},{"number":5,"question":"SINONIM - UTILISASI","options":{"A":"Proses pengadaan armada baru","B":"Laporan keuangan operasional bulanan","C":"Standar keselamatan kendaraan umum","D":"Frekuensi perawatan berkala kendaraan","E":"Tingkat penggunaan atau pemanfaatan aset secara efektif"},"answer":"E","explanation":"Utilisasi (utilization) adalah persentase atau tingkat seberapa efektif suatu aset digunakan dibandingkan kapasitas totalnya."},{"number":6,"question":"SINONIM - SINKRONISASI","options":{"A":"Penyelarasan jadwal atau sistem agar berjalan bersamaan secara harmonis","B":"Perbaikan teknis pada sistem mekanik kendaraan","C":"Pembuatan laporan operasional terintegrasi","D":"Penggabungan dua perusahaan transportasi","E":"Standarisasi tarif di seluruh koridor"},"answer":"A","explanation":"Sinkronisasi berarti menyelaraskan dua atau lebih sistem/jadwal agar beroperasi secara harmonis dan bersamaan."},{"number":7,"question":"SINONIM - LOAD FACTOR","options":{"A":"Beban teknis mesin kendaraan saat beroperasi","B":"Rasio jumlah penumpang aktual terhadap kapasitas maksimum armada","C":"Jumlah muatan barang dalam kendaraan logistik","D":"Tingkat kerusakan armada dalam satu periode","E":"Frekuensi pengisian daya bus listrik per hari"},"answer":"B","explanation":"Load factor adalah rasio antara jumlah penumpang yang diangkut dengan kapasitas total armada, dinyatakan dalam persen."},{"number":8,"question":"ANTONIM - OPTIMAL (Seri2)","options":{"A":"Terbaik dan paling efisien","B":"Sangat memuaskan pengguna","C":"Di bawah standar dan tidak ideal","D":"Sesuai dengan rencana awal","E":"Melebihi target yang ditetapkan"},"answer":"C","explanation":"Optimal berarti kondisi terbaik atau paling efisien. Antonimnya adalah kondisi yang tidak ideal atau berada di bawah standar."},{"number":9,"question":"ANTONIM - DENSITAS","options":{"A":"Kepadatan tinggi di jam sibuk","B":"Penumpukan penumpang di halte","C":"Konsentrasi rute di pusat kota","D":"Kejarangan atau rendahnya tingkat kepadatan","E":"Banyaknya armada di satu koridor"},"answer":"D","explanation":"Densitas berarti kepadatan atau konsentrasi tinggi. Antonimnya adalah kejarangan atau tingkat kepadatan yang rendah."},{"number":10,"question":"ANTONIM - PROAKTIF (Seri2)","options":{"A":"Inisiatif sebelum masalah terjadi","B":"Antisipatif terhadap risiko","C":"Cepat tanggap terhadap keluhan","D":"Sigap dalam penanganan darurat","E":"Reaktif dan menunggu masalah terjadi dahulu"},"answer":"E","explanation":"Proaktif berarti mengambil inisiatif sebelum masalah terjadi. Lawan katanya adalah reaktif, baru bertindak setelah masalah sudah terjadi."},{"number":11,"question":"ANTONIM - SENTRAL","options":{"A":"Terpinggirkan dan jauh dari pusat sistem","B":"Paling penting dalam sistem","C":"Berada di tengah jaringan operasional","D":"Menjadi acuan dalam pengambilan keputusan","E":"Strategis dan mudah dijangkau"},"answer":"A","explanation":"Sentral berarti berada di pusat atau paling penting. Antonimnya adalah terpinggirkan, periferal, atau marjinal."},{"number":12,"question":"ANTONIM - MANDATORY","options":{"A":"Diwajibkan oleh regulasi","B":"Bersifat opsional dan tidak diwajibkan","C":"Harus dipenuhi tanpa pengecualian","D":"Berdasarkan perintah atasan","E":"Berlaku untuk seluruh pihak"},"answer":"B","explanation":"Mandatory berarti diwajibkan atau bersifat wajib. Antonimnya adalah opsional atau sukarela."},{"number":13,"question":"ANTONIM - EFEKTIF (Seri2)","options":{"A":"Berhasil mencapai tujuan yang ditetapkan","B":"Berjalan lancar tanpa hambatan","C":"Gagal mencapai tujuan yang diharapkan","D":"Hemat waktu dan sumber daya","E":"Sesuai dengan standar operasional"},"answer":"C","explanation":"Efektif berarti berhasil mencapai tujuan. Antonimnya adalah tidak efektif atau gagal m
