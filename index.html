  async function fetchLeaderboard() {
    const sb = initSupabase();
    if (!sb) return null;
    
    // Ambil semua skor dengan info user
    const { data, error } = await sb
      .from('scores')
      .select('user_id, section_id, score, submitted_at, users(username, display_name)')
      .order('score', { ascending: false });
    
    if (error) {
      console.error('Fetch leaderboard error:', error);
      return null;
    }
    return data || [];
  }
  
  // ============ UTILS ============
  function fmtTime(seconds) {
    if (seconds < 0) seconds = 0;
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
  }
  
  function getSection(id) { return QUIZ_DATA[id]; }

  function hasBundles(section) { return !!(section && section.isBundled); }

  function getBundleIds(sectionId) {
    const s = QUIZ_DATA[sectionId];
    return s && s.bundleIds ? s.bundleIds : [];
  }

  function getBundleStatus(sectionId) {
    const ids = getBundleIds(sectionId);
    if (ids.length === 0) return 'pending';
    const statuses = ids.map(bid => getSectionStatus(bid));
    if (statuses.every(s => s === 'done')) return 'done';
    if (statuses.some(s => s === 'in_progress' || s === 'paused' || s === 'done')) return 'in_progress';
    return 'pending';
  }

  function getOrderedSections() {
    return Object.entries(QUIZ_DATA)
      .filter(([id, s]) => s.order !== undefined && !id.includes('__'))
      .sort((a, b) => a[1].order - b[1].order)
      .map(([id, s]) => ({ id, ...s }));
  }
  
  function showModal(title, msg, onOk, okLabel) {
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalMsg').textContent = msg;
    const ok = document.getElementById('modalOk');
    const cancel = document.getElementById('modalCancel');
    const bg = document.getElementById('modal');
    if (okLabel) ok.textContent = okLabel;
    else ok.textContent = 'Yakin';
    bg.classList.remove('hidden');
    
    function close() { bg.classList.add('hidden'); }
    ok.onclick = () => { close(); onOk(); };
    cancel.onclick = close;
    bg.onclick = (e) => { if (e.target === bg) close(); };
  }
  
  function escapeHtml(s) {
    if (typeof s !== 'string') return s || '';
    return s
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function formatQuestionText(text) {
    if (!/Premis\s+\d+\s*:/i.test(text)) {
      return `<div class="question-text">${escapeHtml(text)}</div>`;
    }
    // Split teks pada setiap "Premis N:" — escape dulu, lalu inject HTML bold
    const escaped = escapeHtml(text);
    const formatted = escaped.replace(/(Premis\s+\d+)(\s*:)/gi, (match, label, colon, offset) => {
      const br = offset > 0 ? '<br><br>' : '';
      return `${br}<strong>${label}</strong>${colon}`;
    });
    return `<div class="question-text">${formatted}</div>`;
  }
  
  // ============ HEADER ============
  function renderHeader() {
    const right = document.getElementById('headerRight');
    let html = '';
    
    if (isLeaderboardEnabled() && currentUser) {
      html += `
        <div class="user-chip">👤 ${escapeHtml(currentUser.display_name || currentUser.username)}</div>
        <button class="btn btn-ghost btn-sm" id="logoutBtn">Logout</button>
      `;
    }

    right.innerHTML = html;

    const logoutBtn = document.getElementById('logoutBtn');
    if (logoutBtn) logoutBtn.addEventListener('click', () => {
      showModal('Logout?', 'Kamu akan keluar dari akun. Lanjut?', logout);
    });
  }
  
  // ============ RENDER ============
  const app = document.getElementById('app');
  
  function render() {
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    
    // Auth gate: paksa login kalau Supabase aktif tapi belum login
    if (isLeaderboardEnabled() && !currentUser && state.view !== 'auth') {
      state.view = 'auth';
      saveState();
    }
    
    renderHeader();
    
    if (state.view === 'auth') renderAuth();
    else if (state.view === 'home' || state.view === 'leaderboard') renderHome();
    else if (state.view === 'quiz') renderQuiz();
    else if (state.view === 'result') renderResult();
    else if (state.view === 'bundle_select') renderBundleSelect();
    
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
  
  function renderAuth() {
    let mode = 'login';
    
    function draw() {
      app.innerHTML = `
        <div class="card setup-card">
          <h2 style="margin-bottom:8px">${mode === 'login' ? 'Login dulu' : 'Daftar Akun Baru'}</h2>
          <p class="text-muted mb-4" style="font-size:14px">${mode === 'login' ? 'Masukkan username dan password kamu buat lanjut.' : 'Bikin akun pakai username dan password sederhana. Ini bakal jadi nama kamu di leaderboard.'}</p>
          
          <div class="auth-tabs">
            <button class="auth-tab ${mode === 'login' ? 'active' : ''}" data-mode="login">Login</button>
            <button class="auth-tab ${mode === 'register' ? 'active' : ''}" data-mode="register">Daftar Baru</button>
          </div>
          
          <div id="authError"></div>
          
          ${mode === 'register' ? `
            <div class="form-group">
              <label>Nama Tampilan</label>
              <input class="form-input" id="displayName" placeholder="Contoh: Andi K." maxlength="40">
              <div class="form-help">Nama yang muncul di leaderboard</div>
            </div>
          ` : ''}
          
          <div class="form-group">
            <label>Username</label>
            <input class="form-input" id="username" placeholder="huruf kecil tanpa spasi" autocomplete="username" maxlength="30">
            ${mode === 'register' ? '<div class="form-help">Min 3 karakter, huruf/angka/underscore</div>' : ''}
          </div>
          
          <div class="form-group">
            <label>Password</label>
            <input class="form-input" id="password" type="password" placeholder="${mode === 'register' ? 'Min 4 karakter' : 'Password kamu'}" autocomplete="${mode === 'register' ? 'new-password' : 'current-password'}">
          </div>
          
          <button class="btn btn-block btn-lg" id="submitAuth">${mode === 'login' ? 'Masuk' : 'Daftar & Masuk'}</button>
        </div>
      `;
      
      document.querySelectorAll('.auth-tab').forEach(el => {
        el.addEventListener('click', () => {
          mode = el.dataset.mode;
          draw();
        });
      });
      
      document.getElementById('submitAuth').addEventListener('click', handleAuth);
      
      // Enter key submit
      ['username', 'password', 'displayName'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') handleAuth();
        });
      });
    }
    
    async function handleAuth() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('authError');
      const btn = document.getElementById('submitAuth');
      
      errEl.innerHTML = '';
      
      if (!username || !password) {
        errEl.innerHTML = '<div class="form-error">Username dan password wajib diisi</div>';
        return;
      }
      
      if (mode === 'register') {
        if (username.length < 3) {
          errEl.innerHTML = '<div class="form-error">Username minimal 3 karakter</div>';
          return;
        }
        if (!/^[a-zA-Z0-9_]+$/.test(username)) {
          errEl.innerHTML = '<div class="form-error">Username hanya boleh huruf, angka, dan underscore</div>';
          return;
        }
        if (password.length < 4) {
          errEl.innerHTML = '<div class="form-error">Password minimal 4 karakter</div>';
          return;
        }
      }
      
      btn.disabled = true;
      btn.textContent = mode === 'login' ? 'Sedang masuk...' : 'Sedang daftar...';
      
      try {
        let user;
        if (mode === 'login') {
          user = await login(username, password);
        } else {
          const displayName = document.getElementById('displayName').value.trim() || username;
          user = await register(username, password, displayName);
        }
        currentUser = user;
        saveUser(user);
        state.userId = user.id;
        state.view = 'home';
        saveState();
        // Sync progress dari Supabase → state lokal (cross-device support)
        syncStateFromSupabase().then(() => render());
        render(); // render dulu dengan state lokal, akan re-render setelah sync
      } catch (e) {
        errEl.innerHTML = `<div class="form-error">${escapeHtml(e.message)}</div>`;
        btn.disabled = false;
        btn.textContent = mode === 'login' ? 'Masuk' : 'Daftar & Masuk';
      }
    }
    
    draw();
  }
  
  async function renderHome() {
    if (isLeaderboardEnabled() && currentUser) {
      pausedSessionsCache = await fetchPausedSessions();
    }
    const sections = getOrderedSections();
    
    let totalCompleted = 0;
    let totalScore = 0;
    sections.forEach(s => {
      if (s.isBundled) {
        const bids = getBundleIds(s.id);
        const doneCount = bids.filter(bid => state.scores[bid]).length;
        if (doneCount === bids.length && bids.length > 0) totalCompleted++;
        const scores = bids.map(bid => state.scores[bid] ? (state.scores[bid].bestScore || state.scores[bid].score) : 0).filter(v => v > 0);
        if (scores.length > 0) totalScore += Math.round(scores.reduce((a,b)=>a+b,0)/scores.length);
      } else if (state.scores[s.id]) {
        totalCompleted++;
        totalScore += state.scores[s.id].bestScore || state.scores[s.id].score;
      }
    });
    const avgScore = totalCompleted > 0 ? Math.round(totalScore / totalCompleted) : 0;
    const totalQ = sections.reduce((sum, s) => {
      if (s.id === 'ganjil_genap' || s.id === 'selisih_angka' || s.id === 'selisih_huruf') return sum;
      if (s.isBundled) return sum + getBundleIds(s.id).length * 25;
      return sum + (s.questions ? s.questions.length : 0);
    }, 0);
    const progressPct = sections.length > 0 ? Math.round((totalCompleted / sections.length) * 100) : 0;
    
    const cardsHtml = sections.map(s => {
      const status = getSectionStatus(s.id);
      const score = state.scores[s.id];
      let answeredCount, questionTotal;
      if (s.id === 'ganjil_genap') {
        const g = state.ganjilGenap;
        answeredCount = g ? g.questions.filter(q => q.userAnswer !== undefined).length : 0;
        questionTotal = g ? g.questions.length : 0;
      } else if (s.id === 'selisih_angka') {
        const sa = state.selisihAngka;
        answeredCount = sa ? sa.answered : 0;
        questionTotal = 0;
      } else if (s.id === 'selisih_huruf') {
        const sh = state.selisihHuruf;
        answeredCount = sh ? sh.answered : 0;
        questionTotal = 0;
      } else if (s.isBundled) {
        const bids = getBundleIds(s.id);
        const doneBundles = bids.filter(bid => getSectionStatus(bid) === 'done').length;
        answeredCount = doneBundles;
        questionTotal = bids.length;
      } else {
        answeredCount = Object.keys(state.answers[s.id] || {}).length;
        questionTotal = s.questions ? s.questions.length : 0;
      }
      const progress = questionTotal > 0 ? (answeredCount / questionTotal) * 100 : 0;
      
      let badge = '<span class="badge badge-pending">Belum mulai</span>';
      let actionLabel = 'Mulai';
      let extraInfo = '';
      
      if (status === 'paused') {
        badge = '<span class="badge badge-paused">⏸ Ditunda</span>';
        actionLabel = '🔒 Opsi';
        const ps = pausedSessionsCache[s.id];
        const remaining = ps ? fmtTime(ps.time_remaining_seconds) : '—';
        extraInfo = `<div style="font-size:12px;color:var(--text-muted);line-height:1.3">Sisa <strong>${remaining}</strong> · ${answeredCount}/${questionTotal} soal</div>`;
      } else if (status === 'in_progress') {
        badge = '<span class="badge badge-progress">Sedang berjalan</span>';
        actionLabel = 'Lanjutkan';
        extraInfo = `<div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
          <div style="font-size:12px;color:var(--text-muted)">${answeredCount}/${questionTotal} soal terjawab</div>`;
      } else if (status === 'done') {
        if (s.isBundled) {
          const bids = getBundleIds(s.id);
          const doneBundles = bids.filter(bid => getSectionStatus(bid) === 'done').length;
          const bestScores = bids.map(bid => state.scores[bid] ? (state.scores[bid].bestScore || state.scores[bid].score) : 0).filter(v => v > 0);
          const avgBest = bestScores.length > 0 ? Math.round(bestScores.reduce((a,b)=>a+b,0)/bestScores.length) : 0;
          badge = `<span class="badge badge-done">${doneBundles}/${bids.length} selesai</span>`;

            <h3>${s.title}</h3>

        </div>

        const id = el.dataset.section;
        const action = el.dataset.action;
        if (QUIZ_DATA[id] && QUIZ_DATA[id].isBundled) {
          startSection(id);
        } else if (action === 'done') {
          state.view = 'result';
          state.activeSection = id;
          saveState();
          render();
        } else if (action === 'paused') {
          showPausedOptionsModal(id);
        } else if (id === 'ganjil_genap' && action === 'in_progress') {
          showModal('Mulai Ulang?', 'Kamu memiliki sesi Tes Ganjil Genap yang belum selesai. Memulai ulang akan menghapus jawaban sebelumnya.', () => startSection(id), 'Mulai Ulang');
        } else {
          startSection(id);
        }
      });
    });
    
    const resetBtn = document.getElementById('resetAllBtn');
    if (resetBtn) resetBtn.addEventListener('click', () => {
      showModal(
        'Reset Semua Progress?',
        'Semua skor di leaderboard dan progress lokal kamu akan dihapus permanen. Aksi ini tidak bisa dibatalkan.',
        async () => {
          const resetBtn = document.getElementById('resetAllBtn');
          if (resetBtn) { resetBtn.textContent = '⏳ Menghapus...'; resetBtn.disabled = true; }
          await deleteAllScores();
          localStorage.removeItem(STORAGE_KEY);
          state = defaultState();
          pausedSessionsCache = {};
          render();
        }
      );
    });
    
    // Leaderboard widget: tab switching
    document.querySelectorAll('#lbWidget .lb-tab').forEach(el => {
      el.addEventListener('click', () => {
        state.lbTab = el.dataset.tab;
        saveState();
        // Update active class on all tabs
        document.querySelectorAll('#lbWidget .lb-tab').forEach(t => {
          t.classList.toggle('active', t.dataset.tab === state.lbTab);
        });
        renderHomeLbContent();
      });
    });
    
    // Load leaderboard content
    renderHomeLbContent();
    
    // Auto-resume: jika ada session ditunda, munculkan modal
    if (!window._autoResumeChecked && Object.keys(pausedSessionsCache).length > 0) {
      window._autoResumeChecked = true;
      const ids = Object.keys(pausedSessionsCache);
      setTimeout(() => showPausedOptionsModal(ids[0]), 300);
    }
  }

  function renderBundleSelect() {
    const sectionId = state.activeSection;
    const section = QUIZ_DATA[sectionId];
    const bundleIds = getBundleIds(sectionId);

    const doneBundles = bundleIds.filter(bid => getSectionStatus(bid) === 'done').length;
    const totalBundles = bundleIds.length;

    const cardsHtml = bundleIds.map(bid => {
      const bundle = QUIZ_DATA[bid];
      if (!bundle) return '';
      const status = getSectionStatus(bid);
      const score = state.scores[bid];

      let badge = '<span class="badge badge-pending">Belum mulai</span>';
      let actionLabel = 'Mulai';
      let extraInfo = '';

      if (status === 'paused') {
        badge = '<span class="badge badge-paused">⏸ Ditunda</span>';
        actionLabel = '🔁 Opsi';
        const ps = pausedSessionsCache[bid];
        const remaining = ps ? fmtTime(ps.time_remaining_seconds) : '—';
        const answered = Object.keys(state.answers[bid] || {}).length;
        extraInfo = `<div style="font-size:12px;color:var(--text-muted)">Sisa <strong>${remaining}</strong> · ${answered}/25 soal</div>`;
      } else if (status === 'in_progress') {
        badge = '<span class="badge badge-progress">Sedang berjalan</span>';
        actionLabel = 'Lanjutkan';
        const answered = Object.keys(state.answers[bid] || {}).length;
        const pct = Math.round((answered/25)*100);
        extraInfo = `<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
          <div style="font-size:12px;color:var(--text-muted)">${answered}/25 soal terjawab</div>`;

        const best = score ? (score.bestScore || score.score) : 0;
        badge = `<span class="badge badge-done">Terbaik ${best}%</span>`;

      return `
        <div class="card section-card" data-bundle="${bid}" data-action="${status}" data-section="${sectionId}">
          <div class="section-card-header">
            <h3>${bundle.title}</h3>
            ${badge}
          </div>
          <div class="section-meta">
            <span>📝 25 soal</span>
            <span>⏱ 30 menit</span>
          </div>
          ${extraInfo}
          <button class="btn btn-sm">${actionLabel}</button>
        </div>
      `;
    }).join('');

    app.innerHTML = `
      <div class="container">
        <div style="margin-bottom:20px">
          <button class="btn btn-secondary btn-sm" id="backToHomeBtn">← Kembali</button>
        </div>
        <div class="status-bar" style="margin-bottom:20px">
          <div class="status-bar-left">
            <h2>${section.title}</h2>
          </div>
          <div class="status-bar-center">
            <div class="progress-pill">
              ${doneBundles} dari ${totalBundles} paket selesai
              <div class="mini-progress">
                <div class="mini-progress-fill" style="width:${totalBundles > 0 ? Math.round((doneBundles/totalBundles)*100) : 0}%"></div>
              </div>
            </div>
          </div>
        </div>
        <div class="section-grid-header">
          <h3>Pilih Paket</h3>
          <span class="hint">Setiap paket 25 soal · 30 menit</span>
        </div>
        <div class="section-grid">${cardsHtml}</div>
      </div>
    `;

    document.getElementById('backToHomeBtn').addEventListener('click', () => {
      state.view = 'home';
      saveState();
      render();
    });

    document.querySelectorAll('[data-bundle]').forEach(el => {
      el.addEventListener('click', () => {
        const bid = el.dataset.bundle;
        const action = el.dataset.action;
        if (action === 'done') {
          state.view = 'result';
          state.activeSection = bid;
          saveState();
          render();
        } else if (action === 'paused') {
          showPausedOptionsModal(bid);
        } else {
          startSection(bid);
        }
      });
    });
  }

  async function renderHomeLbContent() {
    const content = document.getElementById('lbWidgetContent');
    if (!content) return;
    
    const sections = getOrderedSections();
    const scores = await fetchLeaderboard();
    
    if (scores === null) {
      content.innerHTML = '<div class="lb-empty">Gagal memuat leaderboard.</div>';
      return;
    }
    
    if (scores.length === 0) {
      content.innerHTML = '<div class="lb-empty">Belum ada skor. Jadilah yang pertama!</div>';
      return;
    }
    
    const byUser = {};
    scores.forEach(s => {
      if (!s.users) return;
      const uid = s.user_id;
      if (!byUser[uid]) {
        byUser[uid] = {
          user_id: uid,
          username: s.users.username,
          display_name: s.users.display_name || s.users.username,
          sections: {},
        };
      }
      // Petakan bundle ID (verbal__paket_1) ke parent ID (verbal) untuk leaderboard
      const parentId = s.section_id.includes('__') ? s.section_id.split('__')[0] : s.section_id;
      const cur = byUser[uid].sections[parentId];
      if (cur === undefined || s.score > cur) {
        byUser[uid].sections[parentId] = s.score;
      }
    });

    let rows;
    if (state.lbTab === 'total') {
      rows = Object.values(byUser).map(u => {
        const sectionScores = sections.map(s => u.sections[s.id]).filter(v => v !== undefined);
        const avg = sectionScores.length > 0
          ? Math.round(sectionScores.reduce((a, b) => a + b, 0) / sectionScores.length)
          : 0;
        return {
          ...u,
          score: avg,
          completed: sectionScores.length,
          totalSections: sections.length,
        };
      }).filter(u => u.completed > 0)
        .sort((a, b) => b.score - a.score || b.completed - a.completed);
      
      content.innerHTML = `
        <div class="lb-widget-scroll">
          <table class="lb-table">
            <thead><tr><th>Rank</th><th>Nama</th><th style="text-align:center">Done</th><th style="text-align:right">Skor</th></tr></thead>
            <tbody>
              ${rows.length === 0 ? '<tr><td colspan="4" class="lb-empty">Belum ada skor.</td></tr>' :
              rows.map((u, i) => {
                const rank = i + 1;
                const isMe = currentUser && u.user_id === currentUser.id;
                const medal = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : `#${rank}`;
                return `<tr class="${isMe ? 'current-user' : ''}">
                  <td class="lb-rank lb-rank-${rank <= 3 ? rank : ''}">${medal}</td>
                  <td>${escapeHtml(u.display_name)}${isMe ? ' <span style="color:var(--text-muted)">(kamu)</span>' : ''}</td>
                  <td style="text-align:center">${u.completed}/${u.totalSections}</td>
                  <td class="lb-score">${u.score}%</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      `;
    } else {
      rows = Object.values(byUser)
        .filter(u => u.sections[state.lbTab] !== undefined)
        .map(u => ({ ...u, score: u.sections[state.lbTab] }))
        .sort((a, b) => b.score - a.score);
      
      if (rows.length === 0) {
        content.innerHTML = '<div class="lb-empty">Belum ada skor di section ini.</div>';
        return;
      }
      
      content.innerHTML = `
        <div class="lb-widget-scroll">
          <table class="lb-table">
            <thead><tr><th>Rank</th><th>Nama</th><th style="text-align:right">Skor</th></tr></thead>
            <tbody>
              ${rows.map((u, i) => {
                const rank = i + 1;
                const isMe = currentUser && u.user_id === currentUser.id;
                const medal = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : `#${rank}`;
                return `<tr class="${isMe ? 'current-user' : ''}">
                  <td class="lb-rank lb-rank-${rank <= 3 ? rank : ''}">${medal}</td>
                  <td>${escapeHtml(u.display_name)}${isMe ? ' <span style="color:var(--text-muted)">(kamu)</span>' : ''}</td>
                  <td class="lb-score">${u.score}%</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      `;
    }
  }
  
  function getSectionStatus(id) {
    if (QUIZ_DATA[id] && QUIZ_DATA[id].isBundled) return getBundleStatus(id);
    if (state.completedAt[id]) return 'done';
    if (pausedSessionsCache[id]) return 'paused';
    if (state.startedAt[id]) return 'in_progress';
    if (id === 'ganjil_genap' && state.ganjilGenap && state.ganjilGenap.startedAt) return 'in_progress';
    // selisih_angka tidak punya status in_progress — selalu mulai fresh
    // selisih_huruf tidak punya status in_progress — selalu mulai fresh
    return 'pending';
  }

  function startSection(id) {
    if (id === 'ganjil_genap') { startGanjilGenap(); return; }
    if (id === 'selisih_angka') { startSelisihAngka(); return; }
    if (id === 'selisih_huruf') { startSelisihHuruf(); return; }
    if (QUIZ_DATA[id] && QUIZ_DATA[id].isBundled) {
      state.activeSection = id;
      state.view = 'bundle_select';
      saveState();
      render();
      return;
    }
    state.activeSection = id;
    state.view = 'quiz';
    
    if (!state.startedAt[id]) {
      state.currentIndex = 0;
      state.startedAt[id] = Date.now();
      state.remainingTime[id] = QUIZ_DATA[id].duration;
      if (!state.answers[id]) state.answers[id] = {};
    }
    
    saveState();
    render();
  }
  
  function renderQuiz() {
    if (state.activeSection === 'ganjil_genap') { renderGanjilGenap(); return; }
    if (state.activeSection === 'selisih_angka') { renderSelisihAngka(); return; }
    if (state.activeSection === 'selisih_huruf') { renderSelisihHuruf(); return; }
    const section = getSection(state.activeSection);
    const questions = section.questions;
    const idx = state.currentIndex;
    const q = questions[idx];
    const answers = state.answers[state.activeSection] || {};
    const userAns = answers[q.number];
    
    let optionsHtml = '';
    if (section.type === 'visual') {
      ['A','B','C','D','E'].forEach(letter => {
        optionsHtml += `
          <div class="option ${userAns === letter ? 'selected' : ''}" data-letter="${letter}">
            <div class="option-letter">${letter}</div>
            <div class="option-text">Pilihan ${letter}</div>
          </div>
        `;
      });
    } else {
      Object.entries(q.options).forEach(([letter, text]) => {
        optionsHtml += `
          <div class="option ${userAns === letter ? 'selected' : ''}" data-letter="${letter}">
            <div class="option-letter">${letter}</div>
            <div class="option-text">${escapeHtml(text)}</div>
          </div>
        `;
      });
    }
    
    let questionHtml = '';
    if (section.type === 'visual') {
      questionHtml = `
        <div class="text-muted mb-3">Lihat gambar di bawah ini, lalu pilih jawaban yang tepat.</div>
        <img src="data:image/jpeg;base64,${q.image_b64}" class="question-image" alt="Soal ${q.number}">
      `;
    } else {
      questionHtml = formatQuestionText(q.question);
    }
    
    const gridHtml = questions.map((qq, i) => {
      const ans = answers[qq.number];
      const cls = i === idx ? 'current' : (ans ? 'answered' : '');
      return `<div class="q-num ${cls}" data-idx="${i}">${qq.number}</div>`;
    }).join('');
    
    app.innerHTML = `
      <div class="card">
        <div class="quiz-header">
          <div class="quiz-title">${section.title}</div>
          <div class="timer" id="timer">⏱ ${fmtTime(state.remainingTime[state.activeSection] || 0)}</div>
        </div>
        <div class="quiz-progress">Soal ${idx + 1} dari ${questions.length} · Nomor ${q.number}</div>
        ${questionHtml}
        <div class="options" id="options">${optionsHtml}</div>
        <div class="nav-buttons">
          <button class="btn btn-secondary" id="prevBtn" ${idx === 0 ? 'disabled' : ''}>← Sebelumnya</button>
          <div style="display:flex; gap:10px">
            ${idx === questions.length - 1
              ? '<button class="btn btn-danger" id="finishBtn">Selesai &amp; Submit</button>'
              : '<button class="btn" id="nextBtn">Selanjutnya →</button>'}
          </div>
        </div>
      </div>
      
      <div class="card mt-4">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px">
          <strong>Navigasi soal</strong>
          <button class="btn btn-secondary btn-sm" id="backHomeBtn">← Kembali ke Home</button>
        </div>
        <div class="text-muted" style="font-size:13px">Kotak orange terang = sudah dijawab. Klik nomor untuk pindah.</div>
        <div class="question-grid">${gridHtml}</div>
      </div>
    `;
    
    document.querySelectorAll('.option').forEach(el => {
      el.addEventListener('click', () => {
        const letter = el.dataset.letter;
        if (!state.answers[state.activeSection]) state.answers[state.activeSection] = {};
        state.answers[state.activeSection][q.number] = letter;
        saveState();
        renderQuiz();
      });
    });
    
    const prevBtn = document.getElementById('prevBtn');
    if (prevBtn) prevBtn.addEventListener('click', () => {
      state.currentIndex = Math.max(0, idx - 1);
      saveState(); renderQuiz();
    });
    
    const nextBtn = document.getElementById('nextBtn');
    if (nextBtn) nextBtn.addEventListener('click', () => {
      state.currentIndex = Math.min(questions.length - 1, idx + 1);
      saveState(); renderQuiz();
    });
    
    const finishBtn = document.getElementById('finishBtn');
    if (finishBtn) finishBtn.addEventListener('click', () => {
      const answered = Object.keys(state.answers[state.activeSection] || {}).length;
      const total = questions.length;
      const msg = answered < total
        ? `Kamu baru jawab ${answered} dari ${total} soal. Yakin mau submit?`
        : `Semua soal sudah dijawab. Submit jawaban?`;
      showModal('Submit Section?', msg, () => finishSection(), 'Submit');
    });
    
    document.getElementById('backHomeBtn').addEventListener('click', () => {
      showPauseModal();
    });
    
    document.querySelectorAll('.q-num').forEach(el => {
      el.addEventListener('click', () => {
        state.currentIndex = parseInt(el.dataset.idx);
        saveState(); renderQuiz();
      });
    });
    
    if (!timerInterval) startTimer();
  }

  function startTimer() {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      state.remainingTime[state.activeSection]--;
      if (state.remainingTime[state.activeSection] <= 0) {
        state.remainingTime[state.activeSection] = 0;
        clearInterval(timerInterval);
        timerInterval = null;
        finishSection(true);
        return;
      }
      saveState();
      const t = document.getElementById('timer');
      if (t) {
        const rem = state.remainingTime[state.activeSection];
        t.textContent = '⏱ ' + fmtTime(rem);
        t.className = 'timer';
        if (rem <= 60) t.classList.add('danger');
        else if (rem <= 300) t.classList.add('warning');
      }
    }, 1000);
  }
  
  async function finishSection(timedOut) {
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    
    const sectionId = state.activeSection;
    const section = getSection(sectionId);
    const userAns = state.answers[sectionId] || {};
    let correct = 0;
    section.questions.forEach(q => {
      if (userAns[q.number] === q.answer) correct++;
    });
    const score = Math.round((correct / section.questions.length) * 100);
    
    const startedTs = state.startedAt[sectionId] || Date.now();
    const duration = Math.round((Date.now() - startedTs) / 1000);
    
    // Riwayat percobaan
    const prev = state.scores[sectionId];
    const history = (prev && prev.history) ? [...prev.history] : [];
    history.push({
      correct,
      total: section.questions.length,
      score,
      timedOut: !!timedOut,
      duration,
      completedAt: Date.now(),
    });
    
    const best = Math.max(...history.map(h => h.score));
    
    state.scores[sectionId] = {
      correct,
      total: section.questions.length,
      score,
      bestScore: best,
      timedOut: !!timedOut,
      duration,
      history,
    };
    state.completedAt[sectionId] = Date.now();
    state.view = 'result';
    saveState();
    render();
    
    // Hapus paused session kalau ada
    if (currentUser && isLeaderboardEnabled()) {
      deletePausedSession(sectionId);
      delete pausedSessionsCache[sectionId];
    }

    // Submit ke Supabase di background (hanya best score)
    if (currentUser && isLeaderboardEnabled()) {
      submitScoreToSupabase(sectionId, {
        score: best, correct, total: section.questions.length,
        duration, timedOut: !!timedOut,
      }).then(() => {
        if (state.view === 'result' && state.activeSection === sectionId) {
          render();
        }
      });
    }
  }
  
  function renderResult() {
    if (state.activeSection === 'ganjil_genap') { renderGanjilGenapResult(); return; }
    if (state.activeSection === 'selisih_angka') { renderSelisihAngkaResult(); return; }
    if (state.activeSection === 'selisih_huruf') { renderSelisihHurufResult(); return; }
    const section = getSection(state.activeSection);
    const sectionId = state.activeSection;
    const userAns = state.answers[sectionId] || {};
    const score = state.scores[sectionId];
    
    let correct = 0, wrong = 0, skipped = 0;
    section.questions.forEach(q => {
      if (!userAns[q.number]) skipped++;
      else if (userAns[q.number] === q.answer) correct++;
      else wrong++;
    });
    
    // Submit status indicator
    let submitStatusHtml = '';
    if (currentUser && isLeaderboardEnabled()) {
      const ss = state.submitStatus[sectionId];
      if (ss === 'pending') submitStatusHtml = '<div class="submit-status pending">⏳ Mengirim skor ke leaderboard...</div>';
      else if (ss === 'success') submitStatusHtml = '<div class="submit-status success">✓ Skor masuk leaderboard</div>';
      else if (ss === 'error') submitStatusHtml = '<div class="submit-status error">✗ Gagal kirim. Klik Coba Lagi di bawah.</div>';
    }
    
    const gridHtml = section.questions.map(q => {
      const ans = userAns[q.number];
      const isCorrect = ans === q.answer;
      const cls = !ans ? 'skipped' : (isCorrect ? 'correct' : 'wrong');
      const qnumAttr = ans ? ` data-qnum="${q.number}"` : '';
      return `<div class="q-num ${cls}"${qnumAttr}>${q.number}</div>`;
    }).join('');

    const answeredQuestions = section.questions.filter(q => userAns[q.number]);
    const answeredNums = answeredQuestions.map(q => q.number);
    const reviewData = {};
    answeredQuestions.forEach(q => {
      const ans = userAns[q.number];
      const isCorrect = ans === q.answer;
      const status = isCorrect ? 'correct' : 'wrong';
      const statusLabel = isCorrect ? 'Benar' : 'Salah';
      let optionsHtml = '';
      if (section.type === 'visual') {
        optionsHtml = `<img src="data:image/jpeg;base64,${q.image_b64}" class="question-image" alt="Soal ${q.number}">`;
        ['A','B','C','D','E'].forEach(letter => {
          let cls = '';
          if (letter === q.answer) cls += ' is-correct';
          if (letter === ans && !isCorrect) cls += ' user-wrong';
          if (letter === ans && isCorrect) cls += ' user-correct';
          optionsHtml += `<div class="review-option${cls}"><div class="option-letter">${letter}</div><div class="option-text">Pilihan ${letter}${letter === q.answer ? ' ✓ (Jawaban Benar)' : ''}${letter === ans && !isCorrect ? ' ✗ (Jawabanmu)' : ''}</div></div>`;
        });
      } else {
        optionsHtml = '<div class="review-options">';
        Object.entries(q.options).forEach(([letter, text]) => {
          let cls = '';
          let suffix = '';
          if (letter === q.answer) { cls += ' is-correct'; suffix += ' ✓ (Jawaban Benar)'; }
          if (letter === ans && !isCorrect) { cls += ' user-wrong'; suffix += ' ✗ (Jawabanmu)'; }
          if (letter === ans && isCorrect) { cls += ' user-correct'; }
          optionsHtml += `<div class="review-option${cls}"><div class="option-letter">${letter}</div><div class="option-text">${escapeHtml(text)}<strong>${suffix}</strong></div></div>`;
        });
        optionsHtml += '</div>';
      }
      reviewData[q.number] = {
        status,
        html: `<div class="review-item ${status}"><div class="review-header"><div class="review-num">Soal ${q.number}</div><div class="review-status ${status}">${statusLabel}</div></div>${section.type !== 'visual' ? `<div class="review-question">${escapeHtml(q.question)}</div>` : ''}${optionsHtml}${q.explanation ? `<div class="explanation"><strong>Pembahasan:</strong> ${escapeHtml(q.explanation)}</div>` : ''}</div>`
      };
    });
    
    const retrySubmitBtn = state.submitStatus[sectionId] === 'error' ? 
      '<button class="btn btn-sm btn-secondary" id="retrySubmitBtn">Coba Kirim Ulang</button>' : '';
    
    app.innerHTML = `
      <div class="card">
        <div class="result-summary">
          <div class="score-circle" style="background: ${score.score >= 70 ? 'var(--success-light)' : score.score >= 50 ? 'var(--primary-light)' : 'var(--danger-light)'}; color: ${score.score >= 70 ? 'var(--success)' : score.score >= 50 ? 'var(--primary)' : 'var(--danger)'}">
            <div class="score-num">${score.score}%</div>
            <div class="score-label">Skor</div>
          </div>
          <div class="quiz-title">${section.title}</div>
          ${score.timedOut ? '<p class="text-muted mt-3" style="color:var(--danger)">⏰ Waktu habis. Section di-submit otomatis.</p>' : ''}
          ${submitStatusHtml}
          ${retrySubmitBtn}
          <div class="result-stats">
            <div class="stat">
              <div class="stat-num" style="color: var(--success)">${correct}</div>
              <div class="stat-label">Benar</div>
            </div>
            <div class="stat">
              <div class="stat-num" style="color: var(--danger)">${wrong}</div>
              <div class="stat-label">Salah</div>

  // ============ GANJIL GENAP ============
  const GG_TOTAL_ROUNDS = 20;
  const GG_ROUND_SECONDS = 60;
  const GG_BREAK_SECONDS = 10;
  const GG_QUESTION_INTERVAL = 1; // generate every 1 second
  
  function startGanjilGenap() {
    state.activeSection = 'ganjil_genap';
    state.view = 'quiz';
    state.ganjilGenap = {
      round: 0,
      phase: 'playing',
      roundTimeLeft: GG_ROUND_SECONDS,
      breakTimeLeft: 0,
      questions: [],
      nextQuestionNum: 1,
      startedAt: Date.now(),
      finishedAt: null,
      timedOut: false,
    };
    // Seed 20 questions right away so user doesn't wait
    for (let i = 0; i < 20; i++) {
      const n1 = Math.floor(Math.random() * 9) + 1;
      const n2 = Math.floor(Math.random() * 9) + 1;
      state.ganjilGenap.questions.push({
        num1: n1, num2: n2,
        answer: (n1 + n2) % 2 === 0 ? 0 : 1,
        userAnswer: undefined,
        round: 0,
        questionNum: state.ganjilGenap.nextQuestionNum++,
      });
    }
    saveState();
    render();
  }
  
  function seedGanjilGenapRound() {
    const g = state.ganjilGenap;
    if (!g || g.phase !== 'playing') return;
    g.questions = [];
    g.nextQuestionNum = 1;
    for (let i = 0; i < 20; i++) {
      const num1 = Math.floor(Math.random() * 9) + 1;
      const num2 = Math.floor(Math.random() * 9) + 1;
      const sum = num1 + num2;
      g.questions.push({
        num1, num2,
        answer: sum % 2 === 0 ? 0 : 1,
        userAnswer: undefined,
        round: g.round,
        questionNum: g.nextQuestionNum++,
      });
    }
    saveState();
    if (state.view === 'quiz' && state.activeSection === 'ganjil_genap' && g.phase === 'playing') {
      renderGanjilGenap();
    }
  }
  
  function renderGanjilGenap() {
    const g = state.ganjilGenap;
    if (!g) { renderHome(); return; }
    
    if (g.phase === 'break') {
      app.innerHTML = `
        <div class="card">
          <div class="gg-break">
            <h2>Babak ${g.round + 1} Selesai!</h2>
            <p class="text-muted mb-4">Istirahat sebentar... Babak ${g.round + 2} akan segera dimulai</p>
            <div class="gg-break-countdown" id="ggBreakTimer">${g.breakTimeLeft}</div>
            <div class="gg-break-dots" id="ggBreakDots">
              ${Array.from({length: GG_TOTAL_ROUNDS}, (_, i) =>
                `<div class="gg-break-dot ${i < g.round ? 'done' : i === g.round ? 'active' : ''}"></div>`
              ).join('')}
            </div>
            <p class="text-muted mt-4">Round ${g.round + 1} / ${GG_TOTAL_ROUNDS}</p>
          </div>
          <div style="text-align:center;margin-top:16px">
            <button class="btn btn-secondary" id="ggBackHomeBreak">← Kembali (Submit Otomatis)</button>
          </div>
        </div>
      `;
      document.getElementById('ggBackHomeBreak').addEventListener('click', () => {
        finishGanjilGenap(false);
      });
      startGanjilGenapTimer();
      return;
    }
    
    // Playing phase
    
    // Save scroll position for smooth updates
    const prevScrollTop = (document.getElementById('ggQuestions') || {}).scrollTop || 0;
    
    let questionsHtml = g.questions.length === 0
      ? '<div class="gg-empty">Menunggu soal berikutnya...</div>'
      : g.questions.map(q => {
          const answered = q.userAnswer !== undefined;
          const cls = answered ? 'answered' : '';
          const btn0Cls = 'gg-qbtn gg-qbtn-0' + (answered && q.userAnswer === 0 ? ' selected' : '');
          const btn1Cls = 'gg-qbtn gg-qbtn-1' + (answered && q.userAnswer === 1 ? ' selected' : '');
          return `
            <div class="gg-question ${cls}" data-qnum="${q.questionNum}">
              <span class="gg-qnum">${q.questionNum}.</span>
              <span class="gg-qexpr">${q.num1} + ${q.num2} =</span>
              <span class="gg-qbtns">
                <button class="${btn0Cls}" data-qnum="${q.questionNum}" data-answer="0">0</button>
                <button class="${btn1Cls}" data-qnum="${q.questionNum}" data-answer="1">1</button>
              </span>
            </div>
          `;
        }).join('');
    
    app.innerHTML = `
      <div class="card">
        <div class="gg-header">
          <div class="gg-round-badge">Babak ${g.round + 1} / ${GG_TOTAL_ROUNDS}</div>
          <div class="gg-timer ${g.roundTimeLeft <= 10 ? 'danger' : g.roundTimeLeft <= 20 ? 'warning' : ''}" id="ggTimer">${g.roundTimeLeft}s</div>
          <button class="btn btn-secondary btn-sm" id="ggBackHome">← Kembali (Submit)</button>
        </div>
        <div class="gg-questions" id="ggQuestions">
          ${questionsHtml}
        </div>
      </div>
    `;
    
    // Restore scroll position after re-render
    if (prevScrollTop > 0) {
      requestAnimationFrame(() => {
        const el = document.getElementById('ggQuestions');
        if (el) el.scrollTop = prevScrollTop;
      });
    }
    
    // Event delegation on questions container
    document.getElementById('ggQuestions').addEventListener('click', (e) => {
      const btn = e.target.closest('.gg-qbtn');
      if (!btn || btn.disabled) return;
      const qnum = parseInt(btn.dataset.qnum);
      const answer = parseInt(btn.dataset.answer);
      handleGanjilGenapAnswer(qnum, answer);
    });
    
    document.getElementById('ggBackHome').addEventListener('click', () => {
      showModal('Kembali ke Home?', 'Semua jawaban akan disubmit. Kamu tidak bisa melanjutkan lagi.', () => finishGanjilGenap(false), 'Submit & Kembali');
    });
    
    startGanjilGenapTimer();
  }
  
  function generateGanjilGenapQuestion() {
    const g = state.ganjilGenap;
    if (!g || g.phase !== 'playing') return;
    const num1 = Math.floor(Math.random() * 9) + 1;
    const num2 = Math.floor(Math.random() * 9) + 1;
    const sum = num1 + num2;
    const answer = sum % 2 === 0 ? 0 : 1; // 0 = even, 1 = odd
    g.questions.push({
      num1,
      num2,
      answer,
      userAnswer: undefined,
      round: g.round,
      questionNum: g.nextQuestionNum++,
    });
    saveState();
    // Re-render to show new question
    if (state.view === 'quiz' && state.activeSection === 'ganjil_genap' && g.phase === 'playing') {
      renderGanjilGenap();
    }
  }
  
  function handleGanjilGenapAnswer(qnum, answer) {
    const g = state.ganjilGenap;
    if (!g || g.phase !== 'playing') return;
    const q = g.questions.find(qq => qq.questionNum === qnum);
    if (!q) return;
    q.userAnswer = answer;
    saveState();
    renderGanjilGenap();
  }
  
  let _ggInterval = null;
  
  function startGanjilGenapTimer() {
    if (_ggInterval) return; // already running, don't restart
    let tickCount = 0;
    _ggInterval = setInterval(() => {
      const g = state.ganjilGenap;
      if (!g) { clearInterval(_ggInterval); _ggInterval = null; return; }
      
      tickCount++;
      
      if (g.phase === 'playing') {
        g.roundTimeLeft--;
        
        // Generate 2 questions every second so user never waits
        generateGanjilGenapQuestion();
        generateGanjilGenapQuestion();
        
        // Update timer display
        const timerEl = document.getElementById('ggTimer');
        if (timerEl) {
          timerEl.textContent = g.roundTimeLeft + 's';
          timerEl.className = 'gg-timer';
          if (g.roundTimeLeft <= 10) timerEl.classList.add('danger');
          else if (g.roundTimeLeft <= 20) timerEl.classList.add('warning');
        }
        
        if (g.roundTimeLeft <= 0) {
          // Round over, start break or finish
          g.round++;
          if (g.round >= GG_TOTAL_ROUNDS) {
            // All rounds done
            finishGanjilGenap(false);
            return;
          }
          g.phase = 'break';
          g.breakTimeLeft = GG_BREAK_SECONDS;
          saveState();
          renderGanjilGenap();
          return;
        }
      } else if (g.phase === 'break') {
        g.breakTimeLeft--;
        const btEl = document.getElementById('ggBreakTimer');
        if (btEl) btEl.textContent = g.breakTimeLeft;
        
        if (g.breakTimeLeft <= 0) {
          // Break over, start next round
          g.phase = 'playing';
          g.roundTimeLeft = GG_ROUND_SECONDS;
          seedGanjilGenapRound();
          saveState();
          return;
        }
      }
      
      saveState();
    }, 1000);
  }
  
  function finishGanjilGenap(timedOut) {
    if (_ggInterval) { clearInterval(_ggInterval); _ggInterval = null; }
    
    const g = state.ganjilGenap;
    if (!g) return;
    
    g.finishedAt = Date.now();
    g.timedOut = !!timedOut;
    
    // Calculate scores per round
    let totalCorrect = 0;
    let totalQuestions = g.questions.length;
    let totalAnswered = g.questions.filter(q => q.userAnswer !== undefined).length;
    const roundStats = [];
    for (let r = 0; r < GG_TOTAL_ROUNDS; r++) {
      const rq = g.questions.filter(q => q.round === r);
      if (rq.length === 0) {
        roundStats.push({ round: r, correct: 0, wrong: 0, total: 0, answered: 0, score: 0 });
        continue;
      }
      const correct = rq.filter(q => q.userAnswer !== undefined && q.userAnswer === q.answer).length;
      const wrong = rq.filter(q => q.userAnswer !== undefined && q.userAnswer !== q.answer).length;
      const answeredInRound = rq.filter(q => q.userAnswer !== undefined).length;
      roundStats.push({ round: r, correct, wrong, total: rq.length, answered: answeredInRound, score: answeredInRound > 0 ? Math.round((correct / answeredInRound) * 100) : 0 });
      totalCorrect += correct;
    }
    
    // Skor = benar / yang dijawab (tidak dijawab tidak dianggap salah)
    const score = totalAnswered > 0 ? Math.round((totalCorrect / totalAnswered) * 100) : 0;
    const duration = Math.round((g.finishedAt - g.startedAt) / 1000);
    
    // Riwayat percobaan
    const prev = state.scores.ganjil_genap;
    const history = (prev && prev.history) ? [...prev.history] : [];
    history.push({
      correct: totalCorrect,
      total: totalQuestions,
      answered: totalAnswered,
      score,
      timedOut,
      duration,
      roundStats,
      completedAt: Date.now(),
    });
    
    const best = Math.max(...history.map(h => h.score));
    
    state.scores.ganjil_genap = {
      correct: totalCorrect,
      total: totalQuestions,
      answered: totalAnswered,
      score,
      bestScore: best,
      timedOut,
      duration,
      roundStats,
      history,
    };
    state.completedAt.ganjil_genap = Date.now();
    state.view = 'result';
    state.activeSection = 'ganjil_genap';
    saveState();
    render();
    
    // Submit to Supabase (hanya best score)
    if (currentUser && isLeaderboardEnabled()) {
      submitScoreToSupabase('ganjil_genap', { score: best, correct: totalCorrect, total: totalAnswered, duration, timedOut })
        .then(() => {
          if (state.view === 'result' && state.activeSection === 'ganjil_genap') render();
        });
    }
  }

  // ============ SELISIH ANGKA ============
  function generateSelisihQuestion() {
    for (let attempt = 0; attempt < 100; attempt++) {
      // d2: selisih terbesar dari nilai tengah (2–9)
      const d2 = Math.floor(Math.random() * 8) + 2;
      // gap antara kedua selisih: 1–5, max = d2-1 agar d1 ≥ 1
      const maxGap = Math.min(5, d2 - 1);
      if (maxGap < 1) continue;
      const gap = Math.floor(Math.random() * maxGap) + 1;
      // d1: selisih terkecil dari nilai tengah (pasti 1–8, tidak pernah sama dengan d2)
      const d1 = d2 - gap;

      // Letakkan satu angka di ATAS dan satu di BAWAH median
      // → median tidak pernah bergeser, tie tidak mungkin terjadi
      const median = Math.floor(Math.random() * 32) + 10; // 10–41
      // Acak: apakah d2 (selisih terbesar) ke atas atau ke bawah
      const bigGoesUp = Math.random() < 0.5;
      const upperNum = median + (bigGoesUp ? d2 : d1);
      const lowerNum = median - (bigGoesUp ? d1 : d2);

      if (upperNum > 50 || lowerNum < 1) continue;
      if (new Set([median, upperNum, lowerNum]).size < 3) continue;

      // Angka dengan selisih terbesar dari median adalah jawabannya
      const correct = bigGoesUp ? upperNum : lowerNum;

      // Safety: pastikan benar-benar tidak ada tie
      if (Math.abs(upperNum - median) === Math.abs(lowerNum - median)) continue;

      const nums = [median, upperNum, lowerNum];
      for (let i = 2; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [nums[i], nums[j]] = [nums[j], nums[i]];
      }
      return { nums, correct, middle: median };
    }
    // Fallback: tengah=13, atas=17 (diff 4), bawah=12 (diff 1), gap=3
    return { nums: [12, 13, 17], correct: 17, middle: 13 };
  }

        state.scores[sid] = {

          correct:   row.latest_correct,
          total:     row.latest_total,
          history
        };

        if (!state.completedAt[sid]) {
          state.completedAt[sid] = new Date(row.last_submitted_at).getTime();
        }
      });
      saveState();
      console.log(`[sync] Progress loaded: ${data.length} section(s) dari Supabase`);

    }
  }

  // ============ SELISIH HURUF ============
  function generateSelisihHurufQuestion() {
    for (let attempt = 0; attempt < 100; attempt++) {
      // d2: selisih terbesar dari median (2–7, min 2 agar gap ≥ 1 mungkin)
      const d2 = Math.floor(Math.random() * 6) + 2;
      // gap antara kedua selisih: 1–4, max = d2–1
      const maxGap = Math.min(4, d2 - 1);
      if (maxGap < 1) continue;
      const gap = Math.floor(Math.random() * maxGap) + 1;
      const d1 = d2 - gap;
      // median: indeks alfabet 1=A...26=Z, range 4–23 (D–W) agar ada ruang ±7
      const medianIdx = Math.floor(Math.random() * 20) + 4;
      // Letakkan satu huruf di atas dan satu di bawah median — cegah tie & median geser
      const bigGoesUp = Math.random() < 0.5;
      const upperIdx = medianIdx + (bigGoesUp ? d2 : d1);
      const lowerIdx = medianIdx - (bigGoesUp ? d1 : d2);
      if (upperIdx < 1 || upperIdx > 26 || lowerIdx < 1 || lowerIdx > 26) continue;
      if (new Set([medianIdx, upperIdx, lowerIdx]).size < 3) continue;
      if (Math.abs(upperIdx - medianIdx) === Math.abs(lowerIdx - medianIdx)) continue;
      const correctIdx = bigGoesUp ? upperIdx : lowerIdx;
      const correctLetter = String.fromCharCode(64 + correctIdx);
      const medianLetter = String.fromCharCode(64 + medianIdx);
      const otherLetter = String.fromCharCode(64 + (bigGoesUp ? lowerIdx : upperIdx));
      // Selalu urutkan A-Z → huruf tengah (median) selalu di posisi tengah tampilan
      const letters = [medianLetter, correctLetter, otherLetter].sort();
      return { letters, correct: correctLetter, middle: medianLetter };
    }
    // Fallback: L O Q → median O(15), L(12) diff 3, Q(17) diff 2 → correct L
    return { letters: ['L', 'O', 'Q'], correct: 'L', middle: 'O' };
  }

        byUser[uid] = {
          user_id: uid,
          username: s.users.username,
          display_name: s.users.display_name || s.users.username,
          sections: {},
        };
      }
      // Petakan bundle ID (verbal__paket_1) ke parent ID (verbal) untuk leaderboard
      const parentId = s.section_id.includes('__') ? s.section_id.split('__')[0] : s.section_id;
      const cur = byUser[uid].sections[parentId];
      if (cur === undefined || s.score > cur) {
        byUser[uid].sections[parentId] = s.score;
      }
    });

    let rows;
    if (state.lbTab === 'total') {
      // Total: average of best scores per section. Hanya hitung user yg udah complete >= 1 section
      rows = Object.values(byUser).map(u => {
        const sectionScores = sections.map(s => u.sections[s.id]).filter(v => v !== undefined);
        const avg = sectionScores.length > 0
          ? Math.round(sectionScores.reduce((a, b) => a + b, 0) / sectionScores.length)
          : 0;
        return {
          ...u,
          score: avg,
          completed: sectionScores.length,
          totalSections: sections.length,
        };
      }).filter(u => u.completed > 0)
        .sort((a, b) => b.score - a.score || b.completed - a.completed);
      
      content.innerHTML = `
        <p class="text-muted mb-4" style="font-size:13px">Rata-rata skor terbaik per section. Makin banyak section selesai, makin akurat.</p>
        <table class="lb-table">
          <thead>
            <tr>
              <th>Rank</th>
              <th>Nama</th>
              <th class="text-center">Section Selesai</th>
              <th style="text-align:right">Rata-rata</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map((u, i) => {
              const rank = i + 1;
              const rankCls = rank <= 3 ? `lb-rank-${rank}` : '';
              const isMe = currentUser && u.user_id === currentUser.id;
              return `
                <tr class="${isMe ? 'current-user' : ''}">
                  <td class="lb-rank ${rankCls}">${rank <= 3 ? ['🥇','🥈','🥉'][rank-1] : '#' + rank}</td>
                  <td>${escapeHtml(u.display_name)}${isMe ? ' (kamu)' : ''}</td>
                  <td style="text-align:center">${u.completed}/${u.totalSections}</td>
                  <td class="lb-score">${u.score}%</td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      `;
    } else {
      // Per section
      const sectionTitle = sections.find(s => s.id === state.lbTab)?.title || state.lbTab;
      rows = Object.values(byUser)
        .filter(u => u.sections[state.lbTab] !== undefined)
        .map(u => ({ ...u, score: u.sections[state.lbTab] }))
        .sort((a, b) => b.score - a.score);
      
      if (rows.length === 0) {
        content.innerHTML = `<div class="lb-empty">Belum ada yang ngerjain ${escapeHtml(sectionTitle)}. Jadi yang pertama!</div>`;
        return;
      }
      
      content.innerHTML = `
        <p class="text-muted mb-4" style="font-size:13px">Skor terbaik per orang di section <strong>${escapeHtml(sectionTitle)}</strong>.</p>
        <table class="lb-table">
          <thead>
            <tr>
              <th>Rank</th>
              <th>Nama</th>
              <th style="text-align:right">Skor</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map((u, i) => {
              const rank = i + 1;
              const rankCls = rank <= 3 ? `lb-rank-${rank}` : '';
              const isMe = currentUser && u.user_id === currentUser.id;
              return `
                <tr class="${isMe ? 'current-user' : ''}">
                  <td class="lb-rank ${rankCls}">${rank <= 3 ? ['🥇','🥈','🥉'][rank-1] : '#' + rank}</td>
                  <td>${escapeHtml(u.display_name)}${isMe ? ' (kamu)' : ''}</td>
                  <td class="lb-score">${u.score}%</td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      `;
    }
  }
  
  // ============ AUTO-PAUSE ON TAB CLOSE ============
  function autoPauseSession() {
    // Auto-submit sesi Selisih Angka jika sedang berjalan saat tab ditutup
    if (state.selisihAngka && state.selisihAngka.phase === 'playing') {
      saveSelisihAngkaScore();
    }
    // Auto-submit sesi Selisih Huruf jika sedang berjalan saat tab ditutup
    if (state.selisihHuruf && state.selisihHuruf.phase === 'playing') {
      saveSelisihHurufScore();
    }
    if (state.view === 'quiz' && state.activeSection) {
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
      if (_ggInterval) { clearInterval(_ggInterval); _ggInterval = null; }
      const sectionId = state.activeSection;
      // Simpan ke Supabase — kecuali ganjil_genap dan selisih_angka (sudah di-handle sendiri)
      if (currentUser && isLeaderboardEnabled() && sectionId !== 'ganjil_genap' && sectionId !== 'selisih_angka' && sectionId !== 'selisih_huruf') {
        const payload = {
          user_id: currentUser.id,
          section_id: sectionId,
          time_remaining_seconds: state.remainingTime[sectionId] || 0,
          answers: state.answers[sectionId] || {},
          current_index: state.currentIndex,
          paused_at: new Date().toISOString()
        };
        fetch(`${SUPABASE_URL}/rest/v1/paused_sessions?on_conflict=user_id,section_id`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            'Prefer': 'resolution=merge-duplicates'
          },
          body: JSON.stringify(payload),
          keepalive: true,
          credentials: 'omit'
        }).catch(e => console.error('Auto-pause Supabase error:', e));
      }
      // Hapus semua state lokal dan logout — pas buka lagi langsung ke login
      currentUser = null;
      saveUser(null);
      state = defaultState();
      pausedSessionsCache = {};
      window._autoResumeChecked = false;
      saveState();
    }
  }
  
  window.addEventListener('beforeunload', autoPauseSession);
  if ('pagehide' in window) window.addEventListener('pagehide', autoPauseSession);
  
  // ============ INIT ============
  document.getElementById('logoBtn').addEventListener('click', () => {
    state.view = 'home';
    saveState();
    render();
  });
  
  // Cek kalau Supabase belum konfigurasi, kasih warning ringan tapi tetap jalan
  if (!isLeaderboardEnabled()) {
    console.warn('Supabase belum dikonfigurasi. Leaderboard tidak aktif. Lihat SETUP_SUPABASE.md');
  }

  // Sync progress dari Supabase saat app dimuat (refresh) — jika sudah login
  // Ini memastikan progress selalu up-to-date tanpa perlu logout/login ulang
  render();
  if (currentUser && isLeaderboardEnabled()) {
    syncStateFromSupabase().then(() => {
      if (state.view === 'home' || state.view === 'leaderboard') render();
    });
  }
</script>
</body>
</html>
