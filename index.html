FFABRRRQAUUUUAFFFFABRRRQAUUUUAFFFFAH//2Q==", "options": {"A": "Pilihan A", "B": "Pilihan B", "C": "Pilihan C", "D": "Pilihan D", "E": "Pilihan E"}, "answer": "B", "explanation": ""}]}, "tkp": {"title": "Tes Karakteristik Pribadi", "duration": 1800, "order": 5, "type": "text", "questions": [{"number": 1, "question": "Anda sedang mengawasi proyek renovasi halte. Seorang vendor menawarkan \"uang saku\" tambahan agar Anda mempermudah proses verifikasi laporan kemajuan mereka yang sebenarnya belum 100% selesai. Sikap Anda adalah...", "options": {"A": "Menerimanya karena itu adalah hal lumrah dalam dunia bisnis.", "B": "Menolak dengan tegas dan meminta vendor fokus menyelesaikan pekerjaan sesuai kontrak.", "C": "Menerima uangnya tetapi tetap melaporkan apa adanya kepada atasan.", "D": "Menolak dan langsung memutus kontrak kerja sama saat itu juga tanpa lapor.", "E": "Mengabaikan tawaran tersebut dan bersikap seolah tidak terjadi apa-apa."}, "answer": "B", "explanation": "Integritas menuntut kejujuran dan kepatuhan pada aturan. Menolak secara tegas menunjukkan profesionalisme dan menjaga nama baik perusahaan dari praktik KKN. (GAMBAR/POLA)"}, {"number": 2, "question": "Rekan kerja Anda sering menggunakan fasilitas kantor, seperti printer dan kertas, untuk keperluan bisnis sampingan pribadinya. Apa yang Anda lakukan?", "options": {"A": "Membiarkannya karena hal itu tidak merugikan Anda secara langsung.", "B": "Menegurnya secara personal dan mengingatkan bahwa fasilitas kantor hanya untuk kepentingan perusahaan.", "C": "Melaporkannya langsung ke HRD tanpa menegur terlebih dahulu.", "D": "Ikut menggunakannya karena merasa itu adalah hak karyawan.", "E": "Membicarakan perilakunya dengan rekan kerja yang lain di kantin."}, "answer": "B", "explanation": "Menegur secara langsung menunjukkan keberanian untuk menjaga nilai-nilai perusahaan (profesionalisme) tanpa harus langsung menciptakan konflik besar (langsung lapor)."}, {"number": 3, "question": "Anda mendapati adanya kesalahan input data pada laporan bulanan yang sudah Anda serahkan ke atasan kemarin. Kesalahan tersebut kecil namun bisa memengaruhi sedikit angka statistik. Sikap Anda...", "options": {"A": "Membiarkannya saja karena atasan mungkin tidak akan menyadarinya.", "B": "Segera menghadap atasan, mengakui kesalahan, dan menyerahkan revisi yang benar.", "C": "Menunggu hingga ada orang lain yang menemukan kesalahan tersebut. BAB V: TES SPASIAL", "D": "Menyalahkan staf administrasi yang membantu Anda mengumpulkan data.", "E": "Memperbaiki data secara diam-diam di sistem tanpa memberi tahu siapapun."}, "answer": "B", "explanation": "Mengakui kesalahan adalah bentuk tanggung jawab dan integritas diri yang sangat dihargai pada level pimpinan (MT)."}, {"number": 4, "question": "Anda sedang terburu-buru menuju rapat penting, namun Anda melihat seorang penumpang lansia kesulitan menggunakan mesin tapping di halte. Apa yang Anda lakukan?", "options": {"A": "Mengabaikannya karena rapat jauh lebih penting dan sudah ada petugas layanan di sana.", "B": "Berhenti sejenak untuk membantunya dengan cepat, lalu segera melanjutkan perjalanan.", "C": "Berteriak memanggil petugas dari kejauhan agar mereka yang membantu.", "D": "Meminta maaf kepada penumpang tersebut karena Anda sedang terburu-buru.", "E": "Berhenti dan membantunya sampai benar-benar tuntas meski harus terlambat rapat."}, "answer": "B", "explanation": "Kepedulian terhadap pelanggan (service excellence) adalah nilai inti Transjakarta, namun tetap harus diimbangi dengan efisiensi waktu (profesionalisme). (GAMBAR/POLA)"}, {"number": 5, "question": "Saat sedang bertugas, Anda melihat seorang rekan MT lainnya pulang lebih awal dari jam kantor tanpa izin resmi dari atasan. Sikap Anda...", "options": {"A": "Mengikutinya pulang awal karena pekerjaan sudah selesai.", "B": "Tetap bekerja sesuai jam kantor dan tidak ikut campur urusannya.", "C": "Mengingatkannya esok hari bahwa perilaku tersebut melanggar kedisiplinan.", "D": "Langsung mengadukannya ke grup WhatsApp divisi agar menjadi pelajaran.", "E": "Membantu merahasiakan hal tersebut jika ada yang bertanya."}, "answer": "C", "explanation": "Menjaga kedisiplinan tim dimulai dari saling mengingatkan antar rekan sejawat."}, {"number": 6, "question": "Perusahaan menerapkan kebijakan penghematan biaya operasional. Anda melihat ada ruangan yang lampunya tetap menyala meski sudah tidak digunakan. Sikap Anda...", "options": {"A": "Membiarkannya karena itu tugas petugas kebersihan.", "B": "Mematikan lampu tersebut sebagai bentuk kepedulian terhadap efisiensi perusahaan.", "C": "Melaporkan kepada bagian sarana prasarana agar ditegur pemakainya.", "D": "Menunggu orang terakhir yang keluar ruangan untuk mematikannya. BAB V: TES SPASIAL", "E": "Mengambil foto dan membagikannya di grup kantor untuk menyindir."}, "answer": "B", "explanation": "Rasa memiliki (sense of belonging) terhadap aset dan biaya perusahaan adalah karakteristik penting MT."}, {"number": 7, "question": "Anda diberi tugas yang sangat sulit dan belum pernah Anda kerjakan sebelumnya oleh atasan. Respons Anda...", "options": {"A": "Meminta bantuan rekan lain untuk mengerjakan sepenuhnya.", "B": "Menolak tugas tersebut karena takut hasilnya tidak maksimal.", "C": "Menerima dengan ragu-ragu dan mengerjakannya sebisanya.", "D": "Menerima, mempelajari tugas tersebut, dan berkonsultasi dengan atasan jika ada kendala.", "E": "Mengeluh kepada rekan kerja tentang beratnya tugas yang diberikan."}, "answer": "D", "explanation": "Menunjukkan semangat belajar dan keterbukaan terhadap tantangan baru (kemauan untuk berkembang)."}, {"number": 8, "question": "Dalam sebuah diskusi, pendapat Anda ditolak oleh mayoritas tim karena dianggap kurang relevan dengan kondisi lapangan. Sikap Anda...", "options": {"A": "Marah dan memutuskan untuk tidak lagi berpendapat di pertemuan berikutnya.", "B": "Menerima keputusan tim dengan lapang dada dan mendukung hasil diskusi tersebut. (GAMBAR/POLA)", "C": "Berusaha keras mempertahankan pendapat Anda sampai rapat berakhir.", "D": "Keluar dari ruangan rapat karena merasa tidak dihargai.", "E": "Menerima namun bekerja setengah hati untuk membuktikan pendapat mereka salah."}, "answer": "B", "explanation": "Kerja sama tim dan kedewasaan dalam berorganisasi menuntut kemampuan untuk menerima konsensus."}, {"number": 9, "question": "Anda melihat seorang pengemudi bus Transjakarta mengemudi dengan ugal- ugalan saat Anda sedang tidak dalam jam dinas. Apa yang Anda lakukan?", "options": {"A": "Mengabaikannya karena sedang tidak bekerja.", "B": "Mencatat nomor lambung bus dan melaporkannya ke divisi operasional/layanan pelanggan.", "C": "Mengejar bus tersebut dan memarahi supirnya di jalan.", "D": "Memvideokannya dan memviralkannya di sosial media pribadi.", "E": "Hanya bergumam dalam hati tentang buruknya kualitas supir tersebut."}, "answer": "B", "explanation": "Menjaga standar layanan perusahaan adalah tanggung jawab setiap karyawan setiap saat melalui jalur resmi."}, {"number": 10, "question": "Atasan Anda memberikan instruksi yang menurut Anda melanggar SOP perusahaan. Apa yang Anda lakukan? BAB V: TES SPASIAL", "options": {"A": "Langsung melaksanakan karena dia adalah atasan Anda.", "B": "Mengingatkan atasan mengenai SOP tersebut secara sopan dan menanyakan dasar instruksinya.", "C": "Melaporkan atasan tersebut ke divisi audit secara diam-diam.", "D": "Menolak mentah-mentah instruksinya di depan rekan kerja lain.", "E": "Melaksanakan instruksi tersebut tetapi menyimpan buktinya untuk melindungi diri sendiri."}, "answer": "B", "explanation": "Integritas profesional berarti berani mengingatkan demi kebenaran aturan dengan cara yang tetap santun (etiket). Kerja Sama Tim & Adaptasi."}, {"number": 11, "question": "Tim Anda sedang mengerjakan proyek analisis kepadatan rute baru, namun salah satu anggota tim terlihat sangat pasif dan sering menunda pekerjaan. Sikap Anda adalah...", "options": {"A": "Melaporkannya kepada Manajer agar ia segera diganti dari tim.", "B": "Mengambil alih pekerjaannya agar proyek tetap selesai tepat waktu.", "C": "Mengajaknya berdiskusi secara personal untuk mengetahui kendalanya dan menawarkan bantuan.", "D": "Membiarkannya saja karena setiap orang memiliki tanggung jawab masing-masing. (GAMBAR/POLA)", "E": "Menegurnya dengan keras di depan anggota tim lain agar ia merasa malu dan berubah."}, "answer": "C", "explanation": "Kerja sama tim yang efektif membutuhkan komunikasi dua arah. Mencari tahu masalah anggota tim menunjukkan empati dan jiwa kepemimpinan yang solutif."}, {"number": 12, "question": "Perusahaan tiba-tiba mengubah sistem pelaporan operasional dari manual ke aplikasi digital yang cukup rumit. Anda merasa kesulitan, namun sistem ini harus digunakan mulai besok. Anda akan...", "options": {"A": "Meminta izin untuk tetap menggunakan sistem manual sampai Anda benar-benar siap.", "B": "Mengeluhkan perubahan tersebut karena dianggap menambah beban kerja.", "C": "Segera mempelajari modul penggunaan aplikasi secara mandiri dan bertanya pada rekan yang lebih paham.", "D": "Menunggu instruksi lanjutan dan baru akan menggunakan aplikasi jika sudah dipaksa.", "E": "Mengandalkan rekan kerja untuk menginput data Anda ke sistem baru tersebut."}, "answer": "C", "explanation": "Adaptasi terhadap teknologi adalah kewajiban bagi seorang MT. Semangat belajar mandiri (learning agility) adalah nilai plus yang dicari perusahaan. BAB V: TES SPASIAL"}, {"number": 13, "question": "Anda ditunjuk menjadi ketua kelompok dalam sebuah tugas besar, namun anggota kelompok Anda terdiri dari orang-orang yang lebih senior secara usia dan pengalaman. Apa yang Anda lakukan?", "options": {"A": "Merasa rendah diri dan menyerahkan kepemimpinan kepada anggota yang paling senior.", "B": "Bersikap otoriter agar para senior menghargai posisi Anda sebagai ketua.", "C": "Tetap percaya diri, menghormati pengalaman mereka, dan merangkul semua masukan untuk mencapai tujuan bersama.", "D": "Hanya melakukan tugas administratif dan membiarkan mereka bekerja sendiri-sendiri.", "E": "Meminta atasan untuk mengganti anggota kelompok dengan yang sebaya."}, "answer": "C", "explanation": "Kepemimpinan bukan soal umur, tapi soal bagaimana Anda bisa mengelola potensi tim dan menghargai kontribusi setiap anggota dengan tetap profesional."}, {"number": 14, "question": "Terjadi konflik antara dua rekan kerja Anda di kantor yang mulai mengganggu suasana kerja tim. Posisi Anda dalam hal ini adalah...", "options": {"A": "Menghindar karena tidak ingin terlibat dalam masalah pribadi orang lain.", "B": "Mendengarkan salah satu pihak dan ikut menyalahkan pihak lainnya.", "C": "Berusaha menjadi penengah yang netral dan mengajak mereka fokus kembali pada target tim. (GAMBAR/POLA)", "D": "Melaporkan kedua rekan tersebut ke atasan agar keduanya diberikan sanksi.", "E": "Membicarakan konflik mereka kepada rekan-rekan di divisi lain."}, "answer": "C", "explanation": "Kemampuan resolusi konflik sangat penting untuk menjaga harmoni dan produktivitas tim di lingkungan kerja."}, {"number": 15, "question": "Anda sudah merancang jadwal kerja tim dengan sangat rapi, namun tiba-tiba atasan memberikan tugas darurat yang harus selesai hari ini juga. Sikap Anda...", "options": {"A": "Menolak tugas tersebut karena akan merusak jadwal yang sudah Anda buat.", "B": "Menerima dengan terpaksa dan bekerja sambil menggerutu.", "C": "Segera mendiskusikan skala prioritas dengan tim dan menyesuaikan jadwal agar tugas darurat tersebut tuntas.", "D": "Meminta atasan untuk memberikan tugas tersebut kepada tim lain yang lebih longgar.", "E": "Mengerjakan tugas tersebut sendirian tanpa melibatkan tim agar jadwal lama tidak berubah."}, "answer": "C", "explanation": "Fleksibilitas dalam bekerja (adaptabilitas) terhadap perubahan situasi yang mendadak adalah ciri khas karyawan yang berorientasi pada hasil."}, {"number": 16, "question": "Ketika ide yang Anda sampaikan dalam rapat tidak digunakan oleh tim, perasaan Anda adalah... BAB V: TES SPASIAL", "options": {"A": "Kecewa dan tidak ingin memberikan masukan lagi di rapat berikutnya.", "B": "Menerima keputusan tersebut dan berusaha memahami mengapa ide lain dianggap lebih baik.", "C": "Tetap mempromosikan ide Anda secara terus-menerus di luar rapat.", "D": "Berhenti bekerja secara maksimal sebagai bentuk protes.", "E": "Merasa rekan tim tidak mampu memahami kecerdasan ide Anda."}, "answer": "B", "explanation": "Kedewasaan dalam menerima perbedaan pendapat menunjukkan Anda adalah pemain tim (team player) yang baik."}, {"number": 17, "question": "Anda dipindahkan ke divisi yang sama sekali baru dan belum pernah Anda pelajari sebelumnya. Apa langkah pertama Anda?", "options": {"A": "Meminta waktu satu bulan untuk beradaptasi sebelum mulai bekerja serius.", "B": "Meminta dipindahkan kembali ke divisi lama karena sudah merasa nyaman.", "C": "Mengamati cara kerja tim baru, bertanya tentang SOP, dan segera menjalin hubungan baik dengan rekan baru.", "D": "Menunggu perintah dari atasan baru tanpa melakukan inisiatif apapun.", "E": "Bekerja dengan gaya lama yang Anda gunakan di divisi sebelumnya."}, "answer": "C", "explanation": "Proaktif dalam mengenali lingkungan baru adalah bentuk adaptasi yang efisien agar produktivitas tidak terhambat."}, {"number": 18, "question": "Salah satu rekan kerja Anda sedang berduka dan harus mengambil cuti mendadak, sehingga pekerjaannya terbengkalai. Sikap Anda...", "options": {"A": "Membiarkannya karena itu adalah risiko perusahaan.", "B": "Menunggu perintah atasan untuk membantu menyelesaikan pekerjaannya.", "C": "Secara sukarela menawarkan diri untuk membantu bagian pekerjaan yang mendesak agar target tim tercapai.", "D": "Meminta bagian SDM untuk segera mencari pengganti sementara.", "E": "Mengeluh karena beban kerja tim menjadi bertambah berat."}, "answer": "C", "explanation": "Membantu rekan yang sedang kesulitan merupakan bentuk solidaritas dan komitmen terhadap kesuksesan tim secara keseluruhan."}, {"number": 19, "question": "Anda melihat metode kerja yang digunakan tim saat ini kurang efektif dan membuang banyak waktu. Apa yang akan Anda lakukan?", "options": {"A": "Langsung mengganti metode tersebut tanpa berkonsultasi dengan siapa pun.", "B": "Mengikuti saja cara lama karena sudah menjadi tradisi tim. BAB V: TES SPASIAL", "C": "Mengumpulkan data pendukung dan mengusulkan perbaikan metode kepada atasan dan tim secara sopan.", "D": "Menyindir rekan kerja yang menggunakan cara lama tersebut.", "E": "Melakukan perbaikan hanya untuk pekerjaan pribadi Anda sendiri."}, "answer": "C", "explanation": "Inovasi dan keinginan untuk melakukan perbaikan berkelanjutan (continuous improvement) adalah kualitas pemimpin masa depan."}, {"number": 20, "question": "Dalam sebuah kegiatan outbond kantor, Anda ditempatkan dalam kelompok yang tidak Anda kenal baik. Anda akan...", "options": {"A": "Lebih banyak diam dan hanya bicara jika ditanya.", "B": "Berusaha mencairkan suasana dan mengenal rekan kelompok agar bisa bekerja sama dengan baik.", "C": "Meminta panitia untuk memindahkan Anda ke kelompok teman dekat Anda.", "D": "Memisahkan diri dari kegiatan kelompok karena merasa tidak nyaman.", "E": "Hanya mengikuti kegiatan secara formalitas tanpa interaksi lebih jauh."}, "answer": "B", "explanation": "Kemampuan menjalin jejaring (networking) dan keterbukaan terhadap orang baru sangat mendukung koordinasi kerja di kemudian hari. (GAMBAR/POLA) Kepemimpinan (Leadership) & Orientasi Pelayanan (Service Orientation). Sebagai calon pemimpin di Transjakarta, lo nggak cuma harus jago ngatur orang, tapi juga harus punya insting melayani masyarakat. Karena inti dari BUMD ini adalah pelayanan publik, MT dituntut punya empati tinggi namun tetap tegas dalam menegakkan aturan operasional di lapangan."}, {"number": 21, "question": "Anda melihat antrean penumpang di sebuah halte sangat panjang dan mulai tidak teratur karena bus terlambat datang. Apa yang Anda lakukan sebagai seorang calon pemimpin?", "options": {"A": "Membiarkannya karena sudah ada petugas halte yang berjaga di sana.", "B": "Menghubungi pusat kendali untuk meminta tambahan armada dan ikut membantu petugas menertibkan antrean.", "C": "Menghindari area tersebut agar tidak diprotes oleh penumpang yang marah.", "D": "Mengambil foto kondisi tersebut dan membagikannya ke media sosial untuk menarik perhatian atasan.", "E": "Menyalahkan petugas halte di depan umum karena tidak becus mengatur antrean."}, "answer": "B", "explanation": "Jiwa kepemimpinan dan orientasi pelayanan ditunjukkan dengan mengambil inisiatif untuk menyelesaikan masalah secara sistemik (koordinasi pusat) dan praktis (turun tangan)."}, {"number": 22, "question": "Salah satu anggota tim Anda melakukan kesalahan fatal yang mengakibatkan keterlambatan operasional satu koridor. Atasan BAB V: TES SPASIAL memanggil Anda untuk meminta penjelasan. Sikap Anda...", "options": {"A": "Menyebutkan nama anggota tim tersebut agar dia yang menanggung sanksinya.", "B": "Mengatakan bahwa itu adalah murni kesalahan teknis di luar kendali tim.", "C": "Bertanggung jawab atas kesalahan tim, menjelaskan kronologinya, dan menyampaikan rencana perbaikannya.", "D": "Meminta maaf dan berjanji akan memarahi anggota tim tersebut setelah rapat.", "E": "Mengalihkan pembicaraan ke prestasi tim lainnya agar kesalahan tersebut terlupakan."}, "answer": "C", "explanation": "Accountability (tanggung jawab) adalah syarat mutlak bagi seorang pemimpin. Pemimpin yang baik membela timnya di luar namun melakukan evaluasi di dalam."}, {"number": 23, "question": "Anda sedang makan di sebuah restoran saat melihat seorang pelanggan lain memarahi salah satu petugas Transjakarta yang sedang beristirahat dengan kasar. Apa tindakan Anda?", "options": {"A": "Mengabaikannya karena itu bukan urusan Anda dan Anda sedang tidak bertugas.", "B": "Menghampiri mereka, membela rekan sejawat, dan memarahi balik pelanggan tersebut.", "C": "Menghampiri secara tenang, mendengarkan keluhan pelanggan tersebut, dan memberikan solusi atau penjelasan yang tepat tanpa menjatuhkan wibawa rekan Anda. (GAMBAR/POLA)", "D": "Melaporkan pelanggan tersebut ke polisi atas perbuatan tidak menyenangkan.", "E": "Menyuruh petugas tersebut segera pergi agar tidak terjadi keributan lebih lanjut."}, "answer": "C", "explanation": "Orientasi pelayanan tetap harus dijaga dalam kondisi apapun. Menjadi penengah yang bijak menunjukkan kematangan emosi dan kepemimpinan."}, {"number": 24, "question": "Bagaimana cara Anda memotivasi anggota tim yang mulai jenuh dengan pekerjaan rutin di divisi operasional?", "options": {"A": "Memberikan ancaman sanksi jika kinerja mereka terus menurun.", "B": "Mengabaikannya karena kejenuhan adalah hal yang biasa dalam bekerja.", "C": "Melakukan pendekatan personal, mengingatkan kembali dampak penting pekerjaan mereka bagi warga Jakarta, dan memberikan variasi tugas jika memungkinkan.", "D": "Menjanjikan kenaikan gaji secara sepihak tanpa persetujuan manajemen.", "E": "Memberikan libur panjang meskipun pekerjaan sedang menumpuk."}, "answer": "C", "explanation": "Pemimpin harus mampu menginspirasi tim dengan memberikan makna pada pekerjaan mereka (purpose- driven leadership)."}, {"number": 25, "question": "Anda ditugaskan untuk memimpin sebuah unit yang memiliki tingkat produktivitas paling rendah di BAB V: TES SPASIAL perusahaan. Langkah pertama Anda adalah...", "options": {"A": "Melakukan perombakan besar-besaran dan memecat staf yang kinerjanya buruk.", "B": "Melakukan observasi, berdiskusi dengan anggota unit untuk mencari akar masalah, dan menyusun strategi perbaikan bersama.", "C": "Meminta anggaran tambahan yang besar sebelum mulai bekerja.", "D": "Meniru mentah-mentah cara kerja unit lain yang lebih sukses.", "E": "Mengeluh kepada manajemen bahwa tugas tersebut sangat berat."}, "answer": "B", "explanation": "Pendekatan berbasis data dan komunikasi (diagnosa masalah) adalah langkah awal kepemimpinan yang efektif sebelum mengambil kebijakan."}, {"number": 26, "question": "Seorang penumpang difabel mengeluh karena fasilitas ramp di salah satu halte rusak. Sebagai MT, respons Anda adalah...", "options": {"A": "Mengucapkan terima kasih atas informasinya dan berjanji akan melaporkannya.", "B": "Meminta maaf secara tulus, segera menghubungi bagian sarana prasarana untuk perbaikan darurat, dan membantu penumpang tersebut secara manual jika diperlukan.", "C": "Memberi tahu penumpang tersebut bahwa perbaikan fasilitas umum membutuhkan waktu yang lama. (GAMBAR/POLA)", "D": "Menyuruh penumpang tersebut menggunakan halte lain yang fasilitasnya lebih baik.", "E": "Berargumen bahwa rusaknya fasilitas adalah akibat ulah penumpang lain."}, "answer": "B", "explanation": "Service Excellence berarti memberikan solusi nyata dengan empati tinggi, bukan sekadar janji atau alasan."}, {"number": 27, "question": "Anda harus mengambil keputusan penting terkait pengalihan rute bus karena ada demonstrasi, namun Anda tidak bisa menghubungi atasan Anda saat itu. Sikap Anda...", "options": {"A": "Menunggu sampai atasan bisa dihubungi meskipun terjadi kemacetan parah.", "B": "Mengambil keputusan berdasarkan SOP yang berlaku dan segera melaporkannya saat atasan sudah tersedia.", "C": "Meminta pendapat supir bus dan mengikuti apa kata mereka saja.", "D": "Tidak melakukan apa-apa agar tidak disalahkan jika keputusan tersebut salah.", "E": "Menyerahkan keputusan kepada petugas kepolisian di lapangan sepenuhnya."}, "answer": "B", "explanation": "Keberanian mengambil keputusan (decisiveness) dalam situasi mendesak dengan tetap berbasis pada aturan (SOP) adalah ciri pemimpin mandiri."}, {"number": 28, "question": "Dalam penilaian kinerja, staf Anda memberikan masukan bahwa Anda terlalu kaku dalam memimpin. Bagaimana reaksi Anda? BAB V: TES SPASIAL", "options": {"A": "Menolak masukan tersebut karena merasa posisi Anda lebih tinggi.", "B": "Mencari tahu siapa yang memberikan masukan tersebut dan memberinya tugas lebih berat.", "C": "Menerima masukan tersebut sebagai bahan evaluasi diri dan mencoba lebih fleksibel tanpa mengurangi ketegasan.", "D": "Langsung mengubah gaya kepemimpinan secara drastis menjadi sangat santai.", "E": "Berhenti memberikan instruksi apapun karena merasa tidak dihargai."}, "answer": "C", "explanation": "Keterbukaan terhadap kritik (self-awareness) adalah tanda pimpinan yang memiliki kemauan untuk terus bertumbuh."}, {"number": 29, "question": "Anda melihat ada peluang untuk meningkatkan efisiensi waktu tempuh di sebuah koridor, namun ide Anda berisiko memicu protes dari sebagian kecil warga. Apa yang Anda lakukan?", "options": {"A": "Membatalkan ide tersebut karena tidak mau menghadapi konflik.", "B": "Langsung mengeksekusi ide tersebut tanpa pemberitahuan kepada warga.", "C": "Melakukan kajian mendalam, mensosialisasikan rencana tersebut, dan mencari solusi jalan tengah bagi warga yang terdampak.", "D": "Menyerahkan ide tersebut kepada rekan lain agar mereka yang menanggung risikonya. (GAMBAR/POLA)", "E": "Melakukan perubahan secara diam-diam agar tidak ketahuan."}, "answer": "C", "explanation": "Pemimpin harus berorientasi pada kemajuan namun tetap mengedepankan etika komunikasi dan manajemen pemangku kepentingan."}, {"number": 30, "question": "Di tengah kesibukan pekerjaan kantor, Anda diminta untuk menjadi pembicara dalam acara penyambutan karyawan baru. Sikap Anda...", "options": {"A": "Menolak karena pekerjaan teknis Anda jauh lebih mendesak.", "B": "Menerima dan mempersiapkan materi yang memotivasi untuk membangun budaya kerja yang baik sejak dini.", "C": "Menerima tetapi datang terlambat agar terlihat sebagai orang penting yang sibuk.", "D": "Meminta orang lain untuk menggantikan Anda di menit-menit terakhir.", "E": "Datang dan hanya membaca teks yang sudah disiapkan tanpa antusiasme."}, "answer": "B", "explanation": "MT diharapkan menjadi role model yang mampu merepresentasikan nilai- nilai perusahaan kepada orang lain. Orientasi pada Hasil & Ketabahan Sebagai calon Management Trainee (MT) di Transjakarta, lo bakal menghadapi target operasional yang tinggi, tekanan dari publik, dan situasi lapangan yang dinamis. Perusahaan pengen liat sejauh mana lo bisa BAB V: TES SPASIAL tetap fokus pada hasil kerja tanpa mengabaikan kualitas dan aturan yang ada."}, {"number": 31, "question": "Anda diberikan target untuk meningkatkan efisiensi penggunaan bahan bakar armada sebesar 10% dalam tiga bulan, namun pada bulan kedua hasil yang terlihat baru mencapai 2%. Sikap Anda adalah...", "options": {"A": "Merasa putus asa dan menganggap target tersebut mustahil dicapai.", "B": "Mengevaluasi strategi yang telah dijalankan, mencari titik hambatnya, dan bekerja lebih keras serta cerdas untuk mengejar ketertinggalan di bulan terakhir.", "C": "Melaporkan kepada atasan bahwa target perlu dikurangi karena kondisi lapangan yang sulit.", "D": "Menyalahkan tim teknis karena dianggap tidak mendukung ide Anda.", "E": "Memanipulasi data laporan agar terlihat seolah-olah target sudah tercapai."}, "answer": "B", "explanation": "Orientasi pada hasil menuntut kegigihan dan kemampuan evaluasi mandiri untuk tetap mencapai tujuan meski ada hambatan di tengah jalan."}, {"number": 32, "question": "Ketika Anda sedang lelah setelah seharian bekerja di lapangan, tiba-tiba muncul masalah teknis besar yang menuntut Anda untuk tetap tinggal di kantor hingga larut malam. Sikap Anda...", "options": {"A": "Langsung pulang karena jam kerja sudah selesai dan Anda merasa sangat lelah. (GAMBAR/POLA)", "B": "Mengerjakannya dengan bersungut- sungut dan mengeluh di sepanjang waktu kerja.", "C": "Menghadapi masalah tersebut dengan tenang, menyelesaikannya sampai tuntas, dan menganggapnya sebagai risiko profesi yang harus dijalani.", "D": "Meminta rekan kerja lain untuk menggantikan posisi Anda tanpa izin atasan.", "E": "Meninggalkan pekerjaan tersebut dan berjanji akan menyelesaikannya besok pagi- pagi sekali."}, "answer": "C", "explanation": "Ketabahan (resilience) dan komitmen pada tugas adalah nilai penting bagi seorang MT yang dipersiapkan menjadi pemimpin masa depan."}, {"number": 33, "question": "Anda sedang mempresentasikan ide inovasi di depan direksi, namun di tengah presentasi, salah satu direktur memberikan kritik yang sangat tajam dan menjatuhkan mental Anda. Apa yang Anda lakukan?", "options": {"A": "Berhenti presentasi dan langsung meninggalkan ruangan karena merasa terhina.", "B": "Mendengarkan kritik tersebut dengan kepala dingin, mencatat poin-poinnya, dan berusaha memberikan argumentasi logis untuk membela ide Anda.", "C": "Memarahi balik direktur tersebut karena menganggap kritiknya tidak konstruktif.", "D": "Langsung setuju dengan semua kritik meski sebenarnya Anda yakin ide Anda benar. BAB V: TES SPASIAL", "E": "Diam saja dengan wajah murung sampai sesi presentasi berakhir."}, "answer": "B", "explanation": "Seorang pemimpin harus memiliki ketahanan mental yang kuat (emotional stability) saat menghadapi tekanan atau kritik dari pihak lain."}, {"number": 34, "question": "Dalam bekerja, Anda cenderung...", "options": {"A": "Melakukan tugas hanya sesuai dengan apa yang ada di uraian pekerjaan (job description).", "B": "Berusaha memberikan hasil yang lebih baik dari standar minimum yang ditetapkan perusahaan.", "C": "Menghindari tugas-tugas yang memiliki risiko kegagalan tinggi.", "D": "Bekerja sangat keras jika sedang diawasi oleh atasan saja.", "E": "Menyerahkan hasil kerja apa adanya asal tidak melewati batas waktu."}, "answer": "B", "explanation": "Orientasi pada hasil yang tinggi ditandai dengan keinginan untuk melampaui standar prestasi yang ada."}, {"number": 35, "question": "Perusahaan sedang mengalami masa sulit dan harus memangkas beberapa fasilitas karyawan. Sikap Anda terhadap situasi ini...", "options": {"A": "Ikut menyebarkan keresahan kepada rekan kerja lain agar ikut memprotes kebijakan tersebut.", "B": "Mengurangi kualitas kerja sebagai bentuk protes atas hilangnya fasilitas. (GAMBAR/POLA)", "C": "Memahami kondisi perusahaan, tetap bekerja produktif, dan mencari cara kreatif untuk membantu perusahaan bangkit kembali.", "D": "Segera mencari lowongan kerja di perusahaan lain karena merasa tidak lagi nyaman.", "E": "Menuntut perusahaan untuk tetap memberikan fasilitas tanpa peduli kondisi keuangan yang ada."}, "answer": "C", "explanation": "Kesetiaan dan ketabahan dalam menghadapi masa sulit menunjukkan integritas dan kedewasaan seorang profesional."}, {"number": 36, "question": "Saat menghadapi pekerjaan yang sangat menumpuk dengan batas waktu yang sangat mepet, tindakan Anda adalah...", "options": {"A": "Memilih untuk mengerjakan yang termudah saja agar terlihat sudah banyak bekerja.", "B": "Membuat skala prioritas, fokus pada penyelesaian satu per satu secara efektif, dan jika perlu meminta bantuan tim.", "C": "Mengeluh kepada setiap orang yang Anda temui mengenai beban kerja Anda.", "D": "Menunda-nunda pengerjaan karena merasa terlalu stres melihat tumpukan tugas.", "E": "Mengerjakan semuanya secara terburu- buru sehingga banyak terjadi kesalahan."}, "answer": "B", "explanation": "Manajemen waktu dan fokus pada solusi adalah bagian dari kompetensi orientasi pada hasil."}, {"number": 37, "question": "Anda gagal dalam mengelola sebuah proyek kecil yang dipercayakan kepada Anda untuk pertama kalinya. Sikap Anda...", "options": {"A": "Menyesali kegagalan tersebut secara berlarut-larut sampai sulit fokus bekerja lagi.", "B": "Menganalisis penyebab kegagalan tersebut, menjadikannya pembelajaran berharga, dan siap bangkit untuk tugas berikutnya.", "C": "Mencari-cari alasan eksternal (seperti cuaca atau sistem) untuk membenarkan kegagalan Anda.", "D": "Berharap atasan tidak memberikan tugas serupa lagi di masa depan.", "E": "Menyembunyikan fakta kegagalan tersebut dari rekan kerja lainnya."}, "answer": "B", "explanation": "Ketabahan melibatkan kemampuan untuk bangkit dari kegagalan (bounce back) dan belajar dari pengalaman tersebut."}, {"number": 38, "question": "Perusahaan menerapkan jam kerja yang sangat dinamis untuk posisi MT, terkadang harus masuk di hari libur jika ada keadaan darurat. Sikap Anda...", "options": {"A": "Menolak masuk di hari libur karena itu adalah hak pribadi Anda.", "B": "Masuk dengan perasaan dongkol dan tidak melakukan pekerjaan dengan maksimal. (GAMBAR/POLA)", "C": "Menyadari konsekuensi pekerjaan sejak awal dan bersedia menjalaninya demi kelancaran operasional publik.", "D": "Masuk hari ini namun akan meminta kompensasi libur tiga kali lipat di kemudian hari.", "E": "Mematikan ponsel agar tidak bisa dihubungi saat hari libur."}, "answer": "C", "explanation": "Komitmen pada organisasi dan pelayanan publik membutuhkan dedikasi yang lebih dari sekadar jam kerja formal."}, {"number": 39, "question": "Ide Anda untuk meningkatkan keamanan di halte telah dijalankan, namun ternyata hasilnya belum terlihat signifikan setelah satu bulan berjalan. Anda akan...", "options": {"A": "Langsung menghentikan program tersebut dan kembali ke cara lama.", "B": "Melakukan penyesuaian pada metode pelaksanaan, memantau lebih ketat, dan memberikan waktu tambahan untuk melihat progresnya.", "C": "Menganggap warga Jakarta memang sulit untuk diatur sehingga program apapun akan gagal.", "D": "Melaporkan kepada atasan bahwa ide tersebut sebenarnya bagus, hanya pelaksanaannya saja yang buruk.", "E": "Tidak peduli lagi karena yang penting Anda sudah pernah memberikan ide."}, "answer": "B", "explanation": "Konsistensi dan ketekunan diperlukan untuk mencapai hasil jangka panjang yang diinginkan."}, {"number": 40, "question": "Menurut Anda, keberhasilan dalam sebuah pekerjaan ditentukan oleh...", "options": {"A": "Keberuntungan dan koneksi yang dimiliki dengan orang dalam.", "B": "Kerja keras, kegigihan, dan kemauan untuk terus belajar dari kesalahan.", "C": "Instruksi atasan yang selalu tepat dan tidak pernah salah.", "D": "Kondisi lingkungan kerja yang selalu nyaman tanpa tekanan.", "E": "Fasilitas kantor yang lengkap dan canggih."}, "answer": "B", "explanation": "Keyakinan bahwa hasil ditentukan oleh usaha internal (internal locus of control) adalah ciri individu yang berorientasi pada prestasi. Inovasi & Teknologi serta Pengambilan Keputusan Etis. Gas? Sebagai calon Management Trainee (MT) di PT Transportasi Jakarta, lo diharapkan menjadi agen perubahan yang mampu memanfaatkan teknologi untuk efisiensi publik serta tetap berpegang teguh pada etika kerja."}, {"number": 41, "question": "Anda melihat bahwa proses antrean di halte bisa dipercepat jika menggunakan sistem scan QR Code mandiri, namun beberapa staf senior merasa cara lama sudah cukup baik. Apa yang Anda lakukan? (GAMBAR/POLA)", "options": {"A": "Membatalkan ide tersebut karena tidak ingin berkonflik dengan staf senior.", "B": "Menjalankan sistem tersebut secara diam- diam tanpa sepengetahuan staf senior.", "C": "Menjelaskan keuntungan sistem baru secara data dan mengajak staf senior untuk mencoba mengoperasikannya bersama- sama.", "D": "Memaksa staf senior untuk mengikuti ide Anda karena Anda adalah calon pimpinan.", "E": "Mengadukan penolakan staf senior tersebut kepada Manajer agar mereka ditegur."}, "answer": "C", "explanation": "Mengajak kolaborasi dan memberikan pembuktian berbasis data adalah cara terbaik untuk mengimplementasikan inovasi tanpa merusak hubungan tim."}, {"number": 42, "question": "Perusahaan sedang mempertimbangkan penggunaan bus listrik otonom (tanpa supir). Sebagai MT, bagaimana pendapat Anda?", "options": {"A": "Menolak karena akan menyebabkan banyak supir kehilangan pekerjaan.", "B": "Menyetujui sepenuhnya karena teknologi selalu lebih baik daripada tenaga manusia.", "C": "Menyarankan untuk melakukan kajian mendalam terkait regulasi, keamanan, dan dampak sosial sebelum diterapkan secara bertahap.", "D": "Tidak memberikan pendapat karena merasa bukan ahli di bidang teknologi tersebut. BAB V: TES SPASIAL", "E": "Meminta perusahaan untuk langsung membeli dalam jumlah banyak agar terlihat modern."}, "answer": "C", "explanation": "Pemimpin yang baik harus visioner terhadap teknologi namun tetap kritis dan mempertimbangkan berbagai aspek risiko."}, {"number": 43, "question": "Anda menemukan bahwa salah satu kebijakan operasional baru berpotensi memberikan keuntungan besar bagi perusahaan, namun merugikan hak-hak penumpang tertentu. Sikap Anda...", "options": {"A": "Tetap menjalankan kebijakan tersebut demi mengejar keuntungan perusahaan.", "B": "Menolak kebijakan tersebut dan memberikan saran perbaikan agar keuntungan perusahaan tetap selaras dengan hak penumpang.", "C": "Pura-pura tidak tahu agar tidak perlu mengambil keputusan yang sulit.", "D": "Melaksanakan kebijakan tersebut hanya jika diminta secara tertulis oleh atasan.", "E": "Menyebarkan keburukan kebijakan tersebut di media sosial agar dibatalkan."}, "answer": "B", "explanation": "Pengambilan keputusan etis menuntut keseimbangan antara kepentingan bisnis dan tanggung jawab sosial sebagai pelayan publik."}, {"number": 44, "question": "Di kantor, Anda memiliki akses ke data perjalanan rahasia pelanggan. Seorang teman lama meminta data tersebut untuk keperluan riset pribadinya. Respons Anda... (GAMBAR/POLA)", "options": {"A": "Memberikannya karena dia adalah teman lama dan untuk tujuan riset.", "B": "Memberikannya dengan syarat dia tidak boleh memberi tahu siapa pun.", "C": "Menolak dengan tegas dan menjelaskan bahwa data tersebut bersifat rahasia dan dilindungi undang-undang.", "D": "Menjual data tersebut karena memiliki nilai ekonomi yang tinggi.", "E": "Menanyakan kepada atasan apakah data tersebut boleh diberikan atau tidak."}, "answer": "C", "explanation": "Integritas dan kepatuhan terhadap kerahasiaan data (data privacy) adalah hal yang non-negosiasi di perusahaan BUMD."}, {"number": 45, "question": "Anda merasa sistem kerja di divisi Anda saat ini sangat lambat karena terlalu banyak prosedur birokrasi yang berulang. Apa yang Anda lakukan?", "options": {"A": "Mengabaikan saja karena sudah menjadi prosedur dari dulu.", "B": "Bekerja di luar prosedur agar pekerjaan Anda cepat selesai.", "C": "Mengidentifikasi titik birokrasi yang tidak efektif dan mengusulkan penyederhanaan alur kerja (lean process) kepada atasan.", "D": "Mengeluh di setiap kesempatan rapat mengenai birokrasi tersebut.", "E": "Menyalahkan bagian legal karena membuat aturan yang rumit."}, "answer": "C", "explanation": "MT diharapkan mampu memberikan solusi inovatif untuk meningkatkan efisiensi organisasi secara resmi."}, {"number": 46, "question": "Saat sedang melakukan inspeksi lapangan, Anda menemukan bahwa ada alat pemadam api ringan (APAR) di bus yang sudah kedaluwarsa. Apa tindakan cepat Anda?", "options": {"A": "Membiarkannya karena kemungkinan terjadi kebakaran sangat kecil.", "B": "Menunggu bus tersebut kembali ke depo baru dilaporkan.", "C": "Segera meminta pengemudi menukar unit APAR dengan yang baru dan melaporkan kejadian ini untuk evaluasi pengecekan rutin.", "D": "Memarahi supir bus di depan penumpang karena tidak mengecek peralatan.", "E": "Hanya mencatatnya di buku laporan tanpa melakukan tindakan darurat."}, "answer": "C", "explanation": "Keselamatan penumpang adalah prioritas utama (Safety First). Tindakan responsif dan preventif sangat diperlukan."}, {"number": 47, "question": "Bagaimana sikap Anda terhadap penggunaan kecerdasan buatan (AI) dalam mengatur jadwal keberangkatan bus?", "options": {"A": "Merasa terancam karena AI bisa menggantikan peran manajer.", "B": "Sangat mendukung dan bersedia menjadi pionir dalam mempelajari serta mengimplementasikan sistem tersebut. (GAMBAR/POLA)", "C": "Menolak karena sistem manual dirasa lebih aman dari serangan siber.", "D": "Mengikuti saja apa yang menjadi keputusan mayoritas pimpinan.", "E": "Menerima AI tetapi tetap ingin melakukan pengaturan secara manual setiap saat."}, "answer": "B", "explanation": "Keterbukaan terhadap perkembangan teknologi (digital literacy) adalah kompetensi wajib MT di era industri 4.0."}, {"number": 48, "question": "Anda diminta memimpin tim untuk membuat kampanye penggunaan transportasi publik bagi anak muda. Langkah kreatif apa yang Anda ambil?", "options": {"A": "Membuat brosur kertas dan membagikannya di perempatan jalan.", "B": "Memasang iklan besar di koran lokal.", "C": "Membuat konten edukatif yang menarik dan tren di platform media sosial seperti TikTok atau Instagram.", "D": "Menunggu ide dari anggota tim saja karena Anda sibuk dengan urusan administrasi.", "E": "Mengadakan rapat formal yang panjang dengan berbagai komunitas sekolah."}, "answer": "C", "explanation": "Inovasi dalam komunikasi publik harus menyesuaikan dengan target audiens (anak muda) dan tren teknologi terkini. BAB V: TES SPASIAL"}, {"number": 49, "question": "Jika Anda melihat celah dalam sistem e-ticketing yang bisa disalahgunakan oleh oknum tertentu, apa yang Anda lakukan?", "options": {"A": "Memanfaatkan celah tersebut untuk keuntungan pribadi sebelum diperbaiki.", "B": "Mendiamkannya selama belum ada yang menyadarinya.", "C": "Segera mendokumentasikan celah tersebut dan melaporkannya ke divisi IT agar segera dilakukan perbaikan sistem.", "D": "Memberitahu teman-teman dekat saja agar mereka waspada.", "E": "Menunggu sampai sistem tersebut benar- benar rusak baru melapor."}, "answer": "C", "explanation": "Proaktif dalam menjaga keamanan sistem perusahaan adalah bentuk tanggung jawab profesional. (GAMBAR/POLA)"}, {"number": 50, "question": "Anda ditawari untuk menghadiri pelatihan kepemimpinan di luar negeri, namun jadwalnya bentrok dengan peluncuran proyek penting yang Anda pimpin. Sikap Anda...", "options": {"A": "Mengabaikan pelatihan dan fokus pada proyek karena Anda adalah penanggung jawabnya.", "B": "Meninggalkan proyek dan pergi pelatihan karena itu kesempatan langka untuk diri sendiri.", "C": "Mendiskusikan dengan atasan mengenai kemungkinan pendelegasian tugas proyek yang efektif sehingga Anda bisa ikut pelatihan tanpa mengganggu proyek.", "D": "Meminta pelatihan tersebut dijadwal ulang hanya untuk Anda.", "E": "Tidak memilih keduanya dan malah mengambil cuti karena bingung."}, "answer": "C", "explanation": "Kemampuan manajemen prioritas dan delegasi adalah ciri pimpinan yang mampu menyeimbangkan pengembangan diri dan tanggung jawab kerja BAB V: TES SPASIAL BAB ASSESS KOMPETEN Note :Dilarang untuk memperjualbelikan serta seizin pemiliknya. Al adab fauqal ilmi .Se L (GAMBAR/POLA) B 2 SMENT NSI BIDANG a menshare soal kepada orang lain tanpa elamat mengerjakan!! –PrepKerja.id"}]}, "kompetensi": {"title": "Kompetensi Bidang (Operation & Service)", "duration": 3000, "order": 6, "type": "text", "questions": [{"number": 1, "question": "Dalam manajemen rantai pasok (Supply Chain Management), apa yang dimaksud dengan istilah \"Lead Time\"?", "options": {"A": "Waktu yang dibutuhkan bus untuk menyelesaikan satu ritase.", "B": "Durasi total yang dibutuhkan dari pemesanan suku cadang hingga barang sampai di gudang/depo.", "C": "Waktu tunggu penumpang di halte pada jam sibuk.", "D": "Kecepatan maksimal bus saat berada di jalur khusus.", "E": "Jeda waktu antara keberangkatan bus pertama dan bus kedua."}, "answer": "B", "explanation": "Lead time sangat krusial di operasional bus; keterlambatan pengiriman suku cadang bisa menyebabkan bus tidak bisa beroperasi (stagnasi armada)."}, {"number": 2, "question": "Strategi manajemen stok \"Just-In- Time\" (JIT) jika diterapkan pada pengadaan ban bus bertujuan untuk... (GAMBAR/POLA)", "options": {"A": "Membeli stok sebanyak-banyaknya untuk cadangan setahun.", "B": "Mengurangi biaya penyimpanan gudang dengan mendatangkan barang hanya saat akan digunakan.", "C": "Mengutamakan kualitas ban daripada harga beli.", "D": "Memastikan semua bus menggunakan merk ban yang berbeda-beda.", "E": "Menunggu ban pecah baru melakukan pemesanan baru."}, "answer": "B", "explanation": "JIT membantu efisiensi keuangan perusahaan dengan meminimalkan modal yang \"mati\" di dalam gudang penyimpanan."}, {"number": 3, "question": "Apa fungsi utama dari sistem Manajemen Gudang (Warehouse Management System) di depo Transjakarta?", "options": {"A": "Mengatur jadwal keberangkatan pengemudi bus.", "B": "Memantau posisi bus secara real-time melalui GPS.", "C": "Mengelola arus keluar-masuk barang, akurasi stok, dan lokasi penyimpanan material operasional.", "D": "Menghitung jumlah penumpang harian.", "E": "Melakukan rekrutmen petugas layanan halte. BAB V: TES SPASIAL"}, "answer": "C", "explanation": "WMS memastikan kebutuhan operasional seperti oli, ban, dan komponen mesin terkontrol dengan baik untuk mendukung kelancaran unit di lapangan."}, {"number": 4, "question": "Dalam konsep logistik, istilah \"Reverse Logistics\" di Transjakarta dapat diterapkan pada...", "options": {"A": "Pengalihan rute bus karena adanya penutupan jalan.", "B": "Proses pengembalian dan pengolahan suku cadang bekas atau oli lama untuk didaur ulang secara ramah lingkungan.", "C": "Bus yang berjalan berlawanan arah dengan rute biasanya.", "D": "Penumpang yang kembali ke halte asal karena salah naik bus.", "E": "Pengembalian sisa anggaran operasional ke kas daerah."}, "answer": "B", "explanation": "Reverse logistics berkaitan dengan aliran balik barang dari titik konsumsi kembali ke titik asal untuk pemulihan nilai atau pembuangan yang aman."}, {"number": 5, "question": "Manakah dari faktor berikut yang paling memengaruhi efisiensi biaya logistik dalam pengelolaan bus listrik?", "options": {"A": "Warna cat pada bodi bus.", "B": "Jumlah halte yang memiliki area komersial. (GAMBAR/POLA)", "C": "Lokasi infrastruktur pengisian daya (charging station) yang strategis dan merata di tiap depo.", "D": "Merk seragam yang digunakan oleh pengemudi.", "E": "Banyaknya iklan yang terpasang di dalam bus."}, "answer": "C", "explanation": "Lokasi pengisian daya yang tidak strategis akan meningkatkan \"dead mile\" (jarak tempuh tanpa penumpang), yang merupakan pemborosan energi dan biaya."}, {"number": 6, "question": "Apa yang dimaksud dengan \"Safety Stock\" dalam manajemen inventaris suku cadang?", "options": {"A": "Stok barang yang sudah kedaluwarsa dan tidak boleh dipakai.", "B": "Persediaan tambahan yang disimpan untuk mencegah terjadinya kehabisan stok akibat ketidakpastian permintaan atau pasokan.", "C": "Alat pelindung diri (APD) yang wajib digunakan petugas gudang.", "D": "Jumlah bus cadangan yang parkir di terminal.", "E": "Suku cadang yang memiliki sertifikat keamanan internasional."}, "answer": "B", "explanation": "Safety stock melindungi operasional dari risiko \"Stockout\" yang bisa berakibat pada berkurangnya jumlah bus yang melayani warga. BAB V: TES SPASIAL"}, {"number": 7, "question": "Sistem pelacakan aset (Asset Tracking) pada komponen bus menggunakan barcode atau RFID bertujuan untuk...", "options": {"A": "Menghitung jumlah keuntungan harian dari satu bus.", "B": "Mempermudah pemantauan siklus hidup komponen (misal: usia pemakaian mesin) agar perawatan dilakukan tepat waktu.", "C": "Mengetahui nama penumpang yang duduk di kursi bus.", "D": "Mengatur kecerahan lampu di dalam kabin bus.", "E": "Menentukan rute yang paling banyak menghasilkan uang."}, "answer": "B", "explanation": "Dengan pelacakan aset, manajemen bisa melakukan pemeliharaan preventif (preventive maintenance) untuk mencegah kerusakan mendadak di jalan."}, {"number": 8, "question": "Dalam rantai pasok, penyedia layanan logistik pihak ketiga (Third Party Logistics/3PL) sering digunakan Transjakarta untuk...", "options": {"A": "Mengambil keputusan strategis perusahaan di level direksi.", "B": "Melakukan audit internal keuangan perusahaan.", "C": "Menangani distribusi barang atau jasa tertentu seperti pengadaan armada bus dari pihak operator swasta.", "D": "Melayani keluhan penumpang di media sosial. (GAMBAR/POLA)", "E": "Menyusun regulasi transportasi di tingkat provinsi."}, "answer": "C", "explanation": "Penggunaan mitra operator adalah bentuk integrasi 3PL dalam ekosistem Transjakarta untuk memperluas jangkauan layanan."}, {"number": 9, "question": "Istilah \"Bullwhip Effect\" dalam supply chain merujuk pada...", "options": {"A": "Peningkatan jumlah penumpang secara mendadak saat hari libur.", "B": "Distorsi informasi yang menyebabkan fluktuasi inventaris yang semakin besar dari tingkat ritel ke tingkat manufaktur.", "C": "Kecelakaan beruntun yang melibatkan lebih dari dua bus.", "D": "Strategi pemasaran untuk menarik minat pengguna kendaraan pribadi.", "E": "Proses pengisian bahan bakar yang sangat cepat di depo."}, "answer": "B", "explanation": "Komunikasi data yang akurat antara bagian operasional lapangan dan bagian pengadaan sangat penting untuk menghindari penumpukan stok yang tidak perlu."}, {"number": 10, "question": "Apa indikator utama (KPI) yang paling relevan untuk mengukur keberhasilan manajemen logistik di depo bus?", "options": {"A": "Tingkat kepuasan penumpang terhadap kebersihan halte. BAB V: TES SPASIAL", "B": "Ketersediaan unit bus siap guna (Availability) di setiap awal jam operasional.", "C": "Jumlah pengikut akun media sosial perusahaan.", "D": "Banyaknya jumlah halte integrasi yang dibangun.", "E": "Rata-rata usia pengemudi bus di satu koridor."}, "answer": "B", "explanation": "Jika manajemen logistik (suku cadang dan BBM) baik, maka jumlah bus yang siap beroperasi akan selalu maksimal sesuai target harian. Optimasi Rute & Manajemen Headway. Sebagai calon pemimpin di divisi Operation & Service, Anda harus mampu mengatur pergerakan armada agar efisien secara biaya namun tetap memberikan kepastian waktu bagi penumpang. Bagian ini menguji logika Anda dalam meminimalkan hambatan dan memaksimalkan kapasitas angkut armada."}, {"number": 11, "question": "Apa yang dimaksud dengan istilah \"Headway\" dalam operasional Transjakarta?", "options": {"A": "Kecepatan maksimal yang boleh ditempuh bus di jalur busway.", "B": "Selisih waktu keberangkatan atau kedatangan antara satu armada dengan armada berikutnya di halte yang sama.", "C": "Kapasitas total penumpang yang dapat diangkut dalam satu hari. (GAMBAR/POLA)", "D": "Jarak tempuh bus dari titik awal hingga titik akhir rute.", "E": "Waktu istirahat yang diberikan kepada pengemudi bus."}, "answer": "B", "explanation": "Manajemen headway yang konsisten sangat penting untuk mencegah penumpukan penumpang dan memastikan keandalan jadwal layanan."}, {"number": 12, "question": "Strategi \"Bus Bunching\" (penumpukan bus di satu titik) adalah kondisi yang harus dihindari karena...", "options": {"A": "Menyebabkan bus terlalu kosong sehingga boros bahan bakar.", "B": "Membuat halte terlihat sangat penuh oleh bus.", "C": "Mengakibatkan waktu tunggu penumpang di halte berikutnya menjadi sangat lama dan tidak menentu.", "D": "Meningkatkan risiko kecelakaan antar- bus di jalur sempit.", "E": "Mengurangi pendapatan harian dari tiket penumpang."}, "answer": "C", "explanation": "Bus bunching terjadi ketika satu bus melambat dan bus di belakangnya menyusul, sehingga terjadi kekosongan layanan di halte-halte selanjutnya."}, {"number": 13, "question": "Dalam optimasi rute, istilah \"Dead Mile\" merujuk pada...", "options": {"A": "Jarak yang ditempuh bus saat membawa penumpang maksimal. BAB V: TES SPASIAL", "B": "Jarak tempuh armada saat bergerak tanpa membawa penumpang, misalnya dari depo menuju titik awal rute.", "C": "Area jalur busway yang mengalami kerusakan parah.", "D": "Rute yang sudah tidak lagi diminati oleh penumpang.", "E": "Jarak antara dua halte yang paling jauh di satu koridor."}, "answer": "B", "explanation": "Seorang MT Operation harus mampu meminimalkan dead mile untuk mengefisiensikan biaya operasional dan penggunaan bahan bakar/daya."}, {"number": 14, "question": "Faktor utama yang harus dipertimbangkan dalam menentukan jumlah armada yang dilepas ke sebuah koridor pada jam sibuk (peak hour) adalah...", "options": {"A": "Jumlah halte yang memiliki fasilitas AC.", "B": "Perbandingan antara kapasitas angkut bus dengan perkiraan volume penumpang (Demand).", "C": "Luas depo penyimpanan bus di area tersebut.", "D": "Merk bus yang digunakan pada koridor tersebut.", "E": "Jumlah petugas keamanan yang berjaga di halte."}, "answer": "B", "explanation": "Penentuan jumlah armada harus berbasis data demand agar tidak terjadi kelebihan kapasitas yang mubazir (GAMBAR/POLA) atau kekurangan armada yang menyebabkan antrean."}, {"number": 15, "question": "Apa tujuan dari diterapkannya rute ekspres (Express Route) pada jam-jam tertentu?", "options": {"A": "Memberikan tarif yang lebih mahal bagi penumpang yang ingin cepat.", "B": "Mengurangi beban kepadatan di halte- halte transit utama dengan melewati beberapa halte kecil.", "C": "Menguji kecepatan maksimal mesin bus baru.", "D": "Menghabiskan sisa kuota bahan bakar harian.", "E": "Mengalihkan penumpang agar menggunakan moda transportasi lain."}, "answer": "B", "explanation": "Rute ekspres membantu mempercepat pergerakan penumpang dari titik awal ke titik akhir atau halte transit besar tanpa terhambat setiap halte."}, {"number": 16, "question": "Manakah yang paling efektif untuk mengurangi hambatan bus di titik bersilangan dengan kendaraan pribadi (Bottleneck)?", "options": {"A": "Menambah jumlah kursi di dalam bus.", "B": "Melakukan sterilisasi jalur secara konsisten dan koordinasi dengan pihak kepolisian/Dishub.", "C": "Menghapus halte yang berada di dekat titik macet.", "D": "Meminta penumpang untuk turun dan berjalan kaki di area macet. BAB V: TES SPASIAL", "E": "Mengganti bus besar dengan bus kecil (mikrotrans)."}, "answer": "B", "explanation": "Kelancaran operasional sangat bergantung pada sterilisasi jalur khusus agar bus tidak terjebak kemacetan umum."}, {"number": 17, "question": "Sistem GPS pada armada Transjakarta digunakan oleh bagian operasional pusat untuk...", "options": {"A": "Mendengarkan percakapan penumpang di dalam kabin.", "B": "Mengatur durasi lampu lalu lintas secara otomatis.", "C": "Memantau posisi armada secara real-time untuk mengatur headway dan memberikan estimasi kedatangan (ETA) bagi penumpang.", "D": "Menghitung jumlah langkah pengemudi bus harian.", "E": "Mengubah warna lampu di dalam halte dari jarak jauh."}, "answer": "C", "explanation": "Data GPS adalah fondasi utama dalam mengontrol pergerakan armada agar tetap sesuai jadwal yang ditetapkan."}, {"number": 18, "question": "Apa dampak utama dari penentuan rute yang memiliki terlalu banyak halte transit (overlapping rute)?", "options": {"A": "Penumpang menjadi lebih senang karena banyak pilihan. (GAMBAR/POLA)", "B": "Terjadi inefisiensi armada dan penumpukan bus di halte transit tertentu yang dapat menghambat laju bus lain.", "C": "Pendapatan tiket akan meningkat dua kali lipat secara otomatis.", "D": "Bus akan menjadi lebih awet karena sering berhenti.", "E": "Tidak ada dampak signifikan bagi operasional."}, "answer": "B", "explanation": "Optimasi rute memerlukan keseimbangan agar tidak terjadi tumpang tindih berlebihan yang justru menurunkan produktivitas armada."}, {"number": 19, "question": "Dalam manajemen operasional, istilah \"Cycle Time\" untuk satu unit bus berarti...", "options": {"A": "Waktu yang dibutuhkan bus untuk mencuci seluruh bodi unit.", "B": "Total waktu yang dibutuhkan armada mulai dari berangkat dari titik awal, menuju titik akhir, hingga kembali ke titik awal (satu putaran rute).", "C": "Durasi pergantian shift antar-pengemudi.", "D": "Waktu yang dibutuhkan mesin bus untuk panas di pagi hari.", "E": "Masa pakai bus sebelum akhirnya harus dihancurkan/scrapped."}, "answer": "B", "explanation": "Mengetahui cycle time sangat penting untuk menghitung berapa jumlah bus yang dibutuhkan untuk melayani rute tersebut secara berkelanjutan. BAB V: TES SPASIAL"}, {"number": 20, "question": "Penggunaan bus gandeng (articulated bus) paling tepat ditempatkan pada rute yang memiliki karakteristik...", "options": {"A": "Jalur yang sempit dan banyak belokan tajam.", "B": "Koridor dengan volume penumpang sangat tinggi dan jalur yang relatif lurus/lebar.", "C": "Rute perumahan yang penumpangnya sedikit.", "D": "Jalur yang melewati jembatan dengan kapasitas beban rendah.", "E": "Rute wisata yang hanya beroperasi di hari libur."}, "answer": "B", "explanation": "Bus gandeng digunakan untuk memaksimalkan kapasitas angkut pada koridor-koridor utama yang sangat padat. Service Excellence (Keunggulan Layanan)."}, {"number": 21, "question": "Apa definisi yang paling tepat dari \"Service Excellence\" dalam konteks transportasi publik?", "options": {"A": "Memberikan layanan yang sesuai dengan standar prosedur operasional minimum.", "B": "Memberikan layanan yang melebihi harapan pelanggan secara konsisten untuk menciptakan kepuasan dan loyalitas.", "C": "Menyediakan bus yang selalu baru dan mewah di setiap koridor.", "D": "Menghilangkan seluruh keluhan penumpang di media sosial. (GAMBAR/POLA)", "E": "Memberikan potongan harga tiket setiap hari kepada penumpang."}, "answer": "B", "explanation": "Keunggulan layanan berarti melampaui standar dasar untuk memastikan penumpang merasa dihargai dan nyaman menggunakan transportasi umum."}, {"number": 22, "question": "Dalam menangani keluhan penumpang yang marah karena bus terlambat, langkah pertama yang paling benar sesuai prinsip pelayanan adalah...", "options": {"A": "Langsung memberikan kompensasi berupa uang tunai.", "B": "Menjelaskan bahwa kemacetan bukan kesalahan pihak Transjakarta.", "C": "Mendengarkan dengan penuh empati, meminta maaf, dan memberikan informasi yang jelas mengenai estimasi kedatangan bus berikutnya.", "D": "Meminta penumpang tersebut untuk tidak berteriak di area halte.", "E": "Mengabaikan penumpang tersebut sampai emosinya mereda sendiri."}, "answer": "C", "explanation": "Empati dan komunikasi yang jujur adalah fondasi dalam meredam konflik dan memperbaiki persepsi pelanggan terhadap layanan."}, {"number": 23, "question": "Fasilitas halte yang ramah disabilitas, seperti ramp yang landai dan ubin pemandu (guiding block), merupakan bentuk implementasi dari...", "options": {"A": "Inovasi teknologi digital. BAB V: TES SPASIAL", "B": "Inklusivitas dalam standar layanan publik.", "C": "Strategi penghematan biaya operasional.", "D": "Kewajiban hukum yang tidak memiliki nilai layanan.", "E": "Kebutuhan komersial pihak ketiga."}, "answer": "B", "explanation": "Layanan prima harus bersifat inklusif, artinya dapat diakses dan digunakan dengan nyaman oleh semua kalangan, termasuk kelompok rentan."}, {"number": 24, "question": "Apa yang dimaksud dengan \"Moment of Truth\" dalam pengalaman penumpang Transjakarta?", "options": {"A": "Waktu di mana bus mengalami kecelakaan di jalan raya.", "B": "Setiap titik interaksi antara penumpang dengan layanan Transjakarta (misal: saat tapping, bertanya ke petugas, atau kondisi kabin bus).", "C": "Saat penumpang memberikan rating di aplikasi seluler.", "D": "Rapat akhir tahun jajaran direksi mengenai keuntungan perusahaan.", "E": "Proses rekrutmen petugas layanan halte yang baru."}, "answer": "B", "explanation": "Moment of Truth adalah kesempatan emas di mana kualitas layanan diuji secara langsung oleh pelanggan; jika satu titik buruk, persepsi total layanan bisa rusak. (GAMBAR/POLA)"}, {"number": 25, "question": "Mengapa \"First Impression\" (kesan pertama) petugas layanan halte sangat penting bagi penumpang?", "options": {"A": "Agar petugas terlihat lebih berkuasa daripada penumpang.", "B": "Karena kesan pertama menentukan tingkat kepercayaan dan kenyamanan penumpang terhadap layanan selama perjalanan.", "C": "Untuk memastikan penumpang segera melakukan tapping tanpa bertanya.", "D": "Supaya penumpang takut untuk melanggar aturan di halte.", "E": "Hanya sebagai syarat formalitas dalam penilaian kinerja tahunan."}, "answer": "B", "explanation": "Petugas halte adalah \"wajah\" perusahaan; keramahan dan kesigapan mereka adalah representasi langsung dari kualitas Transjakarta."}, {"number": 26, "question": "Standar kebersihan armada yang terjaga sepanjang hari merupakan bagian dari Service Excellence di bidang...", "options": {"A": "Layanan Informasi.", "B": "Fasilitas Fisik (Tangibles).", "C": "Jaminan Keamanan (Assurance).", "D": "Empati Petugas.", "E": "Keandalan Jadwal (Reliability)."}, "answer": "B", "explanation": "Kebersihan bus adalah aspek fisik yang dapat langsung dirasakan BAB V: TES SPASIAL penumpang dan sangat memengaruhi kenyamanan perjalanan."}, {"number": 27, "question": "Seorang penumpang tunanetra ingin masuk ke bus yang sangat padat. Tindakan petugas layanan bus (PLB) yang paling tepat adalah...", "options": {"A": "Menyarankan penumpang tersebut menunggu bus berikutnya yang lebih sepi.", "B": "Meminta penumpang lain untuk memberikan kursi prioritas dan membantu penumpang tersebut naik dengan hati-hati.", "C": "Membiarkan penumpang tersebut mencari jalannya sendiri agar mandiri.", "D": "Melarang penumpang tersebut naik karena alasan keamanan.", "E": "Mengangkat penumpang tersebut secara paksa masuk ke dalam bus."}, "answer": "B", "explanation": "Kesigapan petugas dalam membantu kelompok prioritas adalah indikator utama keberhasilan layanan publik yang manusiawi."}, {"number": 28, "question": "Apa fungsi dari survei kepuasan pelanggan yang dilakukan secara berkala oleh Transjakarta?", "options": {"A": "Sebagai bahan promosi untuk menjatuhkan kompetitor.", "B": "Sebagai alat evaluasi untuk mengidentifikasi area layanan yang perlu diperbaiki.", "C": "Untuk memenuhi syarat administratif dari pemerintah saja. (GAMBAR/POLA)", "D": "Mencari kesalahan petugas lapangan agar bisa diberikan sanksi.", "E": "Mengurangi jumlah armada pada rute yang penumpangnya tidak puas."}, "answer": "B", "explanation": "Data dari pelanggan adalah masukan paling objektif untuk melakukan perbaikan berkelanjutan (continuous improvement) pada operasional."}, {"number": 29, "question": "Sikap proaktif petugas dalam memberikan informasi perubahan rute tanpa diminta oleh penumpang disebut sebagai...", "options": {"A": "Responsivitas (Responsiveness).", "B": "Formalitas.", "C": "Keterpaksaan kerja.", "D": "Pelanggaran privasi.", "E": "Inefisiensi waktu."}, "answer": "A", "explanation": "Responsivitas adalah kemauan untuk membantu pelanggan dan memberikan layanan yang cepat serta tanggap."}, {"number": 30, "question": "Dalam Service Excellence, jika terjadi gangguan teknis pada sistem e-ticketing, tindakan manajemen yang paling tepat adalah...", "options": {"A": "Menutup seluruh halte sampai sistem diperbaiki.", "B": "Menyalahkan pihak penyedia kartu bank di media massa. BAB V: TES SPASIAL", "C": "Memberikan informasi darurat yang cepat melalui seluruh saluran komunikasi dan menyiapkan solusi alternatif agar mobilitas penumpang tidak terhenti.", "D": "Meminta penumpang membayar tunai kepada petugas secara manual tanpa karcis.", "E": "Membiarkan penumpang masuk secara gratis tanpa pencatatan data sama sekali."}, "answer": "C", "explanation": "Manajemen krisis yang transparan dan solutif adalah bagian dari menjaga integritas layanan di mata publik. Analisis Operasional & Efisiensi. Sebagai calon pemimpin di divisi operasional, Anda dituntut untuk bisa membaca data lapangan dan mengubahnya menjadi keputusan yang taktis. Di bagian ini, fokusnya adalah pada bagaimana mengoptimalkan sumber daya (armada dan personel) untuk mencapai target performa perusahaan dengan biaya yang paling efisien."}, {"number": 31, "question": "Apa yang dimaksud dengan indikator Load Factor dalam operasional bus Transjakarta?", "options": {"A": "Jumlah total bus yang tersedia di depo.", "B": "Perbandingan antara jumlah penumpang yang diangkut dengan kapasitas kursi/daya tampung armada yang tersedia.", "C": "Berat beban maksimal yang bisa ditampung oleh mesin bus.", "D": "Waktu yang dibutuhkan bus untuk mengisi bahan bakar hingga penuh. (GAMBAR/POLA)", "E": "Rasio jumlah petugas halte dibandingkan dengan jumlah penumpang."}, "answer": "B", "explanation": "Load Factor digunakan untuk mengukur seberapa efektif kapasitas armada digunakan. Jika terlalu rendah berarti tidak efisien, jika terlalu tinggi (melebihi 100%) berarti terjadi penumpukan berlebih."}, {"number": 32, "question": "Untuk meningkatkan efisiensi biaya bahan bakar pada armada bus konvensional, tindakan operasional yang paling tepat adalah...", "options": {"A": "Mengurangi jumlah bus yang beroperasi di semua jam.", "B": "Mematikan AC bus selama perjalanan berlangsung.", "C": "Melakukan pemantauan perilaku mengemudi (eco-driving) dan memastikan perawatan mesin dilakukan secara rutin.", "D": "Meminta penumpang untuk mendorong bus saat mulai berjalan.", "E": "Mengganti rute bus menjadi lebih jauh agar mesin tidak sering berhenti."}, "answer": "C", "explanation": "Eco-driving dan perawatan rutin dapat menekan konsumsi bahan bakar secara signifikan tanpa mengurangi kualitas layanan kepada penumpang."}, {"number": 33, "question": "Seorang MT Operation menemukan bahwa rata-rata Cycle Time di Koridor X meningkat sebesar 20 menit karena kemacetan di titik baru. Dampak langsung bagi penumpang adalah...", "options": {"A": "Bus menjadi lebih cepat sampai di tujuan. BAB V: TES SPASIAL", "B": "Waktu tunggu (headway) di halte menjadi lebih lama dan tidak stabil.", "C": "Harga tiket bus akan otomatis naik.", "D": "Jumlah kursi di dalam bus akan dikurangi.", "E": "Petugas halte akan ditambah jumlahnya."}, "answer": "B", "explanation": "Peningkatan cycle time tanpa penambahan armada akan menyebabkan jeda antarbus (headway) melebar, yang merugikan penumpang."}, {"number": 34, "question": "Indikator Mean Time Between Failures (MTBF) pada manajemen armada digunakan untuk mengukur...", "options": {"A": "Rata-rata waktu keberangkatan bus di pagi hari.", "B": "Rata-rata waktu interval antara satu kegagalan teknis/kerusakan mesin dengan kerusakan berikutnya.", "C": "Jumlah penumpang yang jatuh di dalam bus.", "D": "Kecepatan rata-rata bus saat melewati jalur busway.", "E": "Waktu yang dibutuhkan untuk mencuci satu unit bus."}, "answer": "B", "explanation": "MTBF yang tinggi menunjukkan bahwa armada dalam kondisi sangat andal dan jarang mengalami kerusakan saat beroperasi."}, {"number": 35, "questi   // ============ STATE ============
  const STORAGE_KEY = 'psikotes_mt_transjakarta_v2';
  const USER_KEY = 'psikotes_mt_user_v2';
  
  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return defaultState();
      const parsed = JSON.parse(raw);
      const savedUser = loadUser();
      if (savedUser && parsed.userId && parsed.userId !== savedUser.id) {
        return defaultState();
      }
      return { ...defaultState(), ...parsed };
    } catch (e) {
      return defaultState();
    }
  }
  
  function defaultState() {
    return {
      userId: null,
      view: 'home',
      activeSection: null,
      currentIndex: 0,
      answers: {},
      startedAt: {},
      remainingTime: {},
      completedAt: {},
      scores: {},
      lbTab: 'total',
      submitStatus: {},
      ganjilGenap: null,
      selisihAngka: null,
      selisihHuruf: null,
    };
  }
  
  function saveState() {
    if (currentUser) state.userId = currentUser.id;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }
  
  function loadUser() {
    try {
      const raw = localStorage.getItem(USER_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch (e) { return null; }
  }
  
  function saveUser(user) {
    if (user) localStorage.setItem(USER_KEY, JSON.stringify(user));
    else localStorage.removeItem(USER_KEY);
  }
  
  let state = loadState();
  let currentUser = loadUser();
  let timerInterval = null;
  let _sbClient = null;
  let pausedSessionsCache = {};
  
  // ============ SUPABASE INIT ============
  function initSupabase() {
    if (!SUPABASE_URL || !SUPABASE_ANON_KEY) return null;
    if (_sbClient) return _sbClient;
    try {
      _sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      return _sbClient;
    } catch (e) {
      console.error('Supabase init error:', e);
      return null;
    }
  }
  
  function isLeaderboardEnabled() {
    return !!(SUPABASE_URL && SUPABASE_ANON_KEY);
  }
  
  // ============ AUTH ============
  async function hashPassword(plain) {
    const enc = new TextEncoder().encode(plain);
    const buf = await crypto.subtle.digest('SHA-256', enc);
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
  }
  
  async function register(username, password, displayName) {
    const sb = initSupabase();
    if (!sb) throw new Error('Supabase belum dikonfigurasi');
    const hash = await hashPassword(password);
    const { data, error } = await sb
      .from('users')
      .insert({ username: username.toLowerCase(), password_hash: hash, display_name: displayName || username })
      .select()
      .single();
    if (error) {
      if (error.code === '23505') throw new Error('Username sudah dipakai. Coba yang lain.');
      throw new Error(error.message);
    }
    return data;
  }
  
  async function login(username, password) {
    const sb = initSupabase();
    if (!sb) throw new Error('Supabase belum dikonfigurasi');
    const hash = await hashPassword(password);
    const { data, error } = await sb
      .from('users')
      .select('*')
      .eq('username', username.toLowerCase())
      .eq('password_hash', hash)
      .maybeSingle();
    if (error) throw new Error(error.message);
    if (!data) throw new Error('Username atau password salah');
    return data;
  }
  
  function logout() {
    currentUser = null;
    saveUser(null);
    state = defaultState();
    pausedSessionsCache = {};
    window._autoResumeChecked = false;
    saveState();
    state.view = 'auth';
    render();
  }
  
  async function submitScoreToSupabase(sectionId, scoreData) {
    if (!currentUser || !isLeaderboardEnabled()) return false;
    const sb = initSupabase();
    if (!sb) return false;
    
    state.submitStatus[sectionId] = 'pending';
    saveState();
    
    try {
      const { error } = await sb.from('scores').insert({
        user_id: currentUser.id,
        section_id: sectionId,
        score: scoreData.score,
        correct: scoreData.correct,
        total: scoreData.total,
        duration_seconds: scoreData.duration,
        timed_out: scoreData.timedOut,
      });
      if (error) {
        state.submitStatus[sectionId] = 'error';
        saveState();
        console.error('Submit error:', error);
        return false;
      }
      state.submitStatus[sectionId] = 'success';
      saveState();
      return true;
    } catch (e) {
      state.submitStatus[sectionId] = 'error';
      saveState();
      console.error('Submit exception:', e);
      return false;
    }
  }
  
  // ============ PAUSE / RESUME ============

    if (!sb || !currentUser) return false;

      const { error } = await sb.from('paused_sessions').upsert({
        user_id: currentUser.id,

        time_remaining_seconds: state.remainingTime[sectionId] || 0,
        answers: state.answers[sectionId] || {},
        current_index: state.currentIndex,
        paused_at: new Date().toISOString()
      }, { onConflict: 'user_id,section_id' });
      if (error) { console.error('savePausedSession error:', error); return false; }
      return true;

  }

    const sb = initSupabase();
    if (!sb || !currentUser) return {};
    try {
      const { data, error } = await sb.from('paused_sessions').select('*').eq('user_id', currentUser.id);
      if (error || !data) return {};
      const result = {};
      data.forEach(s => {
        // Selisih Angka tidak pakai sistem paused_sessions — hapus entri lama jika ada

        if (s.section_id === 'selisih_huruf') {

          return;
        }
        result[s.section_id] = s;
      });
      return result;
    } catch (e) { return {}; }
  }

  async function deletePausedSession(sectionId) {
    const sb = initSupabase();
    if (!sb || !currentUser) return;
    try {
      await sb.from('paused_sessions').delete()
        .eq('user_id', currentUser.id)
        .eq('section_id', sectionId);
    } catch (e) { console.error('deletePausedSession error:', e); }
  }

    const sb = initSupabase();
    if (!sb || !currentUser) return false;

      const { error: e1 } = await sb.from('scores').delete().eq('user_id', currentUser.id);

  }

  async function pauseSection() {
    const sectionId = state.activeSection;
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    const backBtn = document.getElementById('backHomeBtn');
    if (backBtn) { backBtn.textContent = '⏳ Menyimpan...'; backBtn.disabled = true; }
    const saved = await savePausedSession(sectionId);
    if (!saved) {
      if (backBtn) { backBtn.textContent = '← Kembali ke Home'; backBtn.disabled = false; }
      showModal('Gagal Menyimpan', 'Gagal simpan ke server. Periksa koneksi internet kamu lalu coba lagi.', () => { startTimer(); }, 'Kembali ke Soal');
      return;
    }
    pausedSessionsCache[sectionId] = {
      section_id: sectionId,
      time_remaining_seconds: state.remainingTime[sectionId] || 0,
      answers: state.answers[sectionId] || {},
      current_index: state.currentIndex,
    };
    delete state.startedAt[sectionId];
    delete state.answers[sectionId];
    delete state.remainingTime[sectionId];
    state.view = 'home';
    saveState();
    render();
  }

  async function resumeSection(sectionId) {
    const sb = initSupabase();
    if (!sb || !currentUser) { startSection(sectionId); return; }
    try {
      const { data, error } = await sb.from('paused_sessions').select('*')
        .eq('user_id', currentUser.id).eq('section_id', sectionId).maybeSingle();
      if (error || !data) { startSection(sectionId); return; }
      state.activeSection = sectionId;
      state.view = 'quiz';
      state.currentIndex = data.current_index || 0;
      state.answers[sectionId] = data.answers || {};
      state.remainingTime[sectionId] = data.time_remaining_seconds;
      state.startedAt[sectionId] = Date.now();
      await deletePausedSession(sectionId);
      delete pausedSessionsCache[sectionId];
      saveState();
      render();
    } catch (e) { console.error('resumeSection error:', e); startSection(sectionId); }
  }

  function showPauseModal() {
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    const bg = document.getElementById('modal');
    document.getElementById('modalTitle').textContent = 'Mau ngapain dulu?';
    document.getElementById('modalMsg').textContent = 'Pilih "Tunda" buat simpan progress dan lanjut nanti dari device manapun. Atau "Submit" buat kumpulkan jawaban sekarang.';
    const ok = document.getElementById('modalOk');
    const cancel = document.getElementById('modalCancel');
    let pauseBtn = document.getElementById('modalPauseBtn');
    if (!pauseBtn) {
      pauseBtn = document.createElement('button');
      pauseBtn.id = 'modalPauseBtn';
      pauseBtn.className = 'btn btn-secondary';
      ok.parentNode.insertBefore(pauseBtn, ok);
    }
    pauseBtn.textContent = '⏸ Tunda';
    ok.textContent = 'Submit Sekarang';
    ok.className = 'btn btn-danger';
    cancel.textContent = 'Batal';
    bg.classList.remove('hidden');
    function cleanup() {
      bg.classList.add('hidden');
      const pb = document.getElementById('modalPauseBtn');
      if (pb) pb.remove();
      ok.textContent = 'Yakin'; ok.className = 'btn btn-danger';
      cancel.textContent = 'Batal';
      ok.onclick = null; cancel.onclick = null; bg.onclick = null;
    }
    pauseBtn.onclick = () => { cleanup(); pauseSection(); };
    ok.onclick = () => {
      cleanup();
      const answered = Object.keys(state.answers[state.activeSection] || {}).length;
      const total = getSection(state.activeSection).questions.length;
      const msg = answered < total ? `Kamu baru jawab ${answered} dari ${total} soal. Yakin mau submit?` : `Semua soal sudah dijawab. Submit jawaban?`;
      showModal('Submit Section?', msg, () => finishSection(), 'Submit');
    };
    cancel.onclick = () => { cleanup(); startTimer(); };
    bg.onclick = (e) => { if (e.target === bg) { cleanup(); startTimer(); } };
  }

      newBtn.className = 'btn btn-secondary';

    newBtn.textContent = '🗑 Mulai Baru';
    ok.textContent = '▶ Lanjutkan';
